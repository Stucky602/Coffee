gs. A note on grades: Kenya AA refers to bean size, not quality; read the estate and processing alongside it."}], "keypoints": ["SL28/SL34, volcanic soil, double-washed: blackcurrant, berry, wine-like acidity, savory edge, high clarity.", "Dense and high-grown — takes heat, but carries strong exothermic energy after first crack; plan the RoR.", "Roast light-to-medium (City–City+); dark roasting destroys the distinctive compounds.", "AA is bean size, not quality — read estate + processing. A filter/pour-over coffee first."], "refs": [{"label": "Roast Coffee Co — Kenyan coffee guide", "link": "https://www.roastcc.com/learn/kenyan-coffee-guide"}, {"label": "Coffee Guide — Kenya SL28, AA grade & flavor", "link": "https://coffee-guide.jp/en/beans/kenya-coffee-beans-complete-guide"}, {"label": "Hacea Coffee — roasting SL28/SL34 & exothermic energy", "link": "https://haceacoffee.com/blogs/roasting/roast-approach-costa-rica-hacienda-sonora-sl28-sl34-natural"}]}, "origin_guatemala": {"name": "Guatemala", "sub": "High-grown, balanced, complex", "group": "origin", "accent": "#B07B3E", "sections": [{"h": "What you're working with", "body": "Guatemala's high-altitude microclimates, volcanic soil, and steady rainfall make it one of Central America's finest origins. Most Guatemalan coffee is traditionally washed, though naturals and honeys are growing. The regions each have a character: Antigua is prized for a well-balanced, chocolatey, full-bodied cup; Huehuetenango, high and dry, gives brighter, more complex, fruit-and-citrus-forward coffees. Common varieties include Bourbon, Caturra, Catuai, and Typica. High-grown lots are dense — you'll often see 'SHB' (Strictly Hard Bean) marking the highest elevations."}, {"h": "How to roast it", "body": "Guatemala is versatile, which is part of its appeal. Washed high-grown lots take a medium roast beautifully, developing the chocolate, caramel, and gentle fruit that make Antigua a crowd-pleaser and espresso-friendly. Huehuetenango's brighter, more acidic profile rewards a slightly lighter hand to keep its complexity and citrus alive. As dense high-grown coffee, it wants adequate energy through the roast; SHB lots especially."}, {"h": "Target", "body": "Medium is the sweet spot for most Guatemalans (City+ to Full City), balancing body and sweetness — Antigua in particular shines here and works well in espresso. Push Huehuetenango a touch lighter to preserve its brighter, fruitier complexity for filter. A dependable, flexible origin that suits a range of menus."}], "keypoints": ["High-altitude volcanic origin, mostly washed; Antigua = balanced/chocolatey, Huehuetenango = brighter/complex.", "Dense high-grown beans (look for SHB = Strictly Hard Bean); wants adequate roast energy.", "Medium roast suits most (City+–Full City); Antigua great for espresso, Huehue lighter for filter clarity.", "Versatile, dependable origin — Bourbon, Caturra, Catuai, Typica common."], "refs": [{"label": "Leaderboard Coffee — Guatemala origin guide", "link": "https://leaderboard.coffee/en-us/blogs/news/an-origin-region-varietal-guide-season-12"}, {"label": "Haiku Brew — Guatemala regions & flavors", "link": "https://haikubrew.com/blogs/coffee-education/top-10-coffee-growing-regions-and-their-unique-flavors"}]}, "origin_costarica": {"name": "Costa Rica", "sub": "Clean, sweet, honey-process country", "group": "origin", "accent": "#B07B3E", "sections": [{"h": "What you're working with", "body": "Costa Rica is small — under 1% of world supply — but punches far above its weight on quality, backed by strict national standards (historically Arabica-only) and a thriving micro-mill culture. Tarrazú is the flagship region, with the Central and West Valleys close behind, all high-grown on volcanic soil. Costa Rica is the home of refined honey processing — you'll see it split into white, yellow, red, and black honey by mucilage retained — alongside washed and a growing number of naturals. 'SHB' (Strictly Hard Bean) marks the highest, densest lots."}, {"h": "How to roast it", "body": "Classic washed Costa Ricans are clean, bright, and balanced — a medium roast brings out their caramel sweetness and crisp acidity. Honey-processed lots carry more sweetness and body, and reward a careful medium that lets that syrupy character show without baking it. As dense, high-grown SHB coffee, it takes energy well; with the honeys and naturals, mind the extra sugars during development so you don't scorch or bake."}, {"h": "Target", "body": "Medium (City+ to Full City) for most — enough to develop the sweetness and body Costa Rica is loved for while keeping its clean acidity. Washed lots can go slightly lighter for filter clarity; honey and natural lots shine at a balanced medium that plays up their fruit and syrupy body. A reliably clean, sweet, crowd-pleasing origin."}], "keypoints": ["Small but high-quality; strict standards, micro-mill culture; Tarrazú flagship, volcanic high-grown.", "Home of refined honey processing (white→black by mucilage), plus washed and growing naturals.", "Dense SHB lots take energy well; watch extra sugars in honey/natural lots during development.", "Medium roast (City+–Full City) for sweetness + body; washed slightly lighter for filter clarity."], "refs": [{"label": "Leaderboard Coffee — Costa Rica regions & processing", "link": "https://leaderboard.coffee/en-us/blogs/news/an-origin-region-varietal-guide-season-12"}, {"label": "Tectonic Coffee — Tarrazú & SL28 in Costa Rica", "link": "https://tectoniccoffee.com/blogs/news/how-kenyan-coffee-found-a-second-home-in-costa-rica"}]}, "cupping_intro": {"name": "What Cupping Is", "sub": "The industry's tasting method", "group": "cupping", "accent": "#C9A34E", "sections": [{"h": "The idea", "body": "Cupping is the standardized way the coffee industry tastes and evaluates coffee. Every cup is brewed identically — same dose, same water, same time — so differences you taste come from the coffee, not the brewing. It's how green buyers judge lots, how roasters check whether a roast worked, and how competitions are scored. If you want to evaluate coffee the way professionals do, cupping is the method."}, {"h": "Why roasters cup", "body": "For a roaster, cupping closes the loop. You design a profile, roast it, then cup it to find out if the curve produced the cup you wanted. Cupping side by side — this profile against that one, this batch against a reference — is how a curve decision becomes a flavor judgment. Without cupping, you're roasting blind."}, {"h": "A system in transition", "body": "The reference framework changed recently. In November 2024 the SCA adopted the Coffee Value Assessment (CVA) as its official standard, replacing the 2004 cupping protocol and its single 100-point score that had defined specialty coffee for two decades. Many labs still run the legacy form daily, so working professionals need to understand both — which is why this section covers each."}], "keypoints": ["Cupping = brewing every cup identically so differences reflect the coffee, not the brew.", "For roasters it closes the loop: curve → roast → cup → judgment.", "The SCA replaced the 2004 protocol with the CVA in Nov 2024; both are still in use."], "refs": [{"label": "SCA — Coffee Value Assessment", "link": "https://sca.coffee/value-assessment"}, {"label": "Green Coffee Collective — cupping protocol", "link": "https://greencoffeecollective.com/pages/glossary/cupping-protocol"}]}, "cupping_mechanics": {"name": "Cupping Mechanics", "sub": "The physical protocol, step by step", "group": "cupping", "accent": "#B07B3E", "sections": [{"h": "The recipe", "body": "The SCA standard is 8.25g of coffee per 150ml of water — a ratio of about 1:18. Measure to 0.1g precision and adjust the coffee weight to your actual cup volume to hold the ratio. Water is clean and 93°C (200°F). Prepare at least 5 cups per coffee so you can judge uniformity across the lot."}, {"h": "Grind and fragrance", "body": "Grind coarse — slightly coarser than paper-filter drip, spec'd as 70–75% of grounds passing a US #20 sieve (about 850µm). Grind immediately before pouring; aromatics escape within minutes. Purge the grinder with 5–10g of the next sample first to avoid cross-contamination. Within 15 minutes, smell the dry grounds and note the fragrance."}, {"h": "Pour, steep, break", "body": "Pour 93°C water directly over the grounds to saturate them all, and start a 4-minute timer. A crust of grounds forms on top; smell the wet aroma as it steeps. At 4 minutes, break the crust by stirring three times with a spoon while putting your nose close — the crust-break releases a burst of trapped aromatics and is a critical moment. Rinse the spoon between cups. Then skim the foam and floating grounds off the surface in one clean motion."}, {"h": "Taste as it cools", "body": "Begin tasting once the coffee cools to roughly 71°C (around 8–10 minutes in). Load the spoon and slurp hard — the loud slurp aerates the liquid and sprays it across your whole palate. Evaluate flavor, aftertaste, acidity, sweetness, and mouthfeel, and keep tasting as the cup cools, because different attributes reveal themselves at different temperatures."}], "keypoints": ["8.25g : 150ml (~1:18), water 93°C / 200°F, 5 cups per coffee for uniformity.", "Grind coarse (70–75% through a #20 sieve), fresh; smell dry fragrance first.", "4-minute steep, then break the crust with 3 stirs while smelling; skim.", "Taste ~71°C by slurping hard to aerate; re-taste as the cup cools."], "refs": [{"label": "SCA Protocols & Best Practices (PDF)", "link": "https://www.scribd.com/document/469338504/1594883668193-SCA-Protocols-Best-Practices-pdf"}, {"label": "Royal Coffee — how to run a cupping", "link": "https://royalcoffee.com/how-to-set-up-and-run-a-coffee-cupping-a-step-by-step-guide/"}, {"label": "Podium Coffee Club — SCA protocol step by step", "link": "https://podiumcoffeeclub.com/blogs/blog/sca-cupping-protocol"}]}, "cva_overview": {"name": "The Coffee Value Assessment", "sub": "The modern SCA framework", "group": "cupping", "accent": "#95602F", "sections": [{"h": "What changed and why", "body": "For two decades, coffee was scored on one 100-point number: 80+ meant specialty, and higher was better. The problem is that a single score tells you a coffee is 'very good' but not why, what it tastes like, or whether it suits your market. The CVA, adopted by the SCA in November 2024, replaces that one number with a high-resolution picture across four separate assessments — because describing a coffee and judging how much you like it are different questions that shouldn't be collapsed together."}, {"h": "The four assessments", "body": "The CVA has four components, kept deliberately separate to reduce bias. Physical (CVA 102 territory) covers measurable facts like defect counts and moisture. Descriptive (103) objectively describes what the coffee smells and tastes like, using intensity ratings and flavor-wheel descriptors, with no quality judgment. Affective (104) records how much you value those attributes on a preference scale. Extrinsic (105) captures non-sensory value: origin story, traceability, certifications."}, {"h": "Descriptive vs affective — the key split", "body": "This separation is the heart of the CVA. Descriptive asks 'what is in the cup?' — a group of cuppers might all agree a coffee is floral and bright. Affective asks 'do I value that?' — and here they can disagree completely. A Nordic roaster might prize a tea-like acidity that an Italian espresso blender finds too sharp. The CVA records both as valid: the description stays objective, the preference reflects each taster's context."}, {"h": "Where the score went", "body": "The descriptive form has no total score by design. Only the affective form produces a number, via a calculator that converts the preference ratings to a 0–100 scale for buyers who still need a shorthand during the transition. This is a real shift in thinking: the CVA treats a coffee's value as multi-dimensional, not reducible to one figure."}], "keypoints": ["CVA (Nov 2024) replaced the single 100-point score with four separate assessments.", "Physical, Descriptive, Affective, Extrinsic — kept apart to reduce bias.", "Descriptive = objective 'what's in the cup'; Affective = subjective 'how much I value it'.", "Only the affective form yields a score, converted to 0–100 via calculator."], "refs": [{"label": "SCA — adopts CVA as cupping standard", "link": "https://sca.coffee/sca-news/sca-new-cva-cupping-standards"}, {"label": "Ethio Coffee — CVA guide for buyers", "link": "https://www.ethiocoffee.co/insights/new-sca-coffee-value-assessment"}, {"label": "SCA — CVA in Action: Affective Assessment", "link": "https://sca.coffee/sca-news/cva-in-action-affective"}]}, "cva_scoring": {"name": "CVA Affective Scoring", "sub": "How the 0–100 number is built", "group": "cupping", "accent": "#6E3E1E", "sections": [{"h": "The eight sections", "body": "The affective assessment scores eight sections for impression of quality: fragrance, aroma, flavor, aftertaste, acidity, sweetness, mouthfeel, and overall. Each is rated on a 9-point hedonic (liking) scale. The 9-point scale is a sensory-science standard because, unlike a 5- or 10-point scale, it has a true neutral midpoint. You're rating preference here, not intensity — 'how much do I like this acidity,' not 'how strong is it.'"}, {"h": "The formula", "body": "The eight section scores are summed, then converted to a familiar 0–100 figure by a fixed formula: Cup Score = 0.65625 × (sum of the eight scores) + 52.75. From that, subtract 2 points for each non-uniform cup and 4 points for each defective cup in the set. The constants are chosen so the output lands in the range specialty cuppers are used to reading."}, {"h": "A worked example", "body": "Say a coffee scores fragrance 7, aroma 7, flavor 6, aftertaste 5, acidity 4, sweetness 6, mouthfeel 7, overall 6. The sum is 48. Then 0.65625 × 48 + 52.75 = 84.25. With no non-uniform or defective cups, the final score is 84.25 — comfortably specialty. This app's digital cupping tool (in the Tools section, when built) runs exactly this math."}, {"h": "Reading the number", "body": "One caution echoing the old form: the 0–100 output is a translation for convenience, not the point of the CVA. Two cuppers can land on the same 84 for very different reasons, which is exactly why the descriptive assessment exists alongside it. Use the score as shorthand, and the description for the real picture."}], "keypoints": ["Eight sections (fragrance, aroma, flavor, aftertaste, acidity, sweetness, mouthfeel, overall), each 1–9.", "Cup Score = 0.65625 × (sum of 8) + 52.75, minus 2/non-uniform cup and 4/defective cup.", "Worked example: sum 48 → 84.25, a specialty score.", "The number is a convenience translation; the descriptive assessment carries the real detail."], "refs": [{"label": "SCA — CVA Affective Score Calculator", "link": "https://sca.coffee/cuppingscore"}, {"label": "Royal NY — how to use the CVA form (worked example)", "link": "https://www.royalny.com/blogs/how-to-use-the-sca-cva-form/"}, {"label": "Royal Coffee — what the numbers mean", "link": "https://royalcoffee.com/scoring-specialty-coffee-what-do-the-numbers-mean/"}]}, "legacy_protocol": {"name": "The Legacy 2004 Protocol", "sub": "The 100-point form, still in use", "group": "cupping", "accent": "#5A2F16", "sections": [{"h": "Why it still matters", "body": "The 2004 SCA (then SCAA) cupping form defined specialty coffee for twenty years, and it's still found in hundreds of roasteries and cupping labs today. Even with the CVA now official, a working professional needs to read and speak the legacy form, because most existing coffee documentation, scoresheets, and habits are built on it."}, {"h": "How it scores", "body": "The legacy form rates ten attributes — fragrance/aroma, flavor, aftertaste, acidity, body, balance, uniformity, clean cup, sweetness, and overall. Most attributes are scored from 6.00 to 10.00 in 0.25-point steps, reflecting quality. The individual scores are summed into a single total. A total of 80+ is the specialty threshold, with higher tiers above it — a coffee in the 90s is exceptional."}, {"h": "Defects", "body": "Defects subtract from the total. A taint (a minor off-note, usually in aroma or flavor) costs 2 points; a fault (a strong negative that can make the coffee unpleasant) costs 4. In the CVA, this thinking moved to the physical form and the uniform/defective-cup deductions."}, {"h": "Legacy vs CVA at a glance", "body": "The big difference: the legacy form blends description and quality judgment into one number, while the CVA splits them apart. The legacy form asks 'how good is this acidity?' on one scale; the CVA asks 'how intense is it?' (descriptive) and 'how much do I like it?' (affective) as two separate questions. The legacy 'body' also became the broader 'mouthfeel' in the CVA."}], "keypoints": ["The 2004 form defined specialty for 20 years and is still in daily use.", "Ten attributes scored 6.00–10.00 in 0.25 steps, summed; 80+ = specialty.", "Taint = −2, Fault = −4 for defects.", "Legacy blends description and quality into one score; the CVA splits them."], "refs": [{"label": "Femobook — cupping protocols & scoring", "link": "https://www.femobook.com/blogs/coffee-knowledge/coffee-cupping"}, {"label": "Daily Coffee News — SCA adopts new forms", "link": "https://dailycoffeenews.com/2024/11/05/sca-officially-adopts-new-cupping-forms-and-standards/"}]}, "flavor_wheel": {"name": "The Flavor Wheel", "sub": "The shared vocabulary of taste", "group": "cupping", "accent": "#8A5A34", "sections": [{"h": "What it is", "body": "The Coffee Taster's Flavor Wheel, released by the SCA and World Coffee Research in 2016 (built on WCR's Sensory Lexicon), is the industry's reference for describing what coffee tastes and smells like. It maps hundreds of descriptors in a circle, organized from broad categories at the center to specific references at the outer edge. It's descriptive, not prescriptive — it helps you articulate what you taste without judging quality."}, {"h": "How it's built", "body": "The center holds nine broad categories: floral, fruity, sour/fermented, green/vegetative, other, roasted, spices, nutty/cocoa, and sweet. Each branches outward into sub-groups and then specific notes. Fruity opens to berry, dried fruit, citrus, other fruit; berry opens further to blackberry, raspberry, blueberry, strawberry. The progressive narrowing is what makes it usable."}, {"h": "How to use it", "body": "Work from the center outward. Start with the broadest impression — is this coffee fruity, nutty, roasted, floral? Once you've picked a core category, move out one ring to narrow it: fruity → berry. Then out again to the specific note: berry → blueberry. You can stop at any ring; the further out you go, the more precise the description. This is far easier than trying to jump straight to 'blueberry' from a blank page."}, {"h": "Why it matters for cupping", "body": "The wheel gives cuppers a shared, calibrated vocabulary. When one taster says 'blackberry' and another says 'jammy dark fruit,' the wheel lets them locate a common reference instead of talking past each other. In the CVA descriptive assessment, the flavor-wheel categories are exactly the descriptors you check off — so the wheel and the modern form are built from the same map."}], "keypoints": ["2016 SCA/WCR wheel: hundreds of descriptors, broad center → specific edge.", "Nine center categories: floral, fruity, sour/fermented, green/vegetative, other, roasted, spices, nutty/cocoa, sweet.", "Work center-outward, stopping at whatever precision you can honestly taste.", "Descriptive not prescriptive; it's the vocabulary behind the CVA descriptive form."], "refs": [{"label": "SCA/WCR Coffee Taster's Flavor Wheel (PDF)", "link": "https://atlanticspecialtycoffee.com/wp-content/uploads/SCA_TasterWheel_English_8.5x11.pdf"}, {"label": "Green Coffee Collective — the flavour wheel", "link": "https://greencoffeecollective.com/pages/glossary/sca-flavour-wheel"}, {"label": "Not Bad Coffee — interactive flavor wheel", "link": "https://notbadcoffee.com/flavor-wheel-en/"}]}, "qc_loop": {"name": "The Roaster's QC Loop", "sub": "Cupping your own production", "group": "cupping", "accent": "#7A4A28", "sections": [{"h": "Cup what you ship", "body": "Cupping isn't only for buying green — it's how a roastery holds quality steady. The discipline is simple: cup your production batches, not just your samples. A profile that cupped beautifully as a sample roast can drift at production scale, and the only way you catch it is by tasting what actually went in the bag."}, {"h": "Cup against a reference", "body": "The powerful move is comparative. Cup a new batch next to a retained reference of how that coffee should taste — your approved profile, or a saved sample. Side by side, drift is obvious that would be invisible cup-by-cup. This is the production version of the sample-roasting loop: the sample cup becomes the target you're checking each batch against."}, {"h": "Triangulate for consistency", "body": "To check whether two batches are truly the same, cuppers use triangulation: three cups, two of one batch and one of the other, arranged blind. If you can reliably pick the odd one out, there's a real difference; if you can't, they're effectively identical. It's a rigorous, bias-resistant way to answer 'did this batch match the last one?'"}, {"h": "Close the loop with the curve", "body": "When a cupping flags a problem, the fix lives back in the roast data. A baked, flat cup points at a stalled rate of rise; a sharp, grassy cup points at under-development. Cupping tells you what's wrong in the cup; the roast curve tells you where to fix it. A roastery that cups its production and reads its curves together has a real quality system, not just good intentions."}], "keypoints": ["Cup production batches, not just samples — profiles drift at scale.", "Cup against a retained reference; side-by-side makes drift obvious.", "Triangulation (2 of one, 1 of the other, blind) tests whether batches truly match.", "Cupping finds the flaw; the roast curve tells you where to fix it."], "refs": [{"label": "Green Coffee Collective — cupping protocol & QC", "link": "https://greencoffeecollective.com/pages/glossary/cupping-protocol"}, {"label": "Scott Rao — development & the cup", "link": "https://www.scottrao.com/blog/2016/8/25/development-time-ratio"}]}, "q_grader": {"name": "Q Graders & the Evolved Q", "sub": "The credential landscape", "group": "cupping", "accent": "#95602F", "sections": [{"h": "What a Q Grader is", "body": "A Q Grader is a professionally certified coffee taster — the closest thing coffee has to a sommelier credential. Administered for years by the Coffee Quality Institute (CQI), the Q program trained and calibrated graders worldwide to score green coffee reliably on the 100-point scale, so a score in one country meant the same thing in another. There are roughly 10,000 certified Q Graders globally."}, {"h": "The transition", "body": "In April 2025 the SCA took over management of the Q program from CQI, and announced that an 'evolved Q' credential will be based on the CVA rather than the legacy 100-point form. This is a significant shift: the standard that certifies the world's professional coffee tasters is moving onto the same CVA framework that replaced the cupping form. A transitional 'CVA for Cuppers' course is bridging existing graders across, and is scheduled to retire on November 30, 2026."}, {"h": "What it means practically", "body": "For a roaster, you don't need to be a Q Grader to cup well or run quality control — the protocol is open and learnable. But the credential still signals calibrated, trusted palates for buying and competition, and understanding where it's headed (CVA-based) tells you which framework to invest your own training in. This is a live, moving area — check current SCA announcements for the latest status."}], "keypoints": ["Q Grader = certified, calibrated professional coffee taster; ~10,000 worldwide.", "SCA took over the Q program from CQI in April 2025; the 'evolved Q' is CVA-based.", "The transitional 'CVA for Cuppers' course retires Nov 30, 2026.", "You don't need the credential to cup well — the protocol is open — but it signals a trusted palate."], "refs": [{"label": "Daily Coffee News — SCA takes over Q program", "link": "https://dailycoffeenews.com/2025/04/25/the-specialty-coffee-association-is-taking-over-the-q-grader-program/"}, {"label": "Perfect Daily Grind — CVA & the Q programme", "link": "https://perfectdailygrind.com/2025/05/cva-q-grader-programme-coffee-industry/"}]}, "ops_warmup": {"name": "Warm-Up & Seasoning", "sub": "Starting the day right", "group": "ops", "accent": "#C9A34E", "sections": [{"h": "Why the first batch misbehaves", "body": "Almost every roaster admits the first batches of a session are the hardest to get right, and the usual culprit is an under-warmed machine. A temperature probe reads the charge temperature quickly, but it doesn't reflect the thermal energy stored in the whole roaster — the drum walls, the back plate, the air system. Charge into a roaster that's read-hot but mass-cold and the beans pull more heat than expected, forcing you to compensate mid-roast and changing the entire profile."}, {"h": "How long to warm up", "body": "Give the machine real time to reach thermal equilibrium. For most drum roasters that's 30 to 90 minutes depending on mass — a light Loring settles fast, a heavy Probat takes far longer. One good check: it's warmed up when the gap between bean-probe and exhaust temperatures is small (roughly within 10°C). Some roasters deliberately heat the drum well above charge temperature and let it cool back down once or twice before the first load, to soak the mass evenly."}, {"h": "Seasoning a new drum", "body": "A brand-new roaster needs seasoning before it makes coffee you'd sell. Running batches (often sacrificial or blended-off) conditions the metal and builds the thin, stable oil layer that the machine roasts on from then on. Until it's seasoned, a new drum behaves differently batch to batch. Never rush warm-up or seasoning — rushed thermal prep shows up directly in the cup."}], "keypoints": ["The first batches suffer mostly from an under-warmed machine, not a bad profile.", "Warm up 30–90 min to thermal equilibrium (mass-dependent); check probe-vs-exhaust gap ~within 10°C.", "Season a new drum with break-in batches before selling what it makes.", "Never rush warm-up or seasoning — it shows up in the cup."], "refs": [{"label": "Perfect Daily Grind — common roaster mistakes (warm-up)", "link": "https://perfectdailygrind.com/2019/11/common-mistakes-that-roasters-make-how-to-avoid-them/"}, {"label": "CoffeeNavigated — preheat & thermal mass", "link": "http://coffeenavigated.net/roasting-coffee/"}]}, "ops_bbp": {"name": "Between-Batch Protocol", "sub": "Consistency across a production day", "group": "ops", "accent": "#B07B3E", "sections": [{"h": "The problem it solves", "body": "Your fifth batch roasts differently than your first because the whole machine keeps absorbing heat as the day goes on. A Between-Batch Protocol (BBP) is the routine that resets the roaster to the same starting conditions before every charge, so a profile you dialed in the morning still reproduces in the afternoon. If your starting temperatures aren't identical, the roast will never record — or taste — the same."}, {"h": "How it works", "body": "After dropping a batch, the drum is hot and needs to shed energy back down to a consistent charge point. When switching to a smaller batch, aim for a slightly lower bottom point (say 40°C lower) to give the extra thermal energy time to fade. A common approach: let the drum fall to a set bottom temperature, then bring gas back so bean temp reaches charge temperature in about 60 to 90 seconds — enough time for the metal to cool and re-warm evenly."}, {"h": "Charge on the rising temperature", "body": "A key detail: charge while the temperature is rising back to your target, not while it's still falling. Charging on a falling temperature can mean the drum metal is still too hot even though the probe reads right, risking scorching. Coming up to the charge point on the rise gives a more honest, repeatable starting state."}, {"h": "It's the first question to ask", "body": "When a roaster says a profile won't reproduce, the first thing an expert asks is whether the BBP was the same. Room conditions, seasonal green temperature, and exhaust temperature all feed into it. A disciplined BBP is what separates a roastery that hits its profiles from one that's always chasing them."}], "keypoints": ["BBP resets the machine to identical starting conditions before every charge.", "Let the drum fall to a set bottom point (lower for smaller batches), then ~60–90s back to charge temp.", "Charge on the rising temperature, not the falling one, to avoid a too-hot drum.", "A profile that won't reproduce is usually a BBP problem first."], "refs": [{"label": "Cropster — Between Batch Protocol explained", "link": "https://www.cropster.com/news/article/between-batch-protocol-for-coffee-roasters-the-whats-whys-and-hows-from-experts/"}, {"label": "Perfect Daily Grind — BBP & charge stability", "link": "https://perfectdailygrind.com/2019/11/common-mistakes-that-roasters-make-how-to-avoid-them/"}]}, "ops_batchsize": {"name": "Batch Size & Capacity", "sub": "How much to load", "group": "ops", "accent": "#95602F", "sections": [{"h": "The capacity window", "body": "Most roasters are rated for a maximum batch, but running at 100% is usually a mistake. The practical window is roughly 50 to 85% of drum capacity. Below about half, the beans are too thin in the drum for probes to read reliably and the roast can move too fast; above about 85%, you may not have enough heat available and the beans crowd the sensors. Many production roasters settle around 70–85% for their standard batch and test to find their machine's sweet spot."}, {"h": "Batch size changes everything downstream", "body": "Batch size is the master variable that ripples through the whole roast — it sets how much heat you need, how the probes read, and how the curve behaves. A bigger batch needs more energy and a higher charge temperature to carry the same profile; a smaller batch needs less. Change the batch size and you're effectively re-developing the profile, not just scaling it."}, {"h": "Why not just max it out", "body": "Roasting at full capacity leaves no thermal headroom. If the roast falls behind early, you have nowhere to add energy, and you can't recover the curve. Running at 70–85% keeps reserve heat available to steer the roast — which is exactly why experienced roasters rarely fill the drum."}], "keypoints": ["Practical batch window is ~50–85% of drum capacity; ~70–85% is a common production zone.", "Too small: probes misread, roast races. Too full: no heat headroom, probes buried.", "Batch size sets heat demand, probe behavior, and curve shape — change it and re-develop.", "Leaving headroom lets you steer the roast; a full drum can't be recovered."], "refs": [{"label": "Genuine Origin — batch size & capacity (65–85%)", "link": "https://blog.genuineorigin.com/2025/11/guide-to-roast-profiles/"}, {"label": "HowToCoffeePro — controlling the roast", "link": "https://howtocoffeepro.teachable.com/courses/1206490/lectures/26941587"}]}, "ops_fire": {"name": "Fire Safety", "sub": "The risk you never ignore", "group": "ops", "accent": "#6E3E1E", "sections": [{"h": "Where fires start", "body": "Roaster fires almost always begin in one of a few places: the drum itself (beans left too long, especially on a power loss mid-roast), the chaff collector or cyclone, or the ductwork. The fuel is the byproducts of roasting — chaff, coffee dust, condensed coffee oils, and creosote — all of which are flammable and all of which accumulate exactly where hot air flows. Blocked chimneys and ducts are among the highest-risk conditions because reduced airflow both worsens buildup and can turn a small ignition into a forge-like blaze once the blower feeds it air."}, {"h": "Prevention is cleaning", "body": "Fire prevention in a roastery is mostly a cleaning schedule. Empty the chaff bin every roast day (when half full or less, not topped out). Wipe trays after roasting. Weekly, deep-clean the cooling tray and its underside. Periodically disassemble and scrub the ductwork and cyclone where oil and creosote build up invisibly. A dirty roaster isn't just a flavor problem — coffee oils baked onto internal surfaces are a genuine fire load."}, {"h": "When a fire happens", "body": "Thermal events will happen despite good habits — a power failure at first crack leaves beans sitting motionless on a hot drum. Plan your immediate actions in advance and document them. General principles: keep the drum rotating so beans don't sit and ignite, dump or spray as your machine's design allows, and know where your extinguisher is. Never leave roasting beans unattended — the batch that gets away from a distracted roaster is the classic cause. Keep gas valves closed when not roasting, and have gas detection and a clear, marked fire plan."}], "keypoints": ["Fires start in the drum, chaff cyclone, or ductwork; fuel is chaff, dust, oil, creosote.", "Blocked ducts/chimneys are top risk — poor airflow worsens buildup and feeds flames.", "Prevention is a cleaning schedule: chaff bin daily, trays after each roast, ducts/cyclone periodically.", "Have a documented fire plan; keep the drum turning, never leave beans unattended, know your extinguisher."], "refs": [{"label": "Genio Roasters — fire prevention in roasteries", "link": "https://genioroasters.com/community/docs/safety-and-essentials/fire-prevention-in-coffee-roasteries"}, {"label": "Daily Coffee News — cleaning & maintenance", "link": "https://dailycoffeenews.com/2020/03/09/managing-the-nitty-gritty-cleaning-and-maintenance-in-the-roastery/"}, {"label": "Scott Rao — roaster fires & cleaning", "link": "https://www.scottrao.com/blog/fire"}]}, "ops_decaf": {"name": "Roasting Decaf", "sub": "The bean that lies about its color", "group": "ops", "accent": "#5A2F16", "sections": [{"h": "Why decaf is different", "body": "Decaffeination weakens the bean's internal structure and lowers its density and moisture, so decaf behaves like a different coffee in the drum. It's already darker than regular green before you even start, and it heats faster. This makes decaf one of the classic traps for a roaster used to regular coffee — everything your eyes tell you is slightly wrong."}, {"h": "Don't trust the color", "body": "The single biggest decaf mistake is trusting color as a roast-level indicator. Decaf turns dark brown very quickly, well before it's actually developed, and the surface stays wrinkled rather than smoothing out. If you drop when it looks right, you'll drop underdeveloped. You have to roast to development cues and the clock, not to the shade — decaf that looks like a Full City may only be a City in actual development."}, {"h": "How to adjust", "body": "Come in gentler. Use a lower charge temperature because the beans are lighter and more fragile and scorch easily. First crack lands at roughly the same time as regular coffee, but the roast runs faster after first crack — second crack can arrive surprisingly quickly, so watch the back half closely. Most decaf is best dropped around the end of first crack to somewhat beyond, and generally kept out of a hard second crack, which turns it bitter. Cool it fast and rest it 24–48 hours like any coffee."}], "keypoints": ["Decaf is less dense, lower moisture, structurally weaker — it roasts faster and starts darker.", "Never judge decaf by color: it goes dark brown before it's developed and stays wrinkled.", "Lower the charge temp (fragile, scorch-prone); the roast races after first crack, so watch for a fast second crack.", "Drop around end of first crack to slightly beyond; avoid a hard second crack; rest 24–48h."], "refs": [{"label": "Sweet Maria's — roasting decaf, key things to know", "link": "https://library.sweetmarias.com/roasting-decaf-coffee/"}, {"label": "Perfect Daily Grind — what roasters need to know about decaf", "link": "https://perfectdailygrind.com/2017/11/what-roasters-need-to-know-about-decaf-coffee/"}, {"label": "Green Coffee Collective — roasting decaf tips", "link": "https://greencoffeecollective.com/blogs/learn/expert-tips-for-perfectly-roasting-decaf-coffee"}]}, "ops_degassing": {"name": "Degassing, Storage & Packaging", "sub": "After the drop", "group": "ops", "accent": "#7A4A28", "sections": [{"h": "What degassing is", "body": "Roasting fills the bean with carbon dioxide, and after the drop that gas slowly escapes — degassing. It's strongest in the first 12–24 hours and continues for days or weeks. Brew coffee that's still actively off-gassing and you'll see it fizz and bubble as water hits the grounds; those bubbles block even saturation and give you an uneven, flat extraction. This is why fresh-roasted coffee needs to rest before it brews its best."}, {"h": "Rest windows", "body": "Rest depends on roast level and use. Rough guides from roasters: dark roasts are ready fastest (about 1–3 days), mediums around 3–5 days, and espresso often wants longer — many roasteries rest decaf and espresso 7–12 days. Darker and more porous beans degas faster; denser, lighter, washed coffees hold gas longer. But you can also rest too long — some CO2 is valuable — so the honest answer is to cup at several rest points and find the window for your coffee and setup."}, {"h": "The one-way valve", "body": "Packaging faces a paradox: you need to let CO2 out so the bag doesn't balloon, while keeping oxygen out so the coffee doesn't stale. The one-way degassing valve solves it — it opens to vent gas when internal pressure builds, then closes to block outside air. It's why most fresh coffee bags have that little valve, and why packaging coffee that's still degassing into a valve bag actually helps keep it fresh."}, {"h": "Storage", "body": "Oxygen, light, heat, and moisture are the enemies. Store roasted coffee in airtight, opaque packaging in a cool, dry place. Whole beans keep far longer than ground — ground coffee goes stale in a week or two. Warm storage speeds both degassing and staling; every exposure to air accelerates oxidation, so reseal promptly and minimize headspace."}], "keypoints": ["Roasting traps CO2; it off-gasses hardest in the first 12–24h, then for days/weeks.", "Rough rest: dark ~1–3 days, medium ~3–5, espresso/decaf often 7–12; cup to find your window.", "One-way valves vent CO2 while blocking oxygen — the key to fresh packaging.", "Store airtight, opaque, cool, dry; whole beans keep far longer than ground."], "refs": [{"label": "Roastar — degassing valve guide", "link": "https://www.roastar.com/blog/what-you-really-need-to-know-about-degassing-valves"}, {"label": "Methodical Coffee — degassing, rest & flavor", "link": "https://methodicalcoffee.com/blogs/coffee-culture/freshly-roasted-coffee-explained-degassing-rest-and-flavor"}, {"label": "Home Grounds — degassing coffee", "link": "https://www.homegrounds.co/degassing-coffee/"}]}, "ops_logging": {"name": "Roast Logging & Software", "sub": "Data makes it repeatable", "group": "ops", "accent": "#8A5A34", "sections": [{"h": "Why log at all", "body": "Some roasters work purely by sight, smell, and sound — real skills worth having. But roasting is as much science as art, and the roasters who hit their profiles consistently are the ones capturing data. Without records, dialing in a coffee becomes an endless loop of pushing the same boulder uphill. A logged roast is one you can reproduce, diagnose, and improve; an unlogged one is a lucky batch you may never see again."}, {"h": "What to log", "body": "At minimum: green and lot, charge weight and out weight (for weight loss), charge temperature, turning point, times and temps for drying end, first crack, and drop, total time, and resulting DTR — plus the gas and airflow moves you made and a tasting note once you've cupped it. The goal is enough that a different roaster on your team could reproduce the batch from the log alone."}, {"h": "The software landscape", "body": "Two names dominate. Artisan is free, open-source roast-logging software that connects to most machines and probes and plots BT and RoR live — the standard entry point. Cropster is the commercial industry platform, adding production planning, inventory, QC, and between-batch protocol tooling; it's what many mid-to-large roasteries run. Both do the core job: turn each roast into data you can see, compare, and repeat."}], "keypoints": ["Logged roasts are reproducible and diagnosable; unlogged ones are lucky batches.", "Log green/lot, weights (loss %), charge, TP, drying end, first crack, drop, total time, DTR, gas/air moves, tasting note.", "Artisan: free, open-source, connects to most machines — the standard starting point.", "Cropster: commercial platform adding planning, inventory, QC, BBP — common in larger roasteries."], "refs": [{"label": "Genuine Origin — data-driven roast profiles", "link": "https://blog.genuineorigin.com/2025/11/guide-to-roast-profiles/"}, {"label": "Cropster — roasting platform & BBP", "link": "https://www.cropster.com/news/article/between-batch-protocol-for-coffee-roasters-the-whats-whys-and-hows-from-experts/"}]}, "brew_extraction": {"name": "Extraction Theory", "sub": "What brewing actually does", "group": "brew", "accent": "#C9A34E", "sections": [{"h": "Brewing is dissolving", "body": "Every brew method does the same fundamental thing: hot water dissolves flavor compounds out of ground coffee. How much dissolves is the extraction yield — the percentage of the coffee's dry mass that ends up in your cup. How concentrated the result is, is the total dissolved solids (TDS) — the fraction of the liquid that's dissolved coffee. Extraction yield and TDS are different things, linked by your brew ratio, and nearly all of brewing is managing these two numbers."}, {"h": "The ideal window", "body": "Decades of research (the SCA Golden Cup standard, rooted in Lockhart's 1950s work) put the sweet spot at 18–22% extraction yield. Below 18% the coffee is under-extracted: sour, grassy, weak, because you haven't pulled the sugars and desirable compounds yet. Above 22% it's over-extracted: bitter, dry, astringent, because you've started pulling the harsh stuff. The art is landing inside that window. For strength, filter coffee typically targets a TDS around 1.15–1.35%, while espresso is far more concentrated at roughly 8–12%."}, {"h": "The four levers", "body": "Four variables control extraction. Grind size sets surface area — finer extracts faster. Water temperature — hotter extracts faster (brewing runs ~90–96°C). Contact time — longer extracts more. And agitation — stirring or turbulence speeds extraction by moving fresh water past the grounds. When a cup is wrong, you're almost always adjusting one of these four to move extraction up or down."}, {"h": "The diagnostic that never changes", "body": "Across every method, one rule holds: sour means under-extracted, bitter means over-extracted. Sour cup → extract more (grind finer, hotter water, longer time). Bitter cup → extract less (grind coarser, cooler, shorter). This single sour-vs-bitter axis is the most useful thing a barista or roaster can internalize."}], "keypoints": ["Extraction yield = % of coffee mass dissolved; TDS = concentration; brew ratio links them.", "Golden Cup window: 18–22% extraction. Under = sour/weak, over = bitter/dry.", "Strength: filter TDS ~1.15–1.35%, espresso ~8–12%.", "Four levers: grind, temperature, time, agitation. Sour → extract more; bitter → extract less."], "refs": [{"label": "SCA — towards a new brewing chart (Golden Cup)", "link": "https://sca.coffee/sca-news/25/issue-13/towards-a-new-brewing-chart"}, {"label": "Coffee Brews Hub — science of extraction", "link": "https://coffeebrewshub.com/blog/science-of-coffee-extraction"}]}, "brew_espresso": {"name": "Dialing In Espresso", "sub": "Dose, yield, time", "group": "brew", "accent": "#B07B3E", "sections": [{"h": "The standard shot", "body": "The modern specialty default is a 1:2 ratio by weight: 18g of ground coffee in, 36g of liquid espresso out, pulled in about 25–30 seconds at 9 bar of pressure and roughly 90–96°C. That 1:2 exists because, with a good grind, most espresso lands cleanly inside the 18–22% extraction window there. It's the starting point for any new bag or setup — always measured by weight, because crema makes volume unreliable."}, {"h": "The dial-in order", "body": "Dialing in has a sequence, and following it prevents most frustration. First fix your dose and ratio (18g → 36g). Pull a shot and time it. Then adjust grind to hit the target time: if the shot runs too fast (under ~25s), grind finer to slow it; too slow (over ~35s), grind coarser. Only once grind and time are in range do you taste and fine-tune. Most home espresso problems come from changing the ratio when grind was the real variable."}, {"h": "Reading the shot", "body": "Once it's pulling near 1:2 in 25–30s, taste drives the rest. Sour or sharp means under-extracted — grind finer, or nudge the ratio longer (18g → 40g). Bitter or harsh means over-extracted — grind coarser. Roast level shifts the targets: light roasts are dense and hard to extract, wanting higher temperature (93–96°C) and sometimes a longer ratio; dark roasts extract easily and prefer lower temperature (88–91°C) and often a shorter ratio."}, {"h": "Ristretto and lungo", "body": "Change the ratio and you change the shot's character. A ristretto (1:1 to 1:1.5) is short and concentrated — syrupy, sweet, less bitter, favored for milk drinks. A lungo (1:3 and up) is long and dilute — lighter and more aromatic, sometimes good for very light roasts. The 1:2 normale sits balanced between them and is the default for a reason."}], "keypoints": ["Standard: 1:2 by weight (18g → 36g), 25–30s, 9 bar, ~90–96°C. Weigh everything.", "Dial-in order: fix dose/ratio → adjust grind to hit time → then taste and fine-tune.", "Sour = grind finer / longer ratio; bitter = grind coarser. Light roast hotter, dark roast cooler.", "Ristretto (1:1–1:1.5) concentrated/sweet; lungo (1:3+) light/dilute; 1:2 is the balanced default."], "refs": [{"label": "Podium Coffee Club — espresso brew ratio", "link": "https://podiumcoffeeclub.com/blogs/blog/espresso-brew-ratio"}, {"label": "Espresso Aficionados — dialling in basics", "link": "https://espressoaf.com/guides/beginner.html"}, {"label": "Routes Coffee — key espresso parameters", "link": "https://routescoffee.co.uk/mastering-espresso-key-parameters-every-barista-should-know/"}]}, "brew_grind": {"name": "Grind & Burrs", "sub": "The most important variable", "group": "brew", "accent": "#95602F", "sections": [{"h": "Why grind matters most", "body": "Grind size is the single most powerful lever in brewing because it sets the surface area water works on. Finer grounds expose more surface, so water dissolves compounds faster; coarser grounds slow extraction down. This is why grind is the primary thing you adjust to move a cup in or out of the ideal window — it changes extraction more than any other single control."}, {"h": "Match grind to method", "body": "Each method wants a grind matched to its contact time. Espresso is fine (25–30 second shot). Drip and pour-over are medium (4–6 minute brew). French press is coarse (a 4-minute steep). The logic is consistent: short, intense methods need fine grounds to extract enough quickly; long, gentle methods need coarse grounds so they don't over-extract."}, {"h": "Burrs beat blades", "body": "A burr grinder crushes beans between two shaped surfaces to a consistent, adjustable size. A blade grinder chops randomly, producing a chaotic mix of dust and boulders. That inconsistency is fatal to good coffee: the dust over-extracts (bitter) while the boulders under-extract (sour) in the same cup. A quality burr grinder is the single most important piece of brewing gear — more than the machine — because consistent particle size is what makes extraction predictable."}, {"h": "Fresh grind, and the CO2 effect", "body": "Grind immediately before brewing; ground coffee stales in hours as aromatics escape and oxidation accelerates. Freshness also affects the shot mechanically: very fresh beans still full of CO2 create more resistance and run slower, while degassed beans run faster — which is part of why the same grind setting behaves differently across a bag's life."}], "keypoints": ["Grind sets surface area — finer extracts faster, coarser slower; it's the primary extraction lever.", "Match to method: espresso fine, drip/pour-over medium, French press coarse.", "Burr grinders give consistent size; blades make dust + boulders that over- and under-extract at once.", "Grind fresh; CO2 in fresh beans adds resistance, so grind behaves differently as a bag ages."], "refs": [{"label": "Coffee Brews Hub — grind & extraction", "link": "https://coffeebrewshub.com/blog/science-of-coffee-extraction"}, {"label": "Complete Home Barista — extraction chart & grind", "link": "https://completehomebarista.com/guides/espresso-extraction-chart-explained/"}]}, "brew_methods": {"name": "Brew Methods", "sub": "Filter, immersion, espresso", "group": "brew", "accent": "#6E3E1E", "sections": [{"h": "Three families", "body": "Most brewing falls into three families. Percolation (filter) — water passes through a bed of grounds once and drains away: pour-over (V60, Chemex), drip machines. Immersion — grounds steep in water for a set time, then separate: French press, cupping, cold brew. Pressure — hot water forced through a compacted puck: espresso and its stovetop cousin the moka pot. Each family extracts differently and suits different grind sizes and ratios."}, {"h": "Filter / pour-over", "body": "The specialty workhorse for showcasing origin clarity. The SCA ratio guide is 1:16 to 1:17 — roughly 60g of coffee per liter of water — at 90–96°C, medium grind, over about 4–6 minutes total. Pour-over rewards technique: an even bloom (a short pre-wet that lets fresh coffee degas) and steady pouring produce even extraction. It's the method that best highlights a light roast's acidity and aromatics."}, {"h": "Immersion", "body": "The most forgiving family, because contact time is fixed and even. French press uses a coarse grind and a ~4-minute steep, then you press the grounds down; it gives a heavy, full body since no paper filter removes oils. Cold brew steeps a coarse grind in cold water for many hours (often around 1:8), producing a low-acid, smooth concentrate. Immersion is hard to mess up, which makes it a good place to taste a coffee honestly."}, {"h": "Matching roast to method", "body": "The roast and the method should suit each other. Light and medium-light roasts shine in filter and pour-over, where their acidity and clarity come through. Fuller and darker roasts, and purpose-built espresso profiles, come alive under pressure where body and sweetness concentrate. This is exactly the 'use for' guidance on each roast profile in this app — the brew method is the other half of that decision."}], "keypoints": ["Three families: percolation/filter (pour-over, drip), immersion (French press, cold brew), pressure (espresso, moka).", "Filter: SCA 1:16–1:17 (~60g/L), 90–96°C, medium grind, ~4–6 min; bloom for even extraction.", "Immersion: fixed even contact time, forgiving; French press = full body, cold brew = low-acid concentrate.", "Light/medium roasts favor filter; darker and espresso profiles favor pressure."], "refs": [{"label": "Coffee Brews Hub — ratios & methods", "link": "https://coffeebrewshub.com/blog/science-of-coffee-extraction"}, {"label": "SCA — brewing control chart", "link": "https://sca.coffee/sca-news/25/issue-13/towards-a-new-brewing-chart"}]}, "brew_milk": {"name": "Milk & Steaming", "sub": "Microfoam and the milk drink", "group": "brew", "accent": "#5A2F16", "sections": [{"h": "What you're making", "body": "Great milk drinks depend on microfoam — steamed milk with bubbles so tiny and uniform it looks glossy and pours like wet paint. It's not the stiff, dry froth of a cheap frother; it's a smooth emulsion of air and milk proteins that integrates into the espresso and makes latte art possible. The SCA describes excellent milk foam as smooth, glossy, and moist with no visible bubbles."}, {"h": "The two phases", "body": "Steaming has two stages. First stretch (aeration): the steam tip sits just below the surface so it draws air in — you hear a steady 'tss-tss.' This is done while the milk is still cold, adding roughly 20–30% volume for a latte (more for a cappuccino). Then texture (emulsification): sink the wand deeper and tilt the pitcher to create a whirlpool that shreds big bubbles into microfoam and heats evenly. Stop aerating once the milk warms, or the foam turns stiff and dry."}, {"h": "The temperature window", "body": "Aim for about 60–65°C (140–150°F). Milk's lactose tastes sweetest here because heat converts some of it to simpler sugars — properly steamed milk is noticeably sweeter than cold milk. Above ~65°C whey proteins denature and the foam gets thin and unstable; above ~70°C the milk scalds and turns flat and sulphurous. A common no-thermometer check: pull off when the pitcher is almost too hot to hold. And don't re-steam milk — once its proteins are stretched, they won't rebuild."}, {"h": "Alternative milks", "body": "Plant milks behave differently. Oat is the most barista-friendly — 'barista editions' add stabilizers (like dipotassium phosphate) that stop curdling against acidic espresso and help it foam. Soy froths aggressively and needs a shorter stretch. Almond is trickier for stable foam. In all cases the barista-formulated versions steam far better than the standard cartons, and plant milks generally want a shorter aeration phase and slightly lower temperatures."}], "keypoints": ["Target microfoam: glossy, wet-paint texture — an emulsion of air and proteins, not stiff froth.", "Two phases: stretch (aerate cold milk, +20–30% for a latte) then texture (whirlpool to shred bubbles).", "Sweet spot ~60–65°C; above ~65°C foam destabilizes, above ~70°C it scalds. Don't re-steam.", "Barista-edition oat/soy (added stabilizers) steam best; plant milks want shorter aeration."], "refs": [{"label": "Complete Hospitality Training — milk texturing 101", "link": "https://cht.edu.au/news/milk-texturing-101-microfoam-temperature/"}, {"label": "How-to-Brew — SCA milk texturing guide", "link": "https://how-to-brew.coffee/espresso-brewing/guide-to-milk-texturing-and-steaming/"}, {"label": "ScienceDirect — steam frothing & microfoam", "link": "https://www.sciencedirect.com/science/article/abs/pii/S0958694622001601"}]}, "brew_water": {"name": "Water Chemistry", "sub": "The 98% ingredient", "group": "brew", "accent": "#7A4A28", "sections": [{"h": "Why water matters", "body": "A cup of coffee is about 98% water, so water isn't a neutral background — it's the solvent doing the extracting, and its mineral content directly changes what and how much it pulls from the grounds. Two identical coffees brewed with different water taste genuinely different. This is why serious cafés treat water as an ingredient to be specified, not whatever comes from the tap."}, {"h": "The two numbers that matter", "body": "Coffee water is characterized mainly by two things. Total hardness — the dissolved minerals (mostly magnesium and calcium) that actively grab and extract flavor compounds; too little and coffee tastes flat and empty, too much and it can taste harsh or chalky. And alkalinity (buffering capacity, largely bicarbonate) — which neutralizes acidity; too high and it flattens the bright, pleasant acids that make specialty coffee sing, too low and the cup can taste sharp. The SCA also points to a near-neutral pH (roughly 6.5–7.5) as a target range."}, {"h": "Practical takeaways", "body": "You don't need a chemistry lab, but you should know your water. Very hard tap water over-buffers acidity and scales your machine; distilled or zero-mineral water extracts poorly and tastes hollow. Many cafés filter, blend, or build water to a target. There's a practical safety angle too: hardness minerals are what form limescale inside espresso machines and boilers, so water treatment protects both flavor and equipment."}], "keypoints": ["Coffee is ~98% water; the water is the solvent and shapes extraction directly.", "Two key numbers: hardness (minerals that extract flavor) and alkalinity (buffer that neutralizes acidity).", "Too-hard/high-alkalinity water flattens acidity; distilled/zero-mineral extracts hollow. SCA target pH ~6.5–7.5.", "Know and treat your water — it protects both flavor and machines (limescale)."], "refs": [{"label": "How-to-Brew — SCA water pH guidance", "link": "https://how-to-brew.coffee/espresso-brewing/guide-to-milk-texturing-and-steaming/"}, {"label": "SCA — brewing control chart & standards", "link": "https://sca.coffee/sca-news/25/issue-13/towards-a-new-brewing-chart"}]}, "green_intro": {"name": "Buying Green Coffee", "sub": "Where quality actually starts", "group": "green", "accent": "#C9A34E", "sections": [{"h": "The roaster can't fix the green", "body": "Everything in this guide up to now assumes you already have good green coffee. But a great roaster can only enhance a high-quality bean — they can't rescue a mediocre one. If the green is defective, flat, or dull, no amount of Maillard reaction or careful development will save it; you're just polishing a flawed gem. Specialty starts at the bean level, not the bag, which is why green buying and QC is the foundation under everything else."}, {"h": "Buy on data, verify with your palate", "body": "The professional approach is two-sided. Every lot worth considering comes with data: a cupping score, a defect report, moisture and often water-activity readings. You use that to filter. Then you verify with your own senses — blind cup the sample, ideally next to a control coffee, roasted on a standard grading profile that shows the bean rather than your house style. Scores are signals, not trophies; a number gets you to the cupping table, but your palate makes the call."}, {"h": "What this section covers", "body": "Green QC breaks into a few skills: physically grading a sample for defects, measuring its moisture, density, and water activity, understanding how processing method shapes the cup, knowing the difference between the two coffee species, and reading the country grading systems on a listing. Each has its own page here. Together they're how a buyer decides what's worth roasting — and worth paying for."}], "keypoints": ["A roaster enhances good green but can't fix bad green — specialty starts at the bean.", "Buy on data (score, defect report, moisture), then verify by blind cupping against a control.", "Scores are signals, not trophies; your palate makes the final call.", "Green QC = defect grading + physical measurement + processing + species + country grades."], "refs": [{"label": "Green Coffee Collective — grading explained", "link": "https://greencoffeecollective.com/blogs/learn/green-coffee-grading-explained"}, {"label": "Ebru Coffee — how specialty is graded", "link": "https://ebrucoffeeco.com/blogs/culture/how-specialty-coffee-is-graded"}]}, "green_grading": {"name": "Green Grading & Defects", "sub": "Counting what's wrong", "group": "green", "accent": "#B07B3E", "sections": [{"h": "The sample and the setup", "body": "The SCA green grading protocol works on a 350g representative sample — ideally pulled from across at least 10% of a lot's bags so it reflects the whole shipment. You assess color and smell, then hand-sort the beans against a matte black surface under full-spectrum light (4000K, ~1200 Lux), pulling out every defect. Carefully grading a 350g sample takes an experienced grader 20–30 minutes, so it's real work — six samples can eat an afternoon."}, {"h": "Two categories of defect", "body": "Defects split into Category 1 (primary) — severe faults like full black beans, full sour beans, and foreign matter (stones, sticks) — and Category 2 (secondary) — milder issues like partial black, insect damage, broken/chipped/cut beans, immature (quaker) beans, and shells. If a single bean has two defects, you count only the more severe one. The categories exist because the SCA system weights defects by how much they actually hurt the cup."}, {"h": "The equivalence math", "body": "Not every defective bean counts as a full defect. The system uses equivalences: one full black (Cat 1) equals three partial blacks (Cat 2); you need five broken/chipped/cut beans to make one full Category 2 defect. So ten broken beans = two full defects. You tally everything into a single 'full defect' count for the sample. If your sample is smaller than 350g, sort it anyway and scale the count — multiply a 100g count by 3.5 — accepting it's an approximation."}, {"h": "The specialty bar", "body": "To qualify as specialty grade, a 350g sample must have zero Category 1 defects and no more than five full Category 2 defects. That's a strict bar: a single full black or full sour bean disqualifies the lot. Roasted specialty coffee also permits no quakers (underdeveloped beans) in a 100g sample. This physical inspection sits alongside the cup score — a coffee needs to pass both to be truly specialty. (Note: the SCA has also used water activity below 0.70 as a heritage requirement, and the CVA now folds physical grading into its framework.)"}], "keypoints": ["350g representative sample, sorted under 4000K/1200 Lux on matte black; ~20–30 min per sample.", "Cat 1 (primary): full black/sour, foreign matter. Cat 2 (secondary): partial black, insect, broken, quaker, shells.", "Equivalences: 1 full black = 3 partial; 5 broken = 1 full Cat-2. Tally to a single full-defect count.", "Specialty = 0 Cat-1 and ≤5 full Cat-2 in 350g; no quakers in roasted. Scale small samples (×3.5 for 100g)."], "refs": [{"label": "SCA — grounding green grading in sensory science", "link": "https://sca.coffee/sca-news/25/issue-24-grounding-green-grading"}, {"label": "Cropster — master green grading", "link": "https://www.cropster.com/blog-post/green-grading-coffee/"}, {"label": "Ethio Coffee — green QC & defects", "link": "https://www.ethiocoffee.co/insights/green-coffee-quality-control-defects-grading"}]}, "green_measure": {"name": "Density, Moisture & Water Activity", "sub": "The three physical numbers", "group": "green", "accent": "#95602F", "sections": [{"h": "Moisture content", "body": "Moisture is the headline physical number. Specialty green should sit around 10–12%. Too high (above ~12.5%) and the coffee risks mold during the long, humid sea freight and in storage. Too low (below ~9%) and it's likely over-dried or aged, tending to taste flat. Contractual specs of 10–12% protect both buyer and seller, and you verify moisture at both pre-shipment and arrival, because it can drift in transit. A calibrated meter, sampled from several spots, does the job."}, {"h": "Water activity", "body": "Water activity is often confused with moisture but measures something different: not how much water is present, but how much is available for microbial growth, on a 0–1 scale. Green coffee is considered shelf-stable roughly between 0.50 and 0.70; above ~0.70 the mold and microbial risk climbs sharply. Two coffees with identical moisture can differ in water activity depending on how tightly the water is bound in the bean. This matters most for lots you'll store more than a few months — it's the better predictor of storage safety."}, {"h": "Density", "body": "Density reflects how hard and compact the bean is, which tracks with growing altitude — high-grown coffee matures slowly and comes out denser. It matters to the roaster because heat moves differently through dense material: dense beans generally take and want more energy. Buyers use density to confirm altitude claims and to benchmark a new arrival against previous ones. A simple farm-level version is the float test — healthy dense beans sink, low-density floaters (often defective or under-developed) rise."}, {"h": "Screen size", "body": "Screen size grades beans by physical size, measured in 64ths of an inch — a screen 18 bean is 18/64 inch, about 7.1mm. Green is passed through a stack of calibrated screens to sort by size; specialty coffee commonly falls in the screen 14–18 range. Size isn't quality directly, but uniform size means even roasting, which is why it's specified. This is also the basis of some country grades (Kenya's AA, Colombia's Supremo)."}], "keypoints": ["Moisture ~10–12%; >12.5% risks mold in freight, <9% is over-dried/flat. Check pre-ship and on arrival.", "Water activity (0–1) measures water available to microbes; <0.70 is shelf-stable — key for long storage.", "Density tracks altitude/hardness and affects roast energy; float test separates dense (sink) from defective (float).", "Screen size = 64ths of an inch (screen 18 ≈ 7.1mm); specialty ~14–18; uniform size = even roasting."], "refs": [{"label": "Green Coffee Collective — physical measurements", "link": "https://greencoffeecollective.com/blogs/learn/green-coffee-beans-physical-measurement"}, {"label": "Ethio Coffee — moisture & water activity in QC", "link": "https://www.ethiocoffee.co/insights/green-coffee-quality-control-defects-grading"}]}, "green_processing": {"name": "Processing Methods", "sub": "How the cherry becomes the bean", "group": "green", "accent": "#6E3E1E", "sections": [{"h": "Why processing matters", "body": "How a coffee cherry is turned into a green bean after harvest shapes the cup as profoundly as origin or variety. 'Washed,' 'natural,' and 'honey' aren't marketing words — they're descriptions of physical process, and knowing them lets you predict roughly what a coffee will taste like before you ever roast it. The same farm can produce dramatically different cups depending on how the lot was processed."}, {"h": "Washed and natural", "body": "Washed (wet) process removes all the fruit and mucilage before drying — often via fermentation, then washing clean. The result is a clean, bright, transparent cup where the origin and terroir show clearly with defined acidity. It's the default reference for cupping because it hides nothing. Natural (dry) process is the oldest method: the whole cherry dries around the bean, 'raisining' onto it. This gives bold, sweet, fruity cups (think blueberry, jammy notes) with heavier body and lower perceived acidity — but drying is harder to control, so defect risk is higher."}, {"h": "Honey and the middle ground", "body": "Honey (pulped natural) process is the hybrid: the skin is removed but some sticky mucilage is left on the bean during drying. It lands between washed and natural — more sweetness and body than washed, more clarity than natural. It's often graded by how much mucilage stays on: white (most removed, lightest/cleanest), yellow, red, and black (least removed, richest, sweetest, and slowest/riskiest to dry)."}, {"h": "Anaerobic and wet-hulled", "body": "Two more you'll see on listings. Anaerobic ferments the coffee sealed off from oxygen (often 48–72 hours), producing intense, complex, sometimes polarizing flavors — the experimental frontier. Wet-hulled (giling basah), used almost only in Indonesia, hulls the parchment off while the bean is still wet (around 30–35% moisture), then finishes drying exposed. It's what gives Sumatran coffee its signature earthy, full-bodied, very-low-acid, sometimes savory character. Each method carries a different defect and mold risk when drying is done poorly."}], "keypoints": ["Processing shapes the cup as much as origin; the terms describe physical process, not marketing.", "Washed = clean, bright, transparent (cupping reference). Natural = sweet, fruity, heavy body, higher defect risk.", "Honey = hybrid; graded white→black by mucilage left on (light/clean → rich/sweet/riskier).", "Anaerobic = sealed-oxygen ferment, intense/experimental. Wet-hulled (giling basah) = Indonesian, earthy, low-acid."], "refs": [{"label": "We Are Coffee Co — processing methods explained", "link": "https://www.wearecoffeeco.com/blogs/news/coffee-processing-methods-explained"}, {"label": "The Way to Coffee — washed/natural/honey/experimental", "link": "https://www.thewaytocoffee.com/coffee-processing/"}, {"label": "Craft Coffee Guru — honey process detail", "link": "https://www.craftcoffeeguru.com/honey-processed-coffee/"}]}, "green_species": {"name": "Arabica vs Robusta", "sub": "The two coffees that matter", "group": "green", "accent": "#5A2F16", "sections": [{"h": "Two species, two worlds", "body": "Of 80-plus coffee species, only two matter commercially. Coffea arabica is about 70% of the world market and essentially all of specialty coffee. Coffea canephora — robusta — is the rest, dominant in commodity blends, instant coffee, and as an espresso crema-booster. They're genuinely different plants producing genuinely different cups, and knowing which you're buying frames every other expectation."}, {"h": "Arabica", "body": "Arabica grows at higher altitude (roughly 800–2200m), matures slowly in cool conditions, and rewards that with higher sugars, more aromatic complexity, and pronounced, pleasant acidity — the fruit, floral, and nuanced flavors specialty is built on. The tradeoffs: it's more susceptible to disease (especially leaf rust) and pests, yields less, and costs more. Its caffeine content is relatively low, around 1.2–1.5%. Nearly every origin and variety in this app's profiles is arabica."}, {"h": "Robusta", "body": "Robusta is the hardy one — it grows at lower elevations in warmer, tougher conditions, resists disease and pests, and yields more, which makes it roughly 30–50% cheaper. Its caffeine is nearly double arabica's, around 2.2–2.7% (the plant evolved caffeine partly as a natural pesticide). The cup is heavier, more bitter, earthier, and less complex — traditionally seen as lower quality, though a small movement of 'fine robusta' aims to change that. The higher caffeine and crema are why robusta shows up in traditional Italian espresso blends."}, {"h": "What it means for buying", "body": "For a specialty roaster, the working assumption is arabica, and the interesting decisions live inside it — origin, variety, altitude, processing. Robusta enters the conversation deliberately: for a traditional espresso blend wanting body, crema, and a caffeine kick, or at the commodity end. The species tells you which set of expectations to bring to the cup before you taste."}], "keypoints": ["Only two species matter: arabica (~70% of market, ~all of specialty) and robusta (commodity, instant, crema).", "Arabica: higher altitude (800–2200m), complex/acidic, disease-prone, lower yield, ~1.2–1.5% caffeine, pricier.", "Robusta: hardy/low-altitude, heavier/bitter/earthier, high yield, ~2.2–2.7% caffeine, 30–50% cheaper.", "Specialty defaults to arabica; robusta is a deliberate choice for espresso body/crema/caffeine or commodity."], "refs": [{"label": "Old Chicago Coffee — caffeine by type", "link": "https://oldchicagocoffee.com/coffee-bean-caffeine-content-by-type-explained/"}, {"label": "DQ Coffee — arabica vs robusta", "link": "https://dqcoffee.vn/how-to-distinguish-coffee-arabica-and-robusta/?lang=en"}]}, "green_grades": {"name": "Country Grading Systems", "sub": "Reading the label", "group": "green", "accent": "#7A4A28", "sections": [{"h": "Why every country is different", "body": "The SCA green grading system is universal, but every producing country also has its own grading scheme, shaped by its coffee history, trade infrastructure, and the coffee it grows. That's why a green listing often shows both a country grade and an SCA cup score — they measure different things. The country grade tells you about physical sorting (size or defect count); the cup score tells you how it tastes. You need both to read a coffee."}, {"h": "Defect-count and size systems", "body": "Two broad approaches exist. Defect-count systems grade by how many defects appear in a sample: Ethiopia runs G1 (fewest defects, best) through G5, counted per 300g; Brazil grades on defects (per 300g) combined with screen size. Size systems grade by bean dimension: Kenya's famous AA/AB/PB grades are pure screen size (AA is the largest, not necessarily the best-tasting), and Colombia grades by screen too (Supremo largest, then Excelso)."}, {"h": "Size is not quality", "body": "The most important trap: bean-size grades don't directly mean quality. Kenya AA tells you the beans are large and will roast evenly, but a well-processed AB from a top estate can out-cup a mediocre AA. Always read the estate/producer name and processing method alongside the grade, and trust the cup score over the size letter. A Grade 2 Ethiopian cupping 86 will beat a Grade 1 cupping 80."}, {"h": "Preparation marks and certifications", "body": "You'll also see preparation standards like 'EP' (European Preparation) — an extra sorting pass, typically meaning no more than 8 defects per 300g and no beans below screen 15. It signals cleaner, more uniform green, though not guaranteed cup quality. And a key clarification: certifications like Organic or Fair Trade are about process and ethics, not cup quality — a Fair Trade coffee can score 78 and a certification-free microlot can score 89. Certifications describe how a coffee was grown and traded; specialty is about what's in the cup."}], "keypoints": ["Every origin has its own grade system; listings show country grade AND SCA score because they measure different things.", "Defect-count systems: Ethiopia G1–G5, Brazil (defects + screen), per 300g. Size systems: Kenya AA/AB/PB, Colombia Supremo/Excelso.", "Bean size ≠ quality — read estate + processing, and trust the cup score over the size letter.", "EP = extra sorting (≤8 defects/300g, no beans below screen 15); Organic/Fair Trade are ethics/process, not cup quality."], "refs": [{"label": "Green Coffee Collective — grading systems by country", "link": "https://greencoffeecollective.com/blogs/learn/green-coffee-grading-explained"}, {"label": "FAO Annex 7 — green coffee classification", "link": "https://www.fao.org/4/x6939e/x6939e13.htm"}, {"label": "StoneX — coffee grading overview", "link": "https://www.stonex.com/en/financial-glossary/coffee-grading/"}]}}, "GLOSSARY": [{"term": "Green coffee", "def": "Raw, unroasted coffee beans. They're actually the seed of a fruit (the coffee cherry). Green beans are dense, grassy-smelling, and hold about 10 to 12 percent water. They taste like nothing you'd want to drink until they're roasted."}, {"term": "Charge", "def": "The moment you drop the green beans into the hot roaster to start the roast. \"Charge temperature\" is how hot the roaster is at that instant."}, {"term": "Turning point (TP)", "def": "Right after charge, the cold beans pull heat out of the roaster, so the temperature reading drops for a bit, then bottoms out and starts climbing again. That lowest point is the turning point. From here the beans are heating up for the rest of the roast."}, {"term": "Drying phase", "def": "The first stretch of the roast. The beans shed their moisture and turn from green to yellow. They smell grassy, then like hay, then like baking bread. Usually the longest phase."}, {"term": "Maillard phase (browning)", "def": "The middle stretch, from yellow to first crack. Named after the Maillard reaction, the same browning chemistry that crusts bread and sears a steak. This is where most of coffee's flavor and aroma are built."}, {"term": "First crack (1C)", "def": "An audible popping sound, like popcorn or knuckles cracking, around 196°C / 385°F. Steam and pressure inside the bean rupture its structure and it nearly doubles in size. This is the roaster's most important landmark. No coffee is drinkable if dropped before it, and light roasts are dropped shortly after."}, {"term": "Development", "def": "The final phase, measured from first crack to drop. This is where sharp acidity mellows into sweetness and roast character builds. Too short and the coffee tastes grassy and sour; too long and it goes flat, then roasty."}, {"term": "Second crack (2C)", "def": "A second, quieter, faster crackle around 224°C / 435°F, more like crisp cereal than popcorn. Oils start migrating to the bean's surface. This is the gateway to dark roasts. Push past it and coffee turns smoky, then bitter, then toward burnt."}, {"term": "Drop", "def": "The moment you dump the beans out of the roaster into the cooling tray to stop the roast. \"Drop temperature\" is how hot the beans are at that instant, and it's one of the biggest levers on how light or dark the final roast is. This is the term you'll see most, and it just means: roast's done, get them out and cool them fast."}, {"term": "Bean temperature (BT)", "def": "The temperature of the beans during the roast, read by a probe in the roaster. The main number a roaster watches. Note: absolute readings vary by machine and probe, so roasters care more about the shape of the curve than the exact degrees."}, {"term": "Rate of rise (RoR)", "def": "How fast the bean temperature is climbing at any moment, in degrees per interval. It's the slope of the roast curve. A healthy roast has an RoR that smoothly declines from the turning point to the drop. It shouldn't spike up or flatten out."}, {"term": "Roast curve", "def": "The graph a roaster lives by: bean temperature plotted over time, usually with the RoR overlaid. Reading the curve is how you steer a roast and how you repeat a good one."}, {"term": "Development Time Ratio (DTR)", "def": "The share of the total roast that happened after first crack, as a percent. If a 12-minute roast hit first crack at 9:36, that's 2:24 of development, or 20 percent. A quick shorthand for how far a roast was pushed. Light roasts run lower (~10 to 15%), darker ones higher."}, {"term": "Drum roaster", "def": "The industry-standard machine: a rotating metal drum tumbles the beans over a gas flame. Gives coffee body and is stable and forgiving. Most commercial roasting happens on a drum."}, {"term": "Fluid-bed (air) roaster", "def": "A machine that roasts beans on a stream of hot air, like popcorn. Fast, even, and very clean and bright in the cup. Easier to learn on, but less forgiving because it moves quickly."}, {"term": "Airflow", "def": "How much air the roaster pulls through the beans. It does three jobs at once: delivers heat, clears smoke and chaff so they don't taint the flavor, and shapes how fast the beans gain or shed heat. A key control a roaster adjusts throughout."}, {"term": "Chaff", "def": "The papery skin that flakes off the beans as they roast and expand. Roasters clear it with airflow because burnt chaff tastes bad and, in quantity, is a fire hazard."}, {"term": "Agtron", "def": "A numbered scale for measuring roast color, from high numbers (very light) to low numbers (very dark). A standardized way to say how dark a roast is instead of vague words like \"medium.\" Note: the mapping of roast-level names to Agtron numbers varies by region and roaster — this guide uses the prevailing US specialty convention."}, {"term": "Roast level", "def": "How light or dark a coffee is roasted, from light through medium to dark. It's shorthand: two coffees at the same color can still taste different depending on how they got there."}, {"term": "Cupping", "def": "The industry's standard tasting method: brewing coffees the same controlled way and tasting them side by side to evaluate flavor. How roasters judge whether a roast worked and connect a curve to a cup. The modern SCA framework for this is the Coffee Value Assessment (CVA), which replaced the 2004 cupping protoco
