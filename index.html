<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a120b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coffee Guide">
<link rel="manifest" href="manifest.webmanifest">
<title>Coffee — An Industry Guide</title>
<style>
:root{
  --bg:#160e08; --panel:#1f1610; --panel2:#281c13; --line:#3a2a1c;
  --ink:#f0e6d8; --ink2:#c9b8a4; --ink3:#8f7c66;
  --heat1:#C9A34E; --heat2:#B07B3E; --heat3:#95602F; --heat4:#6E3E1E; --heat5:#43220F;
  --accent:#C9A34E;
  --mono:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;line-height:1.5}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
h1,h2,h3,h4{margin:0;font-weight:650;letter-spacing:-0.01em}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px}

/* header */
header.top{position:sticky;top:0;z-index:40;background:rgba(22,14,8,.92);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top .wrap{display:flex;align-items:center;gap:14px;height:60px}
.brand{display:flex;align-items:baseline;gap:9px;cursor:pointer;user-select:none}
.brand .mark{font-family:var(--mono);font-size:12px;letter-spacing:.18em;
  color:var(--bg);background:linear-gradient(135deg,var(--heat1),var(--heat3));
  padding:4px 8px;border-radius:5px;font-weight:700}
.brand .nm{font-size:16px;font-weight:700;letter-spacing:-.02em}
.brand .nm b{color:var(--heat1)}
.ver{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink3);
  border:1px solid var(--line);padding:3px 8px;border-radius:20px}
.navtabs{display:flex;gap:2px}
.navtabs button{background:none;border:none;color:var(--ink3);font-size:13.5px;
  font-weight:600;padding:8px 12px;border-radius:7px;transition:.15s}
.navtabs button:hover{color:var(--ink2)}
.navtabs button.on{color:var(--ink);background:var(--panel2)}

/* hero */
.hero{padding:52px 0 30px;border-bottom:1px solid var(--line);position:relative;overflow:hidden}
.hero .wrap{position:relative;z-index:2}
.hero h1{font-size:clamp(30px,5.5vw,52px);line-height:1.02;letter-spacing:-.03em;max-width:15ch}
.hero h1 .grad{background:linear-gradient(100deg,var(--heat1),var(--heat4));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{color:var(--ink2);font-size:16.5px;max-width:60ch;margin:18px 0 0}
.heatbar{display:flex;height:6px;margin-top:28px;border-radius:4px;overflow:hidden;max-width:520px}
.heatbar i{flex:1}
.hero .beans{position:absolute;inset:0;z-index:1;opacity:.5}

/* section head */
.seclead{display:flex;align-items:baseline;gap:12px;margin:40px 0 4px}
.seclead .no{font-family:var(--mono);font-size:12px;color:var(--heat3);letter-spacing:.1em}
.seclead h2{font-size:22px}
.seclead p{color:var(--ink3);font-size:14px;margin:2px 0 0}
.grouplabel{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink3);margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.grouplabel:after{content:"";flex:1;height:1px;background:var(--line)}
.filterbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:22px 0 4px}
.searchwrap{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:0 12px;flex:1;min-width:220px;color:var(--ink3)}
.searchwrap:focus-within{border-color:var(--heat3)}
.searchwrap input{background:none;border:none;outline:none;color:var(--ink);font-size:14px;
  padding:10px 0;flex:1;font-family:inherit}
.searchwrap input::placeholder{color:var(--ink3)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chips button{background:var(--panel);border:1px solid var(--line);color:var(--ink3);font-size:12.5px;
  font-weight:600;padding:7px 12px;border-radius:20px;transition:.14s}
.chips button:hover{color:var(--ink2)}
.chips button.on{background:var(--heat3);border-color:var(--heat3);color:#fff}
.sortwrap{display:flex;align-items:center;gap:7px}
.sortwrap label{font-size:12px;color:var(--ink3);font-weight:600}
.sortwrap select{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:13px;
  padding:8px 10px;border-radius:9px;font-family:inherit;cursor:pointer}
.empty{text-align:center;color:var(--ink3);font-size:14px;padding:44px 20px;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-top:16px}

/* start here */
.starthero{padding:40px 0 8px}
.starthero .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--heat2);margin-bottom:14px}
.starthero h1{font-size:clamp(26px,4.5vw,40px);letter-spacing:-.03em;line-height:1.05}
.starthero .lede{color:var(--ink2);font-size:16.5px;max-width:66ch;margin:18px 0 0;line-height:1.55}
.block2{margin-top:44px}
.block2 .bh{font-size:20px;letter-spacing:-.01em}
.block2 .bsub{color:var(--ink3);font-size:14px;margin:5px 0 18px}
.block2 .bsub b{color:var(--heat1);font-weight:600}
.journey{display:flex;flex-direction:column}
.jstep{display:flex;gap:16px;position:relative;padding-bottom:20px}
.jstep .jdot{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:#160e08;z-index:2}
.jstep .jline{position:absolute;left:15.5px;top:32px;bottom:0;width:2px;background:var(--line)}
.jstep .jbody{padding-top:4px}
.jstep .jbody h4{font-size:16px;margin-bottom:3px}
.jstep .jbody p{color:var(--ink2);font-size:14.5px;margin:0;max-width:64ch}
.tradeoff{display:flex;flex-wrap:wrap;align-items:stretch;gap:14px}
.tside{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
.tside.light{border-left:3px solid var(--heat1)}
.tside.dark{border-left:3px solid var(--heat5)}
.tside .tlabel{font-weight:700;font-size:14.5px;margin-bottom:10px}
.tside.light .tlabel{color:var(--heat1)}
.tside.dark .tlabel{color:#c98a5a}
.tside ul{margin:0;padding-left:18px}
.tside li{color:var(--ink2);font-size:14px;margin-bottom:6px}
.tarrow{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;
  letter-spacing:.1em;color:var(--ink3);padding:0 4px}
.glist{display:flex;flex-direction:column;gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.grow{display:grid;grid-template-columns:180px 1fr;gap:18px;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
.grow:last-child{border-bottom:none}
.grow .gterm{font-weight:650;font-size:14.5px;color:var(--heat1)}
.grow .gdef{color:var(--ink2);font-size:14px;line-height:1.5}
.startcta{margin-top:44px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;text-align:center}
.startcta p{font-size:16px;margin:0 0 16px;color:var(--ink)}
.ctarow{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.ctarow button{background:var(--heat3);border:1px solid var(--heat3);color:#fff;font-size:14px;
  font-weight:600;padding:11px 18px;border-radius:10px}
.ctarow button.ghost{background:none;border-color:var(--line);color:var(--ink2)}
.ctarow button:hover{opacity:.9}
@media(max-width:560px){.grow{grid-template-columns:1fr;gap:5px}.tarrow{display:none}}

/* profile grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.pcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;
  cursor:pointer;transition:.16s;position:relative;overflow:hidden}
.pcard:hover{transform:translateY(-2px);border-color:var(--ink3)}
.pcard .swatch{position:absolute;top:0;left:0;width:4px;height:100%}
.pcard .lvl{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3)}
.pcard h3{font-size:19px;margin:5px 0 2px}
.pcard .sub{color:var(--ink3);font-size:12.5px}
.pcard .mini{display:flex;justify-content:center;margin:10px 0 4px}
.pcard .agt{font-family:var(--mono);font-size:11px;color:var(--ink2);text-align:center;margin-top:6px}
.pcard .oneline{color:var(--ink2);font-size:13px;margin-top:10px;line-height:1.45}

/* meth cards */
.mcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;
  cursor:pointer;transition:.16s;display:flex;flex-direction:column;gap:5px}
.mcard:hover{border-color:var(--ink3);background:var(--panel2)}
.mcard .k{font-family:var(--mono);font-size:10.5px;color:var(--heat2);letter-spacing:.1em}
.mcard h3{font-size:17px}
.mcard .sub{color:var(--ink3);font-size:13px}
.mgrid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}

/* learn hub */
.lcount,.hublist .lcount{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:12px}
.hublist{display:flex;flex-direction:column;gap:12px}
.hubgroup{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel);transition:.16s}
.hubgroup.open{background:var(--panel2);border-color:var(--ink3)}
.hubhead{width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;background:none;border:none;
  text-align:left;cursor:pointer;transition:.16s}
.hubhead:hover{background:var(--panel2)}
.hubbar{width:4px;align-self:stretch;border-radius:3px;background:var(--ga);flex-shrink:0;min-height:34px}
.hubtxt{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.hubname{font-size:18px;font-weight:600;color:var(--ink1)}
.hubdesc{font-size:13px;color:var(--ink3);line-height:1.45}
.hubcount{font-family:var(--mono);font-size:12.5px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);
  border-radius:20px;padding:3px 10px;flex-shrink:0;line-height:1;align-self:center}
.hubchev{font-family:var(--mono);font-size:18px;color:var(--ink3);width:16px;text-align:center;flex-shrink:0;
  align-self:center;line-height:1}
.hubcards{padding:4px 18px 18px}

/* detail */
.detail{padding-bottom:60px}
.back{background:var(--panel2);border:1px solid var(--line);color:var(--ink2);font-size:13px;
  padding:7px 14px;border-radius:8px;margin:22px 0 20px;font-weight:600}
.back:hover{color:var(--ink)}
.dhead{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start;
  border-bottom:1px solid var(--line);padding-bottom:24px}
.dhead .txt{flex:1;min-width:260px}
.dhead .lvl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
.dhead h1{font-size:34px;letter-spacing:-.03em;margin:6px 0 2px}
.dhead .sub{color:var(--ink3);font-size:15px}
.dhead .aka{margin-top:9px;font-size:12.5px;color:var(--ink3);display:flex;flex-wrap:wrap;
  align-items:center;gap:6px}
.dhead .aka span{background:var(--panel2);border:1px solid var(--line);border-radius:20px;
  padding:2px 9px;color:var(--ink2);font-size:12px}
.dhead .oneline{color:var(--ink2);font-size:15.5px;margin:14px 0 0;max-width:56ch;line-height:1.5}
.dhead .usefor{margin-top:14px;font-size:13.5px;color:var(--ink2)}
.dhead .usefor b{color:var(--heat1);font-weight:600}
.radarbox{flex-shrink:0;text-align:center}
.radarbox .cap{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink3);margin-top:6px}

.block{margin-top:34px}
.block > h2{font-size:15px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;
  color:var(--heat2);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.block > h2:after{content:"";flex:1;height:1px;background:var(--line)}

/* curve stat table */
.curvegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.stat .lab{font-size:11.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.stat .val{font-family:var(--mono);font-size:18px;color:var(--ink);margin-top:4px}
.stat .val small{font-size:12px;color:var(--ink3);margin-left:4px}
.stat.hi{border-color:var(--heat3)}
.stat.hi .val{color:var(--heat1)}

/* phases */
.phase{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--line)}
.phase:last-child{border-bottom:none}
.phase .n{font-family:var(--mono);font-size:13px;color:var(--bg);flex-shrink:0;
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;background:var(--heat2)}
.phase .c h4{font-size:15.5px;margin-bottom:4px}
.phase .c p{color:var(--ink2);font-size:14px;margin:0}

/* defects */
.defect{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.defect h4{font-size:14.5px;color:#e08a5a}
.defect .row{font-size:13.5px;color:var(--ink2);margin-top:6px}
.defect .row b{color:var(--ink3);font-weight:600;font-family:var(--mono);font-size:11px;
  text-transform:uppercase;letter-spacing:.08em;margin-right:6px}

.prose{color:var(--ink2);font-size:14.5px;max-width:70ch}
.machine{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--heat3);
  border-radius:10px;padding:16px 18px;color:var(--ink2);font-size:14.5px;max-width:74ch}
.snav{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:520px}
.snav-cell{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
  cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:3px}
.snav-cell:not(.empty):hover{border-color:var(--ink3);transform:translateY(-2px)}
.snav-cell.empty{background:none;border:1px dashed var(--line);cursor:default;opacity:.4}
.snav-cell .snav-dir{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase}
.snav-cell .snav-name{font-size:17px;font-weight:650}
.snav-cell .snav-lvl{font-size:12px;color:var(--ink3)}
.snav-cell:last-child{text-align:right;align-items:flex-end}
.curvechart{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px 8px;margin-top:16px}
.clegend{display:flex;flex-wrap:wrap;align-items:center;gap:18px;padding:6px 4px 4px;font-size:12px;color:var(--ink2)}
.clegend span{display:flex;align-items:center;gap:7px}
.clegend .ln{width:16px;height:2.6px;border-radius:2px;display:inline-block}
.clegend .ln.dash{background:repeating-linear-gradient(90deg,#7a6a52 0 4px,transparent 4px 7px);height:2px}
.clegend .hint{color:var(--ink3);font-size:11.5px;flex:1;min-width:200px}
.curvehead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.curvetitle{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.unittoggle{display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.unittoggle button{background:var(--panel);border:none;color:var(--ink3);font-size:12px;font-weight:600;
  padding:5px 12px;font-family:var(--mono);transition:.14s}
.unittoggle button.on{background:var(--heat3);color:#fff}

/* methodology detail */
.msection{margin-top:22px;max-width:74ch}
.msection h3{font-size:16.5px;color:var(--ink);margin-bottom:6px}
.msection p{color:var(--ink2);font-size:14.5px;margin:0}
.keypoints{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:18px 20px;margin-top:28px;max-width:74ch}
.keypoints h4{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--heat2);margin-bottom:12px}
.keypoints li{color:var(--ink);font-size:14px;margin-bottom:9px;list-style:none;
  padding-left:20px;position:relative}
.keypoints li:before{content:"→";position:absolute;left:0;color:var(--heat3)}
.refs{margin-top:26px;max-width:74ch}
.refs h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:10px}
.refs ul{margin:0;padding:0;list-style:none}
.refs li{margin-bottom:7px;padding-left:16px;position:relative}
.refs li:before{content:"↗";position:absolute;left:0;color:var(--ink3);font-size:11px}
.refs a{color:var(--ink2);font-size:13px;text-decoration:none;border-bottom:1px solid var(--line);
  transition:.14s}
.refs a:hover{color:var(--heat1);border-color:var(--heat3)}
.siblings{margin-top:34px;padding-top:26px;border-top:1px solid var(--line)}
.siblings h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:14px}

/* compare */
.cmpmodebar{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;width:fit-content;margin-bottom:16px}
.cmpmodebar button{background:var(--panel);border:none;color:var(--ink3);font-size:13px;font-weight:600;padding:8px 18px;transition:.14s}
.cmpmodebar button.on{background:var(--heat3);color:#fff}
.cmpbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 20px}
.cmpbar button{background:var(--panel);border:1px solid var(--line);color:var(--ink3);
  font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px}
.cmpbar button.on{color:var(--bg);border-color:transparent}
.cmpwrap{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;justify-content:center;
  background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px}
.cmpwrap .lg{flex:1;min-width:280px;display:flex;justify-content:center}
.cmplegend{display:flex;flex-direction:column;gap:10px;min-width:180px}
.cmplegend .it{display:flex;align-items:center;gap:9px;font-size:14px}
.cmplegend .it i{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.cmphint{color:var(--ink3);font-size:13px;margin-top:2px}

footer{border-top:1px solid var(--line);padding:26px 0 44px;color:var(--ink3);font-size:12.5px}
footer .wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between}

@media(max-width:640px){
  .navtabs{display:none}
  .dhead h1{font-size:27px}
  .hero{padding:36px 0 24px}
}
.mobnav{display:none}
@media(max-width:640px){
  .mobnav{display:flex;position:sticky;top:60px;z-index:30;background:var(--bg);
    border-bottom:1px solid var(--line)}
  .mobnav button{flex:1;background:none;border:none;color:var(--ink3);font-size:13px;
    font-weight:600;padding:11px 0;border-bottom:2px solid transparent}
  .mobnav button.on{color:var(--heat1);border-bottom-color:var(--heat1)}
}
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <div class="brand" onclick="go('home')">
      <span class="mark">☕ CIG</span>
      <span class="nm">Coffee<b>·</b>An Industry Guide</span>
    </div>
    <nav class="navtabs">
      <button data-nav="home" onclick="go('home')">Overview</button>
      <button data-nav="start" onclick="go('start')">Start Here</button>
      <button data-nav="profiles" onclick="go('profiles')">Roast Profiles</button>
      <button data-nav="compare" onclick="go('compare')">Compare</button>
      <button data-nav="learn" onclick="go('learn')">Learn</button>
    </nav>
    <span class="ver" id="verlabel"></span>
  </div>
</header>
<nav class="mobnav">
  <button data-nav="home" onclick="go('home')">Overview</button>
  <button data-nav="start" onclick="go('start')">Start</button>
  <button data-nav="profiles" onclick="go('profiles')">Profiles</button>
  <button data-nav="compare" onclick="go('compare')">Compare</button>
  <button data-nav="learn" onclick="go('learn')">Learn</button>
</nav>
<main id="app"></main>
<footer><div class="wrap">
  <span>Coffee — An Industry Guide · Roasting reference for working professionals</span>

oped", "cause": "Treated like a cinnamon roast and dropped too early.", "avoid": "Give it that extra beat past first crack — the whole point of New England versus cinnamon is a touch more development."}, {"d": "Sour", "cause": "Acids not resolved in the short development.", "avoid": "Nudge development slightly longer or pick a sweeter green; brightness is the goal, sourness is the miss."}], "machine": "Forgiving for a light roast. Works on drum or fluid-bed; drum adds a little body, air keeps it crisp and bright. A good light roast to learn on before attempting Nordic or cinnamon."}, "nordic": {"name": "Nordic", "sub": "Scandinavian Light", "level": "Light", "group": "light", "agtron": "95–75", "accent": "#C9A34E", "oneLine": "Ultra-light filter roast that stops well before first crack completes, built to showcase origin acidity and florals.", "useFor": "Single-origin filter, competition-style clarity, delicate washed Africans and high-grown lots.", "curve": {"chargeC": "195–210", "chargeF": "383–410", "tpC": "85–95", "tpF": "185–203", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–200", "fcF": "385–392", "dropC": "200–205", "dropF": "392–401", "totalTime": "8:00–10:00", "dtr": "10–14%"}, "flavor": {"acidity": 5, "body": 2, "sweetness": 3, "bitterness": 1, "roast": 1, "aroma": 5}, "phases": [{"h": "Drying", "body": "Long, gentle drying. Bean stays green-to-yellow. You're driving off free moisture without rushing energy into the bean — a scorched Nordic roast is unrecoverable because there's no development to hide behind."}, {"h": "Maillard / Browning", "body": "Kept short and controlled. Sugars begin browning but you're deliberately not letting caramelization run. This is where the floral and acidic precursors are preserved rather than cooked off."}, {"h": "First Crack", "body": "You drop at or barely into first crack. The crack may be sparse and quiet. Timing here is everything — a few seconds long and you lose the wispy top-end that defines the style."}, {"h": "Development", "body": "Minimal by design. DTR runs low (10–14%). The goal is a fully-dried, evenly-roasted bean that is barely developed, not an underdeveloped one — the distinction is even heat application, not just a fast drop."}], "defects": [{"d": "Grassy / green", "cause": "Dropped before drying truly finished; moisture still locked in center.", "avoid": "Confirm even yellowing across the batch before pushing toward first crack; don't chase the clock."}, {"d": "Sharp / sour", "cause": "Underdeveloped acids never resolved into sweetness.", "avoid": "Nudge DTR up slightly or extend Maillard by a few seconds; sourness is the Nordic failure mode, brightness is the goal."}], "machine": "Demands responsive convection and tight control — fluid-bed and modern drum roasters with strong airflow shine here. Small batches only; large batches can't shed heat fast enough to hold the profile this light.", "aka": ["Scandinavian", "Light Nordic"]}, "blonde": {"name": "Blonde", "sub": "Light (Marketing Term)", "level": "Light", "group": "light", "aka": ["Golden", "Starbucks Blonde", "Light Roast (retail)"], "agtron": "85–75", "accent": "#DCC06A", "oneLine": "A pale, golden light roast made famous as a retail term by Starbucks in 2012 — bright and mellow, though in practice most 'blonde' offerings land closer to a City roast than a true extreme-light.", "useFor": "Approachable light-roast retail coffee, lighter espresso for a broad audience, drinkers stepping down from medium who want less bitterness without going fully Nordic.", "curve": {"chargeC": "198–212", "chargeF": "388–414", "tpC": "88–96", "tpF": "190–205", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "204–209", "dropF": "399–408", "totalTime": "9:00–11:00", "dtr": "13–17%"}, "flavor": {"acidity": 4, "body": 2, "sweetness": 3, "bitterness": 1, "roast": 1, "aroma": 4}, "phases": [{"h": "Drying", "body": "Standard even drying. Blonde is a broadly-marketed light roast, so the approach is a clean, unfussy light-roast curve rather than the knife-edge precision of a Nordic or cinnamon."}, {"h": "Maillard / Browning", "body": "A modest browning cooks off the grassy edge and builds gentle sweetness. The aim is 'smooth and light,' not maximum origin expression."}, {"h": "First Crack", "body": "You let first crack roll fully, then drop within a short window. Because 'blonde' isn't a precise level, exactly where you drop varies a lot between roasters."}, {"h": "Development", "body": "A short-to-moderate window (13–17% DTR). Enough to keep it mellow and approachable rather than sharp — which is why many commercial blonde roasts drift toward City rather than staying truly light."}], "defects": [{"d": "Not actually light", "cause": "Chasing 'smooth,' the roast drifts to City or beyond and stops being a light roast at all.", "avoid": "If you're selling it as blonde, hold the drop genuinely light; know that the term sets a light expectation even if it's loosely defined."}, {"d": "Sour / underdeveloped", "cause": "Overcorrecting toward light and dropping too early.", "avoid": "Give it enough development to resolve acids; blonde should read mellow-bright, not sour."}], "machine": "Forgiving across machines. The real 'trick' of a blonde roast is honestly just a clean, approachable light-to-light-medium roast — the distinctive thing about it is the name and the marketing, not a unique technique."}, "city": {"name": "City", "sub": "Light–Medium Filter", "level": "Light", "group": "light", "agtron": "70–65", "accent": "#B07B3E", "oneLine": "The classic light-medium filter roast dropped in the early minute of development, balancing origin character with rounded sweetness.", "useFor": "Everyday single-origin filter, pour-over programs, origins where you still want acidity but with more body than Nordic.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "205–210", "dropF": "401–410", "totalTime": "9:00–11:00", "dtr": "15–18%"}, "flavor": {"acidity": 4, "body": 3, "sweetness": 4, "bitterness": 1, "roast": 1, "aroma": 4}, "phases": [{"h": "Drying", "body": "Standard drying phase, roughly half the total roast. Even yellowing is the target. Sets up a stable rate-of-rise heading into browning."}, {"h": "Maillard / Browning", "body": "Fuller than Nordic — you let browning build more sweetness and body. This is where City earns its rounder cup versus a Scandinavian light."}, {"h": "First Crack", "body": "You ride into first crack and let it establish before dropping. The crack is audible and consistent across the batch."}, {"h": "Development", "body": "A short but real development window (15–18% DTR). Enough to resolve acids into sweetness and knock off the grassy edge without pushing into roast character."}], "defects": [{"d": "Baked", "cause": "RoR crashed and flat-lined through development; energy stalled.", "avoid": "Keep the rate-of-rise gliding gently downward — never flat, never rising, into the drop."}, {"d": "Underdeveloped", "cause": "Dropped too soon after first crack onset.", "avoid": "Give at least ~1:15–1:45 of development past first crack for this level."}], "machine": "Forgiving across roaster types. Drum roasters give it a touch more body; fluid-bed keeps it brighter. A good all-rounder profile to learn a new machine on.", "aka": ["Light City", "Half City"]}, "american": {"name": "American", "sub": "Medium-Light", "level": "Medium", "group": "medium", "aka": ["Breakfast", "Regular", "Medium (US)"], "agtron": "68–62", "accent": "#A06E38", "oneLine": "The medium-light US standard — the everyday 'regular' or 'breakfast' roast, balanced and approachable, sitting between a bright light roast and a sweeter specialty medium.", "useFor": "Traditional American drip and diner coffee, crowd-pleasing house blends, the safe middle a broad audience already expects.", "curve": {"chargeC": "200–214", "chargeF": "392–417", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "207–212", "dropF": "405–414", "totalTime": "9:30–11:30", "dtr": "16–19%"}, "flavor": {"acidity": 4, "body": 3, "sweetness": 4, "bitterness": 2, "roast": 2, "aroma": 4}, "phases": [{"h": "Drying", "body": "Standard even drying. American is the classic middle roast, so nothing here is pushed — it's a balanced, unhurried approach."}, {"h": "Maillard / Browning", "body": "A solid browning phase builds the balanced sweetness and body that makes this roast so approachable. More developed than New England, lighter than City+."}, {"h": "First Crack", "body": "First crack rolls fully through the batch and you note its timing before carrying into a moderate development."}, {"h": "Development", "body": "A moderate window (16–19% DTR). Enough to balance acidity with body and sweetness, landing the familiar, non-challenging cup most American drinkers grew up on."}], "defects": [{"d": "Flat / generic", "cause": "The safe middle roasted without attention drifts to dull.", "avoid": "Even a balanced roast wants a clean declining RoR; don't let 'medium' mean 'unmanaged.'"}, {"d": "Baked", "cause": "Stalled RoR through the moderate development.", "avoid": "Keep momentum — the middle of the spectrum still bakes if the rate of rise flatlines."}], "machine": "The most forgiving roast on the spectrum. Works on essentially any machine, which is why it became the mass-market default. A fine profile for dialing in a new roaster before pushing to the extremes."}, "cityplus": {"name": "City+", "sub": "Specialty Default", "level": "Medium", "group": "medium", "agtron": "63–58", "accent": "#95602F", "oneLine": "The most common specialty medium roast — a hair past City, deep enough for sweetness and balance while keeping origin identity intact.", "useFor": "The default specialty filter roast, blends meant to be versatile, café house filter, and the safest starting point when dialing a new coffee.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "210–216", "dropF": "410–421", "totalTime": "10:00–12:00", "dtr": "18–22%"}, "flavor": {"acidity": 3, "body": 4, "sweetness": 5, "bitterness": 2, "roast": 2, "aroma": 4}, "phases": [{"h": "Drying", "body": "Even, unhurried drying — this profile rewards a stable, well-managed early phase because the longer development amplifies any inconsistency from earlier."}, {"h": "Maillard / Browning", "body": "The workhorse phase for City+. A generous, well-controlled browning is where the signature sweetness and caramel notes are built."}, {"h": "First Crack", "body": "First crack is a landmark, not the finish. You note its timing precisely — development time is measured from here."}, {"h": "Development", "body": "The sweet spot: 18–22% DTR. Long enough to fully round out and build sweetness, short enough that origin character and a clean finish survive. This is the most-dialed window in specialty roasting."}], "defects": [{"d": "Flat / dull", "cause": "Development pushed too long, muting acidity without adding complexity.", "avoid": "Watch that DTR doesn't creep past ~22%; pull back drop temp if the cup goes lifeless."}, {"d": "Roasty edge", "cause": "Drifted too close to second crack.", "avoid": "Hold drop temp comfortably below second-crack territory; City+ should never taste toasty."}], "machine": "The universal reference profile. Works on nearly anything, which is exactly why it's the benchmark — dial your machine here first, then move lighter or darker from a known-good center.", "aka": ["City Plus", "Medium"]}, "fullcity": {"name": "Full City", "sub": "Medium–Dark", "level": "Medium-Dark", "group": "mediumdark", "agtron": "55–50", "accent": "#6E3E1E", "oneLine": "Medium-dark roast taken right up to the edge of second crack — deep caramelization and body while stopping just short of roast dominating.", "useFor": "Fuller-bodied filter, classic espresso bases, blends built for milk, chocolate-and-nut flavor profiles.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "218–224", "dropF": "424–435", "totalTime": "11:00–13:00", "dtr": "20–25%"}, "flavor": {"acidity": 2, "body": 5, "sweetness": 4, "bitterness": 3, "roast": 3, "aroma": 3}, "phases": [{"h": "Drying", "body": "Standard drying. From here on, total energy delivered matters more than any single phase — Full City is about accumulated development."}, {"h": "Maillard / Browning", "body": "Full browning, deep caramel formation. Sugars are heavily transformed; acidity is dropping and body is climbing."}, {"h": "First Crack", "body": "First crack comes and goes with meaningful time still ahead. The cracks roll through the whole batch and settle."}, {"h": "Development", "body": "Extended development approaching — but not reaching — second crack. You're listening for the first isolated snaps of second crack as your ceiling, and dropping before they build."}], "defects": [{"d": "Roasty / carbony", "cause": "Slid into second crack; roast character took over.", "avoid": "Drop at the very first hint of second crack, not after; the window closes fast at this level."}, {"d": "Baked / flat", "cause": "Long roast with a stalled RoR through the back half.", "avoid": "Maintain momentum — a long roast still needs a declining, never-flat rate-of-rise."}], "machine": "Drum roasters excel here; the conductive heat and thermal mass build the body this style is known for. Batch size is more forgiving than light roasts since you're not preserving fragile top-end.", "aka": ["Full City"]}, "fullcityplus": {"name": "Full City+", "sub": "Into Second Crack", "level": "Medium-Dark", "group": "mediumdark", "agtron": "48–45", "accent": "#5A2F16", "oneLine": "Dropped into the rolling start of second crack — the first roast level where surface oils begin to appear and roast character joins origin flavor.", "useFor": "Bold espresso, traditional-leaning blends, darker café programs that still want some sweetness underneath the roast.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "224–229", "dropF": "435–444", "totalTime": "12:00–14:00", "dtr": "22–27%"}, "flavor": {"acidity": 1, "body": 5, "sweetness": 3, "bitterness": 4, "roast": 4, "aroma": 3}, "phases": [{"h": "Drying", "body": "Standard. The character of this roast is decided almost entirely in the final couple of minutes, so a clean early phase just keeps the back half predictable."}, {"h": "Maillard / Browning", "body": "Full, deep browning already behind you before the finish. Origin acidity is mostly spent by now."}, {"h": "First Crack", "body": "First crack is an early landmark. You're managing energy so second crack arrives controlled, not runaway."}, {"h": "Development", "body": "You drop into the early roll of second crack. First oils bead on the surface hours later. Judgment shifts from taste-forward development to controlling how far into second crack you commit."}], "defects": [{"d": "Ashy / burnt", "cause": "Rode too deep into second crack; pushed toward carbon.", "avoid": "Drop in the early, sporadic phase of second crack — not once it's rolling continuously."}, {"d": "Uneven surface oil", "cause": "Inconsistent heat let some beans out-roast others.", "avoid": "Ensure even development into second crack; blotchy oiling signals an uneven batch, not just a dark roast."}], "machine": "Drum roasters own this territory. Watch airflow — you want to clear smoke and chaff without stripping so much heat that you stall right at the critical second-crack transition.", "aka": ["Full City Plus"]}, "vienna": {"name": "Vienna", "sub": "Dark", "level": "Dark", "group": "dark", "agtron": "42–38", "accent": "#8a4a28", "oneLine": "A moderate dark roast well into second crack with a light, even oil sheen — bittersweet and roast-forward but still short of full French intensity.", "useFor": "Traditional dark-roast espresso, European-style café blends, drinkers who want dark but not scorched.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "230–235", "dropF": "446–455", "totalTime": "13:00–15:00", "dtr": "25–30%"}, "flavor": {"acidity": 1, "body": 4, "sweetness": 3, "bitterness": 4, "roast": 5, "aroma": 2}, "phases": [{"h": "Drying", "body": "Standard drying. At dark levels, consistency of the whole curve matters more than any nuance — you're building toward a roast-dominant cup."}, {"h": "Maillard / Browning", "body": "Fully complete and behind you. Origin sugars are largely converted; what's left is roast-driven bittersweetness."}, {"h": "First Crack", "body": "A distant landmark. You roll through first crack and keep energy moving toward second."}, {"h": "Development", "body": "You settle into the middle of second crack. Oils migrate to the surface evenly. Control matters — the difference between Vienna and French is a matter of seconds and a few degrees here."}], "defects": [{"d": "Acrid / smoky", "cause": "Airflow too low; smoke reabsorbed into the beans.", "avoid": "Open airflow through second crack to evacuate smoke; dark roast should be bittersweet, not smoky."}, {"d": "Baked-then-burnt", "cause": "Slow approach that stalled, then a hard finish to reach color.", "avoid": "Reach dark color through steady momentum, not by stalling and then blasting heat to catch up."}], "machine": "Drum roasters with good airflow control. At this darkness, smoke management and even heat are the whole game; batch-to-batch consistency comes from controlling airflow, not chasing bean temp.", "aka": ["Viennese", "Light French", "Continental (loosely)"]}, "continental": {"name": "Continental", "sub": "Dark", "level": "Dark", "group": "dark", "aka": ["New Orleans", "European", "After-Dinner", "High Roast"], "agtron": "40–35", "accent": "#77401E", "oneLine": "A dark roast in the Vienna-to-French band with a smoky, caramelized, bittersweet body — the traditional 'after-dinner' European style, historically the entry to the darkest roasts.", "useFor": "Dark-roast blends, after-dinner and dessert coffee, drinkers who want deep and smoky but not as punishing as French or Italian.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "232–237", "dropF": "450–459", "totalTime": "13:30–15:30", "dtr": "26–31%"}, "flavor": {"acidity": 1, "body": 4, "sweetness": 2, "bitterness": 5, "roast": 5, "aroma": 2}, "phases": [{"h": "Drying", "body": "Standard. As with all dark roasts, accumulated energy over the whole curve matters more than any single phase's nuance."}, {"h": "Maillard / Browning", "body": "Fully complete well before the finish. Origin character is largely spent; the cup is roast-driven from here."}, {"h": "First Crack", "body": "An early landmark. You manage energy so the run into second crack stays controlled rather than runaway."}, {"h": "Development", "body": "You settle into second crack, past Vienna but short of full French. Smoky, caramelized, bittersweet. The name blurs with New Orleans and European — all sit in this same dark band."}], "defects": [{"d": "Acrid / smoky", "cause": "Low airflow let roast smoke reabsorb into the beans.", "avoid": "Open airflow through second crack; the target is a clean bittersweet smokiness, not an ashtray."}, {"d": "Ashy", "cause": "Pushed too close to the French/Italian end.", "avoid": "Hold the drop in the mid-second-crack range; Continental should keep some caramel body under the roast."}], "machine": "Drum roaster with good airflow control. Historically some New Orleans versions blend in chicory — a separate ingredient, not a roasting technique. Smoke management is the main craft at this darkness."}, "french": {"name": "French", "sub": "Very Dark", "level": "Dark", "group": "dark", "agtron": "35–30", "accent": "#9c5a34", "oneLine": "A very dark roast deep into second crack with heavy surface oil — roast character dominates, origin is largely gone, intense and bittersweet.", "useFor": "Traditional French/Italian-leaning espresso, dark-roast house blends, drinkers who want bold, smoky, low-acid coffee.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "235–240", "dropF": "455–464", "totalTime": "14:00–16:00", "dtr": "28–33%"}, "flavor": {"acidity": 1, "body": 4, "sweetness": 2, "bitterness": 5, "roast": 5, "aroma": 2}, "phases": [{"h": "Drying", "body": "Standard drying, then the roast becomes about controlled energy delivery all the way to a very dark drop."}, {"h": "Maillard / Browning", "body": "Long complete. By now the cup's character is roast and carbon chemistry, not origin sugars."}, {"h": "First Crack", "body": "A memory. You're managing the run deep into second crack without letting it become uncontrolled."}, {"h": "Development", "body": "You push well into or past the peak of second crack. Surface is heavily oiled. This is the edge of the safe roasting envelope — a little further is charcoal, and the risk of roaster fires climbs, so vigilance is mandatory."}], "defects": [{"d": "Burnt / carbony", "cause": "Pushed past controlled dark into scorched territory.", "avoid": "Know your drop point cold; at French level there's almost no margin before flavor becomes ash."}, {"d": "Flat, no sweetness", "cause": "All fermentable sugar cooked off with nothing balancing the bitterness.", "avoid": "Start from a sweeter, denser green; thin coffees turn hollow and purely bitter at this level."}], "machine": "Drum roasters, close supervision, aggressive airflow. Fire safety is real at this level — chaff and oil plus high heat. Never walk away from a French roast, and clean the roaster diligently.", "aka": ["Dark Roast", "Turkish (loosely)"]}, "italian": {"name": "Italian", "sub": "Darkest Traditional", "level": "Dark", "group": "dark", "agtron": "28–25", "accent": "#b06a3e", "oneLine": "The darkest common roast — near the end of the safe envelope, heavily oiled and carbon-forward, built for traditional dark espresso tradition.", "useFor": "Traditional Italian espresso blends, very dark café identities, customers who specifically want the darkest cup.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "240–245", "dropF": "464–473", "totalTime": "15:00–17:00", "dtr": "30–35%"}, "flavor": {"acidity": 1, "body": 3, "sweetness": 1, "bitterness": 5, "roast": 5, "aroma": 1}, "phases": [{"h": "Drying", "body": "Standard. Everything past drying is energy management toward the darkest safe drop point."}, {"h": "Maillard / Browning", "body": "Fully spent long before the finish. No origin character remains to preserve."}, {"h": "First Crack", "body": "Far behind. Second crack has fully rolled and largely finished by the time you approach the drop."}, {"h": "Development", "body": "You take it to the very edge of the safe roasting envelope — beyond here is combustion, not coffee. Bean surface is fully oiled and near-black. This level exists for tradition and identity, not flavor development."}], "defects": [{"d": "Charred / ash", "cause": "One step too far; the bean crossed from dark roast to burnt.", "avoid": "This roast lives on a knife's edge — precise, repeatable drop timing is the entire skill."}, {"d": "Roaster fire", "cause": "Accumulated oil and chaff igniting at extreme heat.", "avoid": "Meticulous roaster cleaning and constant supervision; this is the highest fire-risk common roast."}], "machine": "Drum roasters with rigorous cleaning and fire protocols. At Italian darkness the discipline is entirely about safety and repeatability — the flavor ceiling is fixed, so consistency and not burning the shop down are the job.", "aka": ["Espresso Roast (traditional)"]}, "spanish": {"name": "Spanish", "sub": "Darkest / Carbonized Edge", "level": "Dark", "group": "dark", "aka": ["Dark French (loosely)", "Extreme Dark"], "agtron": "25–20", "accent": "#8a5233", "oneLine": "The darkest named roast — pushed past Italian to the very edge of carbonization, thin-bodied, intensely bitter and smoky, existing at the outer limit of what's still coffee.", "useFor": "Extreme dark-roast traditions and specific regional tastes. A niche, identity-driven roast, not a flavor-development one.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "245–250", "dropF": "473–482", "totalTime": "15:30–17:30", "dtr": "31–36%"}, "flavor": {"acidity": 1, "body": 2, "sweetness": 1, "bitterness": 5, "roast": 5, "aroma": 1}, "phases": [{"h": "Drying", "body": "Standard. Everything after is a controlled march to the darkest safe drop point on the spectrum."}, {"h": "Maillard / Browning", "body": "Long spent. There is no origin character left to preserve at this darkness."}, {"h": "First Crack", "body": "A distant memory. Second crack has fully rolled and largely finished before you approach the drop."}, {"h": "Development", "body": "Taken past Italian to the very verge of combustion. The bean is heavily carbonized and can be over a quarter ash. Body actually thins out here as structure breaks down. This is the outer edge of the roasting envelope."}], "defects": [{"d": "Charred / charcoal", "cause": "One step past the edge; the bean crossed from roast to burnt.", "avoid": "Spanish already lives at the limit — a few seconds or degrees too far is literally charcoal. Precise, repeatable timing is the whole skill."}, {"d": "Roaster fire", "cause": "Oil and chaff plus extreme heat, with dumping into the cooling tray adding oxygen.", "avoid": "Meticulous cleaning, constant supervision, and fire protocols. This is the highest fire-risk roast there is."}], "machine": "Drum roaster with rigorous cleaning and active fire safety. At Spanish darkness the entire job is safety and repeatability — the flavor ceiling is fixed and low, so the craft is consistency and not burning down the roastery."}, "espresso": {"name": "Espresso", "sub": "Modern Specialty", "level": "Purpose", "group": "purpose", "agtron": "58–48", "accent": "#7A4A28", "oneLine": "A purpose profile, not a roast level — extended development for solubility and sweetness under pressure, tuned so it extracts evenly as espresso rather than for a color target.", "useFor": "Modern specialty espresso, single-origin espresso, café espresso where you want clarity and sweetness in a short, pressurized shot.", "curve": {"chargeC": "195–210", "chargeF": "383–410", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "212–222", "dropF": "414–432", "totalTime": "11:00–14:00", "dtr": "20–25%"}, "flavor": {"acidity": 3, "body": 5, "sweetness": 5, "bitterness": 3, "roast": 3, "aroma": 4}, "phases": [{"h": "Drying", "body": "Often a slightly gentler, longer drying to promote even heat penetration — espresso punishes uneven roasts because the extraction concentrates every flaw."}, {"h": "Maillard / Browning", "body": "Deliberately extended. This is the heart of an espresso profile: a long Maillard builds the sweetness and solubility that a short pressurized shot depends on."}, {"h": "First Crack", "body": "A managed landmark. You typically stretch the time between first crack and drop more than a filter roast of the same color, prioritizing development over speed."}, {"h": "Development", "body": "Longer development (often 20–25% DTR) than a filter roast landing at the same Agtron. The extra development lowers perceived acidity and raises solubility so the shot pulls evenly and sweet, not sharp or hollow."}], "defects": [{"d": "Sharp / sour shot", "cause": "Underdeveloped for espresso; acids not resolved and solubility too low.", "avoid": "Extend development; espresso needs more than a filter roast at the same color to pull sweet under pressure."}, {"d": "Hollow / ashy shot", "cause": "Over-roasted chasing body, tipped into roast character.", "avoid": "Build body through development time, not a darker drop; more time at a moderate color beats a darker roast."}], "machine": "Any roaster, but repeatability is critical because espresso amplifies variation. The skill is profile design — targeting extraction behavior and solubility, not a color number. Cup it as a shot, not just on a filter table."}, "omni": {"name": "Omni", "sub": "Filter + Espresso", "level": "Purpose", "group": "purpose", "agtron": "62–55", "accent": "#8A5A34", "oneLine": "A modern medium roast deliberately designed to work as both filter and espresso — the third-wave default that trades a little peak performance in each for versatility.", "useFor": "Cafés running one roast across both bar and brew, single-origin programs that want one SKU per coffee, roasters simplifying inventory.", "curve": {"chargeC": "198–212", "chargeF": "388–414", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "210–218", "dropF": "410–424", "totalTime": "10:30–13:00", "dtr": "19–23%"}, "flavor": {"acidity": 3, "body": 4, "sweetness": 5, "bitterness": 2, "roast": 2, "aroma": 4}, "phases": [{"h": "Drying", "body": "Clean, even drying. Omni lives or dies on evenness because it has to satisfy two extraction methods at once — no room to hide an uneven batch."}, {"h": "Maillard / Browning", "body": "A generous browning builds the sweetness that makes the roast forgiving in espresso while keeping enough clarity for filter."}, {"h": "First Crack", "body": "Landmark noted precisely. Omni development sits between a pure filter and a pure espresso target."}, {"h": "Development", "body": "A middle-path DTR (roughly 19–23%). Enough development for espresso to pull sweet, restrained enough that filter still shows origin. You're intentionally not optimizing for either — the whole point is one roast that does both well."}], "defects": [{"d": "Compromised both ways", "cause": "Split the difference badly — too light for great espresso, too developed for bright filter.", "avoid": "Aim the profile at the coffee's strength; an omni still leans slightly toward what that specific green does best."}, {"d": "Sour as espresso", "cause": "Erred too far toward the filter end.", "avoid": "If the shot pulls sharp, add development; test it on the bar, not just the cupping table."}], "machine": "Any well-controlled roaster. The real work is profile design and disciplined cupping across both methods — you validate an omni by pulling shots and brewing filter from the same batch and confirming both are good."}}, "METHODOLOGY": {"curve": {"name": "Reading the Roast Curve", "sub": "The roaster's primary instrument", "group": "read", "accent": "#C9A34E", "sections": [{"h": "What the curve is", "body": "A roast curve plots bean temperature (BT) over time. Overlaid on it is the rate of rise (RoR) — the slope of that temperature line, how fast the bean is heating at any moment. Together they are the roaster's dashboard: the BT line tells you where you are, the RoR tells you where you're going."}, {"h": "The landmarks", "body": "Every curve has the same anchors: charge (beans hit the drum, temp plunges), turning point (the low, where the bean stops giving up heat and starts absorbing it), drying end (yellowing), first crack, and drop. You read a roast by the spacing and slope between these anchors, not by any single number."}, {"h": "Why the shape matters more than the numbers", "body": "Absolute bean temps are machine-specific — your probe, your drum mass, your placement. What transfers between roasters is the shape: a smooth, continuously declining RoR from turning point to drop. That shape is the closest thing roasting has to a universal quality signal."}], "keypoints": ["BT tells you position; RoR tells you trajectory.", "Read spacing and slope between landmarks, not absolute temps.", "A smooth, declining RoR is the near-universal marker of a clean roast."], "refs": [{"label": "Scott Rao — roast curve & RoR principles", "link": "https://www.scottrao.com/blog"}, {"label": "Coffee roasting (overview)", "link": "https://en.wikipedia.org/wiki/Coffee_roasting"}]}, "ror": {"name": "Rate of Rise (RoR)", "sub": "The slope that predicts the cup", "group": "read", "accent": "#B07B3E", "sections": [{"h": "Definition", "body": "RoR is the change in bean temperature over a fixed interval — degrees per 30 seconds or per minute. It's the first derivative of the roast curve. High early (the bean absorbs energy fast), then it should decline steadily as the roast progresses and the temperature gap between drum and bean shrinks."}, {"h": "Why it should always decline", "body": "A healthy roast has a RoR that glides smoothly downward from turning point to drop. It shouldn't rise (a spike overheats the surface), and it shouldn't flat-line (a stall bakes the bean). The single most-watched thing in modern profile roasting is keeping that RoR curve smooth and descending."}, {"h": "Crash and flick", "body": "Two classic RoR faults cluster around first crack. A crash is a sudden RoR drop as first crack's endothermic reaction pulls energy — the bean momentarily stops climbing. A flick is the RoR rebounding upward right after. Both correlate with muddy, baked-tasting cups. Managing gas and airflow before first crack to prevent the crash is a core roasting skill."}], "keypoints": ["RoR = degrees of bean-temp change per interval; the curve's slope.", "Target a smooth, continuously declining RoR from turning point to drop.", "Prevent the first-crack crash-and-flick by managing energy before the crack, not after."], "refs": [{"label": "Scott Rao — Development Time Ratio & declining RoR", "link": "https://www.scottrao.com/blog/2016/8/25/development-time-ratio"}, {"label": "CoffeeNavigated — RoR, stalling & crash/flick", "link": "http://coffeenavigated.net/roasting-coffee/"}]}, "phases": {"name": "The Phases of a Roast", "sub": "Drying, Maillard, development", "group": "read", "accent": "#95602F", "sections": [{"h": "Drying phase", "body": "From charge to roughly the point the bean turns yellow. Free and bound moisture (green coffee is ~10–12% water) is driven off. The bean is endothermic and pale. Rushing this phase scorches the surface before the core is ready; dragging it risks a baked, flat roast. Typically the longest single phase."}, {"h": "Maillard / browning phase", "body": "From yellowing to first crack. The Maillard reaction — amino acids plus reducing sugars — plus caramelization generate hundreds of aroma and flavor compounds and the brown color. This is where most flavor complexity is built. Its length and heat shape sweetness, body, and acidity balance."}, {"h": "Development phase", "body": "From first crack to drop. Also called post-crack development. Here acidity mellows, sweetness rounds, and roast character grows. Too short and the coffee is grassy/sour/underdeveloped; too long and it goes flat then roasty. Measured as a ratio of total time — see DTR."}], "keypoints": ["Drying (~10–12% moisture off) → Maillard/browning (flavor built) → development (from first crack to drop).", "Maillard is where most flavor complexity forms.", "Development balances the trade between underdeveloped (sour/grassy) and overdeveloped (flat/roasty)."], "refs": [{"label": "Curiosity Coffee — phases & Maillard onset (~150°C)", "link": "https://curiositycoffee.com/blogs/learn/what-is-first-crack"}, {"label": "Coffee roasting (overview)", "link": "https://en.wikipedia.org/wiki/Coffee_roasting"}]}, "cracks": {"name": "First & Second Crack", "sub": "The roaster's audible landmarks", "group": "read", "accent": "#6E3E1E", "sections": [{"h": "First crack", "body": "Around 196–205°C bean temp, the bean fractures audibly — a popcorn-like snap — as built-up steam and CO2 rupture the cell structure and the bean expands. First crack is the single most important landmark: development time is measured from here, and no coffee is drinkable roasted before it. The sound rolls through the batch; you note its start precisely."}, {"h": "Second crack", "body": "Roughly 224–230°C, a quieter, faster, higher-pitched crackle — more like crisp cereal — as the bean's cell walls fracture further and oils migrate to the surface. Second crack marks the transition into dark-roast territory. Roasts landing before it keep origin character; roasts taken into it become roast-forward."}, {"h": "Reading them by ear", "body": "Experienced roasters roast partly by sound. The timing, intensity, and evenness of first crack tell you about the batch's uniformity and moisture. A ragged, drawn-out first crack often signals uneven green or an uneven roast."}], "keypoints": ["First crack (~196–205°C): the reference point development time is measured from.", "Second crack (~224–230°C): the gateway into dark, roast-forward territory.", "Sound — timing and evenness — is a real diagnostic, not just a landmark."], "refs": [{"label": "MTPak — guide to first & second crack (196°C / 224°C)", "link": "https://mtpak.coffee/2021/02/coffee-roasting-basics-guide-to-first-second-crack/"}, {"label": "Sweet Maria's — First Crack FAQ", "link": "https://library.sweetmarias.com/first-crack-faq-what-is-first-crack-what-is-second-crack/"}]}, "dtr": {"name": "Development Time Ratio", "sub": "Quantifying the finish", "group": "read", "accent": "#5A2F16", "sections": [{"h": "The definition", "body": "DTR = (time from first crack to drop) ÷ (total roast time), expressed as a percent. If first crack hits at 9:00 and you drop at 11:15 on an 11:15 roast, development is 2:15 of 11:15 ≈ 20%. It's a normalized way to describe how much of the roast happened after first crack."}, {"h": "Typical ranges", "body": "Light filter roasts often run 10–15%. The specialty medium sweet spot sits around 18–22%. Darker roasts climb to 25%+ simply because there's more time past first crack. DTR is a guide, not a target to hit blindly — it's meaningful only alongside how the RoR behaved."}, {"h": "Its limits", "body": "DTR is popular because it's a single comparable number, but it can mislead. Two roasts with identical DTR can taste completely different if one crashed and one glided. Use DTR to describe and compare roasts, not to define quality on its own."}], "keypoints": ["DTR = (first-crack-to-drop time) ÷ (total time), as a percent.", "Rough bands: ~10–15% light, ~18–22% specialty medium, 25%+ dark.", "A comparison tool, not a quality guarantee — always read it with RoR behavior."], "refs": [{"label": "Scott Rao — Development Time Ratio (20–25%)", "link": "https://www.scottrao.com/blog/2016/8/25/development-time-ratio"}, {"label": "Daily Coffee News — Rao on development time", "link": "https://dailycoffeenews.com/2014/08/12/roast-development-time-and-the-prerequisite-for-any-successful-roast/"}]}, "chemistry": {"name": "Roasting Chemistry", "sub": "What heat does to the bean", "group": "science", "accent": "#7A4A28", "sections": [{"h": "Maillard & Strecker", "body": "The Maillard reaction between amino acids and reducing sugars is the engine of roast flavor, producing melanoidins (brown color, body) and a huge range of aromatics. Strecker degradation, a branch of it, generates key aldehydes behind malty, nutty, and savory notes. Most of the cup's complexity is Maillard chemistry."}, {"h": "Caramelization", "body": "Sugars break down under heat independent of amino acids, producing sweet, caramel, and eventually bitter compounds as it goes further. Caramelization and Maillard overlap through browning; how you balance heat and time between them shapes the sweetness-versus-roast character trade."}, {"h": "Acids", "body": "Chlorogenic acids degrade with roast, producing quinic and caffeic acids that shift perceived acidity and bitterness. Lighter roasts retain more of the bright origin acids; darker roasts break them down, which is why dark roasts read low-acid and bitter."}, {"h": "Degassing & oils", "body": "Roasting generates large volumes of CO2 trapped in the bean, released over days after roast (degassing) — freshly roasted coffee needs rest before brewing. At darker levels, cell walls fracture enough that oils migrate to the surface, the visible sheen on dark roasts."}], "keypoints": ["Maillard + Strecker chemistry builds most of the cup's flavor and color.", "Caramelization drives sweetness that tips to bitterness if pushed.", "Acids degrade with roast — lighter keeps origin brightness, darker turns low-acid/bitter.", "Roasting produces CO2 (needs degassing rest) and, when dark, surface oils."], "refs": [{"label": "Sweet Maria's — roast chemistry & degassing", "link": "https://library.sweetmarias.com/first-crack-faq-what-is-first-crack-what-is-second-crack/"}, {"label": "Coffee roasting (overview)", "link": "https://en.wikipedia.org/wiki/Coffee_roasting"}]}, "heat": {"name": "Heat Transfer", "sub": "Conduction, convection, radiation", "group": "science", "accent": "#8A5A34", "sections": [{"h": "The three modes", "body": "Conduction is heat from direct contact — bean against hot drum metal. Convection is heat carried by hot air/gas moving through the bean mass. Radiation is infrared energy from hot surfaces. Every roaster uses all three, but the balance between them defines how a machine roasts and tastes."}, {"h": "Why the balance matters", "body": "Convection-dominant roasting (lots of moving hot air) heats evenly and quickly and is easy to control — favored for clean, bright modern profiles. Conduction-heavy roasting (hot drum, less airflow) can build body and a heavier cup but risks scorching if unmanaged. Adjusting airflow is largely adjusting the convection-to-conduction balance in real time."}, {"h": "Airflow as a control", "body": "Airflow does three jobs at once: it delivers convective heat, it clears smoke and chaff (which otherwise taint flavor), and it influences how fast the bean sheds or gains heat. Learning a roaster is largely learning how its airflow interacts with its gas."}], "keypoints": ["Conduction (drum contact), convection (hot air), radiation (infrared) — all present, balance defines the machine.", "Convection-forward = even and bright; conduction-heavy = body but scorch-prone.", "Airflow simultaneously delivers heat, clears smoke, and shapes heat exchange."], "refs": [{"label": "Perfect Daily Grind — 4 variables that affect roasting", "link": "https://perfectdailygrind.com/2020/04/4-variables-that-affect-roasting/"}]}, "roasters": {"name": "Roaster Types", "sub": "Drum, fluid-bed, hybrid", "group": "science", "accent": "#95602F", "sections": [{"h": "Drum roasters", "body": "A rotating drum tumbles beans against a heated metal surface with gas heat below and airflow drawn through. The industry workhorse. Strong conductive component gives body; thermal mass makes them stable and forgiving but slower to respond. The default for most commercial specialty and dark roasting."}, {"h": "Fluid-bed (air) roasters", "body": "A stream of hot air both heats and levitates the beans. Almost purely convective: fast, even, very clean and bright in the cup, highly responsive. Popular for sample roasting and light, clarity-focused profiles. Less thermal mass means less forgiving of a mistake — the roast moves quickly."}, {"h": "Hybrids & recirculation", "body": "Many modern machines blur the line: drums with heavily managed airflow, recirculating-air roasters that reuse heat for efficiency and emissions control. The trend is toward more convective control on a drum platform — body of a drum, evenness of air."}], "keypoints": ["Drum: conductive body, stable thermal mass, the commercial default.", "Fluid-bed: convective, fast, clean and bright, less forgiving.", "Modern hybrids add convective control to drum platforms for the best of both."], "refs": [{"label": "Genuine Origin — roast profiles 101 (roaster types, charge)", "link": "https://blog.genuineorigin.com/2025/11/guide-to-roast-profiles/"}]}, "defects": {"name": "Roast Defects", "sub": "Failure modes and their causes", "group": "practice", "accent": "#5A2F16", "sections": [{"h": "Underdeveloped", "body": "Dropped too early / too fast past first crack. Grassy, sour, sharp, hay-like; may taste thin. Cause is insufficient development — either too little time or a roast so fast the interior never caught up. The most common defect in beginners chasing light roasts."}, {"h": "Baked", "body": "The roast lost momentum — RoR crashed or flat-lined — and dragged through the finish. Tastes flat, hollow, papery, lifeless, with muted aroma. Insidious because the color can look correct. Prevented by maintaining a smooth declining RoR and never stalling."}, {"h": "Scorched & tipped", "body": "Scorching is surface burn from too much conductive heat / too hot a charge — dark blotches on the bean face. Tipping is small burnt spots at the bean's ends (the tips) from excessive early heat. Both come from delivering energy faster than the bean can absorb it evenly."}, {"h": "Roasty / over-developed", "body": "Pushed too far — too dark, too far into second crack for the intent. Ashy, carbony, flat, origin character erased. In dark roasts this is a matter of degree; in a roast meant to be bright, even a little is a defect."}], "keypoints": ["Underdeveloped: grassy/sour — too little development.", "Baked: flat/hollow, correct-looking color — stalled RoR.", "Scorched/tipped: surface and tip burns — heat delivered too fast early.", "Roasty/over-developed: ashy/flat — pushed too dark for the intent."], "refs": [{"label": "Scott Rao — baked/underdeveloped & DTR context", "link": "https://www.scottrao.com/blog/2016/8/25/development-time-ratio"}, {"label": "Perfect Daily Grind — charge temp, scorching & tipping", "link": "https://perfectdailygrind.com/2017/09/coffee-roasting-guide-how-to-control-charge-temperature/"}]}, "profiling": {"name": "Sample Roasting & Profiling", "sub": "How a profile actually gets built", "group": "practice", "accent": "#C9A34E", "sections": [{"h": "Start with the green", "body": "Before designing a profile you assess the green: density, moisture, screen size, process (washed/natural/honey), and origin. Dense, high-grown, washed coffees take and want more heat; softer, lower-density or natural coffees roast faster and scorch more easily. The green dictates the starting approach."}, {"h": "Sample roast, then cup", "body": "You roast small sample batches at a few different profiles — vary charge, development time, drop point — then cup them side by side. Cupping is the standardized side-by-side tasting method the industry uses to connect a curve to a flavor. The SCA replaced its long-standing 2004 cupping protocol with the Coffee Value Assessment (CVA) in November 2024, though the legacy 100-point form is still in daily use in many labs. Either way, you're building a map from roast decisions to cup outcomes for this specific coffee."}, {"h": "Scale to production", "body": "A profile developed on a sample roaster rarely transfers one-to-one to a production drum — thermal mass and batch size change everything. You re-develop at production scale, using the sample cups as your flavor target, then lock the profile once it's repeatable batch to batch."}, {"h": "Iterate and document", "body": "Good roasting is disciplined iteration: change one variable, cup the result, keep notes. A repeatable, documented profile that any roaster on the team can hit is the real deliverable — not a single lucky great batch."}], "keypoints": ["Assess the green first — density, moisture, and process set the approach.", "Sample roast several profiles, then cup side by side to map curve → cup.", "Re-develop at production scale using sample cups as the flavor target.", "Change one variable at a time, document, and lock a repeatable profile."], "refs": [{"label": "SCA — Coffee Value Assessment", "link": "https://sca.coffee/value-assessment"}, {"label": "Liberty Beans — density testing & sample roasting", "link": "https://libertybeanscoffee.com/uncategorized/secret-coffee-roasting-strategies/"}]}, "origin_intro": {"name": "Roasting by Origin", "sub": "Why green dictates the roast", "group": "origin", "accent": "#C9A34E", "sections": [{"h": "The green sets the ceiling", "body": "A roaster doesn't impose a profile on a coffee so much as respond to it. Density, moisture, screen size, altitude, variety, and processing all arrive baked into the green, and they decide how much heat the bean wants and how it behaves through the roast. The best profile you can build is capped by the green you start with."}, {"h": "Density is the master variable", "body": "Higher-altitude coffees are denser — they grow slower and pack in more sugars and acids. Dense beans need more heat energy to roast through and reward it with complexity, but they also tolerate (and often want) a higher charge temperature with disciplined development. Softer, lower-grown beans have more internal air pockets, transfer heat slower, scorch more easily, and take darker roasts more readily. Many roasters weigh identical volumes of two greens to compare density before designing a profile."}, {"h": "Processing changes the handling", "body": "Washed coffees are cleaner and brighter and generally shine light — but a washed coffee hit with too much early energy tends to bake at first crack, over-developing some beans while others stay under. Naturals carry fruit-forward, fermented notes and can spike in temperature before first crack if pushed, inviting defects. Honey sits between. A dense natural Ethiopian and a soft Brazilian natural want opposite charge temps and rates of rise."}, {"h": "The practical rule", "body": "Denser / higher-grown / washed → more heat capacity, favors lighter roasts, needs curve discipline. Softer / lower-grown / natural → lower charge temp, slower rate of rise, extend the roast to avoid scorching, takes darker levels well. Everything past that is dialing in the specific lot by cupping."}], "keypoints": ["The green's density, moisture, altitude, and processing cap what any roast can achieve.", "Dense/high-grown beans want more heat and favor lighter roasts; soft/low-grown beans scorch easily and take dark well.", "Washed coffees bake if rushed into first crack; naturals can spike and defect if over-energized.", "Weigh equal volumes to compare density before building a profile — then confirm by cupping."], "refs": [{"label": "Perfect Daily Grind — roasting different origins", "link": "https://perfectdailygrind.com/2017/07/how-to-roast-coffee-from-different-origins/"}, {"label": "Green Coffee Beans Wholesale — roast level & origin", "link": "https://www.ictcoffee.com/news/the-relationship-between-roast-level-and-origin-character/"}]}, "origin_ethiopia": {"name": "Ethiopia", "sub": "High, dense, floral, fickle", "group": "origin", "accent": "#B07B3E", "sections": [{"h": "What you're working with", "body": "Ethiopian specialty grows very high (often 1,800–2,200m), making it dense and demanding. It's also famously variable — thousands of local varieties, mixed screen sizes, and often unknown genetics in a single lot. Expect trial and error to find the profile. The reward is some of the world's finest, most aromatic Arabica: florals, citrus, berry, wine."}, {"h": "How to roast it", "body": "Steer away from sudden, intense heat. A hard, energetic start can push out gingery or spice notes but risks torching the delicate florals that define the origin. On washed Ethiopians, too much early energy causes a big energy loss at first crack — baking — which over-develops some beans while others stay under before you have to dump for a light color. On naturals, an aggressive start can spike bean temperature before first crack and invite roast defects."}, {"h": "Target", "body": "Light to medium. Washed Ethiopians commonly want a restrained drop with a modest development window and a smoothly declining rate of rise. Too little development gives showy aromatics over a hollow mid-palate; too much turns bright citrus into dull marmalade and wilts the florals. The whole game is preserving the top-end."}], "keypoints": ["Very high-grown and dense, but highly variable lot to lot — expect to dial in by trial.", "Avoid an aggressive start; it bakes washed lots at first crack and spikes naturals into defects.", "Roast light to medium with a restrained drop; the goal is preserving florals and bright acidity."], "refs": [{"label": "Perfect Daily Grind — Ethiopian coffee: a roaster's guide", "link": "https://perfectdailygrind.com/2019/11/ethiopian-coffee-a-roasters-guide/"}]}, "origin_colombia": {"name": "Colombia", "sub": "Balanced and forgiving", "group": "origin", "accent": "#95602F", "sections": [{"h": "What you're working with", "body": "Colombian coffee, especially from regions like Huila, grows at moderate-to-high altitude (roughly 1,200–1,800m) and is typically washed. It's known for balanced acidity, caramel sweetness, and medium body. Medium density makes it versatile and one of the more forgiving origins to roast — a good coffee to learn a new machine on."}, {"h": "How to roast it", "body": "Its balance and medium density mean it doesn't punish small mistakes the way a dense Ethiopian or a soft Brazilian can. It takes a standard, well-managed curve well and holds up across roast levels, from a bright-ish medium that keeps its caramel sweetness to a fuller medium-dark for blends and espresso."}, {"h": "Target", "body": "Versatile — anywhere from light-medium to medium-dark depending on intent. City+ is a natural home that showcases the caramel-and-balance signature. Push toward Full City for espresso body. Because it's forgiving, it's a strong reference coffee for calibrating a roaster before tackling trickier origins."}], "keypoints": ["Moderate-to-high altitude, washed, medium density — balanced and forgiving.", "Takes a standard well-managed curve and holds up across roast levels.", "A great calibration/reference origin; City+ showcases its caramel-balance signature."], "refs": [{"label": "One Hundred Coffee — origin & roasting profiles", "link": "https://onehundredcoffee.com/roasting/testing-different-coffee-beans-how-origin-affects-roasting-profiles/"}]}, "origin_brazil": {"name": "Brazil", "sub": "Low, soft, nutty, espresso backbone", "group": "origin", "accent": "#6E3E1E", "sections": [{"h": "What you're working with", "body": "Brazilian coffee grows comparatively low (often 800–1,200m, some near 900m), making it softer and lower in density with lower acidity. It's frequently natural-processed and known for nutty, chocolatey, smooth character with natural sweetness and body — which is why it's the backbone of so many espresso blends and commercial coffee."}, {"h": "How to roast it", "body": "Because it's soft and low-density, use a lower charge temperature and a slower rate of rise — its air-pocketed structure transfers heat slowly, so a hot, fast start scorches the exterior before the core catches up. Many roasters extend the roast slightly for these coffees. Brazil rewards a touch more development time but demands good curve discipline; flick the rate of rise late and you trade nut-butter creaminess for a drying finish."}, {"h": "Target", "body": "Medium to medium-dark. Brazil's sweetness and body caramelize beautifully in that range and stand up to milk, making it a workhorse espresso base. It also takes darker roasts more readily than a dense high-grown coffee. This is a classic candidate for 'stretching' — deliberately extending the Maillard phase to build deeper sweetness."}], "keypoints": ["Low-grown, soft, low-density, often natural — nutty/chocolatey with body and low acidity.", "Use a lower charge temp and slower rate of rise to avoid scorching; consider extending the roast.", "Shines medium to medium-dark; an espresso-blend backbone and a good 'stretching' candidate."], "refs": [{"label": "Perfect Daily Grind — roasting natural & honey processed", "link": "https://perfectdailygrind.com/2017/10/how-to-roast-natural-honey-processed-coffee/"}, {"label": "Liberty Beans — 'stretching' the Maillard phase", "link": "https://libertybeanscoffee.com/uncategorized/secret-coffee-roasting-strategies/"}]}, "origin_sumatra": {"name": "Sumatra / Indonesia", "sub": "Earthy, heavy-bodied, dark-friendly", "group": "origin", "accent": "#5A2F16", "sections": [{"h": "What you're working with", "body": "Indonesian coffees from Sumatra and Sulawesi are known for earthy, spicy, herbal character with full body and low acidity — a signature partly created by the region's distinctive wet-hulled processing. These flavors become more pronounced in darker roasts, which is where the origin is traditionally taken."}, {"h": "How to roast it", "body": "Sumatra can handle more aggressive heat application during the middle (Maillard) stage to develop its full body — a head roaster's approach that would obliterate a delicate Ethiopian. Its low acidity and heavy body mean the earthy, herbal signature holds up rather than being lost, so it tolerates and often benefits from a firmer hand than high-grown washed coffees."}, {"h": "Target", "body": "Medium-dark to dark. Sumatra's earthy depth and body are traditionally showcased at Full City and beyond, where the roast character complements rather than erases the origin. It's a natural fit for darker blends and for drinkers who want a heavy, low-acid, brooding cup."}], "keypoints": ["Earthy, herbal, heavy-bodied, low-acid — a signature of wet-hulled Indonesian processing.", "Tolerates firmer heat in the Maillard stage to build body; won't lose its character the way delicate origins do.", "Traditionally taken medium-dark to dark, where roast character complements the earthy depth."], "refs": [{"label": "God of Beans — origin characteristics & density", "link": "https://godofbeans.com/choosing-green-beans-for-home-roasting-a-beginners-guide"}]}, "origin_kenya": {"name": "Kenya", "sub": "Blackcurrant and bright acidity", "group": "origin", "accent": "#B07B3E", "sections": [{"h": "What you're working with", "body": "Kenyan coffee has a flavor fingerprint professionals recognize instantly: intense, wine-like acidity with blackcurrant and berry, sometimes a savory tomato edge, and remarkable clarity. It comes from the SL28 and SL34 varieties (selected by Scott Laboratories in the 1930s), high-altitude red volcanic soil around Mt. Kenya (Nyeri, Kirinyaga, Embu), and a distinctive double-washed processing with extended fermentation. Kenya's rigorous auction system means specialty lots are consistently excellent — and consistently expensive. These are dense, high-grown beans."}, {"h": "How to roast it", "body": "Kenya is a light-to-medium coffee — its whole appeal is that bright, complex acidity and blackcurrant character, and dark roasting destroys exactly the compounds that make it special. Treat it as a dense, high-grown bean that takes and wants heat, but watch the back half: dense Kenyans carry significant exothermic energy after first crack, and if you're not planning for it you can lose control of the rate of rise. Aim to protect acidity and clarity — drop it before the origin character bakes out."}, {"h": "Target", "body": "Light to medium (City to City+), stopping around or shortly after first crack. The goal is to showcase the blackcurrant, berry, and vivid acidity — this is a pour-over and filter coffee first, where that clarity sin
