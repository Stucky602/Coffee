<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a120b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coffee Guide">
<link rel="manifest" href="manifest.webmanifest">
<title>Coffee — An Industry Guide</title>
<style>
:root{
  --bg:#160e08; --panel:#1f1610; --panel2:#281c13; --line:#3a2a1c;
  --ink:#f0e6d8; --ink1:#f0e6d8; --ink2:#c9b8a4; --ink3:#8f7c66;
  --heat1:#C9A34E; --heat2:#B07B3E; --heat3:#95602F; --heat4:#6E3E1E; --heat5:#43220F;
  --accent:#C9A34E;
  --mono:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;line-height:1.5}
a,a:visited{color:inherit}
button{font-family:inherit;cursor:pointer;color:inherit}
h1,h2,h3,h4{margin:0;font-weight:650;letter-spacing:-0.01em}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px}

/* header */
header.top{position:sticky;top:0;z-index:40;background:rgba(22,14,8,.92);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  padding-top:env(safe-area-inset-top,0px)}
.top .wrap{display:flex;align-items:center;gap:14px;height:60px;
  padding-left:calc(20px + env(safe-area-inset-left,0px));
  padding-right:calc(20px + env(safe-area-inset-right,0px))}
.brand{display:flex;align-items:baseline;gap:9px;cursor:pointer;user-select:none}
.brand .mark{font-family:var(--mono);font-size:12px;letter-spacing:.18em;
  color:var(--bg);background:linear-gradient(135deg,var(--heat1),var(--heat3));
  padding:4px 8px;border-radius:5px;font-weight:700}
.brand .nm{font-size:16px;font-weight:700;letter-spacing:-.02em}
.brand .nm b{color:var(--heat1)}
.ver{font-family:var(--mono);font-size:11px;color:var(--ink3);
  border:1px solid var(--line);padding:3px 8px;border-radius:20px}
.navtabs{display:flex;gap:2px;margin-left:auto}
.navtabs button{background:none;border:none;color:var(--ink3);font-size:13.5px;
  font-weight:600;padding:8px 12px;border-radius:7px;transition:.15s}
.navtabs button:hover{color:var(--ink2)}
.navtabs button.on{color:var(--ink);background:var(--panel2)}
.searchbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ink2);width:36px;height:36px;
  border-radius:9px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.searchbtn:hover{color:var(--ink);border-color:var(--ink3)}
/* search overlay */
.searchoverlay{position:fixed;inset:0;z-index:100;background:rgba(10,8,6,.72);backdrop-filter:blur(6px);
  display:flex;justify-content:center;align-items:flex-start;padding:8vh 16px 16px}
.searchpanel{width:100%;max-width:640px;background:var(--panel);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 24px 70px rgba(0,0,0,.6);overflow:hidden;max-height:82vh;display:flex;flex-direction:column}
.searchtop{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);color:var(--ink3)}
.searchtop input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:17px;font-family:inherit}
.searchtop input::placeholder{color:var(--ink3)}
.searchclose{background:var(--bg);border:1px solid var(--line);color:var(--ink3);font-family:var(--mono);
  font-size:11px;padding:4px 9px;border-radius:7px;flex-shrink:0}
.searchresults{overflow-y:auto;padding:10px}
.searchhint{color:var(--ink3);font-size:14px;line-height:1.6;padding:24px 14px;text-align:center}
.searchhint b{color:var(--ink2);font-weight:600}
.searchgroup{margin-bottom:12px}
.searchglabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink3);padding:8px 12px 6px}
.searchitem{display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;background:none;border:none;
  padding:10px 12px;border-radius:9px;transition:.12s}
.searchitem:hover{background:var(--panel2)}
.searchitem .si-name{font-size:15px;font-weight:600;color:var(--ink1)}
.searchitem .si-meta{font-size:11.5px;color:var(--ink3);font-family:var(--mono)}
.searchitem .si-def{font-size:12.5px;color:var(--ink3);line-height:1.4}
.searchmore{font-size:12px;color:var(--ink3);padding:6px 12px;font-style:italic}
/* glossary inline term links + popover */
.termref{border-bottom:1px dotted var(--heat2);cursor:help;color:inherit}
.termref:hover{border-bottom-color:var(--heat1);color:var(--heat1)}
.termpop{position:absolute;z-index:200;background:var(--panel2);border:1px solid var(--heat3);border-radius:12px;
  padding:13px 15px;box-shadow:0 14px 40px rgba(0,0,0,.55);animation:popin .12s ease}
@keyframes popin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.termpop-term{font-size:14px;font-weight:700;color:var(--heat1);margin-bottom:5px}
.termpop-def{font-size:13px;color:var(--ink2);line-height:1.5}
/* guided path */
.pathlist{display:flex;flex-direction:column;gap:8px}
.pathstep{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--panel);
  border:1px solid var(--line);border-radius:11px;padding:13px 15px;cursor:pointer;transition:.15s}
.pathstep:hover{border-color:var(--heat3);background:var(--panel2);transform:translateX(3px)}
.pathnum{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--bg);border:1px solid var(--heat3);
  color:var(--heat1);font-family:var(--mono);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.pathtxt{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.pathname{font-size:15px;font-weight:650;color:var(--ink1)}
.pathwhy{font-size:12.5px;color:var(--ink3);line-height:1.4}
.patharrow{color:var(--ink3);font-size:16px;flex-shrink:0}
.pathnav{margin-top:34px;padding-top:22px;border-top:1px solid var(--line)}
.pathnav-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--heat2);display:block;margin-bottom:10px}
.pathnav-next{display:flex;flex-direction:column;gap:3px;width:100%;text-align:left;background:linear-gradient(100deg,var(--panel2),var(--panel));
  border:1px solid var(--heat3);border-radius:12px;padding:15px 18px;cursor:pointer;transition:.15s}
.pathnav-next:hover{border-color:var(--heat1);transform:translateY(-2px)}
.pathnav-next span:first-child{font-size:16px;font-weight:700;color:var(--heat1)}
.pathnav-why{font-size:12.5px;color:var(--ink3)}
.pathnav-done{font-size:14px;color:var(--ink2);background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 18px;font-style:italic}
/* related concept chips */
.related{margin-top:28px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.related-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
.relchips{display:flex;flex-wrap:wrap;gap:8px}
.relchip{background:var(--panel2);border:1px solid var(--line);color:var(--ink2);font-size:13px;font-weight:600;
  padding:6px 13px;border-radius:20px;cursor:pointer;transition:.14s}
.relchip:hover{border-color:var(--heat3);color:var(--heat1)}

/* hero */
.hero{padding:52px 0 30px;border-bottom:1px solid var(--line);position:relative;overflow:hidden}
.hero .wrap{position:relative;z-index:2}
.hero h1{font-size:clamp(30px,5.5vw,52px);line-height:1.02;letter-spacing:-.03em;max-width:15ch}
.hero h1 .grad{background:linear-gradient(100deg,var(--heat1),var(--heat4));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{color:var(--ink2);font-size:16.5px;max-width:60ch;margin:18px 0 0}
.hero .lede{font-size:17.5px;line-height:1.55;max-width:64ch}
.heatbar{display:flex;height:6px;margin-top:28px;border-radius:4px;overflow:hidden;max-width:520px}
.heatbar i{flex:1}
.hero .beans{position:absolute;inset:0;z-index:1;opacity:.5}

/* home section directory */
.dirlead{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink3);margin:34px 0 16px}
.secdir{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.secard{display:flex;gap:16px;text-align:left;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:20px;cursor:pointer;transition:.16s;align-items:flex-start}
.secard:hover{border-color:var(--heat3);background:var(--panel2);transform:translateY(-2px)}
.secard-ic{flex-shrink:0;width:44px;height:44px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;background:var(--bg);border:1px solid var(--line);color:var(--heat2)}
.secard-body{display:flex;flex-direction:column;gap:6px;min-width:0}
.secard-title{font-size:18px;font-weight:700;color:var(--ink1);letter-spacing:-.01em}
.secard-blurb{font-size:13.5px;color:var(--ink3);line-height:1.5}
.secard-cta{font-size:13px;font-weight:600;color:var(--heat1);margin-top:3px}

/* section head */
.seclead{display:flex;align-items:baseline;gap:12px;margin:40px 0 4px}
.seclead .no{font-family:var(--mono);font-size:12px;color:var(--heat3);letter-spacing:.1em}
.seclead h2{font-size:22px}
.seclead p{color:var(--ink3);font-size:14px;margin:2px 0 0}
.grouplabel{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink3);margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.grouplabel:after{content:"";flex:1;height:1px;background:var(--line)}
.filterbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:22px 0 4px}
.searchwrap{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:0 12px;flex:1;min-width:220px;color:var(--ink3)}
.searchwrap:focus-within{border-color:var(--heat3)}
.searchwrap input{background:none;border:none;outline:none;color:var(--ink);font-size:14px;
  padding:10px 0;flex:1;font-family:inherit}
.searchwrap input::placeholder{color:var(--ink3)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chips button{background:var(--panel);border:1px solid var(--line);color:var(--ink3);font-size:12.5px;
  font-weight:600;padding:7px 12px;border-radius:20px;transition:.14s}
.chips button:hover{color:var(--ink2)}
.chips button.on{background:var(--heat3);border-color:var(--heat3);color:#fff}
.sortwrap{display:flex;align-items:center;gap:7px}
.sortwrap label{font-size:12px;color:var(--ink3);font-weight:600}
.sortwrap select{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:13px;
  padding:8px 10px;border-radius:9px;font-family:inherit;cursor:pointer}
.empty{text-align:center;color:var(--ink3);font-size:14px;padding:44px 20px;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-top:16px}

/* start here */
.starthero{padding:40px 0 8px}
.starthero .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--heat2);margin-bottom:14px}
.starthero h1{font-size:clamp(26px,4.5vw,40px);letter-spacing:-.03em;line-height:1.05}
.starthero .lede{color:var(--ink2);font-size:16.5px;max-width:66ch;margin:18px 0 0;line-height:1.55}
.block2{margin-top:44px}
.block2 .bh{font-size:20px;letter-spacing:-.01em}
.block2 .bsub{color:var(--ink3);font-size:14px;margin:5px 0 18px}
.block2 .bsub b{color:var(--heat1);font-weight:600}
.journey{display:flex;flex-direction:column}
.jstep{display:flex;gap:16px;position:relative;padding-bottom:20px}
.jstep .jdot{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:#160e08;z-index:2}
.jstep .jline{position:absolute;left:15.5px;top:32px;bottom:0;width:2px;background:var(--line)}
.jstep .jbody{padding-top:4px}
.jstep .jbody h4{font-size:16px;margin-bottom:3px}
.jstep .jbody p{color:var(--ink2);font-size:14.5px;margin:0;max-width:64ch}
.tradeoff{display:flex;flex-wrap:wrap;align-items:stretch;gap:14px}
.tside{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
.tside.light{border-left:3px solid var(--heat1)}
.tside.dark{border-left:3px solid var(--heat5)}
.tside .tlabel{font-weight:700;font-size:14.5px;margin-bottom:10px}
.tside.light .tlabel{color:var(--heat1)}
.tside.dark .tlabel{color:#c98a5a}
.tside ul{margin:0;padding-left:18px}
.tside li{color:var(--ink2);font-size:14px;margin-bottom:6px}
.tarrow{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;
  letter-spacing:.1em;color:var(--ink3);padding:0 4px}
.glist{display:flex;flex-direction:column;gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.grow{display:grid;grid-template-columns:180px 1fr;gap:18px;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
.grow:last-child{border-bottom:none}
.grow .gterm{font-weight:650;font-size:14.5px;color:var(--heat1)}
.grow .gdef{color:var(--ink2);font-size:14px;line-height:1.5}
.startcta{margin-top:44px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;text-align:center}
.startcta p{font-size:16px;margin:0 0 16px;color:var(--ink)}
.ctarow{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.ctarow button{background:var(--heat3);border:1px solid var(--heat3);color:#fff;font-size:14px;
  font-weight:600;padding:11px 18px;border-radius:10px}
.ctarow button.ghost{background:none;border-color:var(--line);color:var(--ink2)}
.ctarow button:hover{opacity:.9}
@media(max-width:560px){.grow{grid-template-columns:1fr;gap:5px}.tarrow{display:none}}

/* profile grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.pcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;
  cursor:pointer;transition:.16s;position:relative;overflow:hidden}
.pcard:hover{transform:translateY(-2px);border-color:var(--ink3)}
.pcard .swatch{position:absolute;top:0;left:0;width:4px;height:100%}
.pcard .lvl{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3)}
.pcard h3{font-size:19px;margin:5px 0 2px}
.pcard .sub{color:var(--ink3);font-size:12.5px}
.pcard .mini{display:flex;justify-content:center;margin:10px 0 4px}
.pcard .agt{font-family:var(--mono);font-size:11px;color:var(--ink2);text-align:center;margin-top:6px}
.pcard .oneline{color:var(--ink2);font-size:13px;margin-top:10px;line-height:1.45}

/* meth cards */
.mcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;
  cursor:pointer;transition:.16s;display:flex;flex-direction:column;gap:5px}
.mcard:hover{border-color:var(--ink3);background:var(--panel2)}
.mcard .k{font-family:var(--mono);font-size:10.5px;color:var(--heat2);letter-spacing:.1em}
.mcard h3{font-size:17px}
.mcard .sub{color:var(--ink3);font-size:13px}
.mgrid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}

/* learn hub */
.lcount,.hublist .lcount{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:12px}
.hublist{display:flex;flex-direction:column;gap:12px}
.hubgroup{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel);transition:.16s}
.hubgroup.open{background:var(--panel2);border-color:var(--ink3)}
.hubhead{width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;background:none;border:none;
  text-align:left;cursor:pointer;transition:.16s}
.hubhead:hover{background:var(--panel2)}
.hubbar{width:4px;align-self:stretch;border-radius:3px;background:var(--ga);flex-shrink:0;min-height:34px}
.hubtxt{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.hubname{font-size:18px;font-weight:600;color:var(--ink1)}
.hubdesc{font-size:13px;color:var(--ink3);line-height:1.45}
.hubcount{font-family:var(--mono);font-size:12.5px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);
  border-radius:20px;padding:3px 10px;flex-shrink:0;line-height:1;align-self:center}
.hubchev{font-family:var(--mono);font-size:18px;color:var(--ink3);width:16px;text-align:center;flex-shrink:0;
  align-self:center;line-height:1}
.hubcards{padding:4px 18px 18px}

/* origins tab */
.regionmap{margin:20px auto 8px;text-align:center}
.regionmap svg{margin:0 auto}
.regionmap figcaption{text-align:left}
.originnote{color:var(--ink2);font-size:15px;line-height:1.6;max-width:70ch;margin:20px 0 8px}
.origrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px;margin-top:4px}
.origcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:17px;cursor:pointer;
  transition:.16s;display:flex;flex-direction:column;gap:9px}
.origcard:hover{border-color:var(--heat3);background:var(--panel2);transform:translateY(-2px)}
.origcard-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.origcard-name{font-size:18px;font-weight:700;letter-spacing:-.01em}
.origcard-roast{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--rc);border:1px solid var(--rc);border-radius:20px;padding:3px 9px;opacity:.9;white-space:nowrap}
.origcard-blurb{font-size:13px;color:var(--ink3);line-height:1.5;flex:1}
.origcard-tags{display:flex;flex-wrap:wrap;gap:5px}
.origcard-tags span{font-size:11px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);
  border-radius:20px;padding:2px 8px}
.origcard-meta{font-family:var(--mono);font-size:11px;color:var(--ink3)}
/* origin detail */
.odhead{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;padding-bottom:8px}
.odtxt{flex:1;min-width:260px}
.odtxt h1{font-size:34px;letter-spacing:-.03em;margin:6px 0 2px}
.odtxt .sub{color:var(--ink3);font-size:15px}
.odtxt .oneline{color:var(--ink2);font-size:15.5px;line-height:1.55;max-width:60ch}
.origtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.origtags span{font-size:12px;color:var(--ink2);background:var(--panel2);border:1px solid var(--line);
  border-radius:20px;padding:3px 10px}
.odroast{flex-shrink:0;margin:0 auto}
.odroast-ring{width:120px;height:120px;border-radius:50%;border:3px solid var(--rc);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:radial-gradient(circle,color-mix(in srgb,var(--rc) 14%,transparent),transparent)}
.odroast-ring span{font-size:16px;font-weight:700;color:var(--ink1);text-align:center;padding:0 8px;line-height:1.1}
.odroast-ring small{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.factstrip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:22px 0 8px}
.fact{background:var(--panel);padding:13px 15px}
.fact .fl{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.fact .fv{font-size:13.5px;color:var(--ink1);line-height:1.35}

/* detail */
.detail{padding-bottom:60px}
.back{background:var(--panel2);border:1px solid var(--line);color:var(--ink2);font-size:13px;
  padding:7px 14px;border-radius:8px;margin:22px 0 20px;font-weight:600}
.back:hover{color:var(--ink)}
/* sticky back on detail pages — follows the scroll, pins below the nav */
.back.sticky{position:sticky;top:calc(72px + env(safe-area-inset-top,0px));z-index:20;
  box-shadow:0 4px 14px rgba(0,0,0,.35);backdrop-filter:blur(6px);background:rgba(42,33,26,.92)}

ltra-light filter roast that stops well before first crack completes, built to showcase origin acidity and florals.", "useFor": "Single-origin filter, competition-style clarity, delicate washed Africans and high-grown lots.", "curve": {"chargeC": "195–210", "chargeF": "383–410", "tpC": "85–95", "tpF": "185–203", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–200", "fcF": "385–392", "dropC": "200–205", "dropF": "392–401", "totalTime": "8:00–10:00", "dtr": "10–14%"}, "flavor": {"acidity": 5, "body": 2, "sweetness": 3, "bitterness": 1, "roast": 1, "aroma": 5}, "phases": [{"h": "Drying", "body": "Long, gentle drying. Bean stays green-to-yellow. You're driving off free moisture without rushing energy into the bean — a scorched Nordic roast is unrecoverable because there's no development to hide behind."}, {"h": "Maillard / Browning", "body": "Kept short and controlled. Sugars begin browning but you're deliberately not letting caramelization run. This is where the floral and acidic precursors are preserved rather than cooked off."}, {"h": "First Crack", "body": "You drop at or barely into first crack. The crack may be sparse and quiet. Timing here is everything — a few seconds long and you lose the wispy top-end that defines the style."}, {"h": "Development", "body": "Minimal by design. DTR runs low (10–14%). The goal is a fully-dried, evenly-roasted bean that is barely developed, not an underdeveloped one — the distinction is even heat application, not just a fast drop."}], "defects": [{"d": "Grassy / green", "cause": "Dropped before drying truly finished; moisture still locked in center.", "avoid": "Confirm even yellowing across the batch before pushing toward first crack; don't chase the clock."}, {"d": "Sharp / sour", "cause": "Underdeveloped acids never resolved into sweetness.", "avoid": "Nudge DTR up slightly or extend Maillard by a few seconds; sourness is the Nordic failure mode, brightness is the goal."}, {"d": "Vegetal / peapod", "cause": "Drying phase ed light roast, so the approach is a clean, unfussy light-roast curve rather than the knife-edge precision of a Nordic or cinnamon."}, {"h": "Maillard / Browning", "body": "A modest browning cooks off the grassy edge and builds gentle sweetness. The aim is 'smooth and light,' not maximum origin expression."}, {"h": "First Crack", "body": "You let first crack roll fully, then drop within a short window. Because 'blonde' isn't a precise level, exactly where you drop varies a lot between roasters."}, {"h": "Development", "body": "A short-to-moderate window (13–17% DTR). Enough to keep it mellow and approachable rather than sharp — which is why many commercial blonde roasts drift toward City rather than staying truly light."}], "defects": [{"d": "Not actually light", "cause": "Chasing 'smooth,' the roast drifts to City or beyond and stops being a light roast at all.", "avoid": "If you're selling it as blonde, hold the drop genuinely light; know that the term sets a light expectation even if it's loosely defined."}, {"d": "Sour / underdeveloped", "cause": "Overcorrecting toward light and dropping too early.", "avoid": "Give it enough development to resolve acids; blonde should read mellow-bright, not sour."}, {"d": "Peanutty / flat", "cause": "Rushed Maillard — not enough time in the browning phase to build sweetness before dropping light.", "avoid": "Stretch the Maillard phase a little even when finishing light; sweetness is built there, not at the drop."}], "machine": "Forgiving across machines. The real trick of a blonde roast is honestly just a clean, approachable light-to-light-medium roast — no special hardware needed. Any reasonably controllable drum or fluid-bed handles it. The engineering effort goes into consistency and avoiding under-development, not into machine choice."}, "city": {"name": "City", "sub": "Light–Medium Filter", "level": "Light", "group": "light", "agtron": "70–65", "accent": "#B07B3E", "oneLine": "The classic light-medium filter roast dropped in the early minute of development, balancing origin character with rounded sweetness.", "useFor": "Everyday single-origin filter, pour-over programs, origins where you still want acidity but with more body than Nordic.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "205–210", "dropF": "401–410", "totalTime": "9:00–11:00", "dtr": "15–18%"}, "flavor": {"acidity": 4, "body": 3, "sweetness": 4, "bitterness": 1, "roast": 1, "aroma": 4}, "phases": [{"h": "Drying", "body": "Standard drying phase, roughly half the total roast. Even yellowing is the target. Sets up a stable rate-of-rise heading into browning."}, {"h": "Maillard / Browning", "body": "Fuller than Nordic — you let browning build more sweetness and body. This is where City earns its rounder cup versus a Scandinavian light."}, {"h": "First Crack", "body": "You ride into first crack and let it establish before dropping. The crack is audible and consistent across the batch."}, {"h": "Development", "body": "A short but real development window (15–18% DTR). Enough to resolve acids into sweetness and knock off the grassy edge without pushing into roast character."}], "defects": [{"d": "Baked", "cause": "RoR crashed and flat-lined through development; energy stalled.", "avoid": "Keep the rate-of-rise gliding gently downward — never flat, never rising, into the drop."}, {"d": "Underdeveloped", "cause": "Dropped too soon after first crack onset.", "avoid": "Give at least ~1:15–1:45 of development past first crack for this level."}, {"d": "Muted acidity", "cause": "Slightly too much development for the origin, dulling the brightness you kept it light to preserve.", "avoid": "If the coffee's appeal is its acidity, drop toward the earlier end of the City window."}], "machine": "Forgiving across roaster types — a genuine all-rounder and a great profile to learn a new machine on. Drum roasters lend it a touch more body; fluid-bed keeps it brighter. Batch size is not especially critical. If you're commissioning or characterizing an unfamiliar roaster, City is the profile that will show you the machine's honest behavior without punishing small mistakes.", "aka": ["Light City", "Half City"]}, "american": {"name": "American", "sub": "Medium-Light", "level": "Medium", "group": "medium", "aka": ["Breakfast", "Regular", "Medium (US)"], "agtron": "68–62", "accent": "#A06E38", "oneLine": "The medium-light US standard — the everyday 'regular' or 'breakfast' roast, balanced and approachable, sitting between a bright light roast and a sweeter specialty medium.", "useFor": "Traditional American drip and diner coffee, crowd-pleasing house blends, the safe middle a broad audience already expects.", "curve": {"chargeC": "200–214", "chargeF": "392–417", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "207–212", "dropF": "405–414", "totalTime": "9:30–11:30", "dtr": "16–19%"}, "flavor": {"acidity": 4, "body": 3, "sweetness": 4, "bitterness": 2, "roast": 2, "aroma": 4}, "phases": [{"h": "Drying", "body": "Standard even drying. American is the classic middle roast, so nothing here is pushed — it's a balanced, unhurried approach."}, {"h": "Maillard / Browning", "body": "A solid browning phase builds the balanced sweetness and body that makes this roast so approachable. More developed than New England, lighter than City+."}, {"h": "First Crack", "body": "First crack rolls fully through the batch and you note its timing before carrying into a moderate development."}, {"h": "Development", "body": "A moderate window (16–19% DTR). Enough to balance acidity with body and sweetness, landing the familiar, non-challenging cup most American drinkers grew up on."}], "defects": [{"d": "Flat / generic", "cause": "The safe middle roasted without attention drifts to dull.", "avoid": "Even a balanced roast wants a clean declining RoR; don't let 'medium' mean 'unmanaged.'"}, {"d": "Baked", "cause": "Stalled RoR through the moderate development.", "avoid": "Keep momentum — the middle of the spectrum still bakes if the rate of rise flatlines."}, {"d": "Papery / stale-tasting", "cause": "Over-long drying or a baked stretch flattens the cup into cardboard.", "avoid": "Keep the roast moving with a steady declining rate of rise; don't let it coast."}, {"d": "Roasty without depth", "cause": "Pushed a touch dark to hide green notes rather than developing properly.", "avoid": "Fix development with time and a clean curve, not with extra color."}], "machine": "The most forgiving roast on the spectrum — it works on essentially any machine, which is exactly why it became the mass-market default. Drum, fluid-bed, high mass, low mass: all produce an acceptable American roast. Batch size and airflow are non-critical within reason. The engineering challenge here is volume and consistency at scale, not coaxing character out of the roast."}, "cityplus": {"name": "City+", "sub": "Specialty Default", "level": "Medium", "group": "medium", "agtron": "63–58", "accent": "#95602F", "oneLine": "The most common specialty medium roast — a hair past City, deep enough for sweetness and balance while keeping origin identity intact.", "useFor": "The default specialty filter roast, blends meant to be versatile, café house filter, and the safest starting point when dialing a new coffee.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "210–216", "dropF": "410–421", "totalTime": "10:00–12:00", "dtr": "18–22%"}, "flavor": {"acidity": 3, "body": 4, "sweetness": 5, "bitterness": 2, "roast": 2, "aroma": 4}, "phases": [{"h": "Drying", "body": "Even, unhurried drying — this profile rewards a stable, well-managed early phase because the longer development amplifies any inconsistency from earlier."}, {"h": "Maillard / Browning", "body": "The workhorse phase for City+. A generous, well-controlled browning is where the signature sweetness and caramel notes are built."}, {"h": "First Crack", "body": "First crack is a landmark, not the finish. You note its timing precisely — development time is measured from here."}, {"h": "Development", "body": "The sweet spot: 18–22% DTR. Long enough to fully round out and build sweetness, short enough that origin character and a clean finish survive. This is the most-dialed window in specialty roasting."}], "defects": [{"d": "Flat / dull", "cause": "Development pushed too long, muting acidity without adding complexity.", "avoid": "Watch that DTR doesn't creep past ~22%; pull back drop temp if the cup goes lifeless."}, {"d": "Roasty edge", "cause": "Drifted too close to second crack.", "avoid": "Hold drop temp comfortably below second-crack territory; City+ should never taste toasty."}, {"d": "Slightly baked, hollow middle", "cause": "Rate of rise sagged through the Maillard phase, hollowing out the body.", "avoid": "Protect a gentle, continuous RoR decline through Maillard — the sweet spot depends on it."}], "machine": "The universal reference profile — works on nearly anything, which is why it's the industry benchmark. Dial your machine here first: if City+ comes out clean and sweet, the roaster is behaving. Drum adds body, fluid-bed adds clarity, but both land in a usable place. Moderate batches. It's the profile against which you diagnose a machine's quirks before attempting anything more demanding.", "aka": ["City Plus", "Medium"]}, "fullcity": {"name": "Full City", "sub": "Medium–Dark", "level": "Medium-Dark", "group": "mediumdark", "agtron": "55–50", "accent": "#6E3E1E", "oneLine": "Medium-dark roast taken right up to the edge of second crack — deep caramelization and body while stopping just short of roast dominating.", "useFor": "Fuller-bodied filter, classic espresso bases, blends built for milk, chocolate-and-nut flavor profiles.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "218–224", "dropF": "424–435", "totalTime": "11:00–13:00", "dtr": "20–25%"}, "flavor": {"acidity": 2, "body": 5, "sweetness": 4, "bitterness": 3, "roast": 3, "aroma": 3}, "phases": [{"h": "Drying", "body": "Standard drying. From here on, total energy delivered matters more than any single phase — Full City is about accumulated development."}, {"h": "Maillard / Browning", "body": "Full browning, deep caramel formation. Sugars are heavily transformed; acidity is dropping and body is climbing."}, {"h": "First Crack", "body": "First crack comes and goes with meaningful time still ahead. The cracks roll through the whole batch and settle."}, {"h": "Development", "body": "Extended development approaching — but not reaching — second crack. You're listening for the first isolated snaps of second crack as your ceiling, and dropping before they build."}], "defects": [{"d": "Roasty / carbony", "cause": "Slid into second crack; roast character took over.", "avoid": "Drop at the very first hint of second crack, not after; the window closes fast at this level."}, {"d": "Baked / flat", "cause": "Long roast with a stalled RoR through the back half.", "avoid": "Maintain momentum — a long roast still needs a declining, never-flat rate-of-rise."}, {"d": "Oily too soon", "cause": "Dropped just into second crack and rested warm — oils migrate to the surface faster than expected.", "avoid": "Drop at the very start of second crack if you don't want surface oil, and cool fast."}, {"d": "Muddled / no origin character", "cause": "Development pushed far enough to erase the bean's identity without gaining a clean dark-roast profile.", "avoid": "Decide the goal: preserve some origin (drop earlier) or commit to a clean dark roast (later), not a muddy middle."}], "machine": "Drum roasters excel here — conductive heat and thermal mass build the body this style is known for, and a heavier drum carries momentum smoothly into second crack. Batch size matters more than at lighter levels because you're managing the approach to second crack: too full and you may lack the heat headroom to steer it, too empty and it can race. Airflow needs to clear the smoke that begins at second crack without stripping heat.", "aka": ["Full City"]}, "fullcityplus": {"name": "Full City+", "sub": "Into Second Crack", "level": "Medium-Dark", "group": "mediumdark", "agtron": "48–45", "accent": "#5A2F16", "oneLine": "Dropped into the rolling start of second crack — the first roast level where surface oils begin to appear and roast character joins origin flavor.", "useFor": "Bold espresso, traditional-leaning blends, darker café programs that still want some sweetness underneath the roast.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "224–229", "dropF": "435–444", "totalTime": "12:00–14:00", "dtr": "22–27%"}, "flavor": {"acidity": 1, "body": 5, "sweetness": 3, "bitterness": 4, "roast": 4, "aroma": 3}, "phases": [{"h": "Drying", "body": "Standard. The character of this roast is decided almost entirely in the final couple of minutes, so a clean early phase just keeps the back half predictable."}, {"h": "Maillard / Browning", "body": "Full, deep browning already behind you before the finish. Origin acidity is mostly spent by now."}, {"h": "First Crack", "body": "First crack is an early landmark. You're managing energy so second crack arrives controlled, not runaway."}, {"h": "Development", "body": "You drop into the early roll of second crack. First oils bead on the surface hours later. Judgment shifts from taste-forward development to controlling how far into second crack you commit."}], "defects": [{"d": "Ashy / burnt", "cause": "Rode too deep into second crack; pushed toward carbon.", "avoid": "Drop in the early, sporadic phase of second crack — not once it's rolling continuously."}, {"d": "Uneven surface oil", "cause": "Inconsistent heat let some beans out-roast others.", "avoid": "Ensure even development into second crack; blotchy oiling signals an uneven batch, not just a dark roast."}, {"d": "Bitter, drying finish", "cause": "Development stretched too long into second crack, extracting harsh compounds.", "avoid": "Once into second crack, time is short — small delays read as big jumps in bitterness."}], "machine": "Drum roasters own this territory. Watch airflow closely — you want to clear smoke and chaff without stripping so much heat that development stalls right when the roast is most sensitive. Thermal mass helps carry even heat through early second crack. Batch consistency becomes important: as you darken, small differences in charge temperature and batch size translate into visible differences in surface oil and color.", "aka": ["Full City Plus"]}, "vienna": {"name": "Vienna", "sub": "Dark", "level": "Dark", "group": "dark", "agtron": "42–38", "accent": "#8a4a28", "oneLine": "A moderate dark roast well into second crack with a light, even oil sheen — bittersweet and roast-forward but still short of full French intensity.", "useFor": "Traditional dark-roast espresso, European-style café blends, drinkers who want dark but not scorched.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "230–235", "dropF": "446–455", "totalTime": "13:00–15:00", "dtr": "25–30%"}, "flavor": {"acidity": 1, "body": 4, "sweetness": 3, "bitterness": 4, "roast": 5, "aroma": 2}, "phases": [{"h": "Drying", "body": "Standard drying. At dark levels, consistency of the whole curve matters more than any nuance — you're building toward a roast-dominant cup."}, {"h": "Maillard / Browning", "body": "Fully complete and behind you. Origin sugars are largely converted; what's left is roast-driven bittersweetness."}, {"h": "First Crack", "body": "A distant landmark. You roll through first crack and keep energy moving toward second."}, {"h": "Development", "body": "You settle into the middle of second crack. Oils migrate to the surface evenly. Control matters — the difference between Vienna and French is a matter of seconds and a few degrees here."}], "defects": [{"d": "Acrid / smoky", "cause": "Airflow too low; smoke reabsorbed into the beans.", "avoid": "Open airflow through second crack to evacuate smoke; dark roast should be bittersweet, not smoky."}, {"d": "Baked-then-burnt", "cause": "Slow approach that stalled, then a hard finish to reach color.", "avoid": "Reach dark color through steady momentum, not by stalling and then blasting heat to catch up."}, {"d": "Uneven oil sheen", "cause": "Inconsistent heat or airflow late in the roast leaves some beans oily and others dry.", "avoid": "Even heat and steady airflow through second crack; batch-to-batch consistency matters more as you darken."}], "machine": "Drum roasters with good airflow control. At this darkness, smoke management and even heat are the whole game, and batch-to-batch consistency starts to dominate — the same beans a minute apart look and taste noticeably different. Adequate extraction and evacuation of smoke keeps the cup from turning acrid. Fluid-bed machines can struggle to hold even heat this deep into second crack.", "aka": ["Viennese", "Light French", "Continental (loosely)"]}, "continental": {"name": "Continental", "sub": "Dark", "level": "Dark", "group": "dark", "aka": ["New Orleans", "European", "After-Dinner", "High Roast"], "agtron": "40–35", "accent": "#77401E", "oneLine": "A dark roast in the Vienna-to-French band with a smoky, caramelized, bittersweet body — the traditional 'after-dinner' European style, historically the entry to the darkest roasts.", "useFor": "Dark-roast blends, after-dinner and dessert coffee, drinkers who want deep and smoky but not as punishing as French or Italian.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "232–237", "dropF": "450–459", "totalTime": "13:30–15:30", "dtr": "26–31%"}, "flavor": {"acidity": 1, "body": 4, "sweetness": 2, "bitterness": 5, "roast": 5, "aroma": 2}, "phases": [{"h": "Drying", "body": "Standard. As with all dark roasts, accumulated energy over the whole curve matters more than any single phase's nuance."}, {"h": "Maillard / Browning", "body": "Fully complete well before the finish. Origin character is largely spent; the cup is roast-driven from here."}, {"h": "First Crack", "body": "An early landmark. You manage energy so the run into second crack stays controlled rather than runaway."}, {"h": "Development", "body": "You settle into second crack, past Vienna but short of full French. Smoky, caramelized, bittersweet. The name blurs with New Orleans and European — all sit in this same dark band."}], "defects": [{"d": "Acrid / smoky", "cause": "Low airflow let roast smoke reabsorb into the beans.", "avoid": "Open airflow through second crack; the target is a clean bittersweet smokiness, not an ashtray."}, {"d": "Ashy", "cause": "Pushed too close to the French/Italian end.", "avoid": "Hold the drop in the mid-second-crack range; Continental should keep some caramel body under the roast."}, {"d": "Flat / one-dimensional", "cause": "So much development that only roast character remains, with no sweetness or complexity left underneath.", "avoid": "Even at this darkness, a clean curve into second crack preserves a little sweetness beneath the roast."}], "machine": "Drum roaster with good airflow control. Historically some New Orleans versions blend in chicory — a separate ingredient added after roasting, not a roast technique. Mechanically this is a dark-roast discipline: even heat through a sustained second crack, aggressive smoke clearance, and tight repeatability. High-mass drums help hold steady heat; airflow keeps smoke off the beans."}, "french": {"name": "French", "sub": "Very Dark", "level": "Dark", "group": "dark", "agtron": "35–30", "accent": "#9c5a34", "oneLine": "A very dark roast deep into second crack with heavy surface oil — roast character dominates, origin is largely gone, intense and bittersweet.", "useFor": "Traditional French/Italian-leaning espresso, dark-roast house blends, drinkers who want bold, smoky, low-acid coffee.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "235–240", "dropF": "455–464", "totalTime": "14:00–16:00", "dtr": "28–33%"}, "flavor": {"acidity": 1, "body": 4, "sweetness": 2, "bitterness": 5, "roast": 5, "aroma": 2}, "phases": [{"h": "Drying", "body": "Standard drying, then the roast becomes about controlled energy delivery all the way to a very dark drop."}, {"h": "Maillard / Browning", "body": "Long complete. By now the cup's character is roast and carbon chemistry, not origin sugars."}, {"h": "First Crack", "body": "A memory. You're managing the run deep into second crack without letting it become uncontrolled."}, {"h": "Development", "body": "You push well into or past the peak of second crack. Surface is heavily oiled. This is the edge of the safe roasting envelope — a little further is charcoal, and the risk of roaster fires climbs, so vigilance is mandatory."}], "defects": [{"d": "Burnt / carbony", "cause": "Pushed past controlled dark into scorched territory.", "avoid": "Know your drop point cold; at French level there's almost no margin before flavor becomes ash."}, {"d": "Flat, no sweetness", "cause": "All fermentable sugar cooked off with nothing balancing the bitterness.", "avoid": "Start from a sweeter, denser green; thin coffees turn hollow and purely bitter at this level."}, {"d": "Uncontrolled second crack", "cause": "Too much heat entering second crack sends it racing — seconds separate a French roast from charcoal.", "avoid": "Ease heat before second crack so you can steer the final seconds precisely; this is the danger zone."}], "machine": "Drum roasters, close supervision, and aggressive airflow. Fire safety becomes a genuine operational concern at this level — chaff and accumulated oils plus high heat are a real ignition risk, so cleaning discipline is part of running this roast. The craft is easing heat before second crack so you can steer the final seconds; a machine you can't throttle quickly will overshoot into charcoal. Never leave it unattended.", "aka": ["Dark Roast", "Turkish (loosely)"]}, "italian": {"name": "Italian", "sub": "Darkest Traditional", "level": "Dark", "group": "dark", "agtron": "28–25", "accent": "#b06a3e", "oneLine": "The darkest common roast — near the end of the safe envelope, heavily oiled and carbon-forward, built for traditional dark espresso tradition.", "useFor": "Traditional Italian espresso blends, very dark café identities, customers who specifically want the darkest cup.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "240–245", "dropF": "464–473", "totalTime": "15:00–17:00", "dtr": "30–35%"}, "flavor": {"acidity": 1, "body": 3, "sweetness": 1, "bitterness": 5, "roast": 5, "aroma": 1}, "phases": [{"h": "Drying", "body": "Standard. Everything past drying is energy management toward the darkest safe drop point."}, {"h": "Maillard / Browning", "body": "Fully spent long before the finish. No origin character remains to preserve."}, {"h": "First Crack", "body": "Far behind. Second crack has fully rolled and largely finished by the time you approach the drop."}, {"h": "Development", "body": "You take it to the very edge of the safe roasting envelope — beyond here is combustion, not coffee. Bean surface is fully oiled and near-black. This level exists for tradition and identity, not flavor development."}], "defects": [{"d": "Charred / ash", "cause": "One step too far; the bean crossed from dark roast to burnt.", "avoid": "This roast lives on a knife's edge — precise, repeatable drop timing is the entire skill."}, {"d": "Roaster fire", "cause": "Accumulated oil and chaff igniting at extreme heat.", "avoid": "Meticulous roaster cleaning and constant supervision; this is the highest fire-risk common roast."}, {"d": "Thin body despite darkness", "cause": "So much mass burned off that the cup is dark but hollow — bitterness without weight.", "avoid": "Manage heat so darkness comes from development, not from simply torching the bean to nothing."}], "machine": "Drum roasters with rigorous cleaning and fire protocols. At Italian darkness the discipline is almost entirely about safety and repeatability rather than flavor nuance. Keep the drum clean (oil and chaff buildup is a fire load), manage airflow to evacuate heavy smoke, and watch the roast continuously. Thermal mass helps hold even heat, but the operator's attention is the real safety system.", "aka": ["Espresso Roast (traditional)"]}, "spanish": {"name": "Spanish", "sub": "Darkest / Carbonized Edge", "level": "Dark", "group": "dark", "aka": ["Dark French (loosely)", "Extreme Dark"], "agtron": "25–20", "accent": "#8a5233", "oneLine": "The darkest named roast — pushed past Italian to the very edge of carbonization, thin-bodied, intensely bitter and smoky, existing at the outer limit of what's still coffee.", "useFor": "Extreme dark-roast traditions and specific regional tastes. A niche, identity-driven roast, not a flavor-development one.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "245–250", "dropF": "473–482", "totalTime": "15:30–17:30", "dtr": "31–36%"}, "flavor": {"acidity": 1, "body": 2, "sweetness": 1, "bitterness": 5, "roast": 5, "aroma": 1}, "phases": [{"h": "Drying", "body": "Standard. Everything after is a controlled march to the darkest safe drop point on the spectrum."}, {"h": "Maillard / Browning", "body": "Long spent. There is no origin character left to preserve at this darkness."}, {"h": "First Crack", "body": "A distant memory. Second crack has fully rolled and largely finished before you approach the drop."}, {"h": "Development", "body": "Taken past Italian to the very verge of combustion. The bean is heavily carbonized and can be over a quarter ash. Body actually thins out here as structure breaks down. This is the outer edge of the roasting envelope."}], "defects": [{"d": "Charred / charcoal", "cause": "One step past the edge; the bean crossed from roast to burnt.", "avoid": "Spanish already lives at the limit — a few seconds or degrees too far is literally charcoal. Precise, repeatable timing is the whole skill."}, {"d": "Roaster fire", "cause": "Oil and chaff plus extreme heat, with dumping into the cooling tray adding oxygen.", "avoid": "Meticulous cleaning, constant supervision, and fire protocols. This is the highest fire-risk roast there is."}, {"d": "Acrid smoke taint", "cause": "Smoke not cleared fast enough at extreme darkness settles back onto the beans.", "avoid": "Aggressive, clean airflow to evacuate smoke continuously; at this level smoke management is flavor management."}], "machine": "Drum roaster with rigorous cleaning and active fire safety — this is the darkest common roast and the highest-risk. The entire job is safety and repeatability: continuous supervision, aggressive clean airflow to clear dense smoke, and a spotless machine, because oil and chaff at this heat are a serious fire hazard. Flavor is almost entirely roast character by now; the engineering is about doing it safely and identically every time."}, "espresso": {"name": "Espresso", "sub": "Modern Specialty", "level": "Purpose", "group": "purpose", "agtron": "58–48", "accent": "#7A4A28", "oneLine": "A purpose profile, not a roast level — extended development for solubility and sweetness under pressure, tuned so it extracts evenly as espresso rather than for a color target.", "useFor": "Modern specialty espresso, single-origin espresso, café espresso where you want clarity and sweetness in a short, pressurized shot.", "curve": {"chargeC": "195–210", "chargeF": "383–410", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "212–222", "dropF": "414–432", "totalTime": "11:00–14:00", "dtr": "20–25%"}, "flavor": {"acidity": 3, "body": 5, "sweetness": 5, "bitterness": 3, "roast": 3, "aroma": 4}, "phases": [{"h": "Drying", "body": "Often a slightly gentler, longer drying to promote even heat penetration — espresso punishes uneven roasts because the extraction concentrates every flaw."}, {"h": "Maillard / Browning", "body": "Deliberately extended. This is the heart of an espresso profile: a long Maillard builds the sweetness and solubility that a short pressurized shot depends on."}, {"h": "First Crack", "body": "A managed landmark. You typically stretch the time between first crack and drop more than a filter roast of the same color, prioritizing development over speed."}, {"h": "Development", "body": "Longer development (often 20–25% DTR) than a filter roast landing at the same Agtron. The extra development lowers perceived acidity and raises solubility so the shot pulls evenly and sweet, not sharp or hollow."}], "defects": [{"d": "Sharp / sour shot", "cause": "Underdeveloped for espresso; acids not resolved and solubility too low.", "avoid": "Extend development; espresso needs more than a filter roast at the same color to pull sweet under pressure."}, {"d": "Hollow / ashy shot", "cause": "Over-roasted chasing body, tipped into roast character.", "avoid": "Build body through development time, not a darker drop; more time at a moderate color beats a darker roast."}, {"d": "Harsh crema, bitter finish", "cause": "Roasted too dark or developed too long for the intended shot, so extraction turns harsh under pressure.", "avoid": "Design the roast for the machine and ratio; espresso concentrates every flaw, so aim for even development over color."}], "machine": "Any roaster, but repeatability is critical because espresso amplifies every variation into the shot. The skill is profile design — targeting even development so the coffee extracts cleanly under nine bars of pressure. Whatever machine you use, lock down a disciplined between-batch protocol and consistent charge temperature; a shot exposes drift that a filter brew would forgive. Log everything and cup against a reference."}, "omni": {"name": "Omni", "sub": "Filter + Espresso", "level": "Purpose", "group": "purpose", "agtron": "62–55", "accent": "#8A5A34", "oneLine": "A modern medium roast deliberately designed to work as both filter and espresso — the third-wave default that trades a little peak performance in each for versatility.", "useFor": "Cafés running one roast across both bar and brew, single-origin programs that want one SKU per coffee, roasters simplifying inventory.", "curve": {"chargeC": "198–212", "chargeF": "388–414", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "210–218", "dropF": "410–424", "totalTime": "10:30–13:00", "dtr": "19–23%"}, "flavor": {"acidity": 3, "body": 4, "sweetness": 5, "bitterness": 2, "roast": 2, "aroma": 4}, "phases": [{"h": "Drying", "body": "Clean, even drying. Omni lives or dies on evenness because it has to satisfy two extraction methods at once — no room to hide an uneven batch."}, {"h": "Maillard / Browning", "body": "A generous browning builds the sweetness that makes the roast forgiving in espresso while keeping enough clarity for filter."}, {"h": "First Crack", "body": "Landmark noted precisely. Omni development sits between a pure filter and a pure espresso target."}, {"h": "Development", "body": "A middle-path DTR (roughly 19–23%). Enough development for espresso to pull sweet, restrained enough that filter still shows origin. You're intentionally not optimizing for either — the whole point is one roast that does both well."}], "defects": [{"d": "Compromised both ways", "cause": "Split the difference badly — too light for great espresso, too developed for bright filter.", "avoid": "Aim the profile at the coffee's strength; an omni still leans slightly toward what that specific green does best."}, {"d": "Sour as espresso", "cause": "Erred too far toward the filter end.", "avoid": "If the shot pulls sharp, add development; test it on the bar, not just the cupping table."}, {"d": "Muddy as filter", "cause": "Compromise roast leaning espresso loses the clarity filter brewing needs.", "avoid": "Accept that omni is a deliberate trade-off; if one method matters more, roast for it and let omni go."}], "machine": "Any well-controlled roaster. The real work is profile design and disciplined cupping across both filter and espresso — you validate the roast by brewing it both ways and confirming it's acceptable in each. Consistency and record-keeping matter more than the specific machine, because you're chasing a narrow window that satisfies two extraction methods at once."}}, "METHODOLOGY": {"waves": {"name": "The Waves of Coffee", "sub": "How coffee culture evolved", "group": "culture", "accent": "#c98a2e", "diagram": "waves", "sections": [{"h": "Why \"waves\"?", "body": "The coffee industry describes its modern history in “waves” — major shifts in how people relate to coffee — borrowing the metaphor from the waves of feminism. The term was popularized by coffee professional Trish Rothgeb in a 2002–03 article. Each wave isn't a clean start-and-stop era so much as a shift in values that overlaps with the ones before and after it. Knowing the waves gives you a vocabulary for where a roaster, a café, or a coffee sits on the spectrum from cheap-and-consistent to craft-and-transparent."}, {"h": "First wave — coffee as commodity", "body": "The first wave, taking off through the 1800s and into the 20th century, was about making coffee cheap, convenient, and available to everyone. This is the world of canned pre-ground coffee, instant coffee, and diner drip — Folgers, Maxwell House, Nescafé. Consumers didn't differentiate by origin or variety; the goals were low price and consistent (if unremarkable) taste. Innovations like vacuum packing and instant coffee were the wins of this era. Quality and provenance simply weren't part of the conversation."}, {"h": "Second wave — coffee as experience", "body": "The second wave began in the 1960s with roasters like Peet's Coffee (founded 1966 by Alfred Peet) and was carried worldwide by Starbucks, which grew explosively from the 1980s on. It shifted attention from mere caffeine to the café experience: espresso drinks (lattes, cappuccinos, macchiatos), Italian-style machines, comfortable “third place” shops, and — for the first time — coffee labeled by country of origin. The focus, though, was still on the drink and the ambiance more than the bean itself, and roasts tended to run dark, often masking origin character."}, {"h": "Third wave — coffee as craft", "body": "The third wave, named around 1999–2003 and still the dominant force in specialty today, turned the focus to the coffee itself — not the shop, not the syrup. Its hallmarks: single-origin beans with the farm, altitude, variety, and processing printed on the bag; lighter roasts to reveal origin character; manual brewing (pour-over, AeroPress); direct trade relationships with farmers; and treating coffee with the seriousness of fine wine. The “Big Three” US third-wave roasters — Intelligentsia, Stumptown, and Counter Culture — all built on direct trade. Note that “third wave” and “specialty” aren't synonyms: specialty is a quality grade (80+ points), while the third wave is a movement and a relationship between drinker and coffee."}, {"h": "Fourth wave — and beyond", "body": "The fourth wave is still crystallizing and people define it differently. Common threads: coffee as science (refractometers, water recipes, precise brew control, even AI-assisted roasting and brewing), specialty coffee moving into the home (accelerated by the pandemic and by Gen Z learning on TikTok), and a push — voiced by Rothgeb herself — toward community and accessibility, tearing down the sometimes-exclusive feel of third-wave shops. Some frame it as specialty going both “upmarket” (ever-rarer competition lots) and “down” market (approachable, affordable specialty for everyone). Whether it's a true fourth wave or just the third wave maturing is a genuine industry debate — and there's already talk of a fifth."}], "keypoints": ["“Waves” = shifts in how people relate to coffee; term popularized by Trish Rothgeb (2002–03).", "1st: commodity — cheap, convenient, consistent (instant, canned, diner). No origin awareness.", "2nd: experience — the café, espresso drinks, Starbucks/Peet's; origin first appears on labels; often dark roasts.", "3rd: craft — single origin, light roasts, direct trade, manual brewing, coffee-as-wine. Not the same as “specialty” (a grade).", "4th: science + home + community/accessibility; still being defined."], "refs": [{"label": "Wikipedia — Third-wave coffee", "link": "https://en.wikipedia.org/wiki/Third-wave_coffee"}, {"label": "Perfect Daily Grind — third wave vs specialty", "link": "https://perfectdailygrind.com/2017/04/what-is-third-wave-coffee-how-is-it-different-to-specialty/"}, {"label": "Driven Coffee — the waves explained", "link": "https://www.drivencoffee.com/blogs/blog/coffee-waves-explained"}], "related": ["supply_chain", "sustainability", "blending"]}, "supply_chain": {"name": "The Coffee Trade & Economics", "sub": "C-price, premiums, and who gets paid", "group": "culture", "accent": "#B07B3E", "diagram": "supplychain", "sections": [{"h": "The journey from cherry to cup", "body": "Coffee passes through many hands: a farmer grows and picks the cherry; a mill processes and dries it into green; an exporter and importer move it across borders; a roaster buys the green, roasts it, and sells it; a café or you brews it. Each link adds cost and takes margin, and historically the person who did the most work — the farmer — captured the least value. Understanding this chain is the key to understanding why coffee costs what it does and why “where did this come from” is a loaded question in specialty."}, {"h": "The C-price: coffee as a traded commodity", "body": "Most of the world's coffee is traded as a commodity on the futures market — the “C market,” which sets a global benchmark price (the “C-price”) for standard, commodity-grade Arabica. Like any commodity, it swings with global supply and demand, weather, and speculation, and it can fall below what it costs a farmer to grow. The C-price pertains to mid-grade Arabica — the stuff in a generic supermarket blend — but it still matters to specialty, because it acts as the reference floor that premiums are quoted against."}, {"h": "How specialty prices work", "body": "Specialty coffee is largely traded outside the commodity system, or as a premium on top of the C-price. Rather than the C-price setting the specialty price, it acts as a baseline against which quality premiums are measured — a high-scoring Ethiopian might sell for a large multiple of the C-price, while low-grade lots trade at a discount. The idea is a pricing mechanism that rewards quality: the better the coffee a farmer produces, the more a roaster will pay. Initiatives like the Specialty Coffee Transaction Guide exist to make these premiums transparent. A wrinkle: when the commodity C-price spikes, the gap between commodity and specialty narrows, which can paradoxically reduce farmers' incentive to do the extra work of producing specialty."}, {"h": "Fair Trade vs direct trade", "body": "Two models try to get more value to farmers. Fair Trade is a certification that guarantees a minimum price (a floor above the C-price) plus a social premium, routed through cooperatives — it provides a safety net but is a blunt instrument and the premium is modest. Direct trade is a relationship, not a certification: a roaster (or importer) buys straight from a specific farm or producer, often paying well above both the C-price and Fair Trade, in exchange for quality, traceability, and a long-term partnership. Direct trade is a cornerstone of the third wave, but “direct trade” is an unregulated term — its integrity depends entirely on the roaster actually doing what they claim."}], "keypoints": ["Cherry → mill → exporter → importer → roaster → café/you; each link takes margin, farmer historically got least.", "The C-market sets a global benchmark C-price for commodity-grade Arabica; it's volatile and can fall below cost of production.", "Specialty trades as a premium above the C-price; the C-price is the reference floor, not the specialty price itself.", "Fair Trade = certified minimum-price floor via co-ops. Direct trade = a relationship paying above market for quality + traceability (unregulated term)."], "refs": [{"label": "Green Coffee Collective — the coffee trade explained", "link": "https://greencoffeecollective.com/blogs/learn/coffee-trade-explained"}, {"label": "Abyss — the C market explained", "link": "https://abysscoffee.es/blogs/blog/the-c-market-understanding-coffee-prices-and-coffee-markets"}, {"label": "Perfect Daily Grind — high prices blurring specialty/commercial", "link": "https://perfectdailygrind.com/2025/07/high-coffee-prices-divide-between-specialty-and-commercial/"}], "related": ["sustainability", "waves", "green_grades"]}, "sustainability": {"name": "Sustainability & Certifications", "sub": "What the labels really mean", "group": "culture", "accent": "#7d8f5a", "sections": [{"h": "Why sustainability is existential for coffee", "body": "Coffee isn't just an ethical talking point — it's a survival question for the crop. Arabica is fussy about climate, and warming temperatures are pushing suitable growing altitudes higher and shrinking the land where quality coffee can grow, while making leaf rust and pests worse. At the same time, decades of low commodity prices have left many farming families unable to invest in their farms or attract the next generation to keep farming. Sustainability in coffee spans three linked things: environmental (climate, soil, water, shade, biodiversity), economic (farmers earning a living), and social (labor conditions, community)."}, {"h": "Reading the certifications", "body": "The common labels each cover part of the picture, and it's worth knowing what each does and doesn't guarantee. Fair Trade focuses on a price floor and social premium via cooperatives. Rainforest Alliance (which merged with UTZ) focuses on environmental protection and sustainable farming practices. Organic certifies the absence of synthetic pesticides and fertilizers. Bird-Friendly (Smithsonian) is among the strictest shade-grown-and-organic standards. A crucial caveat: none of these is a quality grade — a certified coffee can taste mediocre, and a superb microlot may carry no certification at all because certification costs money the farmer may not recoup."}, {"h": "Certifications vs direct relationships", "body": "There's a real tension in specialty between certifications and direct relationships. Certifications provide third-party assurance and a recognizable label, but they cost farmers money and can be blunt. Many top specialty roasters argue that a genuine direct-trade relationship — paying well above market, visiting the farm, committing across seasons — does more for sustainability than any label, because it puts real money in the farmer's hands and rewards quality directly. Neither approach is automatically superior; a certification is only as good as its standard and enforcement, and a “direct” relationship is only as good as the roaster's actual conduct."}, {"h": "Where it's heading", "body": "The frontier of sustainability talk includes regenerative farming (building soil health and sequestering carbon), carbon-neutral or “climate-positive” roasting, water reduction in processing (wet processing is water-intensive), and rethinking whether the specialty model's traditional reliance on low prices can survive. The honest challenge, as many in the industry frame it, is extending these gains to ordinary farmers and ordinary drinkers — not just the top of the market — so that producing coffee remains viable for the next generation."}], "keypoints": ["Coffee sustainability = environmental (climate/soil/water/shade) + economic (farmer livelihoods) + social (labor). Climate change is shrinking viable growing land.", "Labels cover parts: Fair Trade (price floor/social), Rainforest Alliance (environment), Organic (no synthetics), Bird-Friendly (strict shade+organic).", "No certification is a quality grade — certified coffee can be mediocre; great microlots may be uncertified (certification costs money).", "Many specialty roasters argue genuine direct relationships beat labels for farmer impact — but both depend on real standards/conduct."], "refs": [{"label": "Blackout — specialty vs commodity trading", "link": "https://www.blackoutcoffee.com/blogs/the-reading-room/coffee-and-the-market-specialty-coffee-vs-commodity-trading"}, {"label": "Craft Coffee Guru — waves, sustainability, certifications", "link": "https://www.craftcoffeeguru.com/what-is-1st-2nd-and-3rd-wave-coffee/"}], "related": ["supply_chain", "waves", "green_processing"]}, "blending": {"name": "Blending", "sub": "Building a coffee from parts", "group": "culture", "accent": "#8A5A34", "diagram": "blend", "sections": [{"h": "Why blend at all?", "body": "A blend combines beans from different origins (or varieties or processes) into one coffee. There are two big reasons roasters do it. Consistency: single origins vary crop to crop and season to season and eventually run out, but a well-designed blend can be kept tasting the same year-round by adjusting components — which is why espresso blends and “house” coffees are usually blends. And construction: blending lets a roaster build a cup that no single origin delivers on its own — pairing a bright, acidic coffee with a heavy, chocolatey one to get both structure and sweetness. There's also an economic dimension: blending a premium coffee with more affordable ones lets a roaster hit a price point while keeping quality acceptable."}, {"h": "Designing a blend", "body": "Good blending is deliberate, not just mixing leftovers. Roasters usually think in roles: a base that provides body and sweetness (often a chocolatey Brazil or a balanced Central American), a bright component for acidity and lift (an East African or washed high-grown coffee), and sometimes an accent for aromatics or a specific note. They dial the ratio by cupping the components together at different proportions until the cup is balanced. Espresso blends in particular are engineered to taste good under pressure and to hold up when milk is added — a job single origins don't always do reliably."}, {"h": "Pre-blend vs post-blend roasting", "body": "A key technical decision: do you mix the green beans and roast them together (pre-blend), or roast each component separately to its own ideal and combine them after (post-blend)? Pre-blending is faster — one batch — and some roasters believe the beans “interchange,” smoothing and integrating as they share heat and moisture. Its risk: different beans have different densities, sizes, and moisture, so they roast at different rates, and a single roast profile can leave some components under- and others over-developed. Post-blending gives you full control — each coffee roasted to its best — at the cost of more time and more batches. Neither is universally “right”; it comes down to the beans and the roaster's preference."}, {"h": "Single origin vs blend", "body": "This isn't a quality ranking — they're different goals. Single origin showcases the distinct character of one place and is the third wave's showpiece, prized for transparency and expressive, sometimes wild flavors that change with the season. Blends prioritize a consistent, engineered, often more “complete” cup that customers can rely on every time. A great roastery does both: single origins to show off what a place can do, and blends to deliver a dependable daily cup and a solid espresso. Snobbery toward blends is misplaced — an artisanal blend of specialty beans is craft, not a compromise."}], "keypoints": ["Blend = beans from different origins/varieties combined. Reasons: year-round consistency, building a cup no single origin gives, hitting a price point.", "Design by roles: a base (body/sweetness) + a bright component (acidity) + optional accent; dial ratio by cupping together. Espresso blends engineered for pressure + milk.", "Pre-blend (roast together) = fast, claimed “interchange,” but uneven if beans differ in density/size. Post-blend (roast separately, combine) = full control, more work.", "Single origin vs blend = different goals not quality tiers: SO showcases a place; blends deliver consistency. Good roasteries do both."], "refs": [{"label": "MTPak — pre-blend vs post-blend", "link": "https://mtpak.coffee/2021/08/pre-blend-or-post-blend-roasted-coffee/"}, {"label": "Coffee Equipment Pros — art & business of blending", "link": "https://coffeeequipmentpros.com/blogs/news/the-art-and-business-of-coffee-blending-pushing-boundaries-for-coffee-worth-remembering"}, {"label": "Rock Creek — artisanal blends", "link": "https://rockcreekcoffee.com/blogs/blog/definition-of-artisanal-coffee-blends-and-their-benefits"}], "related": ["waves", "green_processing", "profiling"]}, "curve": {"name": "Reading the Roast Curve", "sub": "The roaster's primary instrument", "group": "read", "accent": "#C9A34E", "sections": [{"h": "What the curve is", "body": "A roast curve plots bean temperature (BT) over time. Overlaid on it is the rate of rise (RoR) — the slope of that temperature line, how fast the bean is heating at any moment. Together they are the roaster's dashboard: the BT line tells you where you are, the RoR tells you where you're going."}, {"h": "The landmarks", "body": "Every curve has the same anchors: charge (beans hit the drum, temp plunges), turning point (the low, where the bean stops giving up heat and starts absorbing it), drying end (yellowing), first crack, and drop. You read a roast by the spacing and slope between these anchors, not by any single number."}, {"h": "Why the shape matters more than the numbers", "body": "Absolute bean temps are machine-specific — your probe, your drum mass, your placement. What transfers between roasters is the shape: a smooth, continuously declining RoR from turning point to drop. That shape is the closest thing roasting has to a universal quality signal."}, {"h": "Why the shape matters more than the numbers", "body": "Two roasters with different machines will hit different absolute temperatures for the same coffee — one reads first crack at 196°C, another at 205°C, because their probes sit in different places and their drums store heat differently. What transfers between machines is the shape of the curve: a smooth, decelerating rise with a rate of rise that peaks early and then glides steadily down. When people talk about a 'good roast curve,' they mean that shape, not a specific temperature. Learn to read the shape and you can reproduce a roast on any machine; chase the numbers alone and you'll be lost the moment you change roasters."}, {"h": "How to actually use the curve live", "body": "In practice you're watching two lines climb and making small heat and airflow adjustments to keep them behaving. The bean-temp line should always be rising toward the drop, never flattening. The rate-of-rise line should be descending smoothly. Your gas changes take 20–60 seconds to show up on the RoR, so you steer ahead of where you are, not where you want to be — like turning a ship. Most modern roasting is logged with software (Artisan, Cropster) that plots both lines in real time so you can compare each batch against a reference roast and reproduce your best results."}], "keypoints": ["BT tells you position; RoR tells you trajectory.", "Read spacing and slope between landmarks, not absolute temps.", "A smooth, declining RoR is the near-universal marker of a clean roast."], "refs": [{"label": "Scott Rao — roast curve & RoR principles", "link": "https://www.scottrao.com/blog"}, {"label": "Coffee roasting (overview)", "link": "https://en.wikipedia.org/wiki/Coffee_roasting"}], "diagram": "roastcurve", "related": ["ror", "phases", "dtr"]}, "ror": {"name": "Rate of Rise (RoR)", "sub": "The slope that predicts the cup", "group": "read", "accent": "#B07B3E", "sections": [{"h": "Definition", "body": "RoR is the change in bean temperature over a fixed interval — degrees per 30 seconds or per minute. It's the first derivative of the roast curve. High early (the bean absorbs energy fast), then it should decline steadily as the roast progresses and the temperature gap between drum and bean shrinks."}, {"h": "Why it should always decline", "body": "A healthy roast has a RoR that glides smoothly downward from turning point to drop. It shouldn't rise (a spike overheats the surface), and it shouldn't flat-line (a stall bakes the bean). The single most-watched thing in modern profile roasting is keeping that RoR curve smooth and descending."}, {"h": "Crash and flick", "body": "Two classic RoR faults cluster around first crack. A crash is a sudden RoR drop as first crack's endothermic reaction pulls energy — the bean momentarily stops climbing. A flick is the RoR rebounding upward right after. Both correlate with muddy, baked-tasting cups. Managing gas and airflow before first crack to prevent the crash is a core roasting skill."}, {"h": "The crash and the flick", "body": "Two specific RoR faults cluster around first crack and ruin cups. A crash is a sudden drop in the rate of rise — first crack is endothermic (the beans briefly absorb energy) and if you haven't planned for it, the RoR can nosedive, giving a flat, baked, hollow cup. A flick (or 'spike') is the RoR rebounding upward right after — often from adding too much heat to fight the crash — which scorches the surface and adds harshness. The goal is a RoR that eases through first crack in a smooth continuous decline, with neither a cliff nor a bounce. Managing the heat before first crack, not after, is what prevents both."}, {"h": "Reading RoR as a prediction", "body": "The power of the rate of rise is that it's a leading indicator — it tells you where the roast is going before it gets there. A RoR that's flattening warns you the roast is about to stall and bake, minutes before the cup would tell you. A RoR climbing late warns of a coming scorch. Because it forecasts rather than reports, experienced roasters watch the RoR line more than the temperature line itself; the temperature tells you where you are, the RoR tells you what's about to happen."}], "keypoints": ["RoR = degrees of bean-temp change per interval; the curve's slope.", "Target a smooth, continuously declining RoR from turning point to drop.", "Prevent the first-crack crash-and-flick by managing energy before the crack, not after."], "refs": [{"label": "Scott Rao — Development Time Ratio & declining RoR", "link": "https://www.scottrao.com/blog/2016/8/25/development-time-ratio"}, {"label": "CoffeeNavigated — RoR, stalling & crash/flick", "link": "http://coffeenavigated.net/roasting-coffee/"}], "diagram": "roastcurve", "related": ["curve", "cracks", "defects"]}, "phases": {"name": "The Phases of a Roast", "sub": "Drying, Maillard, development", "group": "read", "accent": "#95602F", "sections": [{"h": "Drying phase", "body": "From charge to roughly the point the bean turns yellow. Free and bound moisture (green coffee is ~10–12% water) is driven off. The bean is endothermic and pale. Rushing this phase scorches the surface before the core is ready; dragging it risks a baked, flat roast. Typically the longest single phase."}, {"h": "Maillard / browning phase", "body": "From yellowing to first crack. The Maillard reaction — amino acids plus reducing sugars — plus caramelization generate hundreds of aroma and flavor compounds and the brown color. This is where most flavor complexity is built. Its length and heat shape sweetness, body, and acidity balance."}, {"h": "Development phase", "body": "From first crack to drop. Also called post-crack development. Here acidity mellows, sweetness rounds, and roast character grows. Too short and the coffee is grassy/sour/underdeveloped; too long and it goes flat then roasty. Measured as a ratio of total time — see DTR."}, {"h": "What can go wrong in each phase", "body": "Each phase has its own failure mode. Rush the drying phase and the outside of the bean races ahead of a still-damp core, so it browns unevenly and can taste grassy or vegetal. Rush or stall the Maillard phase and you starve the roast of sweetness and complexity — this is where most flavor is made, so a baked or too-fast Maillard shows up as a flat, dull cup. Mismanage development and you either drop underdeveloped (sour, sharp) or over-developed (ashy, bitter). Because the phases run in sequence, a mistake early cascades — you can't fix a rushed drying phase later in the roast."}, {"h": "The phases are proportions, not fixed times", "body": "There's no universal 'right' length for each phase — a light Nordic roast and a dark French roast have very different phase balances. What matters is the relationship: enough drying to evenly prepare the bean, a Maillard phase long enough to build the sweetness you want, and a development phase sized to the roast level. Roasters often think in rough proportions of tota
