ment. Cupping tells you what's wrong in the cup; the roast curve tells you where to fix it. A roastery that cups its production and reads its curves together has a real quality system, not just good intentions."}, {"h": "Building a QC routine that scales", "body": "For a growing roastery, quality control has to become a system rather than a single skilled person's instinct, or it breaks the moment that person is out. A practical QC loop: keep an approved reference roast for each coffee, cup production batches against it on a schedule (daily for high-volume, per-batch for premium), log every result next to its roast curve, and set a clear rule for what happens when a batch drifts — re-roast, blend off, or reject. The goal is catching drift before customers do. As volume grows, this expands into approving green on arrival, checking moisture and color, and tracking trends over time so a slowly wandering machine gets caught early."}], "keypoints": ["Cup production batches, not just samples — profiles drift at scale.", "Cup against a retained reference; side-by-side makes drift obvious.", "Triangulation (2 of one, 1 of the other, blind) tests whether batches truly match.", "Cupping finds the flaw; the roast curve tells you where to fix it."], "refs": [{"label": "Green Coffee Collective — cupping protocol & QC", "link": "https://greencoffeecollective.com/pages/glossary/cupping-protocol"}, {"label": "Scott Rao — development & the cup", "link": "https://www.scottrao.com/blog/2016/8/25/development-time-ratio"}], "related": ["cupping_intro", "defects", "profiling"]}, "q_grader": {"name": "Q Graders & the Evolved Q", "sub": "The credential landscape", "group": "cupping", "accent": "#95602F", "sections": [{"h": "What a Q Grader is", "body": "A Q Grader is a professionally certified coffee taster — the closest thing coffee has to a sommelier credential. Administered for years by the Coffee Quality Institute (CQI), the Q program trained and calibrated graders worldwide to score green coffee reliably on the 100-point scale, so a score in one country meant the same thing in another. There are roughly 10,000 certified Q Graders globally."}, {"h": "The transition", "body": "In April 2025 the SCA took over management of the Q program from CQI, and announced that an 'evolved Q' credential will be based on the CVA rather than the legacy 100-point form. This is a significant shift: the standard that certifies the world's professional coffee tasters is moving onto the same CVA framework that replaced the cupping form. A transitional 'CVA for Cuppers' course is bridging existing graders across, and is scheduled to retire on November 30, 2026."}, {"h": "What it means practically", "body": "For a roaster, you don't need to be a Q Grader to cup well or run quality control — the protocol is open and learnable. But the credential still signals calibrated, trusted palates for buying and competition, and understanding where it's headed (CVA-based) tells you which framework to invest your own training in. This is a live, moving area — check current SCA announcements for the latest status."}, {"h": "What a Q Grader actually is", "body": "A Q Grader is a professional licensed to score coffee using the SCA/CQI system — essentially a certified, calibrated palate whose scores are trusted across the industry. Earning the credential means passing a battery of demanding exams (around 20 tests over several days) covering sensory skills: identifying tastes and their intensities, distinguishing organic acids, matching aromas from the Le Nez du Café kit, grading green and roasted defects, and cupping coffees consistently against the standard. The point isn't snobbery — it's calibration. A Q Grader in Colombia and one in Norway should score the same coffee within a tight range, which is what makes quality scores meaningful in global trade."}, {"h": "Why calibration matters more than talent", "body": "The value of a Q Grader isn't a magically superior tongue — it's reliability. Anyone's palate drifts and differs; the certification exists to pull individual cuppers onto a common scale so their scores mean the same thing. This is why calibration cuppings (where a group scores the same coffees and compares) are a regular practice even among certified graders. For a producer, a calibrated third-party score is leverage: an objective quality number that justifies a premium. For a buyer, it's risk reduction. The whole specialty pricing system rests on the idea that quality can be measured consistently — and Q Graders are the human instruments that make that claim credible."}], "keypoints": ["Q Grader = certified, calibrated professional coffee taster; ~10,000 worldwide.", "SCA took over the Q program from CQI in April 2025; the 'evolved Q' is CVA-based.", "The transitional 'CVA for Cuppers' course retires Nov 30, 2026.", "You don't need the credential to cup well — the protocol is open — but it signals a trusted palate."], "refs": [{"label": "Daily Coffee News — SCA takes over Q program", "link": "https://dailycoffeenews.com/2025/04/25/the-specialty-coffee-association-is-taking-over-the-q-grader-program/"}, {"label": "Perfect Daily Grind — CVA & the Q programme", "link": "https://perfectdailygrind.com/2025/05/cva-q-grader-programme-coffee-industry/"}], "related": ["cva_overview", "flavor_wheel", "cupping_intro"]}, "ops_warmup": {"name": "Warm-Up & Seasoning", "sub": "Starting the day right", "group": "ops", "accent": "#C9A34E", "sections": [{"h": "Why the first batch misbehaves", "body": "Almost every roaster admits the first batches of a session are the hardest to get right, and the usual culprit is an under-warmed machine. A temperature probe reads the charge temperature quickly, but it doesn't reflect the thermal energy stored in the whole roaster — the drum walls, the back plate, the air system. Charge into a roaster that's read-hot but mass-cold and the beans pull more heat than expected, forcing you to compensate mid-roast and changing the entire profile."}, {"h": "How long to warm up", "body": "Give the machine real time to reach thermal equilibrium. For most drum roasters that's 30 to 90 minutes depending on mass — a light Loring settles fast, a heavy Probat takes far longer. One good check: it's warmed up when the gap between bean-probe and exhaust temperatures is small (roughly within 10°C). Some roasters deliberately heat the drum well above charge temperature and let it cool back down once or twice before the first load, to soak the mass evenly."}, {"h": "Seasoning a new drum", "body": "A brand-new roaster needs seasoning before it makes coffee you'd sell. Running batches (often sacrificial or blended-off) conditions the metal and builds the thin, stable oil layer that the machine roasts on from then on. Until it's seasoned, a new drum behaves differently batch to batch. Never rush warm-up or seasoning — rushed thermal prep shows up directly in the cup."}, {"h": "Why the warm-up matters", "body": "You can't just switch on a cold roaster and charge your first batch — the machine has to reach thermal equilibrium first, or your early roasts will be inconsistent. A cold drum absorbs heat differently than a hot, saturated one, so a batch charged into an under-warmed machine behaves unpredictably and usually bakes. The warm-up brings the whole mass of the drum and surrounding metal up to a stable operating temperature so it responds the same way every time. Most roasters run the machine at temperature for a set period (often 20–40+ minutes) before the first charge, and treat the first batch of the day with extra caution even so."}, {"h": "Seasoning and the first batch", "body": "Beyond the daily warm-up, many roasters run a “seasoning” or throwaway batch first — a low-value coffee roasted to bring the machine into its true rhythm and to leave a thin, stable layer that helps consistency. The first real batch of the day is notorious for running differently from the rest, because the machine is still settling, so experienced roasters either sacrifice it, cup it separately, or schedule their least-critical coffee first. The broader lesson is that repeatability starts before the coffee even goes in: a consistent warm-up and start-of-day routine removes a hidden variable that otherwise quietly changes every batch."}], "keypoints": ["The first batches suffer mostly from an under-warmed machine, not a bad profile.", "Warm up 30–90 min to thermal equilibrium (mass-dependent); check probe-vs-exhaust gap ~within 10°C.", "Season a new drum with break-in batches before selling what it makes.", "Never rush warm-up or seasoning — it shows up in the cup."], "refs": [{"label": "Perfect Daily Grind — common roaster mistakes (warm-up)", "link": "https://perfectdailygrind.com/2019/11/common-mistakes-that-roasters-make-how-to-avoid-them/"}, {"label": "CoffeeNavigated — preheat & thermal mass", "link": "http://coffeenavigated.net/roasting-coffee/"}], "related": ["ops_bbp", "ops_batchsize"]}, "ops_bbp": {"name": "Between-Batch Protocol", "sub": "Consistency across a production day", "group": "ops", "accent": "#B07B3E", "sections": [{"h": "The problem it solves", "body": "Your fifth batch roasts differently than your first because the whole machine keeps absorbing heat as the day goes on. A Between-Batch Protocol (BBP) is the routine that resets the roaster to the same starting conditions before every charge, so a profile you dialed in the morning still reproduces in the afternoon. If your starting temperatures aren't identical, the roast will never record — or taste — the same."}, {"h": "How it works", "body": "After dropping a batch, the drum is hot and needs to shed energy back down to a consistent charge point. When switching to a smaller batch, aim for a slightly lower bottom point (say 40°C lower) to give the extra thermal energy time to fade. A common approach: let the drum fall to a set bottom temperature, then bring gas back so bean temp reaches charge temperature in about 60 to 90 seconds — enough time for the metal to cool and re-warm evenly."}, {"h": "Charge on the rising temperature", "body": "A key detail: charge while the temperature is rising back to your target, not while it's still falling. Charging on a falling temperature can mean the drum metal is still too hot even though the probe reads right, risking scorching. Coming up to the charge point on the rise gives a more honest, repeatable starting state."}, {"h": "It's the first question to ask", "body": "When a roaster says a profile won't reproduce, the first thing an expert asks is whether the BBP was the same. Room conditions, seasonal green temperature, and exhaust temperature all feed into it. A disciplined BBP is what separates a roastery that hits its profiles from one that's always chasing them."}], "keypoints": ["BBP resets the machine to identical starting conditions before every charge.", "Let the drum fall to a set bottom point (lower for smaller batches), then ~60–90s back to charge temp.", "Charge on the rising temperature, not the falling one, to avoid a too-hot drum.", "A profile that won't reproduce is usually a BBP problem first."], "refs": [{"label": "Cropster — Between Batch Protocol explained", "link": "https://www.cropster.com/news/article/between-batch-protocol-for-coffee-roasters-the-whats-whys-and-hows-from-experts/"}, {"label": "Perfect Daily Grind — BBP & charge stability", "link": "https://perfectdailygrind.com/2019/11/common-mistakes-that-roasters-make-how-to-avoid-them/"}], "related": ["ops_warmup", "ops_logging", "profiling"]}, "ops_batchsize": {"name": "Batch Size & Capacity", "sub": "How much to load", "group": "ops", "accent": "#95602F", "sections": [{"h": "The capacity window", "body": "Most roasters are rated for a maximum batch, but running at 100% is usually a mistake. The practical window is roughly 50 to 85% of drum capacity. Below about half, the beans are too thin in the drum for probes to read reliably and the roast can move too fast; above about 85%, you may not have enough heat available and the beans crowd the sensors. Many production roasters settle around 70–85% for their standard batch and test to find their machine's sweet spot."}, {"h": "Batch size changes everything downstream", "body": "Batch size is the master variable that ripples through the whole roast — it sets how much heat you need, how the probes read, and how the curve behaves. A bigger batch needs more energy and a higher charge temperature to carry the same profile; a smaller batch needs less. Change the batch size and you're effectively re-developing the profile, not just scaling it."}, {"h": "Why not just max it out", "body": "Roasting at full capacity leaves no thermal headroom. If the roast falls behind early, you have nowhere to add energy, and you can't recover the curve. Running at 70–85% keeps reserve heat available to steer the roast — which is exactly why experienced roasters rarely fill the drum."}, {"h": "Why batch size changes the roast", "body": "Batch size isn't just how much coffee you make — it changes how the roast behaves. A roaster is designed around a rated capacity, and the same machine behaves differently at the top and bottom of its range. Too full (over capacity) and there isn't enough heat or airflow to move through the dense bean mass, so the roast slows, stalls, and bakes, and you may not be able to drive it into second crack cleanly. Too empty and the beans can't buffer the drum's heat, so the roast races and scorches, and the probe may not even be properly buried in beans to read accurately. Most roasters find a machine performs best somewhere in the middle of its rated range."}, {"h": "Scaling a profile across batch sizes", "body": "A profile dialed in at one batch size won't transfer unchanged to another, which trips up new roasters. A larger batch has more thermal mass and needs more energy and usually more time; a smaller batch needs less gas and moves faster. If you change batch size, expect to re-tune your gas and airflow and to see your landmark times shift. This is why serious roasteries standardize batch sizes for production coffees — keeping the batch size fixed is one less variable, so the logged profile stays reproducible day to day. Change the batch, and you're effectively developing a new profile."}], "keypoints": ["Practical batch window is ~50–85% of drum capacity; ~70–85% is a common production zone.", "Too small: probes misread, roast races. Too full: no heat headroom, probes buried.", "Batch size sets heat demand, probe behavior, and curve shape — change it and re-develop.", "Leaving headroom lets you steer the roast; a full drum can't be recovered."], "refs": [{"label": "Genuine Origin — batch size & capacity (65–85%)", "link": "https://blog.genuineorigin.com/2025/11/guide-to-roast-profiles/"}, {"label": "HowToCoffeePro — controlling the roast", "link": "https://howtocoffeepro.teachable.com/courses/1206490/lectures/26941587"}], "related": ["ops_warmup", "ops_fire"]}, "ops_fire": {"name": "Fire Safety", "sub": "The risk you never ignore", "group": "ops", "accent": "#6E3E1E", "sections": [{"h": "Where fires start", "body": "Roaster fires almost always begin in one of a few places: the drum itself (beans left too long, especially on a power loss mid-roast), the chaff collector or cyclone, or the ductwork. The fuel is the byproducts of roasting — chaff, coffee dust, condensed coffee oils, and creosote — all of which are flammable and all of which accumulate exactly where hot air flows. Blocked chimneys and ducts are among the highest-risk conditions because reduced airflow both worsens buildup and can turn a small ignition into a forge-like blaze once the blower feeds it air."}, {"h": "Prevention is cleaning", "body": "Fire prevention in a roastery is mostly a cleaning schedule. Empty the chaff bin every roast day (when half full or less, not topped out). Wipe trays after roasting. Weekly, deep-clean the cooling tray and its underside. Periodically disassemble and scrub the ductwork and cyclone where oil and creosote build up invisibly. A dirty roaster isn't just a flavor problem — coffee oils baked onto internal surfaces are a genuine fire load."}, {"h": "When a fire happens", "body": "Thermal events will happen despite good habits — a power failure at first crack leaves beans sitting motionless on a hot drum. Plan your immediate actions in advance and document them. General principles: keep the drum rotating so beans don't sit and ignite, dump or spray as your machine's design allows, and know where your extinguisher is. Never leave roasting beans unattended — the batch that gets away from a distracted roaster is the classic cause. Keep gas valves closed when not roasting, and have gas detection and a clear, marked fire plan."}, {"h": "Building a fire plan before you need one", "body": "The time to decide what you'll do about a roaster fire is long before one happens, because a drum fire escalates in seconds. A basic plan every roastery should have written down and rehearsed: know where your extinguisher is and that it's rated for the fire type; know how your specific machine is meant to be handled in a thermal event (many manufacturers give explicit steps); keep the drum turning so beans don't sit and ignite; and never, ever open the drum to look, since the rush of oxygen can turn smoldering chaff into a flare. Pair the plan with the prevention routine — a clean machine rarely catches fire in the first place — and the darkest roasts become a managed risk rather than a gamble."}], "keypoints": ["Fires start in the drum, chaff cyclone, or ductwork; fuel is chaff, dust, oil, creosote.", "Blocked ducts/chimneys are top risk — poor airflow worsens buildup and feeds flames.", "Prevention is a cleaning schedule: chaff bin daily, trays after each roast, ducts/cyclone periodically.", "Have a documented fire plan; keep the drum turning, never leave beans unattended, know your extinguisher."], "refs": [{"label": "Genio Roasters — fire prevention in roasteries", "link": "https://genioroasters.com/community/docs/safety-and-essentials/fire-prevention-in-coffee-roasteries"}, {"label": "Daily Coffee News — cleaning & maintenance", "link": "https://dailycoffeenews.com/2020/03/09/managing-the-nitty-gritty-cleaning-and-maintenance-in-the-roastery/"}, {"label": "Scott Rao — roaster fires & cleaning", "link": "https://www.scottrao.com/blog/fire"}], "related": ["ops_batchsize", "roasters"]}, "ops_decaf": {"name": "Roasting Decaf", "sub": "The bean that lies about its color", "group": "ops", "accent": "#5A2F16", "sections": [{"h": "Why decaf is different", "body": "Decaffeination weakens the bean's internal structure and lowers its density and moisture, so decaf behaves like a different coffee in the drum. It's already darker than regular green before you even start, and it heats faster. This makes decaf one of the classic traps for a roaster used to regular coffee — everything your eyes tell you is slightly wrong."}, {"h": "Don't trust the color", "body": "The single biggest decaf mistake is trusting color as a roast-level indicator. Decaf turns dark brown very quickly, well before it's actually developed, and the surface stays wrinkled rather than smoothing out. If you drop when it looks right, you'll drop underdeveloped. You have to roast to development cues and the clock, not to the shade — decaf that looks like a Full City may only be a City in actual development."}, {"h": "How to adjust", "body": "Come in gentler. Use a lower charge temperature because the beans are lighter and more fragile and scorch easily. First crack lands at roughly the same time as regular coffee, but the roast runs faster after first crack — second crack can arrive surprisingly quickly, so watch the back half closely. Most decaf is best dropped around the end of first crack to somewhat beyond, and generally kept out of a hard second crack, which turns it bitter. Cool it fast and rest it 24–48 hours like any coffee."}, {"h": "Reading decaf without the usual cues", "body": "Because decaf lies about its color and its cracks are muffled, you have to lean harder on the cues that don't lie: time, temperature, and rate of rise. Trust your logged curve and your probe over what your eyes and ears tell you, since a decaf that looks like a Full City may only be developed to a City. Many roasters keep a separate reference profile for decaf entirely, built from cupping rather than appearance, and treat the visual darkness as almost meaningless. It's a good reminder that the roast is a process to be measured, not just watched."}], "keypoints": ["Decaf is less dense, lower moisture, structurally weaker — it roasts faster and starts darker.", "Never judge decaf by color: it goes dark brown before it's developed and stays wrinkled.", "Lower the charge temp (fragile, scorch-prone); the roast races after first crack, so watch for a fast second crack.", "Drop around end of first crack to slightly beyond; avoid a hard second crack; rest 24–48h."], "refs": [{"label": "Sweet Maria's — roasting decaf, key things to know", "link": "https://library.sweetmarias.com/roasting-decaf-coffee/"}, {"label": "Perfect Daily Grind — what roasters need to know about decaf", "link": "https://perfectdailygrind.com/2017/11/what-roasters-need-to-know-about-decaf-coffee/"}, {"label": "Green Coffee Collective — roasting decaf tips", "link": "https://greencoffeecollective.com/blogs/learn/expert-tips-for-perfectly-roasting-decaf-coffee"}], "related": ["chemistry", "defects"]}, "ops_degassing": {"name": "Degassing, Storage & Packaging", "sub": "After the drop", "group": "ops", "accent": "#7A4A28", "sections": [{"h": "What degassing is", "body": "Roasting fills the bean with carbon dioxide, and after the drop that gas slowly escapes — degassing. It's strongest in the first 12–24 hours and continues for days or weeks. Brew coffee that's still actively off-gassing and you'll see it fizz and bubble as water hits the grounds; those bubbles block even saturation and give you an uneven, flat extraction. This is why fresh-roasted coffee needs to rest before it brews its best."}, {"h": "Rest windows", "body": "Rest depends on roast level and use. Rough guides from roasters: dark roasts are ready fastest (about 1–3 days), mediums around 3–5 days, and espresso often wants longer — many roasteries rest decaf and espresso 7–12 days. Darker and more porous beans degas faster; denser, lighter, washed coffees hold gas longer. But you can also rest too long — some CO2 is valuable — so the honest answer is to cup at several rest points and find the window for your coffee and setup."}, {"h": "The one-way valve", "body": "Packaging faces a paradox: you need to let CO2 out so the bag doesn't balloon, while keeping oxygen out so the coffee doesn't stale. The one-way degassing valve solves it — it opens to vent gas when internal pressure builds, then closes to block outside air. It's why most fresh coffee bags have that little valve, and why packaging coffee that's still degassing into a valve bag actually helps keep it fresh."}, {"h": "Storage", "body": "Oxygen, light, heat, and moisture are the enemies. Store roasted coffee in airtight, opaque packaging in a cool, dry place. Whole beans keep far longer than ground — ground coffee goes stale in a week or two. Warm storage speeds both degassing and staling; every exposure to air accelerates oxidation, so reseal promptly and minimize headspace."}], "keypoints": ["Roasting traps CO2; it off-gasses hardest in the first 12–24h, then for days/weeks.", "Rough rest: dark ~1–3 days, medium ~3–5, espresso/decaf often 7–12; cup to find your window.", "One-way valves vent CO2 while blocking oxygen — the key to fresh packaging.", "Store airtight, opaque, cool, dry; whole beans keep far longer than ground."], "refs": [{"label": "Roastar — degassing valve guide", "link": "https://www.roastar.com/blog/what-you-really-need-to-know-about-degassing-valves"}, {"label": "Methodical Coffee — degassing, rest & flavor", "link": "https://methodicalcoffee.com/blogs/coffee-culture/freshly-roasted-coffee-explained-degassing-rest-and-flavor"}, {"label": "Home Grounds — degassing coffee", "link": "https://www.homegrounds.co/degassing-coffee/"}], "related": ["ops_logging", "brew_espresso"]}, "ops_logging": {"name": "Roast Logging & Software", "sub": "Data makes it repeatable", "group": "ops", "accent": "#8A5A34", "sections": [{"h": "Why log at all", "body": "Some roasters work purely by sight, smell, and sound — real skills worth having. But roasting is as much science as art, and the roasters who hit their profiles consistently are the ones capturing data. Without records, dialing in a coffee becomes an endless loop of pushing the same boulder uphill. A logged roast is one you can reproduce, diagnose, and improve; an unlogged one is a lucky batch you may never see again."}, {"h": "What to log", "body": "At minimum: green and lot, charge weight and out weight (for weight loss), charge temperature, turning point, times and temps for drying end, first crack, and drop, total time, and resulting DTR — plus the gas and airflow moves you made and a tasting note once you've cupped it. The goal is enough that a different roaster on your team could reproduce the batch from the log alone."}, {"h": "The software landscape", "body": "Two names dominate. Artisan is free, open-source roast-logging software that connects to most machines and probes and plots BT and RoR live — the standard entry point. Cropster is the commercial industry platform, adding production planning, inventory, QC, and between-batch protocol tooling; it's what many mid-to-large roasteries run. Both do the core job: turn each roast into data you can see, compare, and repeat."}, {"h": "What to log, and why", "body": "A roast log is the roaster's black box — the record that turns a good batch from a happy accident into something you can reproduce. At minimum, log the coffee and batch size, charge temperature, the times and temperatures of your landmarks (turning point, dry end, first crack, drop), your gas and airflow settings and when you changed them, the total time and development time ratio, and the ambient conditions. Modern software (Artisan, Cropster) captures the temperature curve automatically; the human still records the decisions and the tasting result. Without a log you can't answer the only question that matters when a batch is great or terrible: what did I actually do?"}, {"h": "Closing the loop with the cup", "body": "A log of numbers is only half the picture — its real power comes from pairing it with the cup. The discipline is to cup each batch (or a regular sample) and write the tasting result next to the curve that produced it. Over time this builds a library: you can see that the batches that stalled in Maillard taste flat, that dropping thirty seconds earlier kept more acidity, that a particular coffee wants more heat than you'd expect. This feedback loop — roast, log, cup, adjust — is how a roaster actually improves, and it's why logging without tasting (or tasting without logging) leaves most of the value on the table."}], "keypoints": ["Logged roasts are reproducible and diagnosable; unlogged ones are lucky batches.", "Log green/lot, weights (loss %), charge, TP, drying end, first crack, drop, total time, DTR, gas/air moves, tasting note.", "Artisan: free, open-source, connects to most machines — the standard starting point.", "Cropster: commercial platform adding planning, inventory, QC, BBP — common in larger roasteries."], "refs": [{"label": "Genuine Origin — data-driven roast profiles", "link": "https://blog.genuineorigin.com/2025/11/guide-to-roast-profiles/"}, {"label": "Cropster — roasting platform & BBP", "link": "https://www.cropster.com/news/article/between-batch-protocol-for-coffee-roasters-the-whats-whys-and-hows-from-experts/"}], "related": ["ops_bbp", "profiling", "dtr"]}, "brew_extraction": {"name": "Extraction Theory", "sub": "What brewing actually does", "group": "brew", "accent": "#C9A34E", "sections": [{"h": "Brewing is dissolving", "body": "Every brew method does the same fundamental thing: hot water dissolves flavor compounds out of ground coffee. How much dissolves is the extraction yield — the percentage of the coffee's dry mass that ends up in your cup. How concentrated the result is, is the total dissolved solids (TDS) — the fraction of the liquid that's dissolved coffee. Extraction yield and TDS are different things, linked by your brew ratio, and nearly all of brewing is managing these two numbers."}, {"h": "The ideal window", "body": "Decades of research (the SCA Golden Cup standard, rooted in Lockhart's 1950s work) put the sweet spot at 18–22% extraction yield. Below 18% the coffee is under-extracted: sour, grassy, weak, because you haven't pulled the sugars and desirable compounds yet. Above 22% it's over-extracted: bitter, dry, astringent, because you've started pulling the harsh stuff. The art is landing inside that window. For strength, filter coffee typically targets a TDS around 1.15–1.35%, while espresso is far more concentrated at roughly 8–12%."}, {"h": "The four levers", "body": "Four variables control extraction. Grind size sets surface area — finer extracts faster. Water temperature — hotter extracts faster (brewing runs ~90–96°C). Contact time — longer extracts more. And agitation — stirring or turbulence speeds extraction by moving fresh water past the grounds. When a cup is wrong, you're almost always adjusting one of these four to move extraction up or down."}, {"h": "The diagnostic that never changes", "body": "Across every method, one rule holds: sour means under-extracted, bitter means over-extracted. Sour cup → extract more (grind finer, hotter water, longer time). Bitter cup → extract less (grind coarser, cooler, shorter). This single sour-vs-bitter axis is the most useful thing a barista or roaster can internalize."}], "keypoints": ["Extraction yield = % of coffee mass dissolved; TDS = concentration; brew ratio links them.", "Golden Cup window: 18–22% extraction. Under = sour/weak, over = bitter/dry.", "Strength: filter TDS ~1.15–1.35%, espresso ~8–12%.", "Four levers: grind, temperature, time, agitation. Sour → extract more; bitter → extract less."], "refs": [{"label": "SCA — towards a new brewing chart (Golden Cup)", "link": "https://sca.coffee/sca-news/25/issue-13/towards-a-new-brewing-chart"}, {"label": "Coffee Brews Hub — science of extraction", "link": "https://coffeebrewshub.com/blog/science-of-coffee-extraction"}], "diagram": "extraction", "related": ["brew_grind", "brew_espresso", "brew_water"]}, "brew_espresso": {"name": "Dialing In Espresso", "sub": "Dose, yield, time", "group": "brew", "accent": "#B07B3E", "sections": [{"h": "The standard shot", "body": "The modern specialty default is a 1:2 ratio by weight: 18g of ground coffee in, 36g of liquid espresso out, pulled in about 25–30 seconds at 9 bar of pressure and roughly 90–96°C. That 1:2 exists because, with a good grind, most espresso lands cleanly inside the 18–22% extraction window there. It's the starting point for any new bag or setup — always measured by weight, because crema makes volume unreliable."}, {"h": "The dial-in order", "body": "Dialing in has a sequence, and following it prevents most frustration. First fix your dose and ratio (18g → 36g). Pull a shot and time it. Then adjust grind to hit the target time: if the shot runs too fast (under ~25s), grind finer to slow it; too slow (over ~35s), grind coarser. Only once grind and time are in range do you taste and fine-tune. Most home espresso problems come from changing the ratio when grind was the real variable."}, {"h": "Reading the shot", "body": "Once it's pulling near 1:2 in 25–30s, taste drives the rest. Sour or sharp means under-extracted — grind finer, or nudge the ratio longer (18g → 40g). Bitter or harsh means over-extracted — grind coarser. Roast level shifts the targets: light roasts are dense and hard to extract, wanting higher temperature (93–96°C) and sometimes a longer ratio; dark roasts extract easily and prefer lower temperature (88–91°C) and often a shorter ratio."}, {"h": "Ristretto and lungo", "body": "Change the ratio and you change the shot's character. A ristretto (1:1 to 1:1.5) is short and concentrated — syrupy, sweet, less bitter, favored for milk drinks. A lungo (1:3 and up) is long and dilute — lighter and more aromatic, sometimes good for very light roasts. The 1:2 normale sits balanced between them and is the default for a reason."}], "keypoints": ["Standard: 1:2 by weight (18g → 36g), 25–30s, 9 bar, ~90–96°C. Weigh everything.", "Dial-in order: fix dose/ratio → adjust grind to hit time → then taste and fine-tune.", "Sour = grind finer / longer ratio; bitter = grind coarser. Light roast hotter, dark roast cooler.", "Ristretto (1:1–1:1.5) concentrated/sweet; lungo (1:3+) light/dilute; 1:2 is the balanced default."], "refs": [{"label": "Podium Coffee Club — espresso brew ratio", "link": "https://podiumcoffeeclub.com/blogs/blog/espresso-brew-ratio"}, {"label": "Espresso Aficionados — dialling in basics", "link": "https://espressoaf.com/guides/beginner.html"}, {"label": "Routes Coffee — key espresso parameters", "link": "https://routescoffee.co.uk/mastering-espresso-key-parameters-every-barista-should-know/"}], "diagram": "espresso", "related": ["brew_extraction", "brew_grind", "brew_milk"]}, "brew_grind": {"name": "Grind & Burrs", "sub": "The most important variable", "group": "brew", "accent": "#95602F", "sections": [{"h": "Why grind matters most", "body": "Grind size is the single most powerful lever in brewing because it sets the surface area water works on. Finer grounds expose more surface, so water dissolves compounds faster; coarser grounds slow extraction down. This is why grind is the primary thing you adjust to move a cup in or out of the ideal window — it changes extraction more than any other single control."}, {"h": "Match grind to method", "body": "Each method wants a grind matched to its contact time. Espresso is fine (25–30 second shot). Drip and pour-over are medium (4–6 minute brew). French press is coarse (a 4-minute steep). The logic is consistent: short, intense methods need fine grounds to extract enough quickly; long, gentle methods need coarse grounds so they don't over-extract."}, {"h": "Burrs beat blades", "body": "A burr grinder crushes beans between two shaped surfaces to a consistent, adjustable size. A blade grinder chops randomly, producing a chaotic mix of dust and boulders. That inconsistency is fatal to good coffee: the dust over-extracts (bitter) while the boulders under-extract (sour) in the same cup. A quality burr grinder is the single most important piece of brewing gear — more than the machine — because consistent particle size is what makes extraction predictable."}, {"h": "Fresh grind, and the CO2 effect", "body": "Grind immediately before brewing; ground coffee stales in hours as aromatics escape and oxidation accelerates. Freshness also affects the shot mechanically: very fresh beans still full of CO2 create more resistance and run slower, while degassed beans run faster — which is part of why the same grind setting behaves differently across a bag's life."}, {"h": "Grinding fresh, and why it’s non-negotiable", "body": "Grind timing matters as much as grind size. Coffee's aromatics are volatile and its huge new surface area oxidizes fast, so ground coffee goes stale in minutes to hours — far faster than whole beans, which hold for weeks. This is why every serious setup grinds immediately before brewing and never stockpiles grounds. It's also why pre-ground supermarket coffee, however good the bean, is already compromised. The practical rule: buy whole bean, grind only what you're about to brew, and if you taste a flat, hollow cup from good beans, stale grind is a prime suspect."}, {"h": "Burr grinders vs blade", "body": "Not all grinders are equal, and the difference shows up in the cup. A blade grinder chops beans unevenly into a mix of dust and boulders, which extract at different rates — the dust over-extracts (bitter) while the boulders under-extract (sour) in the same brew, muddying everything. A burr grinder crushes beans between two surfaces set a fixed distance apart, producing far more uniform particles that extract evenly, and it lets you dial a repeatable, specific grind size for each method. For anyone serious about coffee, a burr grinder is the single highest-impact equipment upgrade — often more than the brewer itself."}], "keypoints": ["Grind sets surface area — finer extracts faster, coarser slower; it's the primary extraction lever.", "Match to method: espresso fine, drip/pour-over medium, French press coarse.", "Burr grinders give consistent size; blades make dust + boulders that over- and under-extract at once.", "Grind fresh; CO2 in fresh beans adds resistance, so grind behaves differently as a bag ages."], "refs": [{"label": "Coffee Brews Hub — grind & extraction", "link": "https://coffeebrewshub.com/blog/science-of-coffee-extraction"}, {"label": "Complete Home Barista — extraction chart & grind", "link": "https://completehomebarista.com/guides/espresso-extraction-chart-explained/"}], "diagram": "grind", "related": ["brew_extraction", "brew_espresso", "brew_methods"]}, "brew_methods": {"name": "Brew Methods", "sub": "Filter, immersion, espresso", "group": "brew", "accent": "#6E3E1E", "sections": [{"h": "Three families", "body": "Most brewing falls into three families. Percolation (filter) — water passes through a bed of grounds once and drains away: pour-over (V60, Chemex), drip machines. Immersion — grounds steep in water for a set time, then separate: French press, cupping, cold brew. Pressure — hot water forced through a compacted puck: espresso and its stovetop cousin the moka pot. Each family extracts differently and suits different grind sizes and ratios."}, {"h": "Filter / pour-over", "body": "The specialty workhorse for showcasing origin clarity. The SCA ratio guide is 1:16 to 1:17 — roughly 60g of coffee per liter of water — at 90–96°C, medium grind, over about 4–6 minutes total. Pour-over rewards technique: an even bloom (a short pre-wet that lets fresh coffee degas) and steady pouring produce even extraction. It's the method that best highlights a light roast's acidity and aromatics."}, {"h": "Immersion", "body": "The most forgiving family, because contact time is fixed and even. French press uses a coarse grind and a ~4-minute steep, then you press the grounds down; it gives a heavy, full body since no paper filter removes oils. Cold brew steeps a coarse grind in cold water for many hours (often around 1:8), producing a low-acid, smooth concentrate. Immersion is hard to mess up, which makes it a good place to taste a coffee honestly."}, {"h": "Matching roast to method", "body": "The roast and the method should suit each other. Light and medium-light roasts shine in filter and pour-over, where their acidity and clarity come through. Fuller and darker roasts, and purpose-built espresso profiles, come alive under pressure where body and sweetness concentrate. This is exactly the 'use for' guidance on each roast profile in this app — the brew method is the other half of that decision."}], "keypoints": ["Three families: percolation/filter (pour-over, drip), immersion (French press, cold brew), pressure (espresso, moka).", "Filter: SCA 1:16–1:17 (~60g/L), 90–96°C, medium grind, ~4–6 min; bloom for even extraction.", "Immersion: fixed even contact time, forgiving; French press = full body, cold brew = low-acid concentrate.", "Light/medium roasts favor filter; darker and espresso profiles favor pressure."], "refs": [{"label": "Coffee Brews Hub — ratios & methods", "link": "https://coffeebrewshub.com/blog/science-of-coffee-extraction"}, {"label": "SCA — brewing control chart", "link": "https://sca.coffee/sca-news/25/issue-13/towards-a-new-brewing-chart"}], "diagram": "brewfamilies", "related": ["brew_extraction", "brew_grind", "brew_water"]}, "brew_milk": {"name": "Milk & Steaming", "sub": "Microfoam and the milk drink", "group": "brew", "accent": "#5A2F16", "sections": [{"h": "What you're making", "body": "Great milk drinks depend on microfoam — steamed milk with bubbles so tiny and uniform it looks glossy and pours like wet paint. It's not the stiff, dry froth of a cheap frother; it's a smooth emulsion of air and milk proteins that integrates into the espresso and makes latte art possible. The SCA describes excellent milk foam as smooth, glossy, and moist with no visible bubbles."}, {"h": "The two phases", "body": "Steaming has two stages. First stretch (aeration): the steam tip sits just below the surface so it draws air in — you hear a steady 'tss-tss.' This is done while the milk is still cold, adding roughly 20–30% volume for a latte (more for a cappuccino). Then texture (emulsification): sink the wand deeper and tilt the pitcher to create a whirlpool that shreds big bubbles into microfoam and heats evenly. Stop aerating once the milk warms, or the foam turns stiff and dry."}, {"h": "The temperature window", "body": "Aim for about 60–65°C (140–150°F). Milk's lactose tastes sweetest here because heat converts some of it to simpler sugars — properly steamed milk is noticeably sweeter than cold milk. Above ~65°C whey proteins denature and the foam gets thin and unstable; above ~70°C the milk scalds and turns flat and sulphurous. A common no-thermometer check: pull off when the pitcher is almost too hot to hold. And don't re-steam milk — once its proteins are stretched, they won't rebuild."}, {"h": "Alternative milks", "body": "Plant milks behave differently. Oat is the most barista-friendly — 'barista editions' add stabilizers (like dipotassium phosphate) that stop curdling against acidic espresso and help it foam. Soy froths aggressively and needs a shorter stretch. Almond is trickier for stable foam. In all cases the barista-formulated versions steam far better than the standard cartons, and plant milks generally want a shorter aeration phase and slightly lower temperatures."}], "keypoints": ["Target microfoam: glossy, wet-paint texture — an emulsion of air and proteins, not stiff froth.", "Two phases: stretch (aerate cold milk, +20–30% for a latte) then texture (whirlpool to shred bubbles).", "Sweet spot ~60–65°C; above ~65°C foam destabilizes, above ~70°C it scalds. Don't re-steam.", "Barista-edition oat/soy (added stabilizers) steam best; plant milks want shorter aeration."], "refs": [{"label": "Complete Hospitality Training — milk texturing 101", "link": "https://cht.edu.au/news/milk-texturing-101-microfoam-temperature/"}, {"label": "How-to-Brew — SCA milk texturing guide", "link": "https://how-to-brew.coffee/espresso-brewing/guide-to-milk-texturing-and-steaming/"}, {"label": "ScienceDirect — steam frothing & microfoam", "link": "https://www.sciencedirect.com/science/article/abs/pii/S0958694622001601"}], "diagram": "milk", "related": ["brew_espresso", "brew_methods"]}, "brew_water": {"name": "Water Chemistry", "sub": "The 98% ingredient", "group": "brew", "accent": "#7A4A28", "sections": [{"h": "Why water matters", "body": "A cup of coffee is about 98% water, so water isn't a neutral background — it's the solvent doing the extracting, and its mineral content directly changes what and how much it pulls from the grounds. Two identical coffees brewed with different water taste genuinely different. This is why serious cafés treat water as an ingredient to be specified, not whatever comes from the tap."}, {"h": "The two numbers that matter", "body": "Coffee water is characterized mainly by two things. Total hardness — the dissolved minerals (mostly magnesium and calcium) that actively grab and extract flavor compounds; too little and coffee tastes flat and empty, too much and it can taste harsh or chalky. And alkalinity (buffering capacity, largely bicarbonate) — which neutralizes acidity; too high and it flattens the bright, pleasant acids that make specialty coffee sing, too low and the cup can taste sharp. The SCA also points to a near-neutral pH (roughly 6.5–7.5) as a target range."}, {"h": "Practical takeaways", "body": "You don't need a chemistry lab, but you should know your water. Very hard tap water over-buffers acidity and scales your machine; distilled or zero-mineral water extracts poorly and tastes hollow. Many cafés filter, blend, or build water to a target. There's a practical safety angle too: hardness minerals are what form limescale inside espresso machines and boilers, so water treatment protects both flavor and equipment."}, {"h": "Building or fixing your water", "body": "You don't need a lab, but you do need to know roughly what your water is. Very hard, high-alkalinity tap water buffers away the bright acidity that makes specialty coffee interesting and scales up your machine; very soft or distilled water extracts poorly and tastes hollow and flat. Common fixes: filtering to reduce hardness and off-flavors, blending tap with distilled to hit a target, or building water from distilled using mineral packs. A rough specialty target is moderate hardness with lower alkalinity and a near-neutral pH. Whatever you do, keep it consistent — changing your water changes every coffee you brew."}], "keypoints": ["Coffee is ~98% water; the water is the solvent and shapes extraction directly.", "Two key numbers: hardness (minerals that extract flavor) and alkalinity (buffer that neutralizes acidity).", "Too-hard/high-alkalinity water flattens acidity; distilled/zero-mineral extracts hollow. SCA target pH ~6.5–7.5.", "Know and treat your water — it protects both flavor and machines (limescale)."], "refs": [{"label": "How-to-Brew — SCA water pH guidance", "link": "https://how-to-brew.coffee/espresso-brewing/guide-to-milk-texturing-and-steaming/"}, {"label": "SCA — brewing control chart & standards", "link": "https://sca.coffee/sca-news/25/issue-13/towards-a-new-brewing-chart"}], "diagram": "water", "related": ["brew_extraction", "brew_methods"]}, "green_intro": {"name": "Buying Green Coffee", "sub": "Where quality actually starts", "group": "green", "accent": "#C9A34E", "sections": [{"h": "The roaster can't fix the green", "body": "Everything in this guide up to now assumes you already have good green coffee. But a great roaster can only enhance a high-quality bean — they can't rescue a mediocre one. If the green is defective, flat, or dull, no amount of Maillard reaction or careful development will save it; you're just polishing a flawed gem. Specialty starts at the bean level, not the bag, which is why green buying and QC is the foundation under everything else."}, {"h": "Buy on data, verify with your palate", "body": "The professional approach is two-sided. Every lot worth considering comes with data: a cupping score, a defect report, moisture and often water-activity readings. You use that to filter. Then you verify with your own senses — blind cup the sample, ideally next to a control coffee, roasted on a standard grading profile that shows the bean rather than your house style. Scores are signals, not trophies; a number gets you to the cupping table, but your palate makes the call."}, {"h": "What this section covers", "body": "Green QC breaks into a few skills: physically grading a sample for defects, measuring its moisture, density, and water activity, understanding how processing method shapes the cup, knowing the difference between the two coffee species, and reading the country grading systems on a listing. Each has its own page here. Together they're how a buyer decides what's worth roasting — and worth paying for."}, {"h": "How green coffee is bought", "body": "Green coffee reaches a roaster through a few channels, and which one a roaster uses shapes everything downstream. Most buy through importers who hold green in climate-controlled warehouses and offer it by the bag — convenient, lower-commitment, and how most small roasters operate. Larger or more relationship-driven roasters buy through direct trade, contracting with a specific farm or cooperative, often visiting origin and committing before harvest. Either way, buying decisions rest on a sample: roasters request green samples, roast and cup them, and only then commit. Coffee is also seasonal — it's an agricultural product with a harvest calendar — so freshness of the crop (“current crop” vs “past crop”) is part of the buying conversation."}], "keypoints": ["A roaster enhances good green but can't fix bad green — specialty starts at the bean.", "Buy on data (score, defect report, moisture), then verify by blind cupping against a control.", "Scores are signals, not trophies; your palate makes the final call.", "Green QC = defect grading + physical measurement + processing + species + country grades."], "refs": [{"label": "Green Coffee Collective — grading explained", "link": "https://greencoffeecollective.com/blogs/learn/green-coffee-grading-explained"}, {"label": "Ebru Coffee — how specialty is graded", "link": "https://ebrucoffeeco.com/blogs/culture/how-specialty-coffee-is-graded"}], "related": ["green_grading", "green_processing", "supply_chain"]}, "green_grading": {"name": "Green Grading & Defects", "sub": "Counting what's wrong", "group": "green", "accent": "#B07B3E", "sections": [{"h": "The sample and the setup", "body": "The SCA green grading protocol works on a 350g representative sample — ideally pulled from across at least 10% of a lot's bags so it reflects the whole shipment. You assess color and smell, then hand-sort the beans against a matte black surface under full-spectrum light (4000K, ~1200 Lux), pulling out every defect. Carefully grading a 350g sample takes an experienced grader 20–30 minutes, so it's real work — six samples can eat an afternoon."}, {"h": "Two categories of defect", "body": "Defects split into Category 1 (primary) — severe faults like full black beans, full sour beans, and foreign matter (stones, sticks) — and Category 2 (secondary) — milder issues like partial black, insect damage, broken/chipped/cut beans, immature (quaker) beans, and shells. If a single bean has two defects, you count only the more severe one. The categories exist because the SCA system weights defects by how much they actually hurt the cup."}, {"h": "The equivalence math", "body": "Not every defective bean counts as a full defect. The system uses equivalences: one full black (Cat 1) equals three partial blacks (Cat 2); you need five broken/chipped/cut beans to make one full Category 2 defect. So ten broken beans = two full defects. You tally everything into a single 'full defect' count for the sample. If your sample is smaller than 350g, sort it anyway and scale the count — multiply a 100g count by 3.5 — accepting it's an approximation."}, {"h": "The specialty bar", "body": "To qualify as specialty grade, a 350g sample must have zero Category 1 defects and no more than five full Category 2 defects. That's a strict bar: a single full black or full sour bean disqualifies the lot. Roasted specialty coffee also permits no quakers (underdeveloped beans) in a 100g sample. This physical inspection sits alongside the cup score — a coffee needs to pass both to be truly specialty. (Note: the SCA has also used water activity below 0.70 as a heritage requirement, and the CVA now folds physical grading into its framework.)"}, {"h": "Sorting in practice", "body": "On the bench you work methodically: spread the 350g sample on a black tray, and pick through it bean by bean, pulling defects into groups so you can count them. Graders develop a fast eye for the Category 1 faults first — a single full black or full sour bean ends the specialty conversation immediately, so those are worth spotting early. Category 2 defects get tallied and converted to full-defect equivalents. Colour, uniformity, smell, and the presence of foreign matter (stones, sticks, husk) all factor in. The same sample is then usually roast-graded too: a small sample roast reveals quakers — beans that stay stubbornly pale because they came from unripe cherries — which don't show reliably in the green."}], "keypoints": ["350g representative sample, sorted under 4000K/1200 Lux on matte black; ~20–30 min per sample.", "Cat 1 (primary): full black/sour, foreign matter. Cat 2 (secondary): partial black, insect, broken, quaker, shells.", "Equivalences: 1 full black = 3 partial; 5 broken = 1 full Cat-2. Tally to a single full-defect count.", "Specialty = 0 Cat-1 and ≤5 full Cat-2 in 350g; no quakers in roasted. Scale small samples (×3.5 for 100g)."], "refs": [{"label": "SCA — grounding green grading in sensory science", "link": "https://sca.coffee/sca-news/25/issue-24-grounding-green-grading"}, {"label": "Cropster — master green grading", "link": "https://www.cropster.com/blog-post/green-grading-coffee/"}, {"label": "Ethio Coffee — green QC & defects", "link": "https://www.ethiocoffee.co/insights/green-coffee-quality-control-defects-grading"}], "visuals": {"title": "What the defects look like", "note": "Green graders learn to spot these by eye against a black tray. The signatures below are the common ones — the two Category 1 faults (full black, full sour) that disqualify a specialty lot outright, and the milder Category 2 defects you're allowed a few of.", "beans": [{"kind": "healthy", "label": "Healthy bean", "cap": "Even color, intact, clean center crease."}, {"kind": "fullblack", "label": "Full black — Cat 1", "cap": "Dead/overripe or fermented; blackened through. Disqualifying."}, {"kind": "partialblack", "label": "Partial black — Cat 2", "cap": "Less than half black; 3 = one full defect."}, {"kind": "sour", "label": "Full sour — Cat 1", "cap": "Reddish-brown, overripe/over-fermented. Disqualifying."}, {"kind": "broken", "label": "Broken / chipped — Cat 2", "cap": "Milling damage; 5 = one full defect."}, {"kind": "insect", "label": "Insect damage — Cat 2", "cap": "Small bore holes from the coffee borer beetle."}, {"kind": "quaker", "label": "Quaker", "cap": "Underdeveloped, pale after roasting. Not allowed in roasted specialty."}, {"kind": "shell", "label": "Shell — Cat 2", "cap": "Malformed hollow bean; roasts unevenly."}]}, "related": ["green_measure", "green_processing", "green_grades"]}, "green_measure": {"name": "Density, Moisture & Water Activity", "sub": "The three physical numbers", "group": "green", "accent": "#95602F", "sections": [{"h": "Moisture content", "body": "Moisture is the headline physical number. Specialty green should sit around 10–12%. Too high (above ~12.5%) and the coffee risks mold during the long, humid sea freight and in storage. Too low (below ~9%) and it's likely over-dried or aged, tending to taste flat. Contractual specs of 10–12% protect both buyer and seller, and you verify moisture at both pre-shipment and arrival, because it can drift in transit. A calibrated meter, sampled from several spots, does the job."}, {"h": "Water activity", "body": "Water activity is often confused with moisture but measures something different: not how much water is present, but how much is available for microbial growth, on a 0–1 scale. Green coffee is considered shelf-stable roughly between 0.50 and 0.70; above ~0.70 the mold and microbial risk climbs sharply. Two coffees with identical moisture can differ in water activity depending on how tightly the water is bound in the bean. This matters most for lots you'll store more than a few months — it's the better predictor of storage safety."}, {"h": "Density", "body": "Density reflects how hard and compact the bean is, which tracks with growing altitude — high-grown coffee matures slowly and comes out denser. It matters to the roaster because heat moves differently through dense material: dense beans generally take and want more energy. Buyers use density to confirm altitude claims and to benchmark a new arrival against previous ones. A simple farm-level version is the float test — healthy dense beans sink, low-density floaters (often defective or under-developed) rise."}, {"h": "Screen size", "body": "Screen size grades beans by physical size, measured in 64ths of an inch — a screen 18 bean is 18/64 inch, about 7.1mm. Green is passed through a stack of calibrated screens to sort by size; specialty coffee commonly falls in the screen 14–18 range. Size isn't quality directly, but uniform size means even roasting, which is why it's specified. This is also the basis of some country grades (Kenya's AA, Colombia's Supremo)."}, {"h": "Why buyers care about all four numbers", "body": "None of these numbers is quality on its own, but together they de-risk a purchase. Moisture and water activity predict whether a lot will survive months in a warehouse or arrive moldy. Density confirms the altitude story a seller tells and hints at how the coffee will take heat in the roaster. Screen size predicts even roasting and underpins many country grades. A careful buyer reads them as a set: a high-altitude claim with low density is a red flag; specialty moisture with high water activity warns of storage risk. The cup score tells you how good it is today; these numbers tell you whether it'll still be good when you roast it."}], "keypoints": ["Moisture ~10–12%; >12.5% risks mold in freight, <9% is over-dried/flat. Check pre-ship and on arrival.", "Water activity (0–1) measures water available to microbes; <0.70 is shelf-stable — key for long storage.", "Density tracks altitude/hardness and affects roast energy; float test separates dense (sink) from defective (float).", "Screen size = 64ths of an inch (screen 18 ≈ 7.1mm); specialty ~14–18; uniform size = even roasting."], "refs": [{"label": "Green Coffee Collective — physical measurements", "link": "https://greencoffeecollective.com/blogs/learn/green-coffee-beans-physical-measurement"}, {"label": "Ethio Coffee — moisture & water activity in QC", "link": "https://www.ethiocoffee.co/insights/green-coffee-quality-control-defects-grading"}], "related": ["green_grading", "green_grades"]}, "green_processing": {"name": "Processing Methods", "sub": "How the cherry becomes the bean", "group": "green", "accent": "#6E3E1E", "sections": [{"h": "Why processing matters", "body": "How a coffee cherry is turned into a green bean after harvest shapes the cup as profoundly as origin or variety. 'Washed,' 'natural,' and 'honey' aren't marketing words — they're descriptions of physical process, and knowing them lets you predict roughly what a coffee will taste like before you ever roast it. The same farm can produce dramatically different cups depending on how the lot was processed."}, {"h": "Washed and natural", "body": "Washed (wet) process removes all the fruit and mucilage before drying — often via fermentation, then washing clean. The result is a clean, bright, transparent cup where the origin and terroir show clearly with defined acidity. It's the default reference for cupping because it hides nothing. Natural (dry) process is the oldest method: the whole cherry dries around the bean, 'raisining' onto it. This gives bold, sweet, fruity cups (think blueberry, jammy notes) with heavier body and lower perceived acidity — but drying is harder to control, so defect risk is higher."}, {"h": "Honey and the middle ground", "body": "Honey (pulped natural) process is the hybrid: the skin is removed but some sticky mucilage is left on the bean during drying. It lands between washed and natural — more sweetness and body than washed, more clarity than natural. It's often graded by how much mucilage stays on: white (most removed, lightest/cleanest), yellow, red, and black (least removed, richest, sweetest, and slowest/riskiest to dry)."}, {"h": "Anaerobic and wet-hulled", "body": "Two more you'll see on listings. Anaerobic ferments the coffee sealed off from oxygen (often 48–72 hours), producing intense, complex, sometimes polarizing flavors — the experimental frontier. Wet-hulled (giling basah), used almost only in Indonesia, hulls the parchment off while the bean is still wet (around 30–35% moisture), then finishes drying exposed. It's what gives Sumatran coffee its signature earthy, full-bodied, very-low-acid, sometimes savory character. Each method carries a different defect and mold risk when drying is done poorly."}, {"h": "Why processing is a lever, not a label", "body": "For a buyer or roaster, processing is one of the few things that reliably predicts the cup before you taste it, so it's worth reading on every offer sheet. The same variety from the same farm can land anywhere from crisp and tea-like to jammy and wild depending only on how the cherry was handled after picking. It also carries risk information: naturals and honeys involve fruit sitting on the bean while it dries, which builds sweetness but invites fermentation faults and mold if the drying isn't carefully managed — so processing tells you something about both the flavor and the care that went into the lot."}], "keypoints": ["Processing shapes the cup as much as origin; the terms describe physical process, not marketing.", "Washed = clean, bright, transparent (cupping reference). Natural = sweet, fruity, heavy body, higher defect risk.", "Honey = hybrid; graded white→black by mucilage left on (light/clean → rich/sweet/riskier).", "Anaerobic = sealed-oxygen ferment, intense/experimental. Wet-hulled (giling basah) = Indonesian, earthy, low-acid."], "refs": [{"label": "We Are Coffee Co — processing methods explained", "link": "https://www.wearecoffeeco.com/blogs/news/coffee-processing-methods-explained"}, {"label": "The Way to Coffee — washed/natural/honey/experimental", "link": "https://www.thewaytocoffee.com/coffee-processing/"}, {"label": "Craft Coffee Guru — honey process detail", "link": "https://www.craftcoffeeguru.com/honey-processed-coffee/"}], "diagram": "processing", "related": ["green_grading", "green_species", "blending"]}, "green_species": {"name": "Arabica vs Robusta", "sub": "The two coffees that matter", "group": "green", "accent": "#5A2F16", "sections": [{"h": "Two species, two worlds", "body": "Of 80-plus coffee species, only two matter commercially. Coffea arabica is about 70% of the world market and essentially all of specialty coffee. Coffea canephora — robusta — is the rest, dominant in commodity blends, instant coffee, and as an espresso crema-booster. They're genuinely different plants producing genuinely different cups, and knowing which you're buying frames every other expectation."}, {"h": "Arabica", "body": "Arabica grows at higher altitude (roughly 800–2200m), matures slowly in cool conditions, and rewards that with higher sugars, more aromatic complexity, and pronounced, pleasant acidity — the fruit, floral, and nuanced flavors specialty is built on. The tradeoffs: it's more susceptible to disease (especially leaf rust) and pests, yields less, and costs more. Its caffeine content is relatively low, around 1.2–1.5%. Nearly every origin and variety in this app's profiles is arabica."}, {"h": "Robusta", "body": "Robusta is the hardy one — it grows at lower elevations in warmer, tougher conditions, resists disease and pests, and yields more, which makes it roughly 30–50% cheaper. Its caffeine is nearly double arabica's, around 2.2–2.7% (the plant evolved caffeine partly as a natural pesticide). The cup is heavier, more bitter, earthier, and less complex — traditionally seen as lower quality, though a small movement of 'fine robusta' aims to change that. The higher caffeine and crema are why robusta shows up in traditional Italian espresso blends."}, {"h": "What it means for buying", "body": "For a specialty roaster, the working assumption is arabica, and the interesting decisions live inside it — origin, variety, altitude, processing. Robusta enters the conversation deliberately: for a traditional espresso blend wanting body, crema, and a caffeine kick, or at the commodity end. The species tells you which set of expectations to bring to the cup before you taste."}], "keypoints": ["Only two species matter: arabica (~70% of market, ~all of specialty) and robusta (commodity, instant, crema).", "Arabica: higher altitude (800–2200m), complex/acidic, disease-prone, lower yield, ~1.2–1.5% caffeine, pricier.", "Robusta: hardy/low-altitude, heavier/bitter/earthier, high yield, ~2.2–2.7% caffeine, 30–50% cheaper.", "Specialty defaults to arabica; robusta is a deliberate choice for espresso body/crema/caffeine or commodity."], "refs": [{"label": "Old Chicago Coffee — caffeine by type", "link": "https://oldchicagocoffee.com/coffee-bean-caffeine-content-by-type-explained/"}, {"label": "DQ Coffee — arabica vs robusta", "link": "https://dqcoffee.vn/how-to-distinguish-coffee-arabica-and-robusta/?lang=en"}], "related": ["green_processing", "green_grades"]}, "green_grades": {"name": "Country Grading Systems", "sub": "Reading the label", "group": "green", "accent": "#7A4A28", "sections": [{"h": "Why every country is different", "body": "The SCA green grading system is universal, but every producing country also has its own grading scheme, shaped by its coffee history, trade infrastructure, and the coffee it grows. That's why a green listing often shows both a country grade and an SCA cup score — they measure different things. The country grade tells you about physical sorting (size or defect count); the cup score tells you how it tastes. You need both to read a coffee."}, {"h": "Defect-count and size systems", "body": "Two broad approaches exist. Defect-count systems grade by how many defects appear in a sample: Ethiopia runs G1 (fewest defects, best) through G5, counted per 300g; Brazil grades on defects (per 300g) combined with screen size. Size systems grade by bean dimension: Kenya's famous AA/AB/PB grades are pure screen size (AA is the largest, not necessarily the best-tasting), and Colombia grades by screen too (Supremo largest, then Excelso)."}, {"h": "Size is not quality", "body": "The most important trap: bean-size grades don't directly mean quality. Kenya AA tells you the beans are large and will roast evenly, but a well-processed AB from a top estate can out-cup a mediocre AA. Always read the estate/producer name and processing method alongside the grade, and trust the cup score over the size letter. A Grade 2 Ethiopian cupping 86 will beat a Grade 1 cupping 80."}, {"h": "Preparation marks and certifications", "body": "You'll also see preparation standards like 'EP' (European Preparation) — an extra sorting pass, typically meaning no more than 8 defects per 300g and no beans below screen 15. It signals cleaner, more uniform green, though not guaranteed cup quality. And a key clarification: certifications like Organic or Fair Trade are about process and ethics, not cup quality — a Fair Trade coffee can score 78 and a certification-free microlot can score 89. Certifications describe how a coffee was grown and traded; specialty is about what's in the cup."}], "keypoints": ["Every origin has its own grade system; listings show country grade AND SCA score because they measure different things.", "Defect-count systems: Ethiopia G1–G5, Brazil (defects + screen), per 300g. Size systems: Kenya AA/AB/PB, Colombia Supremo/Excelso.", "Bean size ≠ quality — read estate + processing, and trust the cup score over the size letter.", "EP = extra sorting (≤8 defects/300g, no beans below screen 15); Organic/Fair Trade are ethics/process, not cup quality."], "refs": [{"label": "Green Coffee Collective — grading systems by country", "link": "https://greencoffeecollective.com/blogs/learn/green-coffee-grading-explained"}, {"label": "FAO Annex 7 — green coffee classification", "link": "https://www.fao.org/4/x6939e/x6939e13.htm"}, {"label": "StoneX — coffee grading overview", "link": "https://www.stonex.com/en/financial-glossary/coffee-grading/"}], "related": ["green_grading", "green_species", "supply_chain"]}}, "GLOSSARY": [{"term": "Green coffee", "def": "Raw, unroasted coffee beans. They're actually the seed of a fruit (the coffee cherry). Green beans are dense, grassy-smelling, and hold about 10 to 12 percent water. They taste like nothing you'd want to drink until they're roasted."}, {"term": "Charge", "def": "The moment you drop the green beans into the hot roaster to start the roast. \"Charge temperature\" is how hot the roaster is at that instant."}, {"term": "Turning point (TP)", "def": "Right after charge, the cold beans pull heat out of the roaster, so the temperature reading drops for a bit, then bottoms out and starts climbing again. That lowest point is the turning point. From here the beans are heating up for the rest of the roast."}, {"term": "Drying phase", "def": "The first stretch of the roast. The beans shed their moisture and turn from green to yellow. They smell grassy, then like hay, then like baking bread. Usually the longest phase."}, {"term": "Maillard phase (browning)", "def": "The middle stretch, from yellow to first crack. Named after the Maillard reaction, the same browning chemistry that crusts bread and sears a steak. This is where most of coffee's flavor and aroma are built."}, {"term": "First crack (1C)", "def": "An audible popping sound, like popcorn or knuckles cracking, around 196°C / 385°F. Steam and pressure inside the bean rupture its structure and it nearly doubles in size. This is the roaster's most important landmark. No coffee is drinkable if dropped before it, and light roasts are dropped shortly after."}, {"term": "Development", "def": "The final phase, measured from first crack to drop. This is where sharp acidity mellows into sweetness and roast character builds. Too short and the coffee tastes grassy and sour; too long and it goes flat, then roasty."}, {"term": "Second crack (2C)", "def": "A second, quieter, faster crackle around 224°C / 435°F, more like crisp cereal than popcorn. Oils start migrating to the bean's surface. This is the gateway to dark roasts. Push past it and coffee turns smoky, then bitter, then toward burnt."}, {"term": "Drop", "def": "The moment you dump the beans out of the roaster into the cooling tray to stop the roast. \"Drop temperature\" is how hot the beans are at that instant, and it's one of the biggest levers on how light or dark the final roast is. This is the term you'll see most, and it just means: roast's done, get them out and cool them fast."}, {"term": "Bean temperature (BT)", "def": "The temperature of the beans during the roast, read by a probe in the roaster. The main number a roaster watches. Note: absolute readings vary by machine and probe, so roasters care more about the shape of the curve than the exact degrees."}, {"term": "Rate of rise (RoR)", "def": "How fast the bean temperature is climbing at any moment, in degrees per interval. It's the slope of the roast curve. A healthy roast has an RoR that smoothly declines from the turning point to the drop. It shouldn't spike up or flatten out."}, {"term": "Roast curve", "def": "The graph a roaster lives by: bean temperature plotted over time, usually with the RoR overlaid. Reading the curve is how you steer a roast and how you repeat a good one."}, {"term": "Development Time Ratio (DTR)", "def": "The share of the total roast that happened after first crack, as a percent. If a 12-minute roast hit first crack at 9:36, that's 2:24 of development, or 20 percent. A quick shorthand for how far a roast was pushed. Light roasts run lower (~10 to 15%), darker ones higher."}, {"term": "Drum roaster", "def": "The industry-standard machine: a rotating metal drum tumbles the beans over a gas flame. Gives coffee body and is stable and forgiving. Most commercial roasting happens on a drum."}, {"term": "Fluid-bed (air) roaster", "def": "A machine that roasts beans on a stream of hot air, like popcorn. Fast, even, and very clean and bright in the cup. Easier to learn on, but less forgiving because it moves quickly."}, {"term": "Airflow", "def": "How much air the roaster pulls through the beans. It does three jobs at once: delivers heat, clears smoke and chaff so they don't taint the flavor, and shapes how fast the beans gain or shed heat. A key control a roaster adjusts throughout."}, {"term": "Chaff", "def": "The papery skin that flakes off the beans as they roast and expand. Roasters clear it with airflow because burnt chaff tastes bad and, in quantity, is a fire hazard."}, {"term": "Agtron", "def": "A numbered scale for measuring roast color, from high numbers (very light) to low numbers (very dark). A standardized way to say how dark a roast is instead of vague words like \"medium.\" Note: the mapping of roast-level names to Agtron numbers varies by region and roaster — this guide uses the prevailing US specialty convention."}, {"term": "Roast level", "def": "How light or dark a coffee is roasted, from light through medium to dark. It's shorthand: two coffees at the same color can still taste different depending on how they got there."}, {"term": "Cupping", "def": "The industry's standard tasting method: brewing coffees the same controlled way and tasting them side by side to evaluate flavor. How roasters judge whether a roast worked and connect a curve to a cup. The modern SCA framework for this is the Coffee Value Assessment (CVA), which replaced the 2004 cupping protocol in November 2024."}, {"term": "Degassing / resting", "def": "Roasting fills the beans with CO2 that escapes over the following days. Fresh-roasted coffee is usually rested at least 12 to 24 hours before brewing so it's not fizzing with gas, which throws off extraction."}, {"term": "Washed / natural / honey", "def": "Three ways the coffee fruit is processed after picking, before it's shipped as green. Washed is clean and bright, natural is fruity and heavier, honey sits in between. The process changes how the green behaves in the roaster and how it tastes."}, {"term": "CVA (Coffee Value Assessment)", "def": "The SCA framework that replaced the 2004 cupping protocol in November 2024. Instead of one 100-point score, it evaluates coffee across four separate assessments — physical, descriptive, affective, and extrinsic — for a higher-resolution picture of quality and value."}, {"term": "Affective vs descriptive", "def": "The key split in the CVA. Descriptive assessment objectively records what a coffee tastes like (intensity, flavor descriptors) with no judgment. Affective assessment records how much a taster likes those attributes. Two cuppers can describe a coffee identically but value it differently."}, {"term": "Flavor wheel", "def": "The 2016 SCA/World Coffee Research reference chart for describing coffee flavor, organized from broad categories at the center (fruity, floral, roasted, nutty/cocoa, etc.) to specific notes at the edge. Used center-outward to build a shared tasting vocabulary."}, {"term": "Q Grader", "def": "A professionally certified, calibrated coffee taster — coffee’s equivalent of a sommelier. The program moved from CQI to the SCA in 2025 and is evolving onto the CVA framework."}, {"term": "Slurp", "def": "In cupping, you slurp the coffee off the spoon loudly and forcefully. The hard slurp aerates the liquid and sprays it across the entire palate at once, so you perceive the full range of flavors and aromatics."}, {"term": "Break the crust", "def": "During cupping, a crust of grounds floats on top of the steeping coffee. At four minutes you break it with three spoon stirs while smelling — this releases a concentrated burst of aromatics trapped underneath, a key evaluation moment."}, {"term": "BBP (Between-Batch Protocol)", "def": "The routine that resets a roaster to identical starting conditions before every batch — letting the drum fall to a set point, then coming back up to charge temperature — so a profile reproduces consistently across a production day."}, {"term": "Extraction yield", "def": "The percentage of a coffee’s dry mass that dissolves into the brewed cup. The Golden Cup ideal is 18–22%. Below that tastes sour and weak (under-extracted); above it tastes bitter and dry (over-extracted)."}, {"term": "TDS (Total Dissolved Solids)", "def": "The concentration of dissolved coffee in the liquid, as a percentage — how strong the cup is. Filter coffee runs ~1.15–1.35%; espresso is far more concentrated at ~8–12%."}, {"term": "Brew ratio", "def": "The weight relationship between dry coffee and water (or, for espresso, dose to yield). Filter is typically 1:16–1:17; espresso is 1:2 (e.g. 18g in, 36g out). It links extraction yield and TDS."}, {"term": "Microfoam", "def": "Steamed milk with tiny, uniform bubbles that looks glossy and pours like wet paint. Made by stretching (aerating cold milk) then texturing (a whirlpool that shreds bubbles), stopping around 60–65°C."}, {"term": "One-way valve", "def": "The small valve on a coffee bag that lets carbon dioxide escape as the beans degas while blocking oxygen from getting in — protecting freshness without letting the bag balloon."}, {"term": "Weight loss", "def": "The percentage of mass a coffee sheds during roasting, mostly water and CO2 — typically about 15–20%. Roasters track it batch to batch as a consistency check."}, {"term": "Green coffee", "def": "Raw, unroasted coffee beans — the seeds of the coffee cherry after processing and drying, ready to be shipped, graded, and roasted. Naturally pale green; they turn brown only when roasted."}, {"term": "Defect (green grading)", "def": "A physical flaw in green coffee. Category 1 (primary) defects like full black or full sour beans are severe; Category 2 (secondary) like broken or insect-damaged beans are milder. Specialty allows zero Cat-1 and ≤5 full Cat-2 in a 350g sample."}, {"term": "Water activity", "def": "A 0–1 measure of how much water in a bean is available for microbial growth (distinct from total moisture). Green coffee below ~0.70 is shelf-stable; above it, mold risk rises. A better storage-safety predictor than moisture alone."}, {"term": "Screen size", "def": "A grading of bean size in 64ths of an inch — a screen 18 bean is 18/64 inch (~7.1mm). Specialty commonly runs screen 14–18. Uniform size means even roasting; it underlies grades like Kenya AA and Colombia Supremo."}, {"term": "Processing method", "def": "How a coffee cherry is turned into a green bean after harvest. Washed = clean/bright; natural = sweet/fruity/heavy; honey = in between; anaerobic = intense/experimental; wet-hulled (giling basah) = earthy/low-acid, Indonesian. It shapes flavor as much as origin."}, {"term": "Quaker", "def": "An underdeveloped bean that stays pale and doesn’t roast properly, usually from an unripe cherry. It tastes papery and flat. Specialty roasted coffee permits no quakers in a 100g sample."}, {"term": "Robusta", "def": "Coffea canephora — the hardy, lower-altitude coffee species. Higher yield and caffeine (~2.2–2.7%), cheaper, heavier and more bitter than arabica. Common in commodity blends, instant coffee, and as an espresso crema-and-caffeine booster."}, {"term": "European Preparation (EP)", "def": "An extra green-sorting standard applied before export — typically no more than 8 defects per 300g and no beans below screen 15. It signals cleaner, more uniform green, though not guaranteed cup quality."}], "PROFILE_GROUPS": [["light", "Light"], ["medium", "Medium"], ["mediumdark", "Medium-Dark"], ["dark", "Dark"], ["purpose", "Purpose-Built"]], "METH_GROUPS": [["culture", "Coffee, the Bigger Picture"], ["green", "Green Buying & QC"], ["read", "Reading the Roast"], ["science", "Roast Science"], ["practice", "In Practice"], ["cupping", "Cupping & Quality"], ["ops", "Roastery Operations"], ["brew", "Brewing & Barista"]], "METH_GROUP_META": {"culture": {"desc": "The story and economics of coffee — the waves of coffee history, how the trade and prices work, direct trade and sustainability, and the art of blending.", "accent": "#c98a2e"}, "green": {"desc"
