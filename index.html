l time rather than absolute minutes, because that scales across batch sizes and machines better than a stopwatch does."}], "keypoints": ["Drying (~10–12% moisture off) → Maillard/browning (flavor built) → development (from first crack to drop).", "Maillard is where most flavor complexity forms.", "Development balances the trade between underdeveloped (sour/grassy) and overdeveloped (flat/roasty)."], "refs": [{"label": "Curiosity Coffee — phases & Maillard onset (~150°C)", "link": "https://curiositycoffee.com/blogs/learn/what-is-first-crack"}, {"label": "Coffee roasting (overview)", "link": "https://en.wikipedia.org/wiki/Coffee_roasting"}], "diagram": "phasebar", "related": ["curve", "cracks", "chemistry"]}, "cracks": {"name": "First & Second Crack", "sub": "The roaster's audible landmarks", "group": "read", "accent": "#6E3E1E", "sections": [{"h": "First crack", "body": "Around 196–205°C bean temp, the bean fractures audibly — a popcorn-like snap — as built-up steam and CO2 rupture the cell structure and the bean expands. First crack is the single most important landmark: development time is measured from here, and no coffee is drinkable roasted before it. The sound rolls through the batch; you note its start precisely."}, {"h": "Second crack", "body": "Roughly 224–230°C, a quieter, faster, higher-pitched crackle — more like crisp cereal — as the bean's cell walls fracture further and oils migrate to the surface. Second crack marks the transition into dark-roast territory. Roasts landing before it keep origin character; roasts taken into it become roast-forward."}, {"h": "Reading them by ear", "body": "Experienced roasters roast partly by sound. The timing, intensity, and evenness of first crack tell you about the batch's uniformity and moisture. A ragged, drawn-out first crack often signals uneven green or an uneven roast."}, {"h": "Reading the cracks by ear", "body": "Experienced roasters navigate largely by sound. First crack is lower, louder, and slower — a sharp, irregular snapping like popcorn or breaking twigs, as steam pressure ruptures the bean's structure around 196°C. It builds, peaks, and fades over a minute or more. Second crack is different: higher-pitched, faster, quieter, and more continuous — a fine crackle like Rice Krispies or crumpling foil, as the now-brittle cell walls fracture and oils are forced to the surface around 224°C. The gap between them is where roast level is decided: drop between the cracks for light-to-medium, drop into or past second crack for dark. Because a hot drum can race from first crack toward second faster than you expect, roasters ease heat after first crack to keep the final approach under control."}], "keypoints": ["First crack (~196–205°C): the reference point development time is measured from.", "Second crack (~224–230°C): the gateway into dark, roast-forward territory.", "Sound — timing and evenness — is a real diagnostic, not just a landmark."], "refs": [{"label": "MTPak — guide to first & second crack (196°C / 224°C)", "link": "https://mtpak.coffee/2021/02/coffee-roasting-basics-guide-to-first-second-crack/"}, {"label": "Sweet Maria's — First Crack FAQ", "link": "https://library.sweetmarias.com/first-crack-faq-what-is-first-crack-what-is-second-crack/"}], "diagram": "cracks", "related": ["phases", "ror", "dtr"]}, "dtr": {"name": "Development Time Ratio", "sub": "Quantifying the finish", "group": "read", "accent": "#5A2F16", "sections": [{"h": "The definition", "body": "DTR = (time from first crack to drop) ÷ (total roast time), expressed as a percent. If first crack hits at 9:00 and you drop at 11:15 on an 11:15 roast, development is 2:15 of 11:15 ≈ 20%. It's a normalized way to describe how much of the roast happened after first crack."}, {"h": "Typical ranges", "body": "Light filter roasts often run 10–15%. The specialty medium sweet spot sits around 18–22%. Darker roasts climb to 25%+ simply because there's more time past first crack. DTR is a guide, not a target to hit blindly — it's meaningful only alongside how the RoR behaved."}, {"h": "Its limits", "body": "DTR is popular because it's a single comparable number, but it can mislead. Two roasts with identical DTR can taste completely different if one crashed and one glided. Use DTR to describe and compare roasts, not to define quality on its own."}, {"h": "Why higher DTR isn’t better", "body": "It's tempting to treat development time ratio as a quality score where more is better, but it's a lever, not a target. Push DTR too high and you drift toward baked, flat, over-developed flavors; too low and you get sharp, underdeveloped, grassy cups. The right DTR depends entirely on the coffee and the roast level you're aiming for — a delicate light-roasted Ethiopian might sing at 12%, while a dark roast naturally runs higher. Use it to compare your own batches and reproduce results, not as a number to maximize."}, {"h": "Measuring it consistently", "body": "DTR is only useful if you measure it the same way every time. The standard is the time from the first audible crack to the drop, divided by the total roast time from charge to drop. The trap is inconsistent crack-calling: if you mark first crack at the very first pop one day and at the rolling crack the next, your DTR numbers won't be comparable. Pick a consistent definition of 'first crack' and stick to it, and log it every batch — DTR's whole value is in comparison across roasts."}], "keypoints": ["DTR = (first-crack-to-drop time) ÷ (total time), as a percent.", "Rough bands: ~10–15% light, ~18–22% specialty medium, 25%+ dark.", "A comparison tool, not a quality guarantee — always read it with RoR behavior."], "refs": [{"label": "Scott Rao — Development Time Ratio (20–25%)", "link": "https://www.scottrao.com/blog/2016/8/25/development-time-ratio"}, {"label": "Daily Coffee News — Rao on development time", "link": "https://dailycoffeenews.com/2014/08/12/roast-development-time-and-the-prerequisite-for-any-successful-roast/"}], "diagram": "dtr", "related": ["phases", "curve", "defects"]}, "chemistry": {"name": "Roasting Chemistry", "sub": "What heat does to the bean", "group": "science", "accent": "#7A4A28", "sections": [{"h": "Maillard & Strecker", "body": "The Maillard reaction between amino acids and reducing sugars is the engine of roast flavor, producing melanoidins (brown color, body) and a huge range of aromatics. Strecker degradation, a branch of it, generates key aldehydes behind malty, nutty, and savory notes. Most of the cup's complexity is Maillard chemistry."}, {"h": "Caramelization", "body": "Sugars break down under heat independent of amino acids, producing sweet, caramel, and eventually bitter compounds as it goes further. Caramelization and Maillard overlap through browning; how you balance heat and time between them shapes the sweetness-versus-roast character trade."}, {"h": "Acids", "body": "Chlorogenic acids degrade with roast, producing quinic and caffeic acids that shift perceived acidity and bitterness. Lighter roasts retain more of the bright origin acids; darker roasts break them down, which is why dark roasts read low-acid and bitter."}, {"h": "Degassing & oils", "body": "Roasting generates large volumes of CO2 trapped in the bean, released over days after roast (degassing) — freshly roasted coffee needs rest before brewing. At darker levels, cell walls fracture enough that oils migrate to the surface, the visible sheen on dark roasts."}, {"h": "Where the flavors come from", "body": "Three overlapping reactions build the cup. Maillard reactions — between amino acids and reducing sugars — start around 150°C and generate hundreds of aroma compounds plus the brown melanoidins that give body and color; this is where most of coffee's savory, nutty, bready complexity is made. Caramelization of sugars runs alongside it at higher temperatures, contributing sweetness and caramel notes while also consuming the sugars (roast too far and you burn away the very sweetness you want). And the beans lose their chlorogenic acids as they roast — high in light roasts (bright, sometimes harsh), broken down in darker roasts into compounds that read as bitter. The roaster's job is to time these reactions against each other: enough Maillard and caramelization to build sweetness and body, not so much that acidity and origin character are lost."}], "keypoints": ["Maillard + Strecker chemistry builds most of the cup's flavor and color.", "Caramelization drives sweetness that tips to bitterness if pushed.", "Acids degrade with roast — lighter keeps origin brightness, darker turns low-acid/bitter.", "Roasting produces CO2 (needs degassing rest) and, when dark, surface oils."], "refs": [{"label": "Sweet Maria's — roast chemistry & degassing", "link": "https://library.sweetmarias.com/first-crack-faq-what-is-first-crack-what-is-second-crack/"}, {"label": "Coffee roasting (overview)", "link": "https://en.wikipedia.org/wiki/Coffee_roasting"}], "related": ["phases", "heat", "defects"]}, "heat": {"name": "Heat Transfer", "sub": "Conduction, convection, radiation", "group": "science", "accent": "#8A5A34", "sections": [{"h": "The three modes", "body": "Conduction is heat from direct contact — bean against hot drum metal. Convection is heat carried by hot air/gas moving through the bean mass. Radiation is infrared energy from hot surfaces. Every roaster uses all three, but the balance between them defines how a machine roasts and tastes."}, {"h": "Why the balance matters", "body": "Convection-dominant roasting (lots of moving hot air) heats evenly and quickly and is easy to control — favored for clean, bright modern profiles. Conduction-heavy roasting (hot drum, less airflow) can build body and a heavier cup but risks scorching if unmanaged. Adjusting airflow is largely adjusting the convection-to-conduction balance in real time."}, {"h": "Airflow as a control", "body": "Airflow does three jobs at once: it delivers convective heat, it clears smoke and chaff (which otherwise taint flavor), and it influences how fast the bean sheds or gains heat. Learning a roaster is largely learning how its airflow interacts with its gas."}, {"h": "Airflow is the hidden third control", "body": "New roasters focus on gas and time and forget airflow, but on most drum roasters airflow is the lever that ties heat transfer together. Turning up the fan pulls more hot air through the bean mass (increasing convective heat) while also clearing chaff and smoke; turning it down lets the drum's conductive and radiant heat dominate. Too little airflow and smoke settles onto the beans and the roast can taste baked or ashy; too much and you strip heat away and stall development. Learning what your machine's airflow actually does — and it differs machine to machine — is a big step in controlling the roast."}, {"h": "Putting the three modes together", "body": "In a real roast, conduction, convection, and radiation all act at once, and the roaster's controls change the balance between them. Early on, contact with the hot drum (conduction) and radiant heat dominate as the cool beans tumble against the metal. As the roast proceeds and airflow moves hot gases through the bean mass, convection carries more and more of the energy — which is why airflow is such a powerful lever. Turning up gas raises the heat available; turning up the fan shifts more of that heat into convection and pulls smoke and chaff away. Understanding which mode you're leaning on at each moment is what lets a roaster shape the curve deliberately instead of just “adding heat.”"}], "keypoints": ["Conduction (drum contact), convection (hot air), radiation (infrared) — all present, balance defines the machine.", "Convection-forward = even and bright; conduction-heavy = body but scorch-prone.", "Airflow simultaneously delivers heat, clears smoke, and shapes heat exchange."], "refs": [{"label": "Perfect Daily Grind — 4 variables that affect roasting", "link": "https://perfectdailygrind.com/2020/04/4-variables-that-affect-roasting/"}], "diagram": "heat", "related": ["roasters", "chemistry", "curve"]}, "roasters": {"name": "Roaster Types", "sub": "Drum, fluid-bed, hybrid", "group": "science", "accent": "#95602F", "sections": [{"h": "Drum roasters", "body": "A rotating drum tumbles beans against a heated metal surface with gas heat below and airflow drawn through. The industry workhorse. Strong conductive component gives body; thermal mass makes them stable and forgiving but slower to respond. The default for most commercial specialty and dark roasting."}, {"h": "Fluid-bed (air) roasters", "body": "A stream of hot air both heats and levitates the beans. Almost purely convective: fast, even, very clean and bright in the cup, highly responsive. Popular for sample roasting and light, clarity-focused profiles. Less thermal mass means less forgiving of a mistake — the roast moves quickly."}, {"h": "Hybrids & recirculation", "body": "Many modern machines blur the line: drums with heavily managed airflow, recirculating-air roasters that reuse heat for efficiency and emissions control. The trend is toward more convective control on a drum platform — body of a drum, evenness of air."}, {"h": "Matching machine to roast style", "body": "The three main roaster types have real tendencies. Drum roasters — a rotating metal drum over a heat source — lean on conductive and radiant heat and thermal mass, building body and handling dark roasts well; they're the workhorse of specialty roasting. Fluid-bed (air) roasters levitate the beans on hot air, giving fast, clean, convection-dominated roasts that suit bright light roasts and are easy to control, but can struggle to build body or hold steady heat deep into second crack. Hybrid and modern recirculating machines blend the two. None is 'best' — the right choice depends on the roast styles you want and the scale you need."}, {"h": "Reading a roaster’s spec sheet", "body": "When roasters compare machines, a few specs tell most of the story. Drum capacity (in kg or lb) sets the batch range — and the usable range is roughly 40–100% of rated, not the headline number alone. The heat source (gas is most common and responsive; electric is cleaner but slower to react) affects control. Airflow adjustability determines how much you can shape convection and clear smoke. Build mass matters: heavier drums hold heat steadily but respond slowly, lighter ones react fast but swing. And instrumentation — bean-temp and environmental probes, data logging — determines how precisely you can read and reproduce a roast. The “best” machine is the one whose tendencies match the roasts you want to make."}], "keypoints": ["Drum: conductive body, stable thermal mass, the commercial default.", "Fluid-bed: convective, fast, clean and bright, less forgiving.", "Modern hybrids add convective control to drum platforms for the best of both."], "refs": [{"label": "Genuine Origin — roast profiles 101 (roaster types, charge)", "link": "https://blog.genuineorigin.com/2025/11/guide-to-roast-profiles/"}], "diagram": "roasters", "related": ["heat", "curve", "profiling"]}, "defects": {"name": "Roast Defects", "sub": "Failure modes and their causes", "group": "practice", "accent": "#5A2F16", "sections": [{"h": "Underdeveloped", "body": "Dropped too early / too fast past first crack. Grassy, sour, sharp, hay-like; may taste thin. Cause is insufficient development — either too little time or a roast so fast the interior never caught up. The most common defect in beginners chasing light roasts."}, {"h": "Baked", "body": "The roast lost momentum — RoR crashed or flat-lined — and dragged through the finish. Tastes flat, hollow, papery, lifeless, with muted aroma. Insidious because the color can look correct. Prevented by maintaining a smooth declining RoR and never stalling."}, {"h": "Scorched & tipped", "body": "Scorching is surface burn from too much conductive heat / too hot a charge — dark blotches on the bean face. Tipping is small burnt spots at the bean's ends (the tips) from excessive early heat. Both come from delivering energy faster than the bean can absorb it evenly."}, {"h": "Roasty / over-developed", "body": "Pushed too far — too dark, too far into second crack for the intent. Ashy, carbony, flat, origin character erased. In dark roasts this is a matter of degree; in a roast meant to be bright, even a little is a defect."}, {"h": "From the cup back to the curve", "body": "The most useful skill is running a flaw in the cup back to its cause in the roast. Flat, dull, cardboard-like, no sweetness or acidity → baked; the rate of rise stalled or flat-lined, usually in the Maillard phase. Sharp, sour, grassy, vegetal → underdeveloped; dropped too soon after first crack, or the drying phase was rushed. Harsh, ashy, &#39;burnt&#39; bitterness with a thin body → over-developed or scorched; too much heat, or pushed too far into second crack. Uneven, muddled, both sour and roasty at once → an uneven roast, often too large a batch or weak airflow, so beans developed at different rates. Because cupping tells you what&#39;s wrong and the roast log tells you where, a roaster who cups every batch against its curve can actually fix problems instead of guessing."}], "keypoints": ["Underdeveloped: grassy/sour — too little development.", "Baked: flat/hollow, correct-looking color — stalled RoR.", "Scorched/tipped: surface and tip burns — heat delivered too fast early.", "Roasty/over-developed: ashy/flat — pushed too dark for the intent."], "refs": [{"label": "Scott Rao — baked/underdeveloped & DTR context", "link": "https://www.scottrao.com/blog/2016/8/25/development-time-ratio"}, {"label": "Perfect Daily Grind — charge temp, scorching & tipping", "link": "https://perfectdailygrind.com/2017/09/coffee-roasting-guide-how-to-control-charge-temperature/"}], "visuals": {"title": "What roast defects look like", "note": "Roast defects show up in the bean's appearance as well as the cup. These are the common visual tells alongside the flavor signatures described above.", "beans": [{"kind": "healthy", "label": "Well-developed", "cap": "Even color, smooth surface, fully developed."}, {"kind": "quaker", "label": "Quaker", "cap": "Pale, underdeveloped bean from an unripe cherry — stands out after roasting."}, {"kind": "immature", "label": "Scorched tips", "cap": "Dark burnt tips from charge heat too high for the bean to conduct inward."}, {"kind": "fullblack", "label": "Charred", "cap": "Taken too far — carbonized surface, ashy and bitter in the cup."}]}, "related": ["ror", "dtr", "profiling", "cupping_intro"]}, "profiling": {"name": "Sample Roasting & Profiling", "sub": "How a profile actually gets built", "group": "practice", "accent": "#C9A34E", "sections": [{"h": "Start with the green", "body": "Before designing a profile you assess the green: density, moisture, screen size, process (washed/natural/honey), and origin. Dense, high-grown, washed coffees take and want more heat; softer, lower-density or natural coffees roast faster and scorch more easily. The green dictates the starting approach."}, {"h": "Sample roast, then cup", "body": "You roast small sample batches at a few different profiles — vary charge, development time, drop point — then cup them side by side. Cupping is the standardized side-by-side tasting method the industry uses to connect a curve to a flavor. The SCA replaced its long-standing 2004 cupping protocol with the Coffee Value Assessment (CVA) in November 2024, though the legacy 100-point form is still in daily use in many labs. Either way, you're building a map from roast decisions to cup outcomes for this specific coffee."}, {"h": "Scale to production", "body": "A profile developed on a sample roaster rarely transfers one-to-one to a production drum — thermal mass and batch size change everything. You re-develop at production scale, using the sample cups as your flavor target, then lock the profile once it's repeatable batch to batch."}, {"h": "Iterate and document", "body": "Good roasting is disciplined iteration: change one variable, cup the result, keep notes. A repeatable, documented profile that any roaster on the team can hit is the real deliverable — not a single lucky great batch."}, {"h": "Developing a profile from scratch", "body": "Approaching a brand-new green coffee is a process, not a guess. Most roasters start with a sample roast on a neutral, middle-of-the-road profile — enough development to see the coffee clearly without imposing a style — then cup it to understand what the bean offers. From there they adjust deliberately: more or less development to balance acidity and sweetness, tweaks to the Maillard phase to build or restrain body, a lighter or darker drop to suit the coffee's character and the intended use. Each change is one variable at a time, logged and cupped, until the profile lands. Dense high-grown coffees and unusual processes take more iterations to dial in."}, {"h": "Roasting to a purpose, not a formula", "body": "There's no single “correct” roast for a coffee — the right profile depends on what it's for. The same Ethiopian might be roasted light and bright for filter, or slightly developed for a sweeter espresso; a blend component is roasted to play its role, not to shine alone. Good profiling starts from the end use and the coffee's strengths and works backward. This is also where a roaster's style lives: two skilled roasters can make the same green taste different and both be “right,” because they're aiming at different targets. The craft is having a clear intention and the control to hit it repeatedly."}], "keypoints": ["Assess the green first — density, moisture, and process set the approach.", "Sample roast several profiles, then cup side by side to map curve → cup.", "Re-develop at production scale using sample cups as the flavor target.", "Change one variable at a time, document, and lock a repeatable profile."], "refs": [{"label": "SCA — Coffee Value Assessment", "link": "https://sca.coffee/value-assessment"}, {"label": "Liberty Beans — density testing & sample roasting", "link": "https://libertybeanscoffee.com/uncategorized/secret-coffee-roasting-strategies/"}], "related": ["curve", "dtr", "defects", "cupping_intro"]}, "origin_intro": {"name": "Roasting by Origin", "sub": "Why green dictates the roast", "group": "origin", "accent": "#C9A34E", "sections": [{"h": "The green sets the ceiling", "body": "A roaster doesn't impose a profile on a coffee so much as respond to it. Density, moisture, screen size, altitude, variety, and processing all arrive baked into the green, and they decide how much heat the bean wants and how it behaves through the roast. The best profile you can build is capped by the green you start with."}, {"h": "Density is the master variable", "body": "Higher-altitude coffees are denser — they grow slower and pack in more sugars and acids. Dense beans need more heat energy to roast through and reward it with complexity, but they also tolerate (and often want) a higher charge temperature with disciplined development. Softer, lower-grown beans have more internal air pockets, transfer heat slower, scorch more easily, and take darker roasts more readily. Many roasters weigh identical volumes of two greens to compare density before designing a profile."}, {"h": "Processing changes the handling", "body": "Washed coffees are cleaner and brighter and generally shine light — but a washed coffee hit with too much early energy tends to bake at first crack, over-developing some beans while others stay under. Naturals carry fruit-forward, fermented notes and can spike in temperature before first crack if pushed, inviting defects. Honey sits between. A dense natural Ethiopian and a soft Brazilian natural want opposite charge temps and rates of rise."}, {"h": "The practical rule", "body": "Denser / higher-grown / washed → more heat capacity, favors lighter roasts, needs curve discipline. Softer / lower-grown / natural → lower charge temp, slower rate of rise, extend the roast to avoid scorching, takes darker levels well. Everything past that is dialing in the specific lot by cupping."}], "keypoints": ["The green's density, moisture, altitude, and processing cap what any roast can achieve.", "Dense/high-grown beans want more heat and favor lighter roasts; soft/low-grown beans scorch easily and take dark well.", "Washed coffees bake if rushed into first crack; naturals can spike and defect if over-energized.", "Weigh equal volumes to compare density before building a profile — then confirm by cupping."], "refs": [{"label": "Perfect Daily Grind — roasting different origins", "link": "https://perfectdailygrind.com/2017/07/how-to-roast-coffee-from-different-origins/"}, {"label": "Green Coffee Beans Wholesale — roast level & origin", "link": "https://www.ictcoffee.com/news/the-relationship-between-roast-level-and-origin-character/"}]}, "origin_ethiopia": {"name": "Ethiopia", "sub": "High, dense, floral, fickle", "group": "origin", "accent": "#B07B3E", "sections": [{"h": "What you're working with", "body": "Ethiopian specialty grows very high (often 1,800–2,200m), making it dense and demanding. It's also famously variable — thousands of local varieties, mixed screen sizes, and often unknown genetics in a single lot. Expect trial and error to find the profile. The reward is some of the world's finest, most aromatic Arabica: florals, citrus, berry, wine."}, {"h": "How to roast it", "body": "Steer away from sudden, intense heat. A hard, energetic start can push out gingery or spice notes but risks torching the delicate florals that define the origin. On washed Ethiopians, too much early energy causes a big energy loss at first crack — baking — which over-develops some beans while others stay under before you have to dump for a light color. On naturals, an aggressive start can spike bean temperature before first crack and invite roast defects."}, {"h": "Target", "body": "Light to medium. Washed Ethiopians commonly want a restrained drop with a modest development window and a smoothly declining rate of rise. Too little development gives showy aromatics over a hollow mid-palate; too much turns bright citrus into dull marmalade and wilts the florals. The whole game is preserving the top-end."}], "keypoints": ["Very high-grown and dense, but highly variable lot to lot — expect to dial in by trial.", "Avoid an aggressive start; it bakes washed lots at first crack and spikes naturals into defects.", "Roast light to medium with a restrained drop; the goal is preserving florals and bright acidity."], "refs": [{"label": "Perfect Daily Grind — Ethiopian coffee: a roaster's guide", "link": "https://perfectdailygrind.com/2019/11/ethiopian-coffee-a-roasters-guide/"}], "country": "Ethiopia", "continent": "Africa", "lat": 6.9, "lng": 38.5, "regions": "Yirgacheffe, Guji, Sidamo, Harrar", "altitude": "1,800–2,200 m", "varieties": "Heirloom landraces (thousands, often mixed)", "process": "Washed & natural", "harvest": "Oct–Jan", "roastLevel": "Light", "flavorTags": ["Floral", "Citrus", "Berry", "Tea-like"], "blurb": "The birthplace of coffee and its genetic homeland — dense, high-grown, wildly diverse, and some of the most aromatic Arabica on earth.", "regionMap": {"note": "Coffee clusters in the southern and western highlands — Yirgacheffe, Guji and Sidamo in the south, Harrar to the east.", "shape": "M60,60 L150,45 L235,60 L250,110 L215,165 L150,180 L80,165 L50,115 Z", "regions": [["Yirgacheffe", 120, 150], ["Guji", 150, 160], ["Sidamo", 135, 140], ["Harrar", 215, 110]]}}, "origin_colombia": {"name": "Colombia", "sub": "Balanced and forgiving", "group": "origin", "accent": "#95602F", "sections": [{"h": "What you're working with", "body": "Colombian coffee, especially from regions like Huila, grows at moderate-to-high altitude (roughly 1,200–1,800m) and is typically washed. It's known for balanced acidity, caramel sweetness, and medium body. Medium density makes it versatile and one of the more forgiving origins to roast — a good coffee to learn a new machine on."}, {"h": "How to roast it", "body": "Its balance and medium density mean it doesn't punish small mistakes the way a dense Ethiopian or a soft Brazilian can. It takes a standard, well-managed curve well and holds up across roast levels, from a bright-ish medium that keeps its caramel sweetness to a fuller medium-dark for blends and espresso."}, {"h": "Target", "body": "Versatile — anywhere from light-medium to medium-dark depending on intent. City+ is a natural home that showcases the caramel-and-balance signature. Push toward Full City for espresso body. Because it's forgiving, it's a strong reference coffee for calibrating a roaster before tackling trickier origins."}], "keypoints": ["Moderate-to-high altitude, washed, medium density — balanced and forgiving.", "Takes a standard well-managed curve and holds up across roast levels.", "A great calibration/reference origin; City+ showcases its caramel-balance signature."], "refs": [{"label": "One Hundred Coffee — origin & roasting profiles", "link": "https://onehundredcoffee.com/roasting/testing-different-coffee-beans-how-origin-affects-roasting-profiles/"}], "country": "Colombia", "continent": "South America", "lat": 4.6, "lng": -74.1, "regions": "Huila, Nariño, Tolima, Cauca, Antioquia", "altitude": "1,400–2,000 m", "varieties": "Caturra, Castillo, Colombia, Typica", "process": "Washed (mostly)", "harvest": "Two harvests (main + mitaca)", "roastLevel": "Light–Medium", "flavorTags": ["Caramel", "Red apple", "Citrus", "Balanced"], "blurb": "The dependable all-rounder — a huge range of microclimates and near year-round harvest producing clean, sweet, balanced coffee.", "regionMap": {"note": "Follows the three Andean mountain ranges running north–south — Huila and Nariño in the south, Antioquia in the northwest.", "shape": "M110,40 L160,45 L180,90 L205,150 L175,195 L120,185 L95,140 L85,90 Z", "regions": [["Antioquia", 120, 80], ["Tolima", 140, 120], ["Huila", 150, 150], ["Nariño", 135, 180]]}}, "origin_brazil": {"name": "Brazil", "sub": "Low, soft, nutty, espresso backbone", "group": "origin", "accent": "#6E3E1E", "sections": [{"h": "What you're working with", "body": "Brazilian coffee grows comparatively low (often 800–1,200m, some near 900m), making it softer and lower in density with lower acidity. It's frequently natural-processed and known for nutty, chocolatey, smooth character with natural sweetness and body — which is why it's the backbone of so many espresso blends and commercial coffee."}, {"h": "How to roast it", "body": "Because it's soft and low-density, use a lower charge temperature and a slower rate of rise — its air-pocketed structure transfers heat slowly, so a hot, fast start scorches the exterior before the core catches up. Many roasters extend the roast slightly for these coffees. Brazil rewards a touch more development time but demands good curve discipline; flick the rate of rise late and you trade nut-butter creaminess for a drying finish."}, {"h": "Target", "body": "Medium to medium-dark. Brazil's sweetness and body caramelize beautifully in that range and stand up to milk, making it a workhorse espresso base. It also takes darker roasts more readily than a dense high-grown coffee. This is a classic candidate for 'stretching' — deliberately extending the Maillard phase to build deeper sweetness."}], "keypoints": ["Low-grown, soft, low-density, often natural — nutty/chocolatey with body and low acidity.", "Use a lower charge temp and slower rate of rise to avoid scorching; consider extending the roast.", "Shines medium to medium-dark; an espresso-blend backbone and a good 'stretching' candidate."], "refs": [{"label": "Perfect Daily Grind — roasting natural & honey processed", "link": "https://perfectdailygrind.com/2017/10/how-to-roast-natural-honey-processed-coffee/"}, {"label": "Liberty Beans — 'stretching' the Maillard phase", "link": "https://libertybeanscoffee.com/uncategorized/secret-coffee-roasting-strategies/"}], "country": "Brazil", "continent": "South America", "lat": -21.2, "lng": -45.0, "regions": "Cerrado Mineiro, Sul de Minas, Mogiana, Bahia", "altitude": "800–1,300 m", "varieties": "Mundo Novo, Bourbon, Catuaí, Acaiá", "process": "Natural & pulped natural", "harvest": "May–Sep", "roastLevel": "Medium–Dark", "flavorTags": ["Chocolate", "Nutty", "Low acid", "Heavy body"], "blurb": "The world’s largest producer and the backbone of espresso blends — lower-grown, nutty, chocolatey, and easy to roast.", "regionMap": {"note": "Concentrated in the southeastern states — Minas Gerais (Cerrado, Sul de Minas), São Paulo (Mogiana), and Bahia.", "shape": "M90,50 L200,45 L245,90 L230,150 L175,195 L110,185 L70,130 L75,80 Z", "regions": [["Cerrado", 150, 95], ["Sul de Minas", 155, 130], ["Mogiana", 130, 140], ["Bahia", 185, 90]]}}, "origin_sumatra": {"name": "Sumatra / Indonesia", "sub": "Earthy, heavy-bodied, dark-friendly", "group": "origin", "accent": "#5A2F16", "sections": [{"h": "What you're working with", "body": "Indonesian coffees from Sumatra and Sulawesi are known for earthy, spicy, herbal character with full body and low acidity — a signature partly created by the region's distinctive wet-hulled processing. These flavors become more pronounced in darker roasts, which is where the origin is traditionally taken."}, {"h": "How to roast it", "body": "Sumatra can handle more aggressive heat application during the middle (Maillard) stage to develop its full body — a head roaster's approach that would obliterate a delicate Ethiopian. Its low acidity and heavy body mean the earthy, herbal signature holds up rather than being lost, so it tolerates and often benefits from a firmer hand than high-grown washed coffees."}, {"h": "Target", "body": "Medium-dark to dark. Sumatra's earthy depth and body are traditionally showcased at Full City and beyond, where the roast character complements rather than erases the origin. It's a natural fit for darker blends and for drinkers who want a heavy, low-acid, brooding cup."}], "keypoints": ["Earthy, herbal, heavy-bodied, low-acid — a signature of wet-hulled Indonesian processing.", "Tolerates firmer heat in the Maillard stage to build body; won't lose its character the way delicate origins do.", "Traditionally taken medium-dark to dark, where roast character complements the earthy depth."], "refs": [{"label": "God of Beans — origin characteristics & density", "link": "https://godofbeans.com/choosing-green-beans-for-home-roasting-a-beginners-guide"}], "country": "Indonesia (Sumatra)", "continent": "Asia", "lat": 2.6, "lng": 98.9, "regions": "Gayo (Aceh), Lintong, Mandheling", "altitude": "1,100–1,600 m", "varieties": "Typica lineages, Ateng, Catimor", "process": "Wet-hulled (giling basah)", "harvest": "Oct–Dec (+ scattered)", "roastLevel": "Medium–Dark", "flavorTags": ["Earthy", "Herbal", "Cedar", "Full body"], "blurb": "The savory outlier — wet-hulled processing gives a heavy-bodied, low-acid, earthy cup unlike anywhere else on earth.", "regionMap": {"note": "On the island of Sumatra in Indonesia — Gayo highlands in Aceh (north), Lintong and Mandheling further south.", "shape": "M70,40 L120,55 L150,100 L180,150 L200,195 L165,200 L130,155 L95,105 L60,60 Z", "regions": [["Gayo (Aceh)", 95, 70], ["Lintong", 150, 130], ["Mandheling", 165, 155]]}}, "origin_kenya": {"name": "Kenya", "sub": "Blackcurrant and bright acidity", "group": "origin", "accent": "#B07B3E", "sections": [{"h": "What you're working with", "body": "Kenyan coffee has a flavor fingerprint professionals recognize instantly: intense, wine-like acidity with blackcurrant and berry, sometimes a savory tomato edge, and remarkable clarity. It comes from the SL28 and SL34 varieties (selected by Scott Laboratories in the 1930s), high-altitude red volcanic soil around Mt. Kenya (Nyeri, Kirinyaga, Embu), and a distinctive double-washed processing with extended fermentation. Kenya's rigorous auction system means specialty lots are consistently excellent — and consistently expensive. These are dense, high-grown beans."}, {"h": "How to roast it", "body": "Kenya is a light-to-medium coffee — its whole appeal is that bright, complex acidity and blackcurrant character, and dark roasting destroys exactly the compounds that make it special. Treat it as a dense, high-grown bean that takes and wants heat, but watch the back half: dense Kenyans carry significant exothermic energy after first crack, and if you're not planning for it you can lose control of the rate of rise. Aim to protect acidity and clarity — drop it before the origin character bakes out."}, {"h": "Target", "body": "Light to medium (City to City+), stopping around or shortly after first crack. The goal is to showcase the blackcurrant, berry, and vivid acidity — this is a pour-over and filter coffee first, where that clarity sings. A note on grades: Kenya AA refers to bean size, not quality; read the estate and processing alongside it."}], "keypoints": ["SL28/SL34, volcanic soil, double-washed: blackcurrant, berry, wine-like acidity, savory edge, high clarity.", "Dense and high-grown — takes heat, but carries strong exothermic energy after first crack; plan the RoR.", "Roast light-to-medium (City–City+); dark roasting destroys the distinctive compounds.", "AA is bean size, not quality — read estate + processing. A filter/pour-over coffee first."], "refs": [{"label": "Roast Coffee Co — Kenyan coffee guide", "link": "https://www.roastcc.com/learn/kenyan-coffee-guide"}, {"label": "Coffee Guide — Kenya SL28, AA grade & flavor", "link": "https://coffee-guide.jp/en/beans/kenya-coffee-beans-complete-guide"}, {"label": "Hacea Coffee — roasting SL28/SL34 & exothermic energy", "link": "https://haceacoffee.com/blogs/roasting/roast-approach-costa-rica-hacienda-sonora-sl28-sl34-natural"}], "country": "Kenya", "continent": "Africa", "lat": -0.4, "lng": 37.0, "regions": "Nyeri, Kirinyaga, Embu, Murang’a", "altitude": "1,500–2,100 m", "varieties": "SL28, SL34, Ruiru 11, Batian", "process": "Washed (double-washed)", "harvest": "Oct–Dec (main)", "roastLevel": "Light–Medium", "flavorTags": ["Blackcurrant", "Berry", "Wine-like", "Bright"], "blurb": "The acidity benchmark — SL28/SL34 on volcanic soil, double-washed, giving intense blackcurrant and a wine-like sparkle.", "regionMap": {"note": "Grown on the fertile volcanic slopes around Mt. Kenya, just north of the capital — Nyeri, Kirinyaga, Embu.", "shape": "M70,55 L200,50 L245,95 L220,165 L150,185 L80,160 L55,100 Z", "regions": [["Nyeri", 135, 105], ["Kirinyaga", 155, 115], ["Embu", 170, 120], ["Mt. Kenya", 150, 95]]}}, "origin_guatemala": {"name": "Guatemala", "sub": "High-grown, balanced, complex", "group": "origin", "accent": "#B07B3E", "sections": [{"h": "What you're working with", "body": "Guatemala's high-altitude microclimates, volcanic soil, and steady rainfall make it one of Central America's finest origins. Most Guatemalan coffee is traditionally washed, though naturals and honeys are growing. The regions each have a character: Antigua is prized for a well-balanced, chocolatey, full-bodied cup; Huehuetenango, high and dry, gives brighter, more complex, fruit-and-citrus-forward coffees. Common varieties include Bourbon, Caturra, Catuai, and Typica. High-grown lots are dense — you'll often see 'SHB' (Strictly Hard Bean) marking the highest elevations."}, {"h": "How to roast it", "body": "Guatemala is versatile, which is part of its appeal. Washed high-grown lots take a medium roast beautifully, developing the chocolate, caramel, and gentle fruit that make Antigua a crowd-pleaser and espresso-friendly. Huehuetenango's brighter, more acidic profile rewards a slightly lighter hand to keep its complexity and citrus alive. As dense high-grown coffee, it wants adequate energy through the roast; SHB lots especially."}, {"h": "Target", "body": "Medium is the sweet spot for most Guatemalans (City+ to Full City), balancing body and sweetness — Antigua in particular shines here and works well in espresso. Push Huehuetenango a touch lighter to preserve its brighter, fruitier complexity for filter. A dependable, flexible origin that suits a range of menus."}], "keypoints": ["High-altitude volcanic origin, mostly washed; Antigua = balanced/chocolatey, Huehuetenango = brighter/complex.", "Dense high-grown beans (look for SHB = Strictly Hard Bean); wants adequate roast energy.", "Medium roast suits most (City+–Full City); Antigua great for espresso, Huehue lighter for filter clarity.", "Versatile, dependable origin — Bourbon, Caturra, Catuai, Typica common."], "refs": [{"label": "Leaderboard Coffee — Guatemala origin guide", "link": "https://leaderboard.coffee/en-us/blogs/news/an-origin-region-varietal-guide-season-12"}, {"label": "Haiku Brew — Guatemala regions & flavors", "link": "https://haikubrew.com/blogs/coffee-education/top-10-coffee-growing-regions-and-their-unique-flavors"}], "country": "Guatemala", "continent": "Central America", "lat": 14.6, "lng": -90.7, "regions": "Antigua, Huehuetenango, Atitlán, Cobán", "altitude": "1,300–2,000 m", "varieties": "Bourbon, Caturra, Catuaí, Typica", "process": "Washed (mostly)", "harvest": "Dec–Apr", "roastLevel": "Medium", "flavorTags": ["Chocolate", "Caramel", "Gentle fruit", "Balanced"], "blurb": "High-grown and versatile — Antigua for balanced chocolate, Huehuetenango for brighter complexity.", "regionMap": {"note": "Across volcanic highlands — Antigua in the central highlands, Huehuetenango in the west, Atitlán by the lake.", "shape": "M45,75 L120,60 L215,72 L255,105 L210,140 L120,150 L60,125 Z", "regions": [["Huehuetenango", 85, 95], ["Atitlán", 130, 115], ["Antigua", 150, 120], ["Cobán", 185, 95]]}}, "origin_costarica": {"name": "Costa Rica", "sub": "Clean, sweet, honey-process country", "group": "origin", "accent": "#B07B3E", "sections": [{"h": "What you're working with", "body": "Costa Rica is small — under 1% of world supply — but punches far above its weight on quality, backed by strict national standards (historically Arabica-only) and a thriving micro-mill culture. Tarrazú is the flagship region, with the Central and West Valleys close behind, all high-grown on volcanic soil. Costa Rica is the home of refined honey processing — you'll see it split into white, yellow, red, and black honey by mucilage retained — alongside washed and a growing number of naturals. 'SHB' (Strictly Hard Bean) marks the highest, densest lots."}, {"h": "How to roast it", "body": "Classic washed Costa Ricans are clean, bright, and balanced — a medium roast brings out their caramel sweetness and crisp acidity. Honey-processed lots carry more sweetness and body, and reward a careful medium that lets that syrupy character show without baking it. As dense, high-grown SHB coffee, it takes energy well; with the honeys and naturals, mind the extra sugars during development so you don't scorch or bake."}, {"h": "Target", "body": "Medium (City+ to Full City) for most — enough to develop the sweetness and body Costa Rica is loved for while keeping its clean acidity. Washed lots can go slightly lighter for filter clarity; honey and natural lots shine at a balanced medium that plays up their fruit and syrupy body. A reliably clean, sweet, crowd-pleasing origin."}], "keypoints": ["Small but high-quality; strict standards, micro-mill culture; Tarrazú flagship, volcanic high-grown.", "Home of refined honey processing (white→black by mucilage), plus washed and growing naturals.", "Dense SHB lots take energy well; watch extra sugars in honey/natural lots during development.", "Medium roast (City+–Full City) for sweetness + body; washed slightly lighter for filter clarity."], "refs": [{"label": "Leaderboard Coffee — Costa Rica regions & processing", "link": "https://leaderboard.coffee/en-us/blogs/news/an-origin-region-varietal-guide-season-12"}, {"label": "Tectonic Coffee — Tarrazú & SL28 in Costa Rica", "link": "https://tectoniccoffee.com/blogs/news/how-kenyan-coffee-found-a-second-home-in-costa-rica"}], "country": "Costa Rica", "continent": "Central America", "lat": 9.7, "lng": -84.1, "regions": "Tarrazú, Central Valley, West Valley", "altitude": "1,200–1,900 m", "varieties": "Caturra, Catuaí, Villa Sarchí, Geisha", "process": "Honey, washed, natural", "harvest": "Nov–Mar", "roastLevel": "Medium", "flavorTags": ["Honey", "Citrus", "Clean", "Sweet"], "blurb": "The home of refined honey processing — clean, sweet, crisp coffee from a country with strict quality standards.", "regionMap": {"note": "Small country, high quality — Tarrazú south of the capital is the flagship, with the Central and West Valleys nearby.", "shape": "M50,80 L120,68 L200,80 L245,110 L205,150 L125,158 L65,130 Z", "regions": [["West Valley", 110, 100], ["Central Valley", 140, 105], ["Tarrazú", 145, 130]]}}, "origin_panama": {"name": "Panama", "sub": "The Geisha capital", "group": "origin", "accent": "#B07B3E", "country": "Panama", "continent": "Central America", "lat": 8.8, "lng": -82.4, "regions": "Boquete, Volán (Tierras Altas), Renacimiento", "altitude": "1,200–2,000 m", "varieties": "Geisha, Typica, Caturra, Catuaí, Pacamara", "process": "Washed, natural, honey", "harvest": "Dec–Mar", "roastLevel": "Light", "flavorTags": ["Jasmine", "Bergamot", "Tropical", "Tea-like"], "blurb": "A small industry that rewired the coffee world when Geisha from Boquete won Best of Panama in 2004. Now the benchmark for floral, tea-like, record-price coffee.", "sections": [{"h": "What you're working with", "body": "Panama is a small producer that punches astronomically above its weight, and it's the origin most associated with Proud Mary's rarest lots. The story is the Geisha variety (also spelled Gesha): originally from Ethiopia, brought to Panama in the 1960s for its leaf-rust resistance, and largely ignored until Hacienda La Esmeralda entered a lot in the 2004 Best of Panama competition. Judges thought an Ethiopian coffee had been slipped in by mistake — it was that floral and elegant. It won, broke price records, and has kept breaking them since (competition lots have sold for thousands of dollars a pound). The growing is centered on the slopes of Volán Barú: Boquete on the east (the historic, balanced region, moderated by a constant mist called the bajareque), Volán/Tierras Altas on the west (higher, drier, cleaner — home to the most awarded Geishas), and Renacimiento (the emerging frontier). Most of it is dense, high-grown Arabica."}, {"h": "How to roast it", "body": "A Panama Geisha is the coffee you roast with the lightest possible touch. The entire value is in the aromatics — jasmine, bergamot, orange blossom — and a delicate, tea-like body, all of which a darker roast will trample. Think City to a whisper past first crack, no second-crack development. As dense high-grown coffee it needs enough energy to develop evenly, but the goal is clarity and floral lift, not browning. It's genuinely 'almost a shame to take any darker' — pushing it to medium mutes the florals into a duller, tea-like sweetness and throws away what you paid for. Non-Geisha Panama (Caturra, Typica, Pacamara) is more forgiving and takes a light-medium roast well."}, {"h": "Target", "body": "Light (City), dropped just after first crack, to showcase floral aromatics and bright, clean acidity. This is a pour-over and filter coffee above all — the method that lets the fragrance and tea-like clarity speak. Reserve espresso for deliberately showcasing a Geisha shot; most of the time this coffee belongs in a glass, black, no milk."}], "keypoints": ["Geisha (from Ethiopia via Panama, 1960s) exploded onto the scene winning Best of Panama 2004; now record-breaking prices.", "Grown on Volán Barú: Boquete (balanced, misty), Volán (higher/drier, top Geishas), Renacimiento (emerging).", "Roast as light as you dare — the value is floral aromatics + tea-like body that darker roasts destroy.", "A filter/pour-over coffee first; jasmine, bergamot, tropical fruit, clean bright acidity."], "refs": [{"label": "Proud Mary Academy — the Geisha variety", "link": "https://www.proudmaryacademy.com/en/articles/5243492-geisha-central-america-coffee-variety"}, {"label": "The Way to Coffee — Boquete origin story", "link": "https://www.thewaytocoffee.com/boquete/"}, {"label": "Forbes — Central America coffee regions", "link": "https://www.forbes.com/sites/lmowery/2025/05/22/a-beginners-guide-to-central-americas-acclaimed-coffee-regions/"}], "regionMap": {"note": "A tiny sliver of the country near the Costa Rican border — the highlands around Volcán Barú: Boquete and Volcán.", "shape": "M40,95 L110,80 L180,90 L250,80 L260,120 L200,135 L120,130 L50,130 Z", "regions": [["Boquete", 80, 105], ["Volcán", 60, 112], ["Renacimiento", 48, 118]]}}, "origin_elsalvador": {"name": "El Salvador", "sub": "Heirloom Bourbon country", "group": "origin", "accent": "#B07B3E", "country": "El Salvador", "continent": "Central America", "lat": 13.8, "lng": -89.2, "regions": "Apaneca-Ilamatepec, Alotepec, Chichontepec", "altitude": "1,200–1,800 m", "varieties": "Bourbon, Pacas, Pacamara", "process": "Washed, honey, natural", "harvest": "Nov–Mar", "roastLevel": "Medium", "flavorTags": ["Juicy", "Stone fruit", "Milk chocolate", "Sweet"], "blurb": "A country whose turbulent history accidentally preserved old-growth heirloom Bourbon — giving juicy, sweet, complex cups and the homegrown Pacamara.", "sections": [{"h": "What you're working with", "body": "El Salvador's coffee is defined by a historical accident: civil war in the 1980s and a commodity-price collapse in the 1990s meant farmers never had the capital to rip out their old Bourbon trees and replace them with higher-yielding, lower-quality varieties, as many neighbors did. The result is a country unusually rich in old-growth heirloom Bourbon, which gives a juicy, sweet, layered cup. El Salvador is also the birthplace of Pacamara — a striking large-beaned cross of Pacas and Maragogipe — which can be intensely floral and complex. Growing is concentrated on the volcanic Apaneca-Ilamatepec range in the west."}, {"h": "How to roast it", "body": "Bourbon-driven Salvadorans shine at a balanced medium roast that draws out their signature sweetness — think milk chocolate, caramel, and ripe stone fruit — without tipping into roasty. They're a touch softer in acidity than a Kenyan or a washed Ethiopian, so there's less need to protect brightness with an ultra-light approach; the sweetness is the point. Pacamara lots, being large and sometimes unevenly dense, reward attention through the drying and Maillard phases so the big beans develop evenly. Honey and natural lots carry extra sugar — mind the back half so they don't scorch."}, {"h": "Target", "body": "Medium (City+ to Full City) for the classic sweet, balanced, chocolate-and-stone-fruit profile that makes El Salvador such a crowd-pleaser and a strong espresso and milk-drink component. Lighter for a bright washed Pacamara you want to show off on filter. A versatile, approachable origin."}], "keypoints": ["Civil war + price crashes meant old heirloom Bourbon was never replaced — now a rare wealth of it.", "Birthplace of Pacamara (Pacas × Maragogipe): big-beaned, can be intensely floral/complex.", "Bourbon shines at a balanced medium — juicy sweetness, milk chocolate, stone fruit.", "Softer acidity than East Africa; sweetness-forward, great for espresso and milk."], "refs": [{"label": "Forbes — Central America coffee regions", "link": "https://www.forbes.com/sites/lmowery/2025/05/22/a-beginners-guide-to-central-americas-acclaimed-coffee-regions/"}, {"label": "Stone Street — guide to Central American coffee", "link": "https://stonestreetcoffee.com/blogs/brooklyn-coffee-academy/a-guide-to-central-american-coffee"}], "regionMap": {"note": "Across the volcanic ranges of the west and center — the Apaneca-Ilamatepec range holds the best-known estates.", "shape": "M45,90 L130,80 L215,88 L255,110 L215,140 L130,150 L55,138 Z", "regions": [["Apaneca-Ilamatepec", 95, 110], ["Alotepec", 160, 112], ["Chichontepec", 185, 118]]}}, "origin_honduras": {"name": "Honduras", "sub": "The rising heavyweight", "group": "origin", "accent": "#B07B3E", "country": "Honduras", "continent": "Central America", "lat": 14.8, "lng": -88.0, "regions": "Copán, Montecillos, Opalaca, Agalta, Comayagua, El Paraíso", "altitude": "1,000–1,700 m", "varieties": "Bourbon, Catuaí, Caturra, Lempira, Parainema", "process": "Washed (mostly), growing naturals", "harvest": "Nov–Apr", "roastLevel": "Medium", "flavorTags": ["Sweet", "Caramel", "Balanced", "Mild fruit"], "blurb": "One of Central America’s largest exporters, once commodity-only, now producing clean, sweet, balanced specialty across six distinct regions.", "sections": [{"h": "What you're working with", "body": "Honduras is a Central American production heavyweight — consistently one of the region's largest exporters (around 5 million-plus 60kg bags a season) — that historically sold mostly into blends, but has built a serious specialty sector over the last decade. It has six recognized growing regions (Copán, Montecillos, Opalaca, Agalta, Comayagua, El Paraíso), each with its own character, spread across mountainous terrain. Investment in processing and drying (its humid climate historically made drying a challenge) has pushed quality up sharply. Expect sweet, clean, well-balanced coffee, sometimes with gentle fruit — approachable rather than wild."}, {"h": "How to roast it", "body": "Honduran coffee is forgiving and rewards a balanced medium roast that plays up its caramel sweetness and rounded body. Acidity is moderate and nutty-sweet rather than sharp, so it doesn't demand a light-roast rescue of brightness the way an East African does. As mid-altitude coffee (generally a touch lower and less dense than Guatemala or Panama), it takes heat readily — just avoid rushing so the sweetness develops fully. It's a strong, cost-effective blend and espresso base as well as a pleasant single origin."}, {"h": "Target", "body": "Medium (City+ to Full City) for the sweet, caramel, balanced profile that suits both filter and espresso and makes Honduras such a reliable everyday and blending coffee. Slightly lighter for higher-grown regional lots (Montecillos, Opalaca) where you want more fruit and clarity."}], "keypoints": ["A production giant (5M+ bags/season) that shifted from commodity to serious specialty.", "Six regions (Copán, Montecillos, Opalaca, Agalta, Comayagua, El Paraíso), each distinct.", "Sweet, clean, balanced, mild fruit; moderate nutty-sweet acidity — approachable.", "Forgiving medium roast; a reliable, cost-effective single origin, blend, and espresso base."], "refs": [{"label": "Forbes — Central America coffee regions", "link": "https://www.forbes.com/sites/lmowery/2025/05/22/a-beginners-guide-to-central-americas-acclaimed-coffee-regions/"}, {"label": "Stone Street — guide to Central American coffee", "link": "https://stonestreetcoffee.com/blogs/brooklyn-coffee-academy/a-guide-to-central-american-coffee"}], "regionMap": {"note": "Spread across six mountainous regions in the west and center — Copán, Montecillos, Opalaca, Agalta, Comayagua, El Paraíso.", "shape": "M50,70 L140,55 L240,70 L255,120 L200,155 L120,160 L60,130 Z", "regions": [["Copán", 85, 95], ["Montecillos", 120, 105], ["Comayagua", 150, 110], ["Agalta", 195, 100], ["El Paraíso", 180, 130]]}}, "origin_nicaragua": {"name": "Nicaragua", "sub": "Between two neighbors", "group": "origin", "accent": "#B07B3E", "country": "Nicaragua", "continent": "Central America", "lat": 13.0, "lng": -85.9, "regions": "Jinotega, Matagalpa, Nueva Segovia, Madriz", "altitude": "1,100–1,700 m", "varieties": "Caturra, Bourbon, Catuaí, Maragogipe, Pacamara", "process": "Washed, honey, natural", "harvest": "Dec–Mar", "roastLevel": "Medium", "flavorTags": ["Balanced", "Stone fruit", "Milk chocolate", "Brown spice"], "blurb": "Often described as a blend of its Honduran and Costa Rican neighbors — well-balanced, mild-to-bright, with elegant naturals emerging.", "sections": [{"h": "What you're working with", "body": "Nicaragua sits geographically and stylistically between Honduras and Costa Rica, and its coffee often tastes like a bridge between them: well-balanced, both mildly bright and mildly sweet. Growing centers on the northern highlands — Jinotega and Matagalpa produce the bulk, while high, shade-grown Nueva Segovia and Madriz near the Honduran border yield some of the most refined lots. Volcanic soil and a range of altitudes give a spread of profiles, from soft nutty-caramel to livelier florals and red fruit. It also grows large-beaned Maragogipe and Pacamara. Proud Mary has featured elegant Nicaraguan naturals with brown spice, milk chocolate, and stone fruit."}, {"h": "How to roast it", "body": "Nicaragua is versatile and even-tempered — a balanced medium roast suits most lots, drawing out milk-chocolate sweetness, gentle stone fruit, and a rounded body. Acidity is moderate, so there's flexibility: go a little lighter on high-grown Nueva Segovia lots to keep their brightness and floral lift, or a touch fuller for a comforting, sweet everyday cup. Natural and honey lots bring extra fruit and sugar; watch development so the sweetness lands without scorching. Large Maragogipe/Pacamara beans want even heat to develop uniformly."}, {"h": "Target", "body": "Medium (City+ to Full City) for a balanced, sweet, chocolatey cup that works across filter, espresso, and milk. Lighter for high-grown or natural lots you want to show off for their fruit and complexity. A dependable, food-friendly origin."}], "keypoints": ["Stylistically between Honduras and Costa Rica — balanced, mildly bright and mildly sweet.", "Jinotega & Matagalpa (bulk); high Nueva Segovia & Madriz (refined lots); grows Maragogipe/Pacamara.", "Balanced medium roast; milk chocolate, stone fruit, brown spice; moderate acidity.", "Versatile across filter/espresso/milk; go lighter for high-grown naturals."], "refs": [{"label": "Klatch — flavor by country", "link": "https://www.klatchcoffee.com/blogs/knowledgebase/how-coffee-flavor-profiles-vary-by-continent-and-country"}, {"label": "Stone Street — guide to Central American coffee", "link": "https://stonestreetcoffee.com/blogs/brooklyn-coffee-academy/a-guide-to-central-american-coffee"}], "regionMap": {"note": "Concentrated in the northern highlands — Jinotega and Matagalpa produce the bulk; Nueva Segovia sits near the Honduran border.", "shape": "M75,50 L175,45 L215,90 L210,155 L160,190 L95,175 L70,120 Z", "regions": [["Nueva Segovia", 120, 75], ["Jinotega", 135, 105], ["Matagalpa", 150, 125]]}}, "cupping_intro": {"name": "What Cupping Is", "sub": "The industry's tasting method", "group": "cupping", "accent": "#C9A34E", "sections": [{"h": "The idea", "body": "Cupping is the standardized way the coffee industry tastes and evaluates coffee. Every cup is brewed identically — same dose, same water, same time — so differences you taste come from the coffee, not the brewing. It's how green buyers judge lots, how roasters check whether a roast worked, and how competitions are scored. If you want to evaluate coffee the way professionals do, cupping is the method."}, {"h": "Why roasters cup", "body": "For a roaster, cupping closes the loop. You design a profile, roast it, then cup it to find out if the curve produced the cup you wanted. Cupping side by side — this profile against that one, this batch against a reference — is how a curve decision becomes a flavor judgment. Without cupping, you're roasting blind."}, {"h": "A system in transition", "body": "The reference framework changed recently. In November 2024 the SCA adopted the Coffee Value Assessment (CVA) as its official standard, replacing the 2004 cupping protocol and its single 100-point score that had defined specialty coffee for two decades. Many labs still run the legacy form daily, so working professionals need to understand both — which is why this section covers each."}, {"h": "Who cups, and why it matters to everyone", "body": "Cupping isn't just a buyer's ritual — it's the shared language of the whole industry, and nearly every role leans on it. Green buyers cup to decide what to purchase and at what premium. Roasters cup to check that a roast delivered what the green promised, and to compare batches. Quality-control teams cup production coffee against a reference to catch drift before it reaches customers. Even baristas cup to understand what they're brewing. Because it's a controlled, repeatable tasting, cupping lets people in different countries and companies compare notes on the same coffee and actually mean the same thing — which is why the protocol is standardized down to the gram and the second."}, {"h": "What you’re actually assessing", "body": "A cupping evaluates a coffee across several dimensions rather than a single “good/bad” verdict: fragrance (the smell of the dry grounds), aroma (the smell once wet), flavor and aftertaste, acidity, sweetness, body/mouthfeel, and overall balance and cleanliness. Crucially, it also checks uniformity — whether all the cups of the same coffee taste alike, which reveals whether the lot is consistent or hiding a few tainted beans. A trained cupper isn't chasing their personal preference; they're describing and scoring the coffee against a standard so the result is useful to someone who wasn't at the table."}], "keypoints": ["Cupping = brewing every cup identically so differences reflect the coffee, not the brew.", "For roasters it closes the loop: curve → roast → cup → judgment.", "The SCA replaced the 2004 protocol with the CVA in Nov 2024; both are still in use."], "refs": [{"label": "SCA — Coffee Value Assessment", "link": "https://sca.coffee/value-assessment"}, {"label": "Green Coffee Collective — cupping protocol", "link": "https://greencoffeecollective.com/pages/glossary/cupping-protocol"}], "related": ["cupping_mechanics", "flavor_wheel", "cva_overview"]}, "cupping_mechanics": {"name": "Cupping Mechanics", "sub": "The physical protocol, step by step", "group": "cupping", "accent": "#B07B3E", "sections": [{"h": "The recipe", "body": "The SCA standard is 8.25g of coffee per 150ml of water — a ratio of about 1:18. Measure to 0.1g precision and adjust the coffee weight to your actual cup volume to hold the ratio. Water is clean and 93°C (200°F). Prepare at least 5 cups per coffee so you can judge uniformity across the lot."}, {"h": "Grind and fragrance", "body": "Grind coarse — slightly coarser than paper-filter drip, spec'd as 70–75% of grounds passing a US #20 sieve (about 850µm). Grind immediately before pouring; aromatics escape within minutes. Purge the grinder with 5–10g of the next sample first to avoid cross-contamination. Within 15 minutes, smell the dry grounds and note the fragrance."}, {"h": "Pour, steep, break", "body": "Pour 93°C water directly over the grounds to saturate them all, and start a 4-minute timer. A crust of grounds forms on top; smell the wet aroma as it steeps. At 4 minutes, break the crust by stirring three times with a spoon while putting your nose close — the crust-break releases a burst of trapped aromatics and is a critical moment. Rinse the spoon between cups. Then skim the foam and floating grounds off the surface in one clean motion."}, {"h": "Taste as it cools", "body": "Begin tasting once the coffee cools to roughly 71°C (around 8–10 minutes in). Load the spoon and slurp hard — the loud slurp aerates the liquid and sprays it across your whole palate. Evaluate flavor, aftertaste, acidity, sweetness, and mouthfeel, and keep tasting as the cup cools, because different attributes reveal themselves at different temperatures."}, {"h": "Why the protocol is so rigid", "body": "The strict recipe — same dose, same water, same grind, same timing — isn't fussiness, it's the whole point. Cupping exists to compare coffees, and a comparison is only valid if the only thing that changed is the coffee. Vary the grind or the water temperature between cups and you're now tasting your own inconsistency, not the beans. That's also why cuppers prepare five cups of each coffee: it checks that the lot itself is uniform, catching a single tainted or defective bean that one cup might hide. The rigidity is what makes the results mean something."}], "keypoints": ["8.25g : 150ml (~1:18), water 93°C / 200°F, 5 cups per coffee for uniformity.", "Grind coarse (70–75% through a #20 sieve), fresh; smell dry fragrance first.", "4-minute steep, then break the crust with 3 stirs while smelling; skim.", "Taste ~71°C by slurping hard to aerate; re-taste as the cup cools."], "refs": [{"label": "SCA Protocols & Best Practices (PDF)", "link": "https://www.scribd.com/document/469338504/1594883668193-SCA-Protocols-Best-Practices-pdf"}, {"label": "Royal Coffee — how to run a cupping", "link": "https://royalcoffee.com/how-to-set-up-and-run-a-coffee-cupping-a-step-by-step-guide/"}, {"label": "Podium Coffee Club — SCA protocol step by step", "link": "https://podiumcoffeeclub.com/blogs/blog/sca-cupping-protocol"}], "related": ["cupping_intro", "flavor_wheel", "cva_scoring"]}, "cva_overview": {"name": "The Coffee Value Assessment", "sub": "The modern SCA framework", "group": "cupping", "accent": "#95602F", "sections": [{"h": "What changed and why", "body": "For two decades, coffee was scored on one 100-point number: 80+ meant specialty, and higher was better. The problem is that a single score tells you a coffee is 'very good' but not why, what it tastes like, or whether it suits your market. The CVA, adopted by the SCA in November 2024, replaces that one number with a high-resolution picture across four separate assessments — because describing a coffee and judging how much you like it are different questions that shouldn't be collapsed together."}, {"h": "The four assessments", "body": "The CVA has four components, kept deliberately separate to reduce bias. Physical (CVA 102 territory) covers measurable facts like defect counts and moisture. Descriptive (103) objectively describes what the coffee smells and tastes like, using intensity ratings and flavor-wheel descriptors, with no quality judgment. Affective (104) records how much you value those attributes on a preference scale. Extrinsic (105) captures non-sensory value: origin story, traceability, certifications."}, {"h": "Descriptive vs affective — the key split", "body": "This separation is the heart of the CVA. Descriptive asks 'what is in the cup?' — a group of cuppers might all agree a coffee is floral and bright. Affective asks 'do I value that?' — and here they can disagree completely. A Nordic roaster might prize a tea-like acidity that an Italian espresso blender finds too sharp. The CVA records both as valid: the description stays objective, the preference reflects each taster's context."}, {"h": "Where the score went", "body": "The descriptive form has no total score by design. Only the affective form produces a number, via a calculator that converts the preference ratings to a 0–100 scale for buyers who still need a shorthand during the transition. This is a real shift in thinking: the CVA treats a coffee's value as multi-dimensional, not reducible to one figure."}], "keypoints": ["CVA (Nov 2024) replaced the single 100-point score with four separate assessments.", "Physical, Descriptive, Affective, Extrinsic — kept apart to reduce bias.", "Descriptive = objective 'what's in the cup'; Affective = subjective 'how much I value it'.", "Only the affective form yields a score, converted to 0–100 via calculator."], "refs": [{"label": "SCA — adopts CVA as cupping standard", "link": "https://sca.coffee/sca-news/sca-new-cva-cupping-standards"}, {"label": "Ethio Coffee — CVA guide for buyers", "link": "https://www.ethiocoffee.co/insights/new-sca-coffee-value-assessment"}, {"label": "SCA — CVA in Action: Affective Assessment", "link": "https://sca.coffee/sca-news/cva-in-action-affective"}], "related": ["cva_scoring", "legacy_protocol", "cupping_intro"]}, "cva_scoring": {"name": "CVA Affective Scoring", "sub": "How the 0–100 number is built", "group": "cupping", "accent": "#6E3E1E", "sections": [{"h": "The eight sections", "body": "The affective assessment scores eight sections for impression of quality: fragrance, aroma, flavor, aftertaste, acidity, sweetness, mouthfeel, and overall. Each is rated on a 9-point hedonic (liking) scale. The 9-point scale is a sensory-science standard because, unlike a 5- or 10-point scale, it has a true neutral midpoint. You're rating preference here, not intensity — 'how much do I like this acidity,' not 'how strong is it.'"}, {"h": "The formula", "body": "The eight section scores are summed, then converted to a familiar 0–100 figure by a fixed formula: Cup Score = 0.65625 × (sum of the eight scores) + 52.75. From that, subtract 2 points for each non-uniform cup and 4 points for each defective cup in the set. The constants are chosen so the output lands in the range specialty cuppers are used to reading."}, {"h": "A worked example", "body": "Say a coffee scores fragrance 7, aroma 7, flavor 6, aftertaste 5, acidity 4, sweetness 6, mouthfeel 7, overall 6. The sum is 48. Then 0.65625 × 48 + 52.75 = 84.25. With no non-uniform or defective cups, the final score is 84.25 — comfortably specialty. This app's digital cupping tool (in the Tools section, when built) runs exactly this math."}, {"h": "Reading the number", "body": "One caution echoing the old form: the 0–100 output is a translation for convenience, not the point of the CVA. Two cuppers can land on the same 84 for very different reasons, which is exactly why the descriptive assessment exists alongside it. Use the score as shorthand, and the description for the real picture."}, {"h": "Working through the arithmetic", "body": "The CVA affective score can feel opaque, so it helps to walk it once. You rate each of the eight sections on a 1–9 scale for how much you like it, then sum those eight numbers (so the raw sum ranges from 8 to 72). That sum is converted to a 0–100-style score with the formula: multiply the sum by 0.65625 and add 52.75. So a coffee whose eight sections sum to 48 scores 0.65625 × 48 + 52.75 = 84.25. Then you subtract penalties: 2 points for each cup that wasn't uniform and 4 points for each defective cup. The constants are chosen so the numbers land on roughly the same familiar scale as the old 100-point form, which eases the transition."}, {"h": "Liking, not judging", "body": "The philosophical shift in CVA scoring is that each section asks how much you like the attribute, on a simple 1–9 impression, rather than asking you to judge it against an abstract ideal of “correctness.” This sounds subtle but it changes the exercise: it separates the affective question (do I like this?) from the descriptive one (what does it taste like?), which the CVA handles on a separate descriptive form. Keeping liking and description apart is meant to make scores more honest and more comparable, and to stop the two from contaminating each other — a cupper can note a coffee is intensely fruity (description) while still rating how pleasant they find that fruit (affective)."}], "keypoints": ["Eight sections (fragrance, aroma, flavor, aftertaste, acidity, sweetness, mouthfeel, overall), each 1–9.", "Cup Score = 0.65625 × (sum of 8) + 52.75, minus 2/non-uniform cup and 4/defective cup.", "Worked example: sum 48 → 84.25, a specialty score.", "The number is a convenience translation; the descriptive assessment carries the real detail."], "refs": [{"label": "SCA — CVA Affective Score Calculator", "link": "https://sca.coffee/cuppingscore"}, {"label": "Royal NY — how to use the CVA form (worked example)", "link": "https://www.royalny.com/blogs/how-to-use-the-sca-cva-form/"}, {"label": "Royal Coffee — what the numbers mean", "link": "https://royalcoffee.com/scoring-specialty-coffee-what-do-the-numbers-mean/"}], "diagram": "cva", "related": ["cva_overview", "cupping_mechanics", "flavor_wheel"]}, "legacy_protocol": {"name": "The Legacy 2004 Protocol", "sub": "The 100-point form, still in use", "group": "cupping", "accent": "#5A2F16", "sections": [{"h": "Why it still matters", "body": "The 2004 SCA (then SCAA) cupping form defined specialty coffee for twenty years, and it's still found in hundreds of roasteries and cupping labs today. Even with the CVA now official, a working professional needs to read and speak the legacy form, because most existing coffee documentation, scoresheets, and habits are built on it."}, {"h": "How it scores", "body": "The legacy form rates ten attributes — fragrance/aroma, flavor, aftertaste, acidity, body, balance, uniformity, clean cup, sweetness, and overall. Most attributes are scored from 6.00 to 10.00 in 0.25-point steps, reflecting quality. The individual scores are summed into a single total. A total of 80+ is the specialty threshold, with higher tiers above it — a coffee in the 90s is exceptional."}, {"h": "Defects", "body": "Defects subtract from the total. A taint (a minor off-note, usually in aroma or flavor) costs 2 points; a fault (a strong negative that can make the coffee unpleasant) costs 4. In the CVA, this thinking moved to the physical form and the uniform/defective-cup deductions."}, {"h": "Legacy vs CVA at a glance", "body": "The big difference: the legacy form blends description and quality judgment into one number, while the CVA splits them apart. The legacy form asks 'how good is this acidity?' on one scale; the CVA asks 'how intense is it?' (descriptive) and 'how much do I like it?' (affective) as two separate questions. The legacy 'body' also became the broader 'mouthfeel' in the CVA."}, {"h": "Why the old protocol still matters", "body": "The SCA's 2004 cupping form — the 100-point scale most people picture when they think of coffee scores — was the industry standard for two decades and still appears everywhere, even after the CVA replaced it. Knowing it matters because an enormous body of coffee history, marketing, and record-keeping is written in its language: “88-point” coffees, competition results, and older green offers all reference it. It scored coffee across ten attributes (fragrance/aroma, flavor, aftertaste, acidity, body, balance, uniformity, clean cup, sweetness, and overall) each out of ten, summing to 100, with 80 as the specialty threshold. Understanding both systems lets you read old and new scores without confusion."}], "keypoints": ["The 2004 form defined specialty for 20 years and is still in daily use.", "Ten attributes scored 6.00–10.00 in 0.25 steps, summed; 80+ = specialty.", "Taint = −2, Fault = −4 for defects.", "Legacy blends description and quality into one score; the CVA splits them."], "refs": [{"label": "Femobook — cupping protocols & scoring", "link": "https://www.femobook.com/blogs/coffee-knowledge/coffee-cupping"}, {"label": "Daily Coffee News — SCA adopts new forms", "link": "https://dailycoffeenews.com/2024/11/05/sca-officially-adopts-new-cupping-forms-and-standards/"}], "related": ["cva_overview", "cva_scoring"]}, "flavor_wheel": {"name": "The Flavor Wheel", "sub": "The shared vocabulary of taste", "group": "cupping", "accent": "#8A5A34", "sections": [{"h": "What it is", "body": "The Coffee Taster's Flavor Wheel, released by the SCA and World Coffee Research in 2016 (built on WCR's Sensory Lexicon), is the industry's reference for describing what coffee tastes and smells like. It maps hundreds of descriptors in a circle, organized from broad categories at the center to specific references at the outer edge. It's descriptive, not prescriptive — it helps you articulate what you taste without judging quality."}, {"h": "How it's built", "body": "The center holds nine broad categories: floral, fruity, sour/fermented, green/vegetative, other, roasted, spices, nutty/cocoa, and sweet. Each branches outward into sub-groups and then specific notes. Fruity opens to berry, dried fruit, citrus, other fruit; berry opens further to blackberry, raspberry, blueberry, strawberry. The progressive narrowing is what makes it usable."}, {"h": "How to use it", "body": "Work from the center outward. Start with the broadest impression — is this coffee fruity, nutty, roasted, floral? Once you've picked a core category, move out one ring to narrow it: fruity → berry. Then out again to the specific note: berry → blueberry. You can stop at any ring; the further out you go, the more precise the description. This is far easier than trying to jump straight to 'blueberry' from a blank page."}, {"h": "Why it matters for cupping", "body": "The wheel gives cuppers a shared, calibrated vocabulary. When one taster says 'blackberry' and another says 'jammy dark fruit,' the wheel lets them locate a common reference instead of talking past each other. In the CVA descriptive assessment, the flavor-wheel categories are exactly the descriptors you check off — so the wheel and the modern form are built from the same map."}, {"h": "How to actually use it at the table", "body": "The wheel works best as a decision tree, not a word bank. When you taste something, start at the center and ask the broadest question: is this fruity, nutty/cocoa, floral, roasted? Commit to one, then move outward one ring to narrow it — fruity becomes berry or citrus or dried fruit. Then, only if you can honestly taste it, move out again to the specific note — berry becomes blueberry. The discipline of working outward stops you from grabbing an impressive-sounding descriptor you don't actually taste, and it gives a whole cupping table a shared path to the same words."}], "keypoints": ["2016 SCA/WCR wheel: hundreds of descriptors, broad center → specific edge.", "Nine center categories: floral, fruity, sour/fermented, green/vegetative, other, roasted, spices, nutty/cocoa, sweet.", "Work center-outward, stopping at whatever precision you can honestly taste.", "Descriptive not prescriptive; it's the vocabulary behind the CVA descriptive form."], "refs": [{"label": "SCA/WCR Coffee Taster's Flavor Wheel (PDF)", "link": "https://atlanticspecialtycoffee.com/wp-content/uploads/SCA_TasterWheel_English_8.5x11.pdf"}, {"label": "Green Coffee Collective — the flavour wheel", "link": "https://greencoffeecollective.com/pages/glossary/sca-flavour-wheel"}, {"label": "Not Bad Coffee — interactive flavor wheel", "link": "https://notbadcoffee.com/flavor-wheel-en/"}], "diagram": "flavorwheel", "related": ["cupping_mechanics", "cupping_intro", "q_grader"]}, "qc_loop": {"name": "The Roaster's QC Loop", "sub": "Cupping your own production", "group": "cupping", "accent": "#7A4A28", "sections": [{"h": "Cup what you ship", "body": "Cupping isn't only for buying green — it's how a roastery holds quality steady. The discipline is simple: cup your production batches, not just your samples. A profile that cupped beautifully as a sample roast can drift at production scale, and the only way you catch it is by tasting what actually went in the bag."}, {"h": "Cup against a reference", "body": "The powerful move is comparative. Cup a new batch next to a retained reference of how that coffee should taste — your approved profile, or a saved sample. Side by side, drift is obvious that would be invisible cup-by-cup. This is the production version of the sample-roasting loop: the sample cup becomes the target you're checking each batch against."}, {"h": "Triangulate for consistency", "body": "To check whether two batches are truly the same, cuppers use triangulation: three cups, two of one batch and one of the other, arranged blind. If you can reliably pick the odd one out, there's a real difference; if you can't, they're effectively identical. It's a rigorous, bias-resistant way to answer 'did this batch match the last one?'"}, {"h": "Close the loop with the curve", "body": "When a cupping flags a problem, the fix lives back in the roast data. A baked, flat cup points at a stalled rate of rise; a sharp, grassy cup points at under-develop
