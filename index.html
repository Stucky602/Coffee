oped", "cause": "Treated like a cinnamon roast and dropped too early.", "avoid": "Give it that extra beat past first crack — the whole point of New England versus cinnamon is a touch more development."}, {"d": "Sour", "cause": "Acids not resolved in the short development.", "avoid": "Nudge development slightly longer or pick a sweeter green; brightness is the goal, sourness is the miss."}], "machine": "Forgiving for a light roast. Works on drum or fluid-bed; drum adds a little body, air keeps it crisp and bright. A good light roast to learn on before attempting Nordic or cinnamon."}, "nordic": {"name": "Nordic", "sub": "Scandinavian Light", "level": "Light", "group": "light", "agtron": "95–75", "accent": "#C9A34E", "oneLine": "Ultra-light filter roast that stops well before first crack completes, built to showcase origin acidity and florals.", "useFor": "Single-origin filter, competition-style clarity, delicate washed Africans and high-grown lots.", "curve": {"chargeC": "195–210", "chargeF": "383–410", "tpC": "85–95", "tpF": "185–203", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–200", "fcF": "385–392", "dropC": "200–205", "dropF": "392–401", "totalTime": "8:00–10:00", "dtr": "10–14%"}, "flavor": {"acidity": 5, "body": 2, "sweetness": 3, "bitterness": 1, "roast": 1, "aroma": 5}, "phases": [{"h": "Drying", "body": "Long, gentle drying. Bean stays green-to-yellow. You're driving off free moisture without rushing energy into the bean — a scorched Nordic roast is unrecoverable because there's no development to hide behind."}, {"h": "Maillard / Browning", "body": "Kept short and controlled. Sugars begin browning but you're deliberately not letting caramelization run. This is where the floral and acidic precursors are preserved rather than cooked off."}, {"h": "First Crack", "body": "You drop at or barely into first crack. The crack may be sparse and quiet. Timing here is everything — a few seconds long and you lose the wispy top-end that defines the style."}, {"h": "Development", "body": "Minimal by design. DTR runs low (10–14%). The goal is a fully-dried, evenly-roasted bean that is barely developed, not an underdeveloped one — the distinction is even heat application, not just a fast drop."}], "defects": [{"d": "Grassy / green", "cause": "Dropped before drying truly finished; moisture still locked in center.", "avoid": "Confirm even yellowing across the batch before pushing toward first crack; don't chase the clock."}, {"d": "Sharp / sour", "cause": "Underdeveloped acids never resolved into sweetness.", "avoid": "Nudge DTR up slightly or extend Maillard by a few seconds; sourness is the Nordic failure mode, brightness is the goal."}], "machine": "Demands responsive convection and tight control — fluid-bed and modern drum roasters with strong airflow shine here. Small batches only; large batches can't shed heat fast enough to hold the profile this light.", "aka": ["Scandinavian", "Light Nordic"]}, "blonde": {"name": "Blonde", "sub": "Light (Marketing Term)", "level": "Light", "group": "light", "aka": ["Golden", "Starbucks Blonde", "Light Roast (retail)"], "agtron": "85–75", "accent": "#DCC06A", "oneLine": "A pale, golden light roast made famous as a retail term by Starbucks in 2012 — bright and mellow, though in practice most 'blonde' offerings land closer to a City roast than a true extreme-light.", "useFor": "Approachable light-roast retail coffee, lighter espresso for a broad audience, drinkers stepping down from medium who want less bitterness without going fully Nordic.", "curve": {"chargeC": "198–212", "chargeF": "388–414", "tpC": "88–96", "tpF": "190–205", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "204–209", "dropF": "399–408", "totalTime": "9:00–11:00", "dtr": "13–17%"}, "flavor": {"acidity": 4, "body": 2, "sweetness": 3, "bitterness": 1, "roast": 1, "aroma": 4}, "phases": [{"h": "Drying", "body": "Standard even drying. Blonde is a broadly-marketed light roast, so the approach is a clean, unfussy light-roast curve rather than the knife-edge precision of a Nordic or cinnamon."}, {"h": "Maillard / Browning", "body": "A modest browning cooks off the grassy edge and builds gentle sweetness. The aim is 'smooth and light,' not maximum origin expression."}, {"h": "First Crack", "body": "You let first crack roll fully, then drop within a short window. Because 'blonde' isn't a precise level, exactly where you drop varies a lot between roasters."}, {"h": "Development", "body": "A short-to-moderate window (13–17% DTR). Enough to keep it mellow and approachable rather than sharp — which is why many commercial blonde roasts drift toward City rather than staying truly light."}], "defects": [{"d": "Not actually light", "cause": "Chasing 'smooth,' the roast drifts to City or beyond and stops being a light roast at all.", "avoid": "If you're selling it as blonde, hold the drop genuinely light; know that the term sets a light expectation even if it's loosely defined."}, {"d": "Sour / underdeveloped", "cause": "Overcorrecting toward light and dropping too early.", "avoid": "Give it enough development to resolve acids; blonde should read mellow-bright, not sour."}], "machine": "Forgiving across machines. The real 'trick' of a blonde roast is honestly just a clean, approachable light-to-light-medium roast — the distinctive thing about it is the name and the marketing, not a unique technique."}, "city": {"name": "City", "sub": "Light–Medium Filter", "level": "Light", "group": "light", "agtron": "70–65", "accent": "#B07B3E", "oneLine": "The classic light-medium filter roast dropped in the early minute of development, balancing origin character with rounded sweetness.", "useFor": "Everyday single-origin filter, pour-over programs, origins where you still want acidity but with more body than Nordic.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "205–210", "dropF": "401–410", "totalTime": "9:00–11:00", "dtr": "15–18%"}, "flavor": {"acidity": 4, "body": 3, "sweetness": 4, "bitterness": 1, "roast": 1, "aroma": 4}, "phases": [{"h": "Drying", "body": "Standard drying phase, roughly half the total roast. Even yellowing is the target. Sets up a stable rate-of-rise heading into browning."}, {"h": "Maillard / Browning", "body": "Fuller than Nordic — you let browning build more sweetness and body. This is where City earns its rounder cup versus a Scandinavian light."}, {"h": "First Crack", "body": "You ride into first crack and let it establish before dropping. The crack is audible and consistent across the batch."}, {"h": "Development", "body": "A short but real development window (15–18% DTR). Enough to resolve acids into sweetness and knock off the grassy edge without pushing into roast character."}], "defects": [{"d": "Baked", "cause": "RoR crashed and flat-lined through development; energy stalled.", "avoid": "Keep the rate-of-rise gliding gently downward — never flat, never rising, into the drop."}, {"d": "Underdeveloped", "cause": "Dropped too soon after first crack onset.", "avoid": "Give at least ~1:15–1:45 of development past first crack for this level."}], "machine": "Forgiving across roaster types. Drum roasters give it a touch more body; fluid-bed keeps it brighter. A good all-rounder profile to learn a new machine on.", "aka": ["Light City", "Half City"]}, "american": {"name": "American", "sub": "Medium-Light", "level": "Medium", "group": "medium", "aka": ["Breakfast", "Regular", "Medium (US)"], "agtron": "68–62", "accent": "#A06E38", "oneLine": "The medium-light US standard — the everyday 'regular' or 'breakfast' roast, balanced and approachable, sitting between a bright light roast and a sweeter specialty medium.", "useFor": "Traditional American drip and diner coffee, crowd-pleasing house blends, the safe middle a broad audience already expects.", "curve": {"chargeC": "200–214", "chargeF": "392–417", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "207–212", "dropF": "405–414", "totalTime": "9:30–11:30", "dtr": "16–19%"}, "flavor": {"acidity": 4, "body": 3, "sweetness": 4, "bitterness": 2, "roast": 2, "aroma": 4}, "phases": [{"h": "Drying", "body": "Standard even drying. American is the classic middle roast, so nothing here is pushed — it's a balanced, unhurried approach."}, {"h": "Maillard / Browning", "body": "A solid browning phase builds the balanced sweetness and body that makes this roast so approachable. More developed than New England, lighter than City+."}, {"h": "First Crack", "body": "First crack rolls fully through the batch and you note its timing before carrying into a moderate development."}, {"h": "Development", "body": "A moderate window (16–19% DTR). Enough to balance acidity with body and sweetness, landing the familiar, non-challenging cup most American drinkers grew up on."}], "defects": [{"d": "Flat / generic", "cause": "The safe middle roasted without attention drifts to dull.", "avoid": "Even a balanced roast wants a clean declining RoR; don't let 'medium' mean 'unmanaged.'"}, {"d": "Baked", "cause": "Stalled RoR through the moderate development.", "avoid": "Keep momentum — the middle of the spectrum still bakes if the rate of rise flatlines."}], "machine": "The most forgiving roast on the spectrum. Works on essentially any machine, which is why it became the mass-market default. A fine profile for dialing in a new roaster before pushing to the extremes."}, "cityplus": {"name": "City+", "sub": "Specialty Default", "level": "Medium", "group": "medium", "agtron": "63–58", "accent": "#95602F", "oneLine": "The most common specialty medium roast — a hair past City, deep enough for sweetness and balance while keeping origin identity intact.", "useFor": "The default specialty filter roast, blends meant to be versatile, café house filter, and the safest starting point when dialing a new coffee.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "210–216", "dropF": "410–421", "totalTime": "10:00–12:00", "dtr": "18–22%"}, "flavor": {"acidity": 3, "body": 4, "sweetness": 5, "bitterness": 2, "roast": 2, "aroma": 4}, "phases": [{"h": "Drying", "body": "Even, unhurried drying — this profile rewards a stable, well-managed early phase because the longer development amplifies any inconsistency from earlier."}, {"h": "Maillard / Browning", "body": "The workhorse phase for City+. A generous, well-controlled browning is where the signature sweetness and caramel notes are built."}, {"h": "First Crack", "body": "First crack is a landmark, not the finish. You note its timing precisely — development time is measured from here."}, {"h": "Development", "body": "The sweet spot: 18–22% DTR. Long enough to fully round out and build sweetness, short enough that origin character and a clean finish survive. This is the most-dialed window in specialty roasting."}], "defects": [{"d": "Flat / dull", "cause": "Development pushed too long, muting acidity without adding complexity.", "avoid": "Watch that DTR doesn't creep past ~22%; pull back drop temp if the cup goes lifeless."}, {"d": "Roasty edge", "cause": "Drifted too close to second crack.", "avoid": "Hold drop temp comfortably below second-crack territory; City+ should never taste toasty."}], "machine": "The universal reference profile. Works on nearly anything, which is exactly why it's the benchmark — dial your machine here first, then move lighter or darker from a known-good center.", "aka": ["City Plus", "Medium"]}, "fullcity": {"name": "Full City", "sub": "Medium–Dark", "level": "Medium-Dark", "group": "mediumdark", "agtron": "55–50", "accent": "#6E3E1E", "oneLine": "Medium-dark roast taken right up to the edge of second crack — deep caramelization and body while stopping just short of roast dominating.", "useFor": "Fuller-bodied filter, classic espresso bases, blends built for milk, chocolate-and-nut flavor profiles.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "218–224", "dropF": "424–435", "totalTime": "11:00–13:00", "dtr": "20–25%"}, "flavor": {"acidity": 2, "body": 5, "sweetness": 4, "bitterness": 3, "roast": 3, "aroma": 3}, "phases": [{"h": "Drying", "body": "Standard drying. From here on, total energy delivered matters more than any single phase — Full City is about accumulated development."}, {"h": "Maillard / Browning", "body": "Full browning, deep caramel formation. Sugars are heavily transformed; acidity is dropping and body is climbing."}, {"h": "First Crack", "body": "First crack comes and goes with meaningful time still ahead. The cracks roll through the whole batch and settle."}, {"h": "Development", "body": "Extended development approaching — but not reaching — second crack. You're listening for the first isolated snaps of second crack as your ceiling, and dropping before they build."}], "defects": [{"d": "Roasty / carbony", "cause": "Slid into second crack; roast character took over.", "avoid": "Drop at the very first hint of second crack, not after; the window closes fast at this level."}, {"d": "Baked / flat", "cause": "Long roast with a stalled RoR through the back half.", "avoid": "Maintain momentum — a long roast still needs a declining, never-flat rate-of-rise."}], "machine": "Drum roasters excel here; the conductive heat and thermal mass build the body this style is known for. Batch size is more forgiving than light roasts since you're not preserving fragile top-end.", "aka": ["Full City"]}, "fullcityplus": {"name": "Full City+", "sub": "Into Second Crack", "level": "Medium-Dark", "group": "mediumdark", "agtron": "48–45", "accent": "#5A2F16", "oneLine": "Dropped into the rolling start of second crack — the first roast level where surface oils begin to appear and roast character joins origin flavor.", "useFor": "Bold espresso, traditional-leaning blends, darker café programs that still want some sweetness underneath the roast.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "224–229", "dropF": "435–444", "totalTime": "12:00–14:00", "dtr": "22–27%"}, "flavor": {"acidity": 1, "body": 5, "sweetness": 3, "bitterness": 4, "roast": 4, "aroma": 3}, "phases": [{"h": "Drying", "body": "Standard. The character of this roast is decided almost entirely in the final couple of minutes, so a clean early phase just keeps the back half predictable."}, {"h": "Maillard / Browning", "body": "Full, deep browning already behind you before the finish. Origin acidity is mostly spent by now."}, {"h": "First Crack", "body": "First crack is an early landmark. You're managing energy so second crack arrives controlled, not runaway."}, {"h": "Development", "body": "You drop into the early roll of second crack. First oils bead on the surface hours later. Judgment shifts from taste-forward development to controlling how far into second crack you commit."}], "defects": [{"d": "Ashy / burnt", "cause": "Rode too deep into second crack; pushed toward carbon.", "avoid": "Drop in the early, sporadic phase of second crack — not once it's rolling continuously."}, {"d": "Uneven surface oil", "cause": "Inconsistent heat let some beans out-roast others.", "avoid": "Ensure even development into second crack; blotchy oiling signals an uneven batch, not just a dark roast."}], "machine": "Drum roasters own this territory. Watch airflow — you want to clear smoke and chaff without stripping so much heat that you stall right at the critical second-crack transition.", "aka": ["Full City Plus"]}, "vienna": {"name": "Vienna", "sub": "Dark", "level": "Dark", "group": "dark", "agtron": "42–38", "accent": "#8a4a28", "oneLine": "A moderate dark roast well into second crack with a light, even oil sheen — bittersweet and roast-forward but still short of full French intensity.", "useFor": "Traditional dark-roast espresso, European-style café blends, drinkers who want dark but not scorched.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "230–235", "dropF": "446–455", "totalTime": "13:00–15:00", "dtr": "25–30%"}, "flavor": {"acidity": 1, "body": 4, "sweetness": 3, "bitterness": 4, "roast": 5, "aroma": 2}, "phases": [{"h": "Drying", "body": "Standard drying. At dark levels, consistency of the whole curve matters more than any nuance — you're building toward a roast-dominant cup."}, {"h": "Maillard / Browning", "body": "Fully complete and behind you. Origin sugars are largely converted; what's left is roast-driven bittersweetness."}, {"h": "First Crack", "body": "A distant landmark. You roll through first crack and keep energy moving toward second."}, {"h": "Development", "body": "You settle into the middle of second crack. Oils migrate to the surface evenly. Control matters — the difference between Vienna and French is a matter of seconds and a few degrees here."}], "defects": [{"d": "Acrid / smoky", "cause": "Airflow too low; smoke reabsorbed into the beans.", "avoid": "Open airflow through second crack to evacuate smoke; dark roast should be bittersweet, not smoky."}, {"d": "Baked-then-burnt", "cause": "Slow approach that stalled, then a hard finish to reach color.", "avoid": "Reach dark color through steady momentum, not by stalling and then blasting heat to catch up."}], "machine": "Drum roasters with good airflow control. At this darkness, smoke management and even heat are the whole game; batch-to-batch consistency comes from controlling airflow, not chasing bean temp.", "aka": ["Viennese", "Light French", "Continental (loosely)"]}, "continental": {"name": "Continental", "sub": "Dark", "level": "Dark", "group": "dark", "aka": ["New Orleans", "European", "After-Dinner", "High Roast"], "agtron": "40–35", "accent": "#77401E", "oneLine": "A dark roast in the Vienna-to-French band with a smoky, caramelized, bittersweet body — the traditional 'after-dinner' European style, historically the entry to the darkest roasts.", "useFor": "Dark-roast blends, after-dinner and dessert coffee, drinkers who want deep and smoky but not as punishing as French or Italian.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "232–237", "dropF": "450–459", "totalTime": "13:30–15:30", "dtr": "26–31%"}, "flavor": {"acidity": 1, "body": 4, "sweetness": 2, "bitterness": 5, "roast": 5, "aroma": 2}, "phases": [{"h": "Drying", "body": "Standard. As with all dark roasts, accumulated energy over the whole curve matters more than any single phase's nuance."}, {"h": "Maillard / Browning", "body": "Fully complete well before the finish. Origin character is largely spent; the cup is roast-driven from here."}, {"h": "First Crack", "body": "An early landmark. You manage energy so the run into second crack stays controlled rather than runaway."}, {"h": "Development", "body": "You settle into second crack, past Vienna but short of full French. Smoky, caramelized, bittersweet. The name blurs with New Orleans and European — all sit in this same dark band."}], "defects": [{"d": "Acrid / smoky", "cause": "Low airflow let roast smoke reabsorb into the beans.", "avoid": "Open airflow through second crack; the target is a clean bittersweet smokiness, not an ashtray."}, {"d": "Ashy", "cause": "Pushed too close to the French/Italian end.", "avoid": "Hold the drop in the mid-second-crack range; Continental should keep some caramel body under the roast."}], "machine": "Drum roaster with good airflow control. Historically some New Orleans versions blend in chicory — a separate ingredient, not a roasting technique. Smoke management is the main craft at this darkness."}, "french": {"name": "French", "sub": "Very Dark", "level": "Dark", "group": "dark", "agtron": "35–30", "accent": "#9c5a34", "oneLine": "A very dark roast deep into second crack with heavy surface oil — roast character dominates, origin is largely gone, intense and bittersweet.", "useFor": "Traditional French/Italian-leaning espresso, dark-roast house blends, drinkers who want bold, smoky, low-acid coffee.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "235–240", "dropF": "455–464", "totalTime": "14:00–16:00", "dtr": "28–33%"}, "flavor": {"acidity": 1, "body": 4, "sweetness": 2, "bitterness": 5, "roast": 5, "aroma": 2}, "phases": [{"h": "Drying", "body": "Standard drying, then the roast becomes about controlled energy delivery all the way to a very dark drop."}, {"h": "Maillard / Browning", "body": "Long complete. By now the cup's character is roast and carbon chemistry, not origin sugars."}, {"h": "First Crack", "body": "A memory. You're managing the run deep into second crack without letting it become uncontrolled."}, {"h": "Development", "body": "You push well into or past the peak of second crack. Surface is heavily oiled. This is the edge of the safe roasting envelope — a little further is charcoal, and the risk of roaster fires climbs, so vigilance is mandatory."}], "defects": [{"d": "Burnt / carbony", "cause": "Pushed past controlled dark into scorched territory.", "avoid": "Know your drop point cold; at French level there's almost no margin before flavor becomes ash."}, {"d": "Flat, no sweetness", "cause": "All fermentable sugar cooked off with nothing balancing the bitterness.", "avoid": "Start from a sweeter, denser green; thin coffees turn hollow and purely bitter at this level."}], "machine": "Drum roasters, close supervision, aggressive airflow. Fire safety is real at this level — chaff and oil plus high heat. Never walk away from a French roast, and clean the roaster diligently.", "aka": ["Dark Roast", "Turkish (loosely)"]}, "italian": {"name": "Italian", "sub": "Darkest Traditional", "level": "Dark", "group": "dark", "agtron": "28–25", "accent": "#b06a3e", "oneLine": "The darkest common roast — near the end of the safe envelope, heavily oiled and carbon-forward, built for traditional dark espresso tradition.", "useFor": "Traditional Italian espresso blends, very dark café identities, customers who specifically want the darkest cup.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "240–245", "dropF": "464–473", "totalTime": "15:00–17:00", "dtr": "30–35%"}, "flavor": {"acidity": 1, "body": 3, "sweetness": 1, "bitterness": 5, "roast": 5, "aroma": 1}, "phases": [{"h": "Drying", "body": "Standard. Everything past drying is energy management toward the darkest safe drop point."}, {"h": "Maillard / Browning", "body": "Fully spent long before the finish. No origin character remains to preserve."}, {"h": "First Crack", "body": "Far behind. Second crack has fully rolled and largely finished by the time you approach the drop."}, {"h": "Development", "body": "You take it to the very edge of the safe roasting envelope — beyond here is combustion, not coffee. Bean surface is fully oiled and near-black. This level exists for tradition and identity, not flavor development."}], "defects": [{"d": "Charred / ash", "cause": "One step too far; the bean crossed from dark roast to burnt.", "avoid": "This roast lives on a knife's edge — precise, repeatable drop timing is the entire skill."}, {"d": "Roaster fire", "cause": "Accumulated oil and chaff igniting at extreme heat.", "avoid": "Meticulous roaster cleaning and constant supervision; this is the highest fire-risk common roast."}], "machine": "Drum roasters with rigorous cleaning and fire protocols. At Italian darkness the discipline is entirely about safety and repeatability — the flavor ceiling is fixed, so consistency and not burning the shop down are the job.", "aka": ["Espresso Roast (traditional)"]}, "spanish": {"name": "Spanish", "sub": "Darkest / Carbonized Edge", "level": "Dark", "group": "dark", "aka": ["Dark French (loosely)", "Extreme Dark"], "agtron": "25–20", "accent": "#8a5233", "oneLine": "The darkest named roast — pushed past Italian to the very edge of carbonization, thin-bodied, intensely bitter and smoky, existing at the outer limit of what's still coffee.", "useFor": "Extreme dark-roast traditions and specific regional tastes. A niche, identity-driven roast, not a flavor-development one.", "curve": {"chargeC": "200–215", "chargeF": "392–419", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "245–250", "dropF": "473–482", "totalTime": "15:30–17:30", "dtr": "31–36%"}, "flavor": {"acidity": 1, "body": 2, "sweetness": 1, "bitterness": 5, "roast": 5, "aroma": 1}, "phases": [{"h": "Drying", "body": "Standard. Everything after is a controlled march to the darkest safe drop point on the spectrum."}, {"h": "Maillard / Browning", "body": "Long spent. There is no origin character left to preserve at this darkness."}, {"h": "First Crack", "body": "A distant memory. Second crack has fully rolled and largely finished before you approach the drop."}, {"h": "Development", "body": "Taken past Italian to the very verge of combustion. The bean is heavily carbonized and can be over a quarter ash. Body actually thins out here as structure breaks down. This is the outer edge of the roasting envelope."}], "defects": [{"d": "Charred / charcoal", "cause": "One step past the edge; the bean crossed from roast to burnt.", "avoid": "Spanish already lives at the limit — a few seconds or degrees too far is literally charcoal. Precise, repeatable timing is the whole skill."}, {"d": "Roaster fire", "cause": "Oil and chaff plus extreme heat, with dumping into the cooling tray adding oxygen.", "avoid": "Meticulous cleaning, constant supervision, and fire protocols. This is the highest fire-risk roast there is."}], "machine": "Drum roaster with rigorous cleaning and active fire safety. At Spanish darkness the entire job is safety and repeatability — the flavor ceiling is fixed and low, so the craft is consistency and not burning down the roastery."}, "espresso": {"name": "Espresso", "sub": "Modern Specialty", "level": "Purpose", "group": "purpose", "agtron": "58–48", "accent": "#7A4A28", "oneLine": "A purpose profile, not a roast level — extended development for solubility and sweetness under pressure, tuned so it extracts evenly as espresso rather than for a color target.", "useFor": "Modern specialty espresso, single-origin espresso, café espresso where you want clarity and sweetness in a short, pressurized shot.", "curve": {"chargeC": "195–210", "chargeF": "383–410", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "212–222", "dropF": "414–432", "totalTime": "11:00–14:00", "dtr": "20–25%"}, "flavor": {"acidity": 3, "body": 5, "sweetness": 5, "bitterness": 3, "roast": 3, "aroma": 4}, "phases": [{"h": "Drying", "body": "Often a slightly gentler, longer drying to promote even heat penetration — espresso punishes uneven roasts because the extraction concentrates every flaw."}, {"h": "Maillard / Browning", "body": "Deliberately extended. This is the heart of an espresso profile: a long Maillard builds the sweetness and solubility that a short pressurized shot depends on."}, {"h": "First Crack", "body": "A managed landmark. You typically stretch the time between first crack and drop more than a filter roast of the same color, prioritizing development over speed."}, {"h": "Development", "body": "Longer development (often 20–25% DTR) than a filter roast landing at the same Agtron. The extra development lowers perceived acidity and raises solubility so the shot pulls evenly and sweet, not sharp or hollow."}], "defects": [{"d": "Sharp / sour shot", "cause": "Underdeveloped for espresso; acids not resolved and solubility too low.", "avoid": "Extend development; espresso needs more than a filter roast at the same color to pull sweet under pressure."}, {"d": "Hollow / ashy shot", "cause": "Over-roasted chasing body, tipped into roast character.", "avoid": "Build body through development time, not a darker drop; more time at a moderate color beats a darker roast."}], "machine": "Any roaster, but repeatability is critical because espresso amplifies variation. The skill is profile design — targeting extraction behavior and solubility, not a color number. Cup it as a shot, not just on a filter table."}, "omni": {"name": "Omni", "sub": "Filter + Espresso", "level": "Purpose", "group": "purpose", "agtron": "62–55", "accent": "#8A5A34", "oneLine": "A modern medium roast deliberately designed to work as both filter and espresso — the third-wave default that trades a little peak performance in each for versatility.", "useFor": "Cafés running one roast across both bar and brew, single-origin programs that want one SKU per coffee, roasters simplifying inventory.", "curve": {"chargeC": "198–212", "chargeF": "388–414", "tpC": "88–98", "tpF": "190–208", "dryEndC": "150–160", "dryEndF": "302–320", "fcC": "196–202", "fcF": "385–396", "dropC": "210–218", "dropF": "410–424", "totalTime": "10:30–13:00", "dtr": "19–23%"}, "flavor": {"acidity": 3, "body": 4, "sweetness": 5, "bitterness": 2, "roast": 2, "aroma": 4}, "phases": [{"h": "Drying", "body": "Clean, even drying. Omni lives or dies on evenness because it has to satisfy two extraction methods at once — no room to hide an uneven batch."}, {"h": "Maillard / Browning", "body": "A generous browning builds the sweetness that makes the roast forgiving in espresso while keeping enough clarity for filter."}, {"h": "First Crack", "body": "Landmark noted precisely. Omni development sits between a pure filter and a pure espresso target."}, {"h": "Development", "body": "A middle-path DTR (roughly 19–23%). Enough development for espresso to pull sweet, restrained enough that filter still shows origin. You're intentionally not optimizing for either — the whole point is one roast that does both well."}], "defects": [{"d": "Compromised both ways", "cause": "Split the difference badly — too light for great espresso, too developed for bright filter.", "avoid": "Aim the profile at the coffee's strength; an omni still leans slightly toward what that specific green does best."}, {"d": "Sour as espresso", "cause": "Erred too far toward the filter end.", "avoid": "If the shot pulls sharp, add development; test it on the bar, not just the cupping table."}], "machine": "Any well-controlled roaster. The real work is profile design and disciplined cupping across both methods — you validate an omni by pulling shots and brewing filter from the same batch and confirming both are good."}}, "METHODOLOGY": {"curve": {"name": "Reading the Roast Curve", "sub": "The roaster's primary instrument", "group": "read", "accent": "#C9A34E", "sections": [{"h": "What the curve is", "body": "A roast curve plots bean temperature (BT) over time. Overlaid on it is the rate of rise (RoR) — the slope of that temperature line, how fast the bean is heating at any moment. Together they are the roaster's dashboard: the BT line tells you where you are, the RoR tells you where you're going."}, {"h": "The landmarks", "body": "Every curve has the same anchors: charge (beans hit the drum, temp plunges), turning point (the low, where the bean stops giving up heat and starts absorbing it), drying end (yellowing), first crack, and drop. You read a roast by the spacing and slope between these anchors, not by any single number."}, {"h": "Why the shape matters more than the numbers", "body": "Absolute bean temps are machine-specific — your probe, your drum mass, your placement. What transfers between roasters is the shape: a smooth, continuously declining RoR from turning point to drop. That shape is the closest thing roasting has to a universal quality signal."}], "keypoints": ["BT tells you position; RoR tells you trajectory.", "Read spacing and slope between landmarks, not absolute temps.", "A smooth, declining RoR is the near-universal marker of a clean roast."]}, "ror": {"name": "Rate of Rise (RoR)", "sub": "The slope that predicts the cup", "group": "read", "accent": "#B07B3E", "sections": [{"h": "Definition", "body": "RoR is the change in bean temperature over a fixed interval — degrees per 30 seconds or per minute. It's the first derivative of the roast curve. High early (the bean absorbs energy fast), then it should decline steadily as the roast progresses and the temperature gap between drum and bean shrinks."}, {"h": "Why it should always decline", "body": "A healthy roast has a RoR that glides smoothly downward from turning point to drop. It shouldn't rise (a spike overheats the surface), and it shouldn't flat-line (a stall bakes the bean). The single most-watched thing in modern profile roasting is keeping that RoR curve smooth and descending."}, {"h": "Crash and flick", "body": "Two classic RoR faults cluster around first crack. A crash is a sudden RoR drop as first crack's endothermic reaction pulls energy — the bean momentarily stops climbing. A flick is the RoR rebounding upward right after. Both correlate with muddy, baked-tasting cups. Managing gas and airflow before first crack to prevent the crash is a core roasting skill."}], "keypoints": ["RoR = degrees of bean-temp change per interval; the curve's slope.", "Target a smooth, continuously declining RoR from turning point to drop.", "Prevent the first-crack crash-and-flick by managing energy before the crack, not after."]}, "phases": {"name": "The Phases of a Roast", "sub": "Drying, Maillard, development", "group": "read", "accent": "#95602F", "sections": [{"h": "Drying phase", "body": "From charge to roughly the point the bean turns yellow. Free and bound moisture (green coffee is ~10–12% water) is driven off. The bean is endothermic and pale. Rushing this phase scorches the surface before the core is ready; dragging it risks a baked, flat roast. Typically the longest single phase."}, {"h": "Maillard / browning phase", "body": "From yellowing to first crack. The Maillard reaction — amino acids plus reducing sugars — plus caramelization generate hundreds of aroma and flavor compounds and the brown color. This is where most flavor complexity is built. Its length and heat shape sweetness, body, and acidity balance."}, {"h": "Development phase", "body": "From first crack to drop. Also called post-crack development. Here acidity mellows, sweetness rounds, and roast character grows. Too short and the coffee is grassy/sour/underdeveloped; too long and it goes flat then roasty. Measured as a ratio of total time — see DTR."}], "keypoints": ["Drying (~10–12% moisture off) → Maillard/browning (flavor built) → development (from first crack to drop).", "Maillard is where most flavor complexity forms.", "Development balances the trade between underdeveloped (sour/grassy) and overdeveloped (flat/roasty)."]}, "cracks": {"name": "First & Second Crack", "sub": "The roaster's audible landmarks", "group": "read", "accent": "#6E3E1E", "sections": [{"h": "First crack", "body": "Around 196–205°C bean temp, the bean fractures audibly — a popcorn-like snap — as built-up steam and CO2 rupture the cell structure and the bean expands. First crack is the single most important landmark: development time is measured from here, and no coffee is drinkable roasted before it. The sound rolls through the batch; you note its start precisely."}, {"h": "Second crack", "body": "Roughly 224–230°C, a quieter, faster, higher-pitched crackle — more like crisp cereal — as the bean's cell walls fracture further and oils migrate to the surface. Second crack marks the transition into dark-roast territory. Roasts landing before it keep origin character; roasts taken into it become roast-forward."}, {"h": "Reading them by ear", "body": "Experienced roasters roast partly by sound. The timing, intensity, and evenness of first crack tell you about the batch's uniformity and moisture. A ragged, drawn-out first crack often signals uneven green or an uneven roast."}], "keypoints": ["First crack (~196–205°C): the reference point development time is measured from.", "Second crack (~224–230°C): the gateway into dark, roast-forward territory.", "Sound — timing and evenness — is a real diagnostic, not just a landmark."]}, "dtr": {"name": "Development Time Ratio", "sub": "Quantifying the finish", "group": "read", "accent": "#5A2F16", "sections": [{"h": "The definition", "body": "DTR = (time from first crack to drop) ÷ (total roast time), expressed as a percent. If first crack hits at 9:00 and you drop at 11:15 on an 11:15 roast, development is 2:15 of 11:15 ≈ 20%. It's a normalized way to describe how much of the roast happened after first crack."}, {"h": "Typical ranges", "body": "Light filter roasts often run 10–15%. The specialty medium sweet spot sits around 18–22%. Darker roasts climb to 25%+ simply because there's more time past first crack. DTR is a guide, not a target to hit blindly — it's meaningful only alongside how the RoR behaved."}, {"h": "Its limits", "body": "DTR is popular because it's a single comparable number, but it can mislead. Two roasts with identical DTR can taste completely different if one crashed and one glided. Use DTR to describe and compare roasts, not to define quality on its own."}], "keypoints": ["DTR = (first-crack-to-drop time) ÷ (total time), as a percent.", "Rough bands: ~10–15% light, ~18–22% specialty medium, 25%+ dark.", "A comparison tool, not a quality guarantee — always read it with RoR behavior."]}, "chemistry": {"name": "Roasting Chemistry", "sub": "What heat does to the bean", "group": "science", "accent": "#7A4A28", "sections": [{"h": "Maillard & Strecker", "body": "The Maillard reaction between amino acids and reducing sugars is the engine of roast flavor, producing melanoidins (brown color, body) and a huge range of aromatics. Strecker degradation, a branch of it, generates key aldehydes behind malty, nutty, and savory notes. Most of the cup's complexity is Maillard chemistry."}, {"h": "Caramelization", "body": "Sugars break down under heat independent of amino acids, producing sweet, caramel, and eventually bitter compounds as it goes further. Caramelization and Maillard overlap through browning; how you balance heat and time between them shapes the sweetness-versus-roast character trade."}, {"h": "Acids", "body": "Chlorogenic acids degrade with roast, producing quinic and caffeic acids that shift perceived acidity and bitterness. Lighter roasts retain more of the bright origin acids; darker roasts break them down, which is why dark roasts read low-acid and bitter."}, {"h": "Degassing & oils", "body": "Roasting generates large volumes of CO2 trapped in the bean, released over days after roast (degassing) — freshly roasted coffee needs rest before brewing. At darker levels, cell walls fracture enough that oils migrate to the surface, the visible sheen on dark roasts."}], "keypoints": ["Maillard + Strecker chemistry builds most of the cup's flavor and color.", "Caramelization drives sweetness that tips to bitterness if pushed.", "Acids degrade with roast — lighter keeps origin brightness, darker turns low-acid/bitter.", "Roasting produces CO2 (needs degassing rest) and, when dark, surface oils."]}, "heat": {"name": "Heat Transfer", "sub": "Conduction, convection, radiation", "group": "science", "accent": "#8A5A34", "sections": [{"h": "The three modes", "body": "Conduction is heat from direct contact — bean against hot drum metal. Convection is heat carried by hot air/gas moving through the bean mass. Radiation is infrared energy from hot surfaces. Every roaster uses all three, but the balance between them defines how a machine roasts and tastes."}, {"h": "Why the balance matters", "body": "Convection-dominant roasting (lots of moving hot air) heats evenly and quickly and is easy to control — favored for clean, bright modern profiles. Conduction-heavy roasting (hot drum, less airflow) can build body and a heavier cup but risks scorching if unmanaged. Adjusting airflow is largely adjusting the convection-to-conduction balance in real time."}, {"h": "Airflow as a control", "body": "Airflow does three jobs at once: it delivers convective heat, it clears smoke and chaff (which otherwise taint flavor), and it influences how fast the bean sheds or gains heat. Learning a roaster is largely learning how its airflow interacts with its gas."}], "keypoints": ["Conduction (drum contact), convection (hot air), radiation (infrared) — all present, balance defines the machine.", "Convection-forward = even and bright; conduction-heavy = body but scorch-prone.", "Airflow simultaneously delivers heat, clears smoke, and shapes heat exchange."]}, "roasters": {"name": "Roaster Types", "sub": "Drum, fluid-bed, hybrid", "group": "science", "accent": "#95602F", "sections": [{"h": "Drum roasters", "body": "A rotating drum tumbles beans against a heated metal surface with gas heat below and airflow drawn through. The industry workhorse. Strong conductive component gives body; thermal mass makes them stable and forgiving but slower to respond. The default for most commercial specialty and dark roasting."}, {"h": "Fluid-bed (air) roasters", "body": "A stream of hot air both heats and levitates the beans. Almost purely convective: fast, even, very clean and bright in the cup, highly responsive. Popular for sample roasting and light, clarity-focused profiles. Less thermal mass means less forgiving of a mistake — the roast moves quickly."}, {"h": "Hybrids & recirculation", "body": "Many modern machines blur the line: drums with heavily managed airflow, recirculating-air roasters that reuse heat for efficiency and emissions control. The trend is toward more convective control on a drum platform — body of a drum, evenness of air."}], "keypoints": ["Drum: conductive body, stable thermal mass, the commercial default.", "Fluid-bed: convective, fast, clean and bright, less forgiving.", "Modern hybrids add convective control to drum platforms for the best of both."]}, "defects": {"name": "Roast Defects", "sub": "Failure modes and their causes", "group": "practice", "accent": "#5A2F16", "sections": [{"h": "Underdeveloped", "body": "Dropped too early / too fast past first crack. Grassy, sour, sharp, hay-like; may taste thin. Cause is insufficient development — either too little time or a roast so fast the interior never caught up. The most common defect in beginners chasing light roasts."}, {"h": "Baked", "body": "The roast lost momentum — RoR crashed or flat-lined — and dragged through the finish. Tastes flat, hollow, papery, lifeless, with muted aroma. Insidious because the color can look correct. Prevented by maintaining a smooth declining RoR and never stalling."}, {"h": "Scorched & tipped", "body": "Scorching is surface burn from too much conductive heat / too hot a charge — dark blotches on the bean face. Tipping is small burnt spots at the bean's ends (the tips) from excessive early heat. Both come from delivering energy faster than the bean can absorb it evenly."}, {"h": "Roasty / over-developed", "body": "Pushed too far — too dark, too far into second crack for the intent. Ashy, carbony, flat, origin character erased. In dark roasts this is a matter of degree; in a roast meant to be bright, even a little is a defect."}], "keypoints": ["Underdeveloped: grassy/sour — too little development.", "Baked: flat/hollow, correct-looking color — stalled RoR.", "Scorched/tipped: surface and tip burns — heat delivered too fast early.", "Roasty/over-developed: ashy/flat — pushed too dark for the intent."]}, "profiling": {"name": "Sample Roasting & Profiling", "sub": "How a profile actually gets built", "group": "practice", "accent": "#C9A34E", "sections": [{"h": "Start with the green", "body": "Before designing a profile you assess the green: density, moisture, screen size, process (washed/natural/honey), and origin. Dense, high-grown, washed coffees take and want more heat; softer, lower-density or natural coffees roast faster and scorch more easily. The green dictates the starting approach."}, {"h": "Sample roast, then cup", "body": "You roast small sample batches at a few different profiles — vary charge, development time, drop point — then cup them side by side (the SCA cupping protocol is the industry-standard tasting method). Cupping is how you connect a curve to a flavor. You're building a map from roast decisions to cup outcomes for this specific coffee."}, {"h": "Scale to production", "body": "A profile developed on a sample roaster rarely transfers one-to-one to a production drum — thermal mass and batch size change everything. You re-develop at production scale, using the sample cups as your flavor target, then lock the profile once it's repeatable batch to batch."}, {"h": "Iterate and document", "body": "Good roasting is disciplined iteration: change one variable, cup the result, keep notes. A repeatable, documented profile that any roaster on the team can hit is the real deliverable — not a single lucky great batch."}], "keypoints": ["Assess the green first — density, moisture, and process set the approach.", "Sample roast several profiles, then cup side by side to map curve → cup.", "Re-develop at production scale using sample cups as the flavor target.", "Change one variable at a time, document, and lock a repeatable profile."]}}, "GLOSSARY": [{"term": "Green coffee", "def": "Raw, unroasted coffee beans. They're actually the seed of a fruit (the coffee cherry). Green beans are dense, grassy-smelling, and hold about 10 to 12 percent water. They taste like nothing you'd want to drink until they're roasted."}, {"term": "Charge", "def": "The moment you drop the green beans into the hot roaster to start the roast. \"Charge temperature\" is how hot the roaster is at that instant."}, {"term": "Turning point (TP)", "def": "Right after charge, the cold beans pull heat out of the roaster, so the temperature reading drops for a bit, then bottoms out and starts climbing again. That lowest point is the turning point. From here the beans are heating up for the rest of the roast."}, {"term": "Drying phase", "def": "The first stretch of the roast. The beans shed their moisture and turn from green to yellow. They smell grassy, then like hay, then like baking bread. Usually the longest phase."}, {"term": "Maillard phase (browning)", "def": "The middle stretch, from yellow to first crack. Named after the Maillard reaction, the same browning chemistry that crusts bread and sears a steak. This is where most of coffee's flavor and aroma are built."}, {"term": "First crack (1C)", "def": "An audible popping sound, like popcorn or knuckles cracking, around 196°C / 385°F. Steam and pressure inside the bean rupture its structure and it nearly doubles in size. This is the roaster's most important landmark. No coffee is drinkable if dropped before it, and light roasts are dropped shortly after."}, {"term": "Development", "def": "The final phase, measured from first crack to drop. This is where sharp acidity mellows into sweetness and roast character builds. Too short and the coffee tastes grassy and sour; too long and it goes flat, then roasty."}, {"term": "Second crack (2C)", "def": "A second, quieter, faster crackle around 224°C / 435°F, more like crisp cereal than popcorn. Oils start migrating to the bean's surface. This is the gateway to dark roasts. Push past it and coffee turns smoky, then bitter, then toward burnt."}, {"term": "Drop", "def": "The moment you dump the beans out of the roaster into the cooling tray to stop the roast. \"Drop temperature\" is how hot the beans are at that instant, and it's one of the biggest levers on how light or dark the final roast is. This is the term you'll see most, and it just means: roast's done, get them out and cool them fast."}, {"term": "Bean temperature (BT)", "def": "The temperature of the beans during the roast, read by a probe in the roaster. The main number a roaster watches. Note: absolute readings vary by machine and probe, so roasters care more about the shape of the curve than the exact degrees."}, {"term": "Rate of rise (RoR)", "def": "How fast the bean temperature is climbing at any moment, in degrees per interval. It's the slope of the roast curve. A healthy roast has an RoR that smoothly declines from the turning point to the drop. It shouldn't spike up or flatten out."}, {"term": "Roast curve", "def": "The graph a roaster lives by: bean temperature plotted over time, usually with the RoR overlaid. Reading the curve is how you steer a roast and how you repeat a good one."}, {"term": "Development Time Ratio (DTR)", "def": "The share of the total roast that happened after first crack, as a percent. If a 12-minute roast hit first crack at 9:36, that's 2:24 of development, or 20 percent. A quick shorthand for how far a roast was pushed. Light roasts run lower (~10 to 15%), darker ones higher."}, {"term": "Drum roaster", "def": "The industry-standard machine: a rotating metal drum tumbles the beans over a gas flame. Gives coffee body and is stable and forgiving. Most commercial roasting happens on a drum."}, {"term": "Fluid-bed (air) roaster", "def": "A machine that roasts beans on a stream of hot air, like popcorn. Fast, even, and very clean and bright in the cup. Easier to learn on, but less forgiving because it moves quickly."}, {"term": "Airflow", "def": "How much air the roaster pulls through the beans. It does three jobs at once: delivers heat, clears smoke and chaff so they don't taint the flavor, and shapes how fast the beans gain or shed heat. A key control a roaster adjusts throughout."}, {"term": "Chaff", "def": "The papery skin that flakes off the beans as they roast and expand. Roasters clear it with airflow because burnt chaff tastes bad and, in quantity, is a fire hazard."}, {"term": "Agtron", "def": "A numbered scale for measuring roast color, from high numbers (very light) to low numbers (very dark). A standardized way to say how dark a roast is instead of vague words like \"medium.\""}, {"term": "Roast level", "def": "How light or dark a coffee is roasted, from light through medium to dark. It's shorthand: two coffees at the same color can still taste different depending on how they got there."}, {"term": "Cupping", "def": "The industry's standard tasting method: brewing coffees the same controlled way and tasting them side by side to evaluate flavor. How roasters judge whether a roast worked and connect a curve to a cup."}, {"term": "Degassing / resting", "def": "Roasting fills the beans with CO2 that escapes over the following days. Fresh-roasted coffee is usually rested at least 12 to 24 hours before brewing so it's not fizzing with gas, which throws off extraction."}, {"term": "Washed / natural / honey", "def": "Three ways the coffee fruit is processed after picking, before it's shipped as green. Washed is clean and bright, natural is fruity and heavier, honey sits in between. The process changes how the green behaves in the roaster and how it tastes."}], "PROFILE_GROUPS": [["light", "Light"], ["medium", "Medium"], ["mediumdark", "Medium-Dark"], ["dark", "Dark"], ["purpose", "Purpose-Built"]], "METH_GROUPS": [["read", "Reading the Roast"], ["science", "Roast Science"], ["practice", "In Practice"]], "FLAVOR_AXES": [["acidity", "Acidity"], ["aroma", "Aroma"], ["sweetness", "Sweetness"], ["body", "Body"], ["bitterness", "Bitterness"], ["roast", "Roast"]], "APP_VERSION": "v6"}</script>
<script>
const D = JSON.parse(document.getElementById('appdata').textContent);
const {PROFILES,METHODOLOGY,GLOSSARY,PROFILE_GROUPS,METH_GROUPS,FLAVOR_AXES,APP_VERSION}=D;
document.getElementById('verlabel').textContent=APP_VERSION;
document.getElementById('footver').textContent=APP_VERSION;
const app=document.getElementById('app');
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- RADAR RENDERER ---------- */
// vals: {axisKey:1..5}. size px. accent color. opts: {small, color2, vals2}
function radar(vals, size, accent, opts){
  opts=opts||{};
  const axes=FLAVOR_AXES, N=axes.length;
  const cx=size/2, cy=size/2;
  const pad=opts.small?18:44;
  const R=size/2-pad;
  const rings=5;
  const ptFor=(v,i)=>{
    const ang=-Math.PI/2 + i*(2*Math.PI/N);
    const r=R*(v/5);
    return [cx+r*Math.cos(ang), cy+r*Math.sin(ang)];
  };
  let g='';
  // rings
  for(let ring=1;ring<=rings;ring++){
    let pts=[];
    for(let i=0;i<N;i++){
      const ang=-Math.PI/2 + i*(2*Math.PI/N);
      const r=R*(ring/rings);
      pts.push((cx+r*Math.cos(ang)).toFixed(1)+','+(cy+r*Math.sin(ang)).toFixed(1));
    }
    g+=`<polygon points="${pts.join(' ')}" fill="none" stroke="#3a2a1c" stroke-width="1"/>`;
  }
  // spokes + labels
  for(let i=0;i<N;i++){
    const ang=-Math.PI/2 + i*(2*Math.PI/N);
    const ex=cx+R*Math.cos(ang), ey=cy+R*Math.sin(ang);
    g+=`<line x1="${cx}" y1="${cy}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="#3a2a1c" stroke-width="1"/>`;
    if(!opts.small){
      const lx=cx+(R+16)*Math.cos(ang), ly=cy+(R+16)*Math.sin(ang);
      let anchor='middle';
      if(Math.cos(ang)>0.3)anchor='start'; else if(Math.cos(ang)<-0.3)anchor='end';
      g+=`<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" fill="#c9b8a4" font-size="11.5" font-family="ui-sans-serif,system-ui" text-anchor="${anchor}">${axes[i][1]}</text>`;
    }
  }
  const drawShape=(vv,col,fillOp)=>{
    let pts=[];
    for(let i=0;i<N;i++){const p=ptFor(vv[axes[i][0]]||0,i);pts.push(p[0].toFixed(1)+','+p[1].toFixed(1));}
    let s=`<polygon points="${pts.join(' ')}" fill="${col}" fill-opacity="${fillOp}" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>`;
    if(!opts.small){for(let i=0;i<N;i++){const p=ptFor(vv[axes[i][0]]||0,i);s+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="${col}"/>`;}}
    return s;
  };
  g+=drawShape(vals,accent,opts.color2?0.16:0.28);
  if(opts.vals2){g+=drawShape(opts.vals2,opts.color2,0.16);}
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="max-width:100%">${g}</svg>`;
}

/* ---------- ROAST CURVE RENDERER ---------- */
// Parses "a–b" range strings to a midpoint number.
function midRange(s){
  if(s==null)return 0;
  const m=String(s).replace('%','').split(/[–\-]/).map(x=>parseFloat(x)).filter(x=>!isNaN(x));
  return m.length?m.reduce((a,b)=>a+b,0)/m.length:0;
}
// "m:ss" -> seconds
function mmssToSec(s){const p=String(s).split(':').map(Number);return p.length===2?p[0]*60+p[1]:midRange(s)*60;}
// Build BT + RoR sample points for a profile from its curve data. Returns {bt:[[t,temp]],ror:[[t,ror]],marks}
function buildCurve(c){
  const totalSec=midRange(c.totalTime.split('–').map(x=>{const p=x.split(':').map(Number);return p[0]*60+(p[1]||0);}).join('–'));
  // total time as seconds: parse both ends as mm:ss then midpoint
  const ends=c.totalTime.split('–').map(x=>{const p=x.trim().split(':').map(Number);return p[0]*60+(p[1]||0);});
  const total=ends.reduce((a,b)=>a+b,0)/ends.length;
  const dtr=midRange(c.dtr)/100;
  const fcTime=total*(1-dtr);           // first crack occurs so that remaining = dtr
  const charge=midRange(c.chargeC);
  const tp=midRange(c.tpC);
  const tpTime=Math.min(60, total*0.09);// turning point ~ first ~9% or 60s
  const dryEnd=midRange(c.dryEndC);
  const dryTime=total*0.48;             // yellowing ~ 48% of roast
  const fcTemp=midRange(c.fcC);
  const drop=midRange(c.dropC);
  // BT anchor points (time, temp)
  const bt=[[0,charge],[tpTime,tp],[dryTime,dryEnd],[fcTime,fcTemp],[total,drop]];
  // Smooth-sample BT with monotone-ish interpolation between anchors
  const btPts=[];
  const steps=90;
  for(let i=0;i<=steps;i++){
    const t=total*i/steps;
    // find segment
    let a=bt[0],b=bt[1];
    for(let k=0;k<bt.length-1;k++){if(t>=bt[k][0]&&t<=bt[k+1][0]){a=bt[k];b=bt[k+1];break;}}
    const span=(b[0]-a[0])||1; let f=(t-a[0])/span;
    f=f<0?0:f>1?1:f;
    // ease so the turning-point dip and the decelerating climb feel real
    const ef=a===bt[0]?(1-Math.pow(1-f,1.7)):(f*f*(3-2*f)*0.4+f*0.6);
    btPts.push([t, a[1]+(b[1]-a[1])*ef]);
  }
  // RoR = derivative of BT, degrees per 30s, smoothed
  const ror=[];
  for(let i=1;i<btPts.length;i++){
    const dt=btPts[i][0]-btPts[i-1][0];
    const dT=btPts[i][1]-btPts[i-1][1];
    ror.push([btPts[i][0], dt>0?(dT/dt)*30:0]);
  }
  // smooth RoR (moving avg) and clamp negatives near the turn
  const sm=[];
  for(let i=0;i<ror.length;i++){
    let s=0,n=0;for(let k=Math.max(0,i-4);k<=Math.min(ror.length-1,i+4);k++){s+=ror[k][1];n++;}
    sm.push([ror[i][0], Math.max(0,s/n)]);
  }
  return {bt:btPts,ror:sm,total,marks:{tpTime,tp,dryTime,dryEnd,fcTime,fcTemp,drop,charge}};
}
function roastCurve(c,accent,w,h){
  w=w||620;h=h||300;
  const cv=buildCurve(c);
  const L=44,R=44,T=18,B=34;
  const iw=w-L-R, ih=h-T-B;
  const total=cv.total;
  // BT temp scale
  const temps=cv.bt.map(p=>p[1]);
  const tmin=Math.min(...temps)-10, tmax=Math.max(...temps)+8;
  const rorMax=Math.max(...cv.ror.map(p=>p[1]),1)*1.15;
  const X=t=>L+iw*(t/total);
  const Ybt=v=>T+ih*(1-(v-tmin)/(tmax-tmin));
  const Yror=v=>T+ih*(1-v/rorMax);
  const mm=s=>`${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`;
  let g='';
  // phase shading
  const phases=[[0,cv.marks.dryTime,'Drying','#2a1c10'],[cv.marks.dryTime,cv.marks.fcTime,'Maillard','#33230f'],[cv.marks.fcTime,total,'Development','#3d2913']];
  phases.forEach(ph=>{g+=`<rect x="${X(ph[0]).toFixed(1)}" y="${T}" width="${(X(ph[1])-X(ph[0])).toFixed(1)}" height="${ih}" fill="${ph[3]}" opacity="0.55"/>`;
    const mx=(X(ph[0])+X(ph[1]))/2;g+=`<text x="${mx.toFixed(1)}" y="${T+13}" fill="#8f7c66" font-size="10.5" font-family="ui-sans-serif" text-anchor="middle" letter-spacing="0.5">${ph[2]}</text>`;});
  // gridlines (time)
  for(let s=0;s<=total;s+=120){g+=`<line x1="${X(s).toFixed(1)}" y1="${T}" x2="${X(s).toFixed(1)}" y2="${T+ih}" stroke="#3a2a1c" stroke-width="1" opacity="0.5"/><text x="${X(s).toFixed(1)}" y="${h-14}" fill="#8f7c66" font-size="10" text-anchor="middle" font-family="ui-monospace">${mm(s)}</text>`;}
  // RoR line (secondary, thin, muted)
  let rorPath=cv.ror.map((p,i)=>(i?'L':'M')+X(p[0]).toFixed(1)+' '+Yror(p[1]).toFixed(1)).join(' ');
  g+=`<path d="${rorPath}" fill="none" stroke="#7a6a52" stroke-width="1.6" stroke-dasharray="4 3" opacity="0.85"/>`;
  // BT line (primary, accent)
  let btPath=cv.bt.map((p,i)=>(i?'L':'M')+X(p[0]).toFixed(1)+' '+Ybt(p[1]).toFixed(1)).join(' ');
  g+=`<path d="${btPath}" fill="none" stroke="${accent}" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>`;
  // landmark markers
  const mk=(t,v,lab,below)=>{const x=X(t),y=Ybt(v);const ly=below?y+16:y-9;return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.6" fill="${accent}" stroke="#160e08" stroke-width="1.5"/><text x="${x.toFixed(1)}" y="${ly.toFixed(1)}" fill="#f0e6d8" font-size="10.5" text-anchor="middle" font-family="ui-sans-serif" font-weight="600">${lab}</text>`;};
  g+=mk(cv.marks.tpTime,cv.marks.tp,'TP',true);
  // if first crack is within ~8% of total time from the drop, push 1C label below to avoid Drop collision
  const fcClose=(total-cv.marks.fcTime)/total < 0.13;
  g+=mk(cv.marks.fcTime,cv.marks.fcTemp,'1C',fcClose);
  g+=mk(total,cv.marks.drop,'Drop');
  // axis labels
  g+=`<text x="${L-8}" y="${Ybt(tmax)+4}" fill="#8f7c66" font-size="10" text-anchor="end" font-family="ui-monospace">${Math.round(tmax)}°C</text>`;
  g+=`<text x="${L-8}" y="${Ybt(tmin)+4}" fill="#8f7c66" font-size="10" text-anchor="end" font-family="ui-monospace">${Math.round(tmin)}°C</text>`;
  g+=`<text x="${w-R+8}" y="${T+ih-4}" fill="#7a6a52" font-size="10" text-anchor="start" font-family="ui-monospace">RoR</text>`;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${w}px" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}

/* ---------- ROUTING ---------- */
let state={view:'home'};
function setNav(n){document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('on',b.dataset.nav===n));}
function go(view,arg){state={view,arg};render();window.scrollTo(0,0);
  const top=['home','start','profiles','compare','learn'].includes(view)?view:
    (view==='profile'?'profiles':view==='meth'?'learn':'home');
  setNav(top);}

function render(){
  const v=state.view;
  if(v==='home')return home();
  if(v==='start')return startHere();
  if(v==='profiles')return profileList();
  if(v==='profile')return profileDetail(state.arg);
  if(v==='compare')return compare();
  if(v==='learn')return learnList();
  if(v==='meth')return methDetail(state.arg);
  home();
}

/* ---------- START HERE ---------- */
function startHere(){
  const journey=[
    {k:'Green',c:'#7d8f5a',d:"Raw coffee beans — actually fruit seeds — dense, grassy, about 10-12% water. Not drinkable yet."},
    {k:'Charge',c:'#C9A34E',d:"You tip the green beans into the hot roaster. The clock starts. The beans immediately cool the drum down."},
    {k:'Drying',c:'#B07B3E',d:"Beans shed moisture and turn from green to yellow. They smell grassy, then like hay, then like baking bread."},
    {k:'Maillard',c:'#95602F',d:"Yellow to light brown. The browning chemistry that crusts bread kicks in. Most of the flavor is built right here."},
    {k:'First crack',c:'#6E3E1E',d:"A popcorn-like POP around 196°C. Beans nearly double in size. The roaster's key landmark — light roasts drop just after."},
    {k:'Development',c:'#5A2F16',d:"From first crack to the drop. Sharpness mellows into sweetness. Go longer and darker for bolder, roastier coffee."},
    {k:'Drop',c:'#3a2412',d:"You dump the beans into the cooling tray to stop the roast. Done. How dark you let it get before dropping is the whole game."},
  ];
  app.innerHTML=`<div class="wrap">
    <div class="starthero">
      <div class="eyebrow">Start Here</div>
      <h1>New to roasting? Read this first.</h1>
      <p class="lede">Roasting is how raw, grassy green coffee seeds become the brown, aromatic beans you grind and brew. You apply heat over roughly 8 to 17 minutes, the beans dry out, brown, and crack open, and you decide exactly when to stop. Stop early for bright, fruity, light coffee; go longer for bold, dark, roasty coffee. That's the whole craft — everything else is detail.</p>
    </div>

    <div class="block2"><h2 class="bh">The journey, green to cup</h2>
    <p class="bsub">Every roast, on every machine, moves through these stages in order. This is the map.</p>
    <div class="journey">${journey.map((s,i)=>`
      <div class="jstep">
        <div class="jdot" style="background:${s.c}">${i+1}</div>
        ${i<journey.length-1?'<div class="jline"></div>':''}
        <div class="jbody"><h4>${s.k}</h4><p>${s.d}</p></div>
      </div>`).join('')}
    </div></div>

    <div class="block2"><h2 class="bh">The one trade-off to understand</h2>
    <p class="bsub">If you remember nothing else, remember this.</p>
    <div class="tradeoff">
      <div class="tside light"><div class="tlabel">Stop earlier / lighter</div><ul><li>Brighter, more acidic, fruitier</li><li>Origin character shines through</li><li>More delicate, more aromatic</li></ul></div>
      <div class="tarrow">→ darker →</div>
      <div class="tside dark"><div class="tlabel">Stop later / darker</div><ul><li>Bolder, heavier body, more bitter</li><li>Roast flavor takes over origin</li><li>Smoky, toasty, lower acidity</li></ul></div>
    </div>
    <p class="bsub" style="margin-top:14px">The <b>drop</b> — when you pull the beans out — is where you commit to that choice. That's why you saw the word everywhere.</p>
    </div>

    <div class="block2"><h2 class="bh">Every term, in plain English</h2>
    <p class="bsub">The jargon the rest of the app uses. Filter to jump to one.</p>
    <div class="searchwrap" style="max-width:340px;margin-bottom:16px">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <input id="glsearch" type="search" placeholder="Filter terms…" autocomplete="off">
    </div>
    <div class="glist" id="glist">${glossaryRows(GLOSSARY)}</div>
    </div>

    <div class="startcta">
      <p>Ready to see it in action?</p>
      <div class="ctarow">
        <button onclick="go('profiles')">Browse roast profiles →</button>
        <button class="ghost" onclick="go('learn')">Go deeper on the fundamentals →</button>
      </div>
    </div>
    <div style="height:40px"></div>
  </div>`;
  const gs=document.getElementById('glsearch');
  if(gs)gs.oninput=e=>{
    const q=e.target.value.toLowerCase().trim();
    const rows=GLOSSARY.filter(g=>!q||(g.term+' '+g.def).toLowerCase().includes(q));
    document.getElementById('glist').innerHTML=rows.length?glossaryRows(rows):`<div class="empty">No term matches that.</div>`;
  };
}
function glossaryRows(rows){
  return rows.map(g=>`<div class="grow"><div class="gterm">${esc(g.term)}</div><div class="gdef">${esc(g.def)}</div></div>`).join('');
}

/* ---------- HOME ---------- */
function home(){
  const heat=['--heat1','--heat2','--heat3','--heat4','--heat5'].map(h=>`<i style="background:var(${h})"></i>`).join('');
  const nP=Object.keys(PROFILES).length, nM=Object.keys(METHODOLOGY).length;
  app.innerHTML=`
  <section class="hero">
    <div class="wrap">
      <h1>The roast is where green coffee <span class="grad">becomes flavor.</span></h1>
      <p>A working reference for the roastery floor — ${nP} core roast profiles broken down by curve, phase, flavor signature, and failure mode, plus the ${nM} fundamentals every roaster reads by instinct. Built for practitioners, not the shelf.</p>
      <div class="heatbar">${heat}</div>
    </div>
  </section>
  <div class="wrap">
    <div class="seclead"><span class="no">01</span><div><h2>Roast Profiles</h2><p>From Nordic light to Italian dark, plus purpose-built espresso and omni.</p></div></div>
    <div class="grid" style="margin-top:16px">${
      Object.entries(PROFILES).slice(0,6).map(([id,p])=>profileCard(id,p)).join('')

    <div style="margin-top:16px"><button class="back" style="margin:0" onclick="go('profiles')">See all ${nP} profiles →</button></div>

    <div class="seclead"><span class="no">02</span><div><h2>Roasting Knowledge</h2><p>The curve, the chemistry, the machine, and the craft of profiling.</p></div></div>
    <div class="grid" style="margin-top:16px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr))">${
      Object.entries(METHODOLOGY).slice(0,6).map(([id,m])=>methCard(id,m)).join('')
    }</div>
    <div style="margin:16px 0 50px"><button class="back" style="margin:0" onclick="go('learn')">All roasting knowledge →</button></div>
